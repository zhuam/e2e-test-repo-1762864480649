<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四川麻将 - Web版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow: hidden;
        }
        
        .game-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .game-title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
        }
        
        .game-info {
            position: absolute;
            top: 50px;
            right: 20px;
            color: #fff;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 10px 15px;
            border-radius: 10px;
            z-index: 100;
        }
        
        .mahjong-table {
            width: 900px;
            height: 650px;
            background: linear-gradient(145deg, #2d5a27 0%, #1e4d1a 100%);
            border-radius: 20px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5), inset 0 0 100px rgba(0,0,0,0.3);
            border: 8px solid #8b4513;
        }
        
        .table-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 200px;
            background: radial-gradient(ellipse, #3d7a35 0%, #2d5a27 100%);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
        }
        
        .deck-pile {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            justify-content: center;
            align-items: center;
        }
        
        .player-area {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .player-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 15px;
            border-radius: 15px;
            color: white;
            font-size: 14px;
            margin-bottom: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .player-info.current {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .player-cards {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 300px;
        }
        
        .player-top {
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .player-left {
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .player-right {
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .player-bottom {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .card {
            width: 38px;
            height: 52px;
            background: linear-gradient(145deg, #fff 0%, #f0f0f0 100%);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.3);
            transition: all 0.2s ease;
            position: relative;
            border: 1px solid #ddd;
        }
        
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 4px 4px 15px rgba(0,0,0,0.4);
        }
        
        .card.selected {
            transform: translateY(-15px);
            box-shadow: 0 8px 20px rgba(255,215,0,0.6);
            border: 2px solid #ffd700;
        }
        
        .card-back {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: transparent;
        }
        
        .card-back::before {
            content: '🀫';
            font-size: 24px;
            color: rgba(255,255,255,0.3);
        }
        
        .card-horizontal {
            width: 30px;
            height: 40px;
            font-size: 14px;
        }
        
        .card-tiny {
            width: 25px;
            height: 35px;
            font-size: 12px;
        }
        
        .card .suit {
            font-size: 10px;
            margin-top: 2px;
        }
        
        .card.wan { color: #d32f2f; }
        .card.tong { color: #1976d2; }
        .card.tiao { color: #388e3c; }
        .card.zi { color: #7b1fa2; }
        
        .discard-area {
            position: absolute;
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 3px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }
        
        .discard-top {
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .discard-left {
            left: 120px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .discard-right {
            right: 120px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .discard-bottom {
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        .discard-card {
            width: 30px;
            height: 40px;
            font-size: 14px;
        }
        
        .action-buttons {
            position: absolute;
            bottom: 180px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 200;
        }
        
        .action-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .action-btn.hu {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        
        .action-btn.gang {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .action-btn.peng {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        
        .action-btn.pass {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        .action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }
        
        .message-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: #ffd700;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 24px;
            font-weight: bold;
            z-index: 300;
            display: none;
            text-align: center;
            border: 3px solid #ffd700;
        }
        
        .new-game-btn {
            position: absolute;
            top: 10px;
            left: 20px;
            padding: 10px 20px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 100;
        }
        
        .new-game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }
        
        .meld-area {
            display: flex;
            gap: 5px;
            margin-top: 5px;
        }
        
        .meld-group {
            display: flex;
            gap: 2px;
            background: rgba(255,215,0,0.2);
            padding: 3px;
            border-radius: 5px;
        }
        
        .last-discard {
            animation: glow 1s infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px #ffd700; }
            50% { box-shadow: 0 0 20px #ffd700, 0 0 30px #ffd700; }
        }
        
        .score-display {
            position: absolute;
            bottom: 10px;
            left: 20px;
            color: #ffd700;
            font-size: 16px;
            background: rgba(0,0,0,0.5);
            padding: 10px 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-title">🀄 四川麻将 🀄</div>
        <button class="new-game-btn" onclick="startNewGame()">新游戏</button>
        
        <div class="game-info">
            <div>剩余牌数: <span id="remaining-count">0</span></div>
            <div>当前回合: <span id="round-num">1</span></div>
        </div>
        
        <div class="mahjong-table">
            <div class="table-center">
                <div class="deck-pile" id="deck-pile"></div>
            </div>
            
            <div class="player-area player-top">
                <div class="player-info" id="player2-info">电脑玩家2 🤖</div>
                <div class="player-cards" id="player2-cards"></div>
                <div class="meld-area" id="player2-melds"></div>
            </div>
            
            <div class="player-area player-left">
                <div class="player-info" id="player1-info">电脑玩家1 🤖</div>
                <div class="player-cards" id="player1-cards" style="flex-direction: column;"></div>
                <div class="meld-area" id="player1-melds" style="flex-direction: column;"></div>
            </div>
            
            <div class="player-area player-right">
                <div class="player-info" id="player3-info">电脑玩家3 🤖</div>
                <div class="player-cards" id="player3-cards" style="flex-direction: column;"></div>
                <div class="meld-area" id="player3-melds" style="flex-direction: column;"></div>
            </div>
            
            <div class="player-area player-bottom">
                <div class="meld-area" id="player0-melds"></div>
                <div class="player-cards" id="player0-cards"></div>
                <div class="player-info" id="player0-info">玩家(你) 👤</div>
            </div>
            
            <div class="discard-area discard-top" id="discard2"></div>
            <div class="discard-area discard-left" id="discard1"></div>
            <div class="discard-area discard-right" id="discard3"></div>
            <div class="discard-area discard-bottom" id="discard0"></div>
        </div>
        
        <div class="action-buttons" id="action-buttons" style="display: none;">
            <button class="action-btn hu" id="btn-hu" onclick="playerAction('hu')">胡</button>
            <button class="action-btn gang" id="btn-gang" onclick="playerAction('gang')">杠</button>
            <button class="action-btn peng" id="btn-peng" onclick="playerAction('peng')">碰</button>
            <button class="action-btn pass" id="btn-pass" onclick="playerAction('pass')">过</button>
        </div>
        
        <div class="message-area" id="message"></div>
        
        <div class="score-display" id="score-display">
            玩家: 0 | 电脑1: 0 | 电脑2: 0 | 电脑3: 0
        </div>
    </div>

    <script>
        // 麻将牌定义
        const SUITS = ['wan', 'tong', 'tiao'];
        const ZI = ['dong', 'nan', 'xi', 'bei', 'zhong', 'fa', 'bai'];
        const SUIT_NAMES = {wan: '万', tong: '筒', tiao: '条'};
        const ZI_NAMES = {dong: '东', nan: '南', xi: '西', bei: '北', zhong: '中', fa: '发', bai: '白'};
        const ZI_SYMBOLS = {dong: '東', nan: '南', xi: '西', bei: '北', zhong: '中', fa: '發', bai: '白'};
        
        // 游戏状态
        let gameState = {
            deck: [],
            players: [
                { name: '玩家', isHuman: true, cards: [], discards: [], melds: [], score: 0 },
                { name: '电脑1', isHuman: false, cards: [], discards: [], melds: [], score: 0 },
                { name: '电脑2', isHuman: false, cards: [], discards: [], melds: [], score: 0 },
                { name: '电脑3', isHuman: false, cards: [], discards: [], melds: [], score: 0 }
            ],
            currentPlayer: 0,
            lastDiscard: null,
            lastDiscardPlayer: -1,
            lastDiscardFromDraw: false,
            discardIndex: 0,
            isGameOver: false,
            round: 1,
            pendingAction: null
        };
        
        let selectedCardIndex = -1;
        
        // 初始化牌堆（四川麻将108张）
        function initDeck() {
            const deck = [];
            for (let suit of SUITS) {
                for (let num = 1; num <= 9; num++) {
                    for (let i = 0; i < 4; i++) {
                        deck.push({ suit, num, type: 'suit' });
                    }
                }
            }
            // 字牌（风牌和箭牌）
            for (let zi of ZI) {
                for (let i = 0; i < 4; i++) {
                    deck.push({ suit: 'zi', zi, type: 'zi' });
                }
            }
            return shuffle(deck);
        }
        
        // 洗牌
        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        // 发牌
        function dealCards() {
            for (let i = 0; i < 4; i++) {
                gameState.players[i].cards = [];
                gameState.players[i].discards = [];
                gameState.players[i].melds = [];
                for (let j = 0; j < 13; j++) {
                    gameState.players[i].cards.push(gameState.deck.pop());
                }
            }
            // 庄家多摸一张
            gameState.players[0].cards.push(gameState.deck.pop());
        }
        
        // 获取牌的显示文本
        function getCardText(card) {
            if (card.type === 'zi') {
                return ZI_SYMBOLS[card.zi];
            }
            return card.num + SUIT_NAMES[card.suit];
        }
        
        // 获取牌的CSS类
        function getCardClass(card) {
            if (card.type === 'zi') return 'card zi';
            return `card ${card.suit}`;
        }
        
        // 创建牌的HTML元素
        function createCardElement(card, isBack = false, isSmall = false, isHorizontal = false) {
            const div = document.createElement('div');
            div.className = getCardClass(card);
            if (isBack) div.classList.add('card-back');
            if (isSmall) div.classList.add('card-tiny');
            if (isHorizontal) div.classList.add('card-horizontal');
            if (!isBack) {
                div.textContent = getCardText(card);
            }
            return div;
        }
        
        // 渲染游戏界面
        function render() {
            // 更新信息显示
            document.getElementById('remaining-count').textContent = gameState.deck.length;
            document.getElementById('round-num').textContent = gameState.round;
            
            // 更新分数显示
            const scores = gameState.players.map((p, i) => 
                `${i === 0 ? '玩家' : '电脑' + i}: ${p.score}`
            ).join(' | ');
            document.getElementById('score-display').textContent = scores;
            
            // 渲染每个玩家的牌
            for (let i = 0; i < 4; i++) {
                const player = gameState.players[i];
                const cardsDiv = document.getElementById(`player${i}-cards`);
                const meldsDiv = document.getElementById(`player${i}-melds`);
                const infoDiv = document.getElementById(`player${i}-info`);
                
                // 更新当前玩家高亮
                if (i === gameState.currentPlayer) {
                    infoDiv.classList.add('current');
                } else {
                    infoDiv.classList.remove('current');
                }
                
                // 清空现有内容
                cardsDiv.innerHTML = '';
                meldsDiv.innerHTML = '';
                
                // 渲染吃碰杠的牌组
                for (const meld of player.melds) {
                    const meldGroup = document.createElement('div');
                    meldGroup.className = 'meld-group';
                    for (const card of meld.cards) {
                        const cardEl = createCardElement(card, false, i !== 0, i === 1 || i === 3);
                        meldGroup.appendChild(cardEl);
                    }
                    meldsDiv.appendChild(meldGroup);
                }
                
                // 渲染手牌
                const sortedCards = sortCards(player.cards);
                for (let j = 0; j < sortedCards.length; j++) {
                    const card = sortedCards[j];
                    let isBack = !player.isHuman;
                    let isSmall = i !== 0;
                    let isHorizontal = i === 1 || i === 3;
                    
                    const cardEl = createCardElement(card, isBack, isSmall, isHorizontal);
                    
                    if (player.isHuman) {
                        cardEl.onclick = () => selectCard(j);
                        if (j === selectedCardIndex) {
                            cardEl.classList.add('selected');
                        }
                    }
                    
                    cardsDiv.appendChild(cardEl);
                }
                
                // 渲染弃牌区
                const discardDiv = document.getElementById(`discard${i}`);
                discardDiv.innerHTML = '';
                for (const card of player.discards) {
                    const cardEl = createCardElement(card, false, true, false);
                    cardEl.classList.add('discard-card');
                    if (card === gameState.lastDiscard) {
                        cardEl.classList.add('last-discard');
                    }
                    discardDiv.appendChild(cardEl);
                }
            }
        }
        
        // 排序手牌
        function sortCards(cards) {
            return [...cards].sort((a, b) => {
                if (a.type !== b.type) {
                    return a.type === 'zi' ? 1 : -1;
                }
                if (a.type === 'suit') {
                    if (a.suit !== b.suit) {
                        return SUITS.indexOf(a.suit) - SUITS.indexOf(b.suit);
                    }
                    return a.num - b.num;
                }
                return ZI.indexOf(a.zi) - ZI.indexOf(b.zi);
            });
        }
        
        // 选择牌
        function selectCard(index) {
            if (gameState.currentPlayer !== 0 || gameState.isGameOver || gameState.pendingAction) return;
            
            const player = gameState.players[0];
            const sortedCards = sortCards(player.cards);
            
            if (selectedCardIndex === index) {
                // 出牌
                discardCard(0, sortedCards[index], true, true);
                selectedCardIndex = -1;
            } else {
                selectedCardIndex = index;
            }
            render();
        }
        
        // 出牌
        function discardCard(playerIndex, card, fromHand = false, isDrawDiscard = false) {
            const player = gameState.players[playerIndex];
            
            if (fromHand) {
                // 从手牌中找到并移除这张牌
                const cardIndex = player.cards.findIndex(c => cardsEqual(c, card));
                if (cardIndex !== -1) {
                    player.cards.splice(cardIndex, 1);
                }
            }
            
            player.discards.push(card);
            gameState.lastDiscard = card;
            gameState.lastDiscardPlayer = playerIndex;
            gameState.lastDiscardFromDraw = isDrawDiscard;
            
            // 检查其他玩家是否可以胡/碰/杠
            setTimeout(() => checkActions(playerIndex), 100);
        }
        
        // 检查操作（胡/碰/杠）
        function checkActions(discardPlayer) {
            const card = gameState.lastDiscard;
            let canHu = false;
            let canPeng = false;
            let canGang = false;
            
            // 检查所有玩家（除了出牌者）
            for (let i = 0; i < 4; i++) {
                if (i === discardPlayer) continue;
                
                const player = gameState.players[i];
                
                // 检查胡
                if (checkHu(player, card)) {
                    canHu = true;
                    if (player.isHuman) {
                        showActionButtons(true, false, false);
                        gameState.pendingAction = 'hu';
                        return;
                    }
                }
                
                // 检查碰
                if (checkPeng(player, card)) {
                    canPeng = true;
                }
                
                // 检查杠
                if (checkGang(player, card)) {
                    canGang = true;
                }
            }
            
            // 人类玩家可以选择碰/杠（只有当有人打出牌时才能碰杠）
            if (canPeng || canGang) {
                const humanPlayer = gameState.players[0];
                if (discardPlayer !== 0) {
                    const humanCanPeng = checkPeng(humanPlayer, card);
                    const humanCanGang = checkGang(humanPlayer, card);
                    if (humanCanPeng || humanCanGang) {
                        showActionButtons(false, humanCanPeng, humanCanGang);
                        if (humanCanPeng) gameState.pendingAction = 'peng';
                        if (humanCanGang) gameState.pendingAction = 'gang';
                        return;
                    }
                }
            }
            
            // AI自动操作
            if (canHu) {
                for (let i = 0; i < 4; i++) {
                    if (i !== discardPlayer && checkHu(gameState.players[i], card)) {
                        aiAction(i, 'hu');
                        return;
                    }
                }
            }
            
            if (canPeng || canGang) {
                for (let i = 0; i < 4; i++) {
                    if (i === discardPlayer) continue;
                    const player = gameState.players[i];
                    if (checkGang(player, card)) {
                        aiAction(i, 'gang');
                        return;
                    }
                    if (checkPeng(player, card)) {
                        aiAction(i, 'peng');
                        return;
                    }
                }
            }
            
            // 下一个玩家摸牌
            gameState.pendingAction = null;
            nextTurn();
        }
        
        // 显示操作按钮
        function showActionButtons(canHu, canPeng, canGang) {
            const buttons = document.getElementById('action-buttons');
            document.getElementById('btn-hu').style.display = canHu ? 'block' : 'none';
            document.getElementById('btn-peng').style.display = canPeng ? 'block' : 'none';
            document.getElementById('btn-gang').style.display = canGang ? 'block' : 'none';
            buttons.style.display = 'flex';
        }
        
        // 隐藏操作按钮
        function hideActionButtons() {
            document.getElementById('action-buttons').style.display = 'none';
        }
        
        // 玩家操作
        function playerAction(action) {
            hideActionButtons();
            
            const player = gameState.players[0];
            const card = gameState.lastDiscard;
            
            if (action === 'hu') {
                player.melds.push({ type: 'hu', cards: [card] });
                showMessage('🎉 恭喜你胡牌了！ 🎉');
                player.score += 100;
                endGame();
                return;
            }
            
            if (action === 'peng') {
                executePeng(0, card);
            } else if (action === 'gang') {
                executeGang(0, card);
            } else {
                gameState.pendingAction = null;
                nextTurn();
            }
        }
        
        // AI操作
        function aiAction(playerIndex, action) {
            const player = gameState.players[playerIndex];
            const card = gameState.lastDiscard;
            
            if (action === 'hu') {
                player.melds.push({ type: 'hu', cards: [card] });
                const isSelfDraw = gameState.lastDiscardFromDraw;
                if (isSelfDraw) {
                    showMessage(`🎉 ${player.name} 自摸胡牌！`);
                    player.score += 150;
                } else {
                    showMessage(`😢 ${player.name} 胡牌了！`);
                    player.score += 100;
                }
                endGame();
            } else if (action === 'peng') {
                executePeng(playerIndex, card);
            } else if (action === 'gang') {
                executeGang(playerIndex, card);
            }
        }
        
        // 执行碰
        function executePeng(playerIndex, card) {
            const player = gameState.players[playerIndex];
            const discardPlayerIndex = gameState.lastDiscardPlayer;

            // 从弃牌中移除最后一张牌
            const discardPile = gameState.players[discardPlayerIndex].discards;
            if (discardPile.length > 0 && cardsEqual(discardPile[discardPile.length - 1], card)) {
                discardPile.pop();
            }
            
            // 从手牌中找出两张相同的牌
            let removed = 0;
            player.cards = player.cards.filter(c => {
                if (cardsEqual(c, card) && removed < 2) {
                    removed++;
                    return false;
                }
                return true;
            });
            
            player.melds.push({ type: 'peng', cards: [card, card, card] });
            
            gameState.currentPlayer = playerIndex;
            gameState.pendingAction = null;
            showMessage(`${player.name} 碰！`);
            
            render();
            
            // 碰后需要出牌
            setTimeout(() => {
                if (player.isHuman) {
                    showMessage('请出一张牌');
                } else {
                    aiDiscard(playerIndex);
                }
            }, 500);
        }
        
        // 执行杠
        function executeGang(playerIndex, card) {
            const player = gameState.players[playerIndex];
            const discardPlayerIndex = gameState.lastDiscardPlayer;

            // 从弃牌中移除最后一张牌
            const discardPile = gameState.players[discardPlayerIndex].discards;
            if (discardPile.length > 0 && cardsEqual(discardPile[discardPile.length - 1], card)) {
                discardPile.pop();
            }
            
            // 从手牌中找出三张相同的牌
            let removed = 0;
            player.cards = player.cards.filter(c => {
                if (cardsEqual(c, card) && removed < 3) {
                    removed++;
                    return false;
                }
                return true;
            });
            
            player.melds.push({ type: 'gang', cards: [card, card, card, card] });
            player.score += 10;
            
            gameState.currentPlayer = playerIndex;
            gameState.pendingAction = null;
            showMessage(`${player.name} 杠！`);
            
            render();
            
            // 杠后摸牌
            setTimeout(() => {
                drawCard(playerIndex, true);
                if (!player.isHuman) {
                    aiDiscard(playerIndex);
                }
            }, 500);
        }
        
        // 下一回合
        function nextTurn() {
            gameState.currentPlayer = (gameState.currentPlayer + 1) % 4;
            
            // 摸牌
            if (gameState.deck.length === 0) {
                showMessage('流局！没有牌了');
                endGame();
                return;
            }
            
            drawCard(gameState.currentPlayer);
            
            render();
            
            // AI出牌
            if (!gameState.players[gameState.currentPlayer].isHuman) {
                setTimeout(() => aiDiscard(gameState.currentPlayer), 800);
            }
        }
        
        // 摸牌
        function drawCard(playerIndex, fromGang = false) {
            const player = gameState.players[playerIndex];
            
            if (gameState.deck.length === 0) {
                showMessage('流局！没有牌了');
                endGame();
                return;
            }
            
            const card = gameState.deck.pop();
            player.cards.push(card);
            
            render();
            
            // 检查自摸
            if (checkHu(player, null)) {
                if (player.isHuman) {
                    showMessage('🎉 自摸胡牌！ 🎉');
                    player.score += 150;
                } else {
                    showMessage(`😢 ${player.name} 自摸胡牌了！`);
                    player.score += 150;
                }
                endGame();
                return;
            }
            
            // 检查暗杠
            const anGangCards = findAnGang(player);
            if (anGangCards.length > 0) {
                if (player.isHuman) {
                    // 暂时不显示杠的选择，简化处理
                    showMessage('请出牌');
                } else {
                    // AI有暗杠时可能会杠
                    if (Math.random() > 0.5) {
                        executeAnGang(playerIndex, anGangCards[0]);
                        return;
                    }
                }
            }
            
            // 如果是杠后的摸牌，需要出牌
            if (fromGang) {
                if (player.isHuman) {
                    showMessage('请出牌');
                } else {
                    aiDiscard(playerIndex);
                }
            } else {
                // 普通摸牌后AI出牌
                if (!player.isHuman) {
                    setTimeout(() => aiDiscard(playerIndex), 500);
                }
            }
        }
        
        // 查找暗杠
        function findAnGang(player) {
            const results = [];
            const counts = {};
            for (const card of player.cards) {
                const key = getCardKey(card);
                counts[key] = (counts[key] || 0) + 1;
            }
            for (const key in counts) {
                if (counts[key] === 4) {
                    const card = player.cards.find(c => getCardKey(c) === key);
                    if (card) results.push(card);
                }
            }
            return results;
        }
        
        // 执行暗杠
        function executeAnGang(playerIndex, card) {
            const player = gameState.players[playerIndex];
            
            // 从手牌中找出四张相同的牌
            let removed = 0;
            player.cards = player.cards.filter(c => {
                if (cardsEqual(c, card) && removed < 4) {
                    removed++;
                    return false;
                }
                return true;
            });
            
            player.melds.push({ type: 'angang', cards: [card, card, card, card] });
            player.score += 20;
            
            gameState.currentPlayer = playerIndex;
            gameState.pendingAction = null;
            showMessage(`${player.name} 暗杠！`);
            
            render();
            
            // 杠后摸牌
            setTimeout(() => {
                drawCard(playerIndex, true);
                if (!player.isHuman) {
                    aiDiscard(playerIndex);
                }
            }, 500);
        }
        
        // AI出牌
        function aiDiscard(playerIndex) {
            const player = gameState.players[playerIndex];
            
            // 简单AI：优先打出孤张
            if (player.cards.length > 0) {
                // 计算每张牌的对子数量
                const cardCounts = {};
                for (const card of player.cards) {
                    const key = getCardKey(card);
                    cardCounts[key] = (cardCounts[key] || 0) + 1;
                }
                
                // 找到孤张（只有1张的牌）
                let lonelyCards = player.cards.filter(c => cardCounts[getCardKey(c)] === 1);
                
                let cardToDiscard;
                if (lonelyCards.length > 0) {
                    // 随机选一张孤张
                    cardToDiscard = lonelyCards[Math.floor(Math.random() * lonelyCards.length)];
                } else {
                    // 没有孤张，随机出一张
                    const randomIndex = Math.floor(Math.random() * player.cards.length);
                    cardToDiscard = player.cards[randomIndex];
                }
                
                discardCard(playerIndex, cardToDiscard, true, true);
                render();
            }
        }
        
        // 检查胡牌
        function checkHu(player, extraCard) {
            const cards = extraCard ? [...player.cards, extraCard] : [...player.cards];
            
            // 牌数必须为2、5、8、11、14张才能胡
            if (cards.length % 3 !== 2) return false;
            
            // 检查七对子（仅当14张时）
            if (cards.length === 14 && checkQiDui(cards)) return true;
            
            // 检查标准胡牌（4组+1对）
            return checkStandardHu(cards);
        }
        
        // 检查七对子
        function checkQiDui(cards) {
            if (cards.length !== 14) return false;
            
            const counts = {};
            for (const card of cards) {
                const key = getCardKey(card);
                counts[key] = (counts[key] || 0) + 1;
            }
            
            for (const key in counts) {
                if (counts[key] % 2 !== 0) return false;
            }
            return true;
        }
        
        // 检查标准胡牌
        function checkStandardHu(cards) {
            if (cards.length < 14) return false;
            
            const sorted = sortCards(cards);
            return findHu(sorted, 0);
        }
        
        function findHu(cards, melds) {
            if (cards.length === 0) return melds === 4;
            if (cards.length % 3 !== 2) return false;
            
            // 找将
            for (let i = 0; i < cards.length - 1; i++) {
                if (cardsEqual(cards[i], cards[i + 1])) {
                    const remaining = cards.filter((_, idx) => idx !== i && idx !== i + 1);
                    if (findMelds(remaining, 3)) return true;
                }
            }
            return false;
        }
        
        function findMelds(cards, targetMelds) {
            if (cards.length === 0) return targetMelds === 0;
            if (targetMelds === 0) return cards.length === 0;
            
            const first = cards[0];
            
            // 检查刻子
            if (cards.filter(c => cardsEqual(c, first)).length >= 3) {
                const remaining = removeCards(cards, first, 3);
                if (findMelds(remaining, targetMelds - 1)) return true;
            }
            
            // 检查顺子（只能同花色）
            if (first.type === 'suit') {
                const num2 = cards.find(c => c.suit === first.suit && c.num === first.num + 1);
                const num3 = cards.find(c => c.suit === first.suit && c.num === first.num + 2);
                if (num2 && num3 && first.num <= 7) {
                    const remaining = removeCard(removeCard(removeCard(cards, first), num2), num3);
                    if (findMelds(remaining, targetMelds - 1)) return true;
                }
            }
            
            return false;
        }
        
        // 辅助函数
        function cardsEqual(a, b) {
            return a.type === b.type && a.suit === b.suit && 
                   (a.type === 'zi' ? a.zi === b.zi : a.num === b.num);
        }
        
        function getCardKey(card) {
            if (card.type === 'zi') return card.zi;
            return card.suit + card.num;
        }
        
        function removeCards(cards, card, count) {
            let result = [...cards];
            let removed = 0;
            result = result.filter(c => {
                if (cardsEqual(c, card) && removed < count) {
                    removed++;
                    return false;
                }
                return true;
            });
            return result;
        }
        
        function removeCard(cards, card) {
            return removeCards(cards, card, 1);
        }
        
        // 检查碰
        function checkPeng(player, card) {
            return player.cards.filter(c => cardsEqual(c, card)).length >= 2;
        }
        
        // 检查杠
        function checkGang(player, card) {
            return player.cards.filter(c => cardsEqual(c, card)).length >= 3;
        }
        
        // 检查暗杠
        function checkAnGang(player) {
            for (const card of player.cards) {
                if (player.cards.filter(c => cardsEqual(c, card)).length === 4) {
                    return true;
                }
            }
            return false;
        }
        
        // 显示消息
        function showMessage(msg) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 2000);
        }
        
        // 结束游戏
        function endGame() {
            gameState.isGameOver = true;
            render();
            
            setTimeout(() => {
                if (confirm('游戏结束！是否开始新游戏？')) {
                    startNewGame();
                }
            }, 2000);
        }
        
        // 开始新游戏
        function startNewGame() {
            gameState = {
                deck: initDeck(),
                players: [
                    { name: '玩家', isHuman: true, cards: [], discards: [], melds: [], score: gameState.players ? gameState.players[0].score : 0 },
                    { name: '电脑1', isHuman: false, cards: [], discards: [], melds: [], score: gameState.players ? gameState.players[1].score : 0 },
                    { name: '电脑2', isHuman: false, cards: [], discards: [], melds: [], score: gameState.players ? gameState.players[2].score : 0 },
                    { name: '电脑3', isHuman: false, cards: [], discards: [], melds: [], score: gameState.players ? gameState.players[3].score : 0 }
                ],
                currentPlayer: 0,
                lastDiscard: null,
                lastDiscardPlayer: -1,
                discardIndex: 0,
                isGameOver: false,
                round: (gameState.round || 0) + 1
            };
            
            selectedCardIndex = -1;
            hideActionButtons();
            
            dealCards();
            render();
            
            // 检查庄家是否天胡
            if (checkHu(gameState.players[0], null)) {
                showMessage('🎉 天胡！ 🎉');
                gameState.players[0].score += 200;
                endGame();
            }
        }
        
        // 初始化游戏
        startNewGame();
    </script>
