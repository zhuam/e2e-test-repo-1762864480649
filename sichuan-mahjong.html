<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四川麻将 - Sichuan Mahjong</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .game-container {
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            max-width: 1000px;
            width: 100%;
        }

        .game-header {
            text-align: center;
            margin-bottom: 15px;
            color: #fff;
        }

        .game-header h1 {
            font-size: 2em;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 50%, #fa709a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            color: #a0a0a0;
            font-size: 0.9em;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .info-value {
            color: #4facfe;
            font-weight: bold;
        }

        .game-table {
            position: relative;
            background: linear-gradient(145deg, #0d4a2e 0%, #1a5c3a 50%, #0f5132 100%);
            border-radius: 15px;
            padding: 20px;
            min-height: 480px;
            box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.3), inset 0 0 100px rgba(255,255,255,0.05);
            border: 3px solid #2d7a4a;
        }

        .player-area {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .player-info {
            background: rgba(255, 255, 255, 0.12);
            padding: 6px 12px;
            border-radius: 15px;
            margin-bottom: 8px;
            color: #fff;
            font-size: 0.8em;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .player-info.active {
            background: rgba(79, 172, 254, 0.4);
            border-color: #4facfe;
            animation: pulse 2s infinite;
            box-shadow: 0 0 15px rgba(79, 172, 254, 0.5);
        }

        .player-info.hu {
            background: rgba(255, 215, 0, 0.4);
            border-color: #ffd700;
            animation: huPulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(79, 172, 254, 0.4); }
            50% { box-shadow: 0 0 0 8px rgba(79, 172, 254, 0); }
        }

        @keyframes huPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .player-hand {
            display: flex;
            gap: 2px;
            justify-content: center;
            flex-wrap: nowrap;
        }

        .tile {
            width: 36px;
            height: 50px;
            background: linear-gradient(145deg, #fff 0%, #f0f0f0 100%);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255,255,255,0.8);
            position: relative;
            user-select: none;
            border: 1px solid #ccc;
        }

        .tile:hover {
            transform: translateY(-8px);
            box-shadow: 4px 6px 12px rgba(0, 0, 0, 0.3);
        }

        .tile.selected {
            transform: translateY(-12px);
            box-shadow: 0 8px 15px rgba(79, 172, 254, 0.5);
            border: 2px solid #4facfe;
            background: linear-gradient(145deg, #e3f2fd 0%, #bbdefb 100%);
        }

        .tile.hidden {
            background: linear-gradient(145deg, #1565C0 0%, #0D47A1 100%);
            color: transparent;
            border: 1px solid #1565C0;
        }

        .tile.hidden::before {
            content: '🀫';
            color: #fff;
            opacity: 0.4;
            font-size: 0.9em;
        }

        .tile.last-drawn {
            border: 2px solid #4facfe;
            box-shadow: 0 0 10px rgba(79, 172, 254, 0.6);
        }

        /* 花色颜色 */
        .tile.wan { color: #c41e3a; }
        .tile.tong { color: #1976d2; }
        .tile.tiao { color: #388e3c; }

        /* 玩家位置 */
        .player-top {
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .player-left {
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .player-left .player-hand {
            flex-direction: column;
        }

        .player-left .tile {
            width: 32px;
            height: 44px;
            font-size: 0.95em;
        }

        .player-right {
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
        }

        .player-right .player-hand {
            flex-direction: column;
        }

        .player-right .tile {
            width: 32px;
            height: 44px;
            font-size: 0.95em;
        }

        .player-bottom {
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
        }

        .player-bottom .tile {
            width: 42px;
            height: 56px;
            font-size: 1.25em;
        }

        /* 中央区域 */
        .center-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 400px;
        }

        .discard-pool {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            gap: 3px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.25);
            padding: 10px;
            border-radius: 8px;
            max-height: 150px;
            overflow-y: auto;
        }

        .discard-pool .tile {
            width: 32px;
            height: 42px;
            font-size: 0.9em;
            cursor: default;
        }

        .discard-pool .tile:hover {
            transform: none;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
        }

        .action-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .action-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        .btn-discard {
            background: linear-gradient(45deg, #e91e63 0%, #f06292 100%);
        }

        .btn-hu {
            background: linear-gradient(45deg, #ffd700 0%, #ffb300 100%);
            color: #333;
        }

        .btn-gang {
            background: linear-gradient(45deg, #4caf50 0%, #8bc34a 100%);
        }

        .btn-peng {
            background: linear-gradient(45deg, #ff9800 0%, #ffc107 100%);
            color: #333;
        }

        .btn-ignore {
            background: linear-gradient(45deg, #9e9e9e 0%, #bdbdbd 100%);
            color: #333;
        }

        .deck-info {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 10px;
            border-radius: 10px;
            color: #fff;
            font-size: 0.75em;
            backdrop-filter: blur(10px);
        }

        /* 游戏消息弹窗 */
        .game-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 30px 50px;
            border-radius: 20px;
            font-size: 1.4em;
            z-index: 1000;
            display: none;
            text-align: center;
            animation: fadeIn 0.4s ease;
            border: 2px solid rgba(79, 172, 254, 0.5);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .game-message.show {
            display: block;
        }

        .game-message hu {
            color: #ffd700;
            font-size: 1.5em;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .new-game-btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .new-game-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        /* 动作提示 */
        .action-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 15px 25px;
            border-radius: 10px;
            color: #fff;
            font-size: 1em;
            z-index: 100;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .action-tip.show {
            display: block;
        }

        /* 吃碰杠区域 */
        .melds-area {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .meld {
            display: flex;
            gap: 1px;
        }

        .meld .tile {
            width: 28px;
            height: 38px;
            font-size: 0.8em;
            cursor: default;
        }

        .meld .tile:hover {
            transform: none;
        }

        .meld.peng .tile {
            background: linear-gradient(145deg, #fff3e0 0%, #ffe0b2 100%);
        }

        .meld.gang .tile {
            background: linear-gradient(145deg, #e8f5e9 0%, #c8e6c9 100%);
        }

        .meld.chi .tile {
            background: linear-gradient(145deg, #e3f2fd 0%, #bbdefb 100%);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .game-container {
                padding: 10px;
            }

            .game-header h1 {
                font-size: 1.5em;
            }

            .game-info {
                gap: 15px;
                font-size: 0.8em;
            }

            .tile {
                width: 28px;
                height: 40px;
                font-size: 0.9em;
            }

            .player-bottom .tile {
                width: 32px;
                height: 44px;
                font-size: 1em;
            }

            .game-table {
                padding: 15px;
                min-height: 380px;
            }

            .action-btn {
                padding: 8px 14px;
                font-size: 0.8em;
            }

            .discard-pool .tile {
                width: 26px;
                height: 34px;
                font-size: 0.75em;
            }
        }

        /* 滚动条美化 */
        .discard-pool::-webkit-scrollbar {
            width: 5px;
        }

        .discard-pool::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 3px;
        }

        .discard-pool::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🀄 四川麻将 Sichuan Mahjong</h1>
            <div class="game-info">
                <div class="info-item">剩余牌: <span class="info-value" id="remaining-count">108</span></div>
                <div class="info-item">当前: <span class="info-value" id="current-player-name">玩家</span></div>
                <div class="info-item">庄家: <span class="info-value" id="dealer-name">玩家</span></div>
            </div>
        </div>

        <div class="game-table">
            <div class="deck-info">
                牌墙: <span id="deck-count">108</span>
            </div>

            <!-- 顶部玩家 (Bot 2 - 上家) -->
            <div class="player-area player-top">
                <div class="player-info" id="player-2-info">
                    🤖 电脑玩家 2
                    <div>牌: <span id="player-2-count">13</span></div>
                </div>
                <div class="player-hand" id="player-2-hand"></div>
                <div class="melds-area" id="player-2-melds"></div>
            </div>

            <!-- 左侧玩家 (Bot 1 - 对家) -->
            <div class="player-area player-left">
                <div class="player-info" id="player-1-info">
                    🤖 电脑玩家 1
                    <div>牌: <span id="player-1-count">13</span></div>
                </div>
                <div class="player-hand" id="player-1-hand"></div>
                <div class="melds-area" id="player-1-melds"></div>
            </div>

            <!-- 右侧玩家 (Bot 3 - 下家) -->
            <div class="player-area player-right">
                <div class="player-info" id="player-3-info">
                    🤖 电脑玩家 3
                    <div>牌: <span id="player-3-count">13</span></div>
                </div>
                <div class="player-hand" id="player-3-hand"></div>
                <div class="melds-area" id="player-3-melds"></div>
            </div>

            <!-- 中央区域 -->
            <div class="center-area">
                <div class="discard-pool" id="discard-pool"></div>
                <div class="action-buttons" id="action-buttons">
                    <button class="action-btn btn-discard" id="btn-discard" onclick="discardTile()">出牌</button>
                    <button class="action-btn btn-peng" id="btn-peng" onclick="pengAction()">碰</button>
                    <button class="action-btn btn-gang" id="btn-gang" onclick="gangAction()">杠</button>
                    <button class="action-btn btn-hu" id="btn-hu" onclick="huAction()">胡</button>
                    <button class="action-btn btn-ignore" id="btn-ignore" onclick="ignoreAction()" style="display:none;">过</button>
                </div>
            </div>

            <!-- 底部玩家 (人类) -->
            <div class="player-area player-bottom">
                <div class="player-info" id="player-0-info">
                    👤 玩家 (你)
                    <div>牌: <span id="player-0-count">13</span></div>
                </div>
                <div class="player-hand" id="player-0-hand"></div>
                <div class="melds-area" id="player-0-melds"></div>
            </div>
        </div>
    </div>

    <!-- 游戏消息弹窗 -->
    <div class="game-message" id="game-message">
        <div id="message-text"></div>
        <button class="new-game-btn" onclick="startNewGame()">再玩一局</button>
    </div>

    <!-- 动作提示 -->
    <div class="action-tip" id="action-tip"></div>

    <script>
        // ==================== 游戏配置 ====================
        const TILE_SYMBOLS = {
            wan: ['🀇', '🀈', '🀉', '🀊', '🀋', '🀌', '🀍', '🀎', '🀏'],
            tong: ['🀙', '🀚', '🀛', '🀜', '🀝', '🀞', '🀟', '🀠', '🀡'],
            tiao: ['🀐', '🀑', '🀒', '🀓', '🀔', '🀕', '🀖', '🀗', '🀘']
        };

        // ==================== 游戏状态 ====================
        const gameState = {
            players: [
                { name: '玩家', hand: [], discarded: [], melds: [], isBot: false },
                { name: '电脑玩家1', hand: [], discarded: [], melds: [], isBot: true },
                { name: '电脑玩家2', hand: [], discarded: [], melds: [], isBot: true },
                { name: '电脑玩家3', hand: [], discarded: [], melds: [], isBot: true }
            ],
            currentPlayer: 0,
            deck: [],
            discardPool: [],
            selectedTile: null,
            dealer: 0,
            lastDiscardedTile: null,
            lastDiscardedPlayer: null,
            isGameOver: false,
            waitingForAction: false,
            pendingActions: [],
            extraTile: null
        };

        // ==================== 牌操作 ====================
        function createDeck() {
            const deck = [];
            // 四川麻将：万、筒、条各9种，每种4张 = 108张
            ['wan', 'tong', 'tiao'].forEach(suit => {
                for (let value = 1; value <= 9; value++) {
                    for (let i = 0; i < 4; i++) {
                        deck.push({
                            suit: suit,
                            value: value,
                            symbol: TILE_SYMBOLS[suit][value - 1],
                            id: `${suit}-${value}-${i}-${Date.now()}-${Math.random()}`
                        });
                    }
                }
            });
            return shuffleDeck(deck);
        }

        function shuffleDeck(deck) {
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        function sortHand(hand) {
            hand.sort((a, b) => {
                if (a.suit !== b.suit) {
                    const suitOrder = { 'wan': 0, 'tong': 1, 'tiao': 2 };
                    return suitOrder[a.suit] - suitOrder[b.suit];
                }
                return a.value - b.value;
            });
        }

        // ==================== 游戏流程 ====================
        function startNewGame() {
            // 重置游戏状态
            gameState.players.forEach(player => {
                player.hand = [];
                player.discarded = [];
                player.melds = [];
            });
            gameState.deck = createDeck();
            gameState.discardPool = [];
            gameState.currentPlayer = gameState.dealer;
            gameState.selectedTile = null;
            gameState.lastDiscardedTile = null;
            gameState.lastDiscardedPlayer = null;
            gameState.isGameOver = false;
            gameState.waitingForAction = false;
            gameState.pendingActions = [];
            gameState.extraTile = null;

            document.getElementById('game-message').classList.remove('show');

            dealTiles();
            updateUI();

            // 庄家先摸牌
            setTimeout(() => {
                drawTile(gameState.currentPlayer);
            }, 800);
        }

        function dealTiles() {
            // 每个玩家发13张牌
            for (let i = 0; i < 13; i++) {
                gameState.players.forEach(player => {
                    if (gameState.deck.length > 0) {
                        player.hand.push(gameState.deck.pop());
                    }
                });
            }

            // 排序手牌
            gameState.players.forEach(player => {
                sortHand(player.hand);
            });
        }

        function drawTile(playerIndex) {
            if (gameState.isGameOver) return;

            const player = gameState.players[playerIndex];

            if (gameState.deck.length === 0) {
                endGame('流局！牌墙已空');
                return;
            }

            const tile = gameState.deck.pop();
            player.hand.push(tile);
            gameState.extraTile = tile;
            sortHand(player.hand);

            updateUI();

            // 检查是否自摸
            if (checkHu(player.hand)) {
                if (player.isBot) {
                    setTimeout(() => {
                        endGame(`🎉 ${player.name} 自摸胡牌！`);
                    }, 600);
                } else {
                    showTip('你可以自摸胡牌！');
                    document.getElementById('btn-hu').disabled = false;
                    enablePlayerActions();
                }
                return;
            }

            // 检查暗杠
            const availableGang = findGangTile(player.hand);
            if (availableGang) {
                if (player.isBot) {
                    // 机器人有一定概率杠
                    if (Math.random() > 0.4) {
                        setTimeout(() => {
                            performGang(playerIndex, availableGang);
                        }, 600);
                        return;
                    }
                } else {
                    document.getElementById('btn-gang').disabled = false;
                }
            }

            // 机器人或玩家出牌
            if (player.isBot && !gameState.isGameOver) {
                setTimeout(() => {
                    botPlay(playerIndex);
                }, 800);
            } else if (!player.isBot && !gameState.isGameOver) {
                enablePlayerActions();
            }
        }

        // ==================== 机器人AI ====================
        function botPlay(playerIndex) {
            if (gameState.isGameOver) return;

            const player = gameState.players[playerIndex];

            // 选择要打出的牌
            const tileToDiscard = selectBotDiscardTile(player.hand);

            if (tileToDiscard) {
                discardTileInternal(playerIndex, tileToDiscard);
            }
        }

        function selectBotDiscardTile(hand) {
            // 统计每张牌的数量
            const tileCounts = {};
            hand.forEach(tile => {
                const key = `${tile.suit}-${tile.value}`;
                tileCounts[key] = (tileCounts[key] || 0) + 1;
            });

            // 策略1: 优先打出孤张（没有相邻牌的牌）
            const loneTiles = hand.filter(tile => {
                const key = `${tile.suit}-${tile.value}`;
                if (tileCounts[key] > 1) return false; // 不打对子

                // 检查是否有相邻的牌
                let hasNeighbor = false;
                // 检查顺子
                if (tile.value >= 2) {
                    const prevKey = `${tile.suit}-${tile.value - 1}`;
                    if (tileCounts[prevKey]) hasNeighbor = true;
                }
                if (tile.value <= 8) {
                    const nextKey = `${tile.suit}-${tile.value + 1}`;
                    if (tileCounts[nextKey]) hasNeighbor = true;
                }
                return !hasNeighbor;
            });

            if (loneTiles.length > 0) {
                return loneTiles[Math.floor(Math.random() * loneTiles.length)];
            }

            // 策略2: 打出一个对子中的一张（保留搭子）
            const pairs = hand.filter(tile => tileCounts[`${tile.suit}-${tile.value}`] === 2);
            if (pairs.length > 0) {
                return pairs[Math.floor(Math.random() * pairs.length)];
            }

            // 策略3: 随机打一张
            return hand[Math.floor(Math.random() * hand.length)];
        }

        function findGangTile(hand) {
            const tileCounts = {};
            hand.forEach(tile => {
                const key = `${tile.suit}-${tile.value}`;
                tileCounts[key] = (tileCounts[key] || 0) + 1;
            });

            for (const tile of hand) {
                const key = `${tile.suit}-${tile.value}`;
                if (tileCounts[key] === 4) {
                    return tile;
                }
            }
            return null;
        }

        // ==================== 出牌 ====================
        function discardTile() {
            if (gameState.selectedTile === null) {
                showTip('请先选择一张牌');
                return;
            }

            const player = gameState.players[gameState.currentPlayer];
            const tileIndex = player.hand.findIndex(t => t.id === gameState.selectedTile.id);

            if (tileIndex === -1) return;

            const tile = player.hand.splice(tileIndex, 1)[0];
            gameState.extraTile = null;
            gameState.selectedTile = null;
            discardTileInternal(gameState.currentPlayer, tile);
        }

        function discardTileInternal(playerIndex, tile) {
            const player = gameState.players[playerIndex];
            player.discarded.push(tile);
            gameState.discardPool.push(tile);
            gameState.lastDiscardedTile = tile;
            gameState.lastDiscardedPlayer = playerIndex;

            updateUI();

            // 检查其他玩家是否可以动作
            setTimeout(() => {
                checkActionsAfterDiscard(playerIndex, tile);
            }, 300);
        }

        // ==================== 碰杠胡检测 ====================
        function checkActionsAfterDiscard(discardPlayerIndex, tile) {
            gameState.pendingActions = [];

            // 检查每个玩家的动作
            for (let i = 0; i < gameState.players.length; i++) {
                if (i === discardPlayerIndex) continue;

                const player = gameState.players[i];

                // 胡牌检测
                const tempHand = [...player.hand, tile];
                if (checkHu(tempHand)) {
                    gameState.pendingActions.push({ player: i, type: 'hu', tile: tile });
                    continue;
                }

                // 碰检测
                if (canPeng(player.hand, tile)) {
                    gameState.pendingActions.push({ player: i, type: 'peng', tile: tile });
                }
            }

            // 按优先级排序：胡 > 碰
            gameState.pendingActions.sort((a, b) => {
                const priority = { 'hu': 0, 'peng': 1 };
                return priority[a.type] - priority[b.type];
            });

            if (gameState.pendingActions.length > 0) {
                processNextAction();
            } else {
                // 没有动作，继续下一个玩家
                setTimeout(() => {
                    nextPlayer();
                }, 400);
            }
        }

        function processNextAction() {
            if (gameState.pendingActions.length === 0) {
                nextPlayer();
                return;
            }

            const action = gameState.pendingActions.shift();
            const player = gameState.players[action.player];

            if (player.isBot) {
                // 机器人动作
                setTimeout(() => {
                    if (action.type === 'hu') {
                        endGame(`🎉 ${player.name} 胡牌！`);
                    } else if (action.type === 'peng') {
                        // 机器人有概率选择碰
                        if (Math.random() > 0.3) {
                            performPeng(action.player, action.tile);
                        } else {
                            processNextAction();
                        }
                    }
                }, 500);
            } else {
                // 玩家动作
                if (action.type === 'hu') {
                    showTip('你可以胡牌了！');
                    document.getElementById('btn-hu').disabled = false;
                    document.getElementById('btn-ignore').style.display = 'inline-block';
                    disableDiscardButton();
                } else if (action.type === 'peng') {
                    showTip('你可以碰牌！');
                    document.getElementById('btn-peng').disabled = false;
                    document.getElementById('btn-ignore').style.display = 'inline-block';
                    disableDiscardButton();
                }
            }
        }

        function canPeng(hand, tile) {
            const count = hand.filter(t =>
                t.suit === tile.suit && t.value === tile.value
            ).length;
            return count >= 2;
        }

        function performPeng(playerIndex, tile) {
            const player = gameState.players[playerIndex];

            // 找到两张相同的牌（通过ID确保唯一性）
            const tilesToRemove = [];
            for (let i = 0; i < player.hand.length; i++) {
                if (tilesToRemove.length < 2 &&
                    player.hand[i].suit === tile.suit &&
                    player.hand[i].value === tile.value) {
                    tilesToRemove.push(i);
                }
            }

            // 移除两张牌
            tilesToRemove.sort((a, b) => b - a).forEach(idx => {
                player.hand.splice(idx, 1);
            });

            // 记录碰副露（使用新对象，避免引用问题）
            const meldTiles = [
                { ...tile, id: tile.id + '-meld1' },
                { ...tile, id: tile.id + '-meld2' },
                { ...tile, id: tile.id + '-meld3' }
            ];
            player.melds.push({
                type: 'peng',
                tiles: meldTiles
            });

            // 从弃牌池移除被碰的牌
            const discardIdx = gameState.discardPool.findIndex(t =>
                t.suit === tile.suit && t.value === tile.value
            );
            if (discardIdx > -1) {
                gameState.discardPool.splice(discardIdx, 1);
            }

            gameState.currentPlayer = playerIndex;
            gameState.lastDiscardedTile = null;
            gameState.lastDiscardedPlayer = null;
            gameState.extraTile = null;
            gameState.pendingActions = [];

            updateUI();
            hideTip();

            // 碰后出牌
            if (player.isBot) {
                setTimeout(() => {
                    botPlay(playerIndex);
                }, 800);
            } else {
                enablePlayerActions();
            }
        }

        function performGang(playerIndex, tile) {
            const player = gameState.players[playerIndex];

            // 移除四张相同的牌
            const remainingHand = [];
            let removedCount = 0;

            for (const t of player.hand) {
                if (removedCount < 4 && t.suit === tile.suit && t.value === tile.value) {
                    removedCount++;
                } else {
                    remainingHand.push(t);
                }
            }

            player.hand = remainingHand;

            // 记录杠副露
            const meldTiles = [];
            for (let i = 0; i < 4; i++) {
                meldTiles.push({ ...tile, id: tile.id + '-gang' + i });
            }
            player.melds.push({
                type: 'gang',
                tiles: meldTiles
            });

            gameState.currentPlayer = playerIndex;
            gameState.lastDiscardedTile = null;
            gameState.lastDiscardedPlayer = null;
            gameState.extraTile = null;

            updateUI();

            // 杠后摸牌
            setTimeout(() => {
                drawTile(playerIndex);
            }, 600);
        }

        // ==================== 胡牌检测 ====================
        function checkHu(hand) {
            if (hand.length % 3 !== 2) return false;

            // 创建牌计数
            const tileCounts = {};
            hand.forEach(tile => {
                const key = `${tile.suit}-${tile.value}`;
                tileCounts[key] = (tileCounts[key] || 0) + 1;
            });

            // 尝试每种牌作为将牌
            for (const key of Object.keys(tileCounts)) {
                if (tileCounts[key] >= 2) {
                    const testCounts = { ...tileCounts };
                    testCounts[key] -= 2;

                    if (canFormSets(testCounts)) {
                        return true;
                    }
                }
            }

            return false;
        }

        function canFormSets(tileCounts) {
            // 深拷贝
            const counts = { ...tileCounts };

            // 尝试组成刻子
            for (const key of Object.keys(counts)) {
                while (counts[key] >= 3) {
                    counts[key] -= 3;
                }
            }

            // 尝试组成顺子
            for (const suit of ['wan', 'tong', 'tiao']) {
                for (let value = 1; value <= 7; value++) {
                    const key1 = `${suit}-${value}`;
                    const key2 = `${suit}-${value + 1}`;
                    const key3 = `${suit}-${value + 2}`;

                    while ((counts[key1] || 0) > 0 && (counts[key2] || 0) > 0 && (counts[key3] || 0) > 0) {
                        counts[key1]--;
                        counts[key2]--;
                        counts[key3]--;
                    }
                }
            }

            // 检查是否全部用完
            return Object.values(counts).every(count => count === 0);
        }

        // ==================== 玩家动作 ====================
        function pengAction() {
            if (!gameState.lastDiscardedTile) return;
            document.getElementById('btn-ignore').style.display = 'none';
            performPeng(0, gameState.lastDiscardedTile);
        }

        function gangAction() {
            const player = gameState.players[0];
            const gangTile = findGangTile(player.hand);

            if (gangTile) {
                performGang(0, gangTile);
            }
        }

        function huAction() {
            endGame('🎉 恭喜！你胡牌了！');
        }

        function ignoreAction() {
            document.getElementById('btn-ignore').style.display = 'none';
            document.getElementById('btn-peng').disabled = true;
            document.getElementById('btn-hu').disabled = true;
            hideTip();
            processNextAction();
        }

        function nextPlayer() {
            gameState.currentPlayer = (gameState.currentPlayer + 1) % 4;
            gameState.selectedTile = null;
            gameState.extraTile = null;

            updateUI();
            drawTile(gameState.currentPlayer);
        }

        // ==================== UI操作 ====================
        function enablePlayerActions() {
            document.getElementById('btn-discard').disabled = false;

            const player = gameState.players[0];
            const gangTile = findGangTile(player.hand);
            document.getElementById('btn-gang').disabled = !gangTile;

            document.getElementById('btn-peng').disabled = true;
            document.getElementById('btn-hu').disabled = true;
            document.getElementById('btn-ignore').style.display = 'none';
        }

        function disablePlayerActions() {
            document.getElementById('btn-discard').disabled = true;
            document.getElementById('btn-peng').disabled = true;
            document.getElementById('btn-gang').disabled = true;
            document.getElementById('btn-hu').disabled = true;
            document.getElementById('btn-ignore').style.display = 'none';
        }

        function disableDiscardButton() {
            document.getElementById('btn-discard').disabled = true;
        }

        function showTip(message) {
            const tip = document.getElementById('action-tip');
            tip.textContent = message;
            tip.classList.add('show');
            setTimeout(() => {
                tip.classList.remove('show');
            }, 2000);
        }

        function hideTip() {
            document.getElementById('action-tip').classList.remove('show');
        }

        function showMessage(message) {
            showTip(message);
        }

        function endGame(message) {
            gameState.isGameOver = true;
            document.getElementById('message-text').innerHTML = message;
            document.getElementById('game-message').classList.add('show');
            disablePlayerActions();
        }

        function updateUI() {
            // 更新信息
            document.getElementById('remaining-count').textContent = gameState.deck.length;
            document.getElementById('deck-count').textContent = gameState.deck.length;
            document.getElementById('current-player-name').textContent = gameState.players[gameState.currentPlayer].name;
            document.getElementById('dealer-name').textContent = gameState.players[gameState.dealer].name;

            // 更新每个玩家
            gameState.players.forEach((player, index) => {
                const handElement = document.getElementById(`player-${index}-hand`);
                const countElement = document.getElementById(`player-${index}-count`);
                const infoElement = document.getElementById(`player-${index}-info`);
                const meldsElement = document.getElementById(`player-${index}-melds`);

                handElement.innerHTML = '';
                countElement.textContent = player.hand.length;

                // 当前玩家高亮
                if (index === gameState.currentPlayer) {
                    infoElement.classList.add('active');
                } else {
                    infoElement.classList.remove('active');
                }

                // 渲染副露
                meldsElement.innerHTML = '';
                player.melds.forEach(meld => {
                    const meldDiv = document.createElement('div');
                    meldDiv.className = `meld ${meld.type}`;
                    meld.tiles.forEach(tile => {
                        const tileEl = document.createElement('div');
                        tileEl.className = `tile ${tile.suit}`;
                        tileEl.textContent = tile.symbol;
                        meldDiv.appendChild(tileEl);
                    });
                    meldsElement.appendChild(meldDiv);
                });

                // 渲染手牌
                player.hand.forEach((tile, tileIndex) => {
                    const tileElement = document.createElement('div');
                    tileElement.className = `tile ${tile.suit}`;

                    // 最后摸到的牌高亮
                    if (index === gameState.currentPlayer &&
                        gameState.extraTile &&
                        tile.id === gameState.extraTile.id) {
                        tileElement.classList.add('last-drawn');
                    }

                    if (index === 0) {
                        // 玩家可见
                        tileElement.textContent = tile.symbol;
                        tileElement.onclick = () => selectTile(tile, tileElement);

                        // 恢复选中状态
                        if (gameState.selectedTile && gameState.selectedTile.id === tile.id) {
                            tileElement.classList.add('selected');
                        }
                    } else {
                        // 机器人隐藏
                        tileElement.classList.add('hidden');
                    }

                    handElement.appendChild(tileElement);
                });
            });

            // 渲染弃牌池
            const discardPoolElement = document.getElementById('discard-pool');
            discardPoolElement.innerHTML = '';
            gameState.discardPool.forEach(tile => {
                const tileElement = document.createElement('div');
                tileElement.className = `tile ${tile.suit}`;
                tileElement.textContent = tile.symbol;
                discardPoolElement.appendChild(tileElement);
            });
        }

        function selectTile(tile, element) {
            // 移除之前的选择
            document.querySelectorAll('.tile.selected').forEach(el => {
                el.classList.remove('selected');
            });

            // 选择新牌
            element.classList.add('selected');
            gameState.selectedTile = tile;
        }

        // ==================== 初始化 ====================
        window.onload = function() {
            startNewGame();
        };
    </script>
</body>
