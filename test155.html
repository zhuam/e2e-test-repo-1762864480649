<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋游戏 - Go Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 900px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .player-info.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
        }

        .stone-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .stone-black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }

        .stone-white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border: 1px solid #ccc;
        }

        .board-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .board {
            background: linear-gradient(135deg, #d4a574 0%, #c19660 100%);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.3),
                inset 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        .board::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            background: 
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 34px,
                    rgba(0,0,0,0.1) 34px,
                    rgba(0,0,0,0.1) 35px
                ),
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 34px,
                    rgba(0,0,0,0.1) 34px,
                    rgba(0,0,0,0.1) 35px
                );
            pointer-events: none;
            border-radius: 4px;
        }

        .grid {
            display: grid;
            gap: 0;
        }

        .cell {
            width: 35px;
            height: 35px;
            border: 1px solid rgba(139, 90, 43, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: background 0.2s ease;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .cell .stone {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            position: absolute;
            transition: all 0.2s ease;
            animation: placeStone 0.3s ease;
        }

        @keyframes placeStone {
            0% {
                transform: scale(0);
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
            }
        }

        .cell .stone.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
            box-shadow: 2px 2px 6px rgba(0,0,0,0.5);
        }

        .cell .stone.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            box-shadow: 2px 2px 6px rgba(0,0,0,0.3);
            border: 1px solid #ccc;
        }

        .cell .star-point {
            width: 8px;
            height: 8px;
            background: #8b5a2b;
            border-radius: 50%;
            position: absolute;
        }

        .cell.last-move .stone::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 2px solid #ff6b6b;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-pass {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-pass:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 87, 108, 0.4);
        }

        .btn-new {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-new:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 254, 0.4);
        }

        .btn-undo {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            color: white;
        }

        .btn-undo:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(250, 112, 154, 0.4);
        }

        .message {
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.info {
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            color: #006064;
        }

        .message.success {
            background: linear-gradient(135deg, #c8e6c9 0%, #a5d6a7 100%);
            color: #1b5e20;
        }

        .message.warning {
            background: linear-gradient(135deg, #fff9c4 0%, #fff59d 100%);
            color: #f57f17;
        }

        .message.error {
            background: linear-gradient(135deg, #ffcdd2 0%, #ef9a9a 100%);
            color: #c62828;
        }

        .captured {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .captured-count {
            font-size: 1.2em;
            font-weight: bold;
        }

        .small-stone {
            width: 16px;
            height: 16px;
            border-radius: 50%;
        }

        @media (max-width: 600px) {
            .cell {
                width: 28px;
                height: 28px;
            }
            
            .cell .stone {
                width: 22px;
                height: 22px;
            }
            
            h1 {
                font-size: 1.5em;
            }
            
            .game-info {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 围棋游戏</h1>
        
        <div class="game-info">
            <div class="player-info active" id="blackPlayer">
                <div class="stone-icon stone-black"></div>
                <div>
                    <div>黑方</div>
                    <div class="captured">
                        提子: <span class="captured-count" id="blackCaptures">0</span>
                    </div>
                </div>
            </div>
            
            <div class="player-info" id="whitePlayer">
                <div class="stone-icon stone-white"></div>
                <div>
                    <div>白方</div>
                    <div class="captured">
                        提子: <span class="captured-count" id="whiteCaptures">0</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="board-container">
            <div class="board">
                <div class="grid" id="board"></div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn-pass" onclick="pass()">🚫 跳过 (Pass)</button>
            <button class="btn-undo" onclick="undo()">↩️ 悔棋</button>
            <button class="btn-new" onclick="newGame()">🔄 新游戏</button>
        </div>
        
        <div class="message info" id="message">黑方先行，请点击棋盘落子</div>
    </div>

    <script>
        const BOARD_SIZE = 19;
        const EMPTY = 0;
        const BLACK = 1;
        const WHITE = 2;
        
        let board = [];
        let currentPlayer = BLACK;
        let blackCaptures = 0;
        let whiteCaptures = 0;
        let passCount = 0;
        let lastMove = null;
        let previousBoard = null;
        let koPoint = null;
        let moveHistory = [];
        
        const starPoints = [
            [3, 3], [3, 9], [3, 15],
            [9, 3], [9, 9], [9, 15],
            [15, 3], [15, 9], [15, 15]
        ];
        
        function initBoard() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY));
            renderBoard();
            updateDisplay();
        }
        
        function renderBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            boardElement.style.gridTemplateColumns = `repeat(${BOARD_SIZE}, 35px)`;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    if (board[i][j] !== EMPTY) {
                        const stone = document.createElement('div');
                        stone.className = `stone ${board[i][j] === BLACK ? 'black' : 'white'}`;
                        cell.appendChild(stone);
                    }
                    
                    if (lastMove && lastMove.row === i && lastMove.col === j) {
                        cell.classList.add('last-move');
                    }
                    
                    // 星位点
                    if (starPoints.some(([r, c]) => r === i && c === j)) {
                        const starPoint = document.createElement('div');
                        starPoint.className = 'star-point';
                        cell.appendChild(starPoint);
                    }
                    
                    cell.addEventListener('click', () => handleCellClick(i, j));
                    boardElement.appendChild(cell);
                }
            }
        }
        
        function handleCellClick(row, col) {
            if (board[row][col] !== EMPTY) {
                showMessage('该位置已有棋子', 'warning');
                return;
            }
            
            // 检查打劫
            if (koPoint && koPoint.row === row && koPoint.col === col) {
                showMessage('打劫中，不能立即提回', 'error');
                return;
            }
            
            // 保存之前的状态用于悔棋
            saveState();
            
            // 尝试落子
            board[row][col] = currentPlayer;
            
            // 检查提子
            const opponent = currentPlayer === BLACK ? WHITE : BLACK;
            const captured = checkCaptures(row, col, opponent);
            
            // 检查自杀
            if (captured.length === 0 && countLiberties(row, col, currentPlayer) === 0) {
                board[row][col] = EMPTY;
                showMessage('不能自杀！', 'error');
                restoreState();
                return;
            }
            
            // 处理打劫
            if (captured.length === 1) {
                const liberties = countLiberties(row, col, currentPlayer);
                const capturedStone = captured[0];
                const group = getGroup(row, col, currentPlayer);
                
                if (liberties === 1 && group.length === 1) {
                    koPoint = { row: capturedStone.row, col: capturedStone.col };
                } else {
                    koPoint = null;
                }
            } else {
                koPoint = null;
            }
            
            // 执行提子
            for (const stone of captured) {
                board[stone.row][stone.col] = EMPTY;
            }
            
            // 更新提子数
            if (currentPlayer === BLACK) {
                blackCaptures += captured.length;
            } else {
                whiteCaptures += captured.length;
            }
            
            lastMove = { row, col };
            passCount = 0;
            
            renderBoard();
            switchPlayer();
            showMessage(`落子成功！`, 'success');
        }
        
        function checkCaptures(row, col, color) {
            const captured = [];
            const neighbors = getNeighbors(row, col);
            
            for (const neighbor of neighbors) {
                if (board[neighbor.row][neighbor.col] === color) {
                    const group = getGroup(neighbor.row, neighbor.col, color);
                    if (countGroupLiberties(group) === 0) {
                        captured.push(...group);
                    }
                }
            }
            
            return captured;
        }
        
        function getGroup(row, col, color) {
            const group = [];
            const visited = new Set();
            const stack = [{ row, col }];
            
            while (stack.length > 0) {
                const pos = stack.pop();
                const key = `${pos.row},${pos.col}`;
                
                if (visited.has(key)) continue;
                visited.add(key);
                
                if (board[pos.row][pos.col] === color) {
                    group.push(pos);
                    
                    const neighbors = getNeighbors(pos.row, pos.col);
                    for (const neighbor of neighbors) {
                        if (!visited.has(`${neighbor.row},${neighbor.col}`)) {
                            stack.push(neighbor);
                        }
                    }
                }
            }
            
            return group;
        }
        
        function countLiberties(row, col, color) {
            const group = getGroup(row, col, color);
            return countGroupLiberties(group);
        }
        
        function countGroupLiberties(group) {
            const liberties = new Set();
            
            for (const stone of group) {
                const neighbors = getNeighbors(stone.row, stone.col);
                for (const neighbor of neighbors) {
                    if (board[neighbor.row][neighbor.col] === EMPTY) {
                        liberties.add(`${neighbor.row},${neighbor.col}`);
                    }
                }
            }
            
            return liberties.size;
        }
        
        function getNeighbors(row, col) {
            const neighbors = [];
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            
            for (const [dr, dc] of directions) {
                const newRow = row + dr;
                const newCol = col + dc;
                
                if (newRow >= 0 && newRow < BOARD_SIZE && newCol >= 0 && newCol < BOARD_SIZE) {
                    neighbors.push({ row: newRow, col: newCol });
                }
            }
            
            return neighbors;
        }
        
        function switchPlayer() {
            currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
            updateDisplay();
        }
        
        function updateDisplay() {
            const blackPlayer = document.getElementById('blackPlayer');
            const whitePlayer = document.getElementById('whitePlayer');
            
            if (currentPlayer === BLACK) {
                blackPlayer.classList.add('active');
                whitePlayer.classList.remove('active');
            } else {
                whitePlayer.classList.add('active');
                blackPlayer.classList.remove('active');
            }
            
            document.getElementById('blackCaptures').textContent = blackCaptures;
            document.getElementById('whiteCaptures').textContent = whiteCaptures;
        }
        
        function showMessage(text, type = 'info') {
            const messageElement = document.getElementById('message');
            messageElement.textContent = text;
            messageElement.className = `message ${type}`;
        }
        
        function pass() {
            passCount++;
            showMessage(`${currentPlayer === BLACK ? '黑方' : '白方'}跳过`, 'info');
            
            if (passCount >= 2) {
                showMessage('双方连续跳过，游戏结束！', 'success');
                return;
            }
            
            koPoint = null;
            lastMove = null;
            switchPlayer();
        }
        
        function newGame() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY));
            currentPlayer = BLACK;
            blackCaptures = 0;
            whiteCaptures = 0;
            passCount = 0;
            lastMove = null;
            koPoint = null;
            moveHistory = [];
            
            renderBoard();
            updateDisplay();
            showMessage('新游戏开始，黑方先行', 'info');
        }
        
        function saveState() {
            previousBoard = board.map(row => [...row]);
            moveHistory.push({
                board: previousBoard,
                player: currentPlayer,
                blackCaptures,
                whiteCaptures,
                lastMove: lastMove ? { ...lastMove } : null
            });
        }
        
        function restoreState() {
            if (moveHistory.length === 0) return;
            
            const state = moveHistory.pop();
            board = state.board;
            currentPlayer = state.player;
            blackCaptures = state.blackCaptures;
            whiteCaptures = state.whiteCaptures;
            lastMove = state.lastMove;
            koPoint = null;
            
            renderBoard();
            updateDisplay();
        }
        
        function undo() {
            if (moveHistory.length === 0) {
                showMessage('没有可以悔棋的步骤', 'warning');
                return;
            }
            
            restoreState();
            showMessage('已悔棋', 'info');
        }
        
        // 初始化游戏
        initBoard();
    </script>
</body>
</html>
