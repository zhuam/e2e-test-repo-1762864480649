<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋 - Go Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1em;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .player-info.active {
            background: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transform: scale(1.05);
        }

        .stone-indicator {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }

        .stone-indicator.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }

        .stone-indicator.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border: 1px solid #ccc;
        }

        .board-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .board {
            position: relative;
            background: linear-gradient(135deg, #d4a574 0%, #c49464 100%);
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        canvas {
            display: block;
            border-radius: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 25px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-pass {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-reset {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .message {
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 8px;
            font-weight: bold;
            color: #333;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .captured {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>围棋 Go Game</h1>
        
        <div class="game-info">
            <div class="player-info active" id="black-player">
                <span class="stone-indicator black"></span>
                <span>Black</span>
                <div class="captured" id="black-captured">Captured: 0</div>
            </div>
            <div class="player-info" id="white-player">
                <span class="stone-indicator white"></span>
                <span>White</span>
                <div class="captured" id="white-captured">Captured: 0</div>
            </div>
        </div>

        <div class="board-wrapper">
            <div class="board">
                <canvas id="go-board" width="570" height="570"></canvas>
            </div>
        </div>

        <div class="controls">
            <button class="btn-pass" onclick="pass()">Pass</button>
            <button class="btn-reset" onclick="resetGame()">Reset Game</button>
        </div>

        <div class="message" id="message">Black's turn - Click to place a stone</div>
    </div>

    <script>
        const canvas = document.getElementById('go-board');
        const ctx = canvas.getContext('2d');
        const BOARD_SIZE = 19;
        const CELL_SIZE = 30;
        const PADDING = 15;
        const STONE_RADIUS = 13;

        let board = [];
        let currentPlayer = 'black';
        let blackCaptured = 0;
        let whiteCaptured = 0;
        let passCount = 0;
        let lastBoard = null;
        let gameOver = false;

        function initBoard() {
            board = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                board[i] = [];
                for (let j = 0; j < BOARD_SIZE; j++) {
                    board[i][j] = null;
                }
            }
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid lines
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                // Horizontal lines
                ctx.beginPath();
                ctx.moveTo(PADDING, PADDING + i * CELL_SIZE);
                ctx.lineTo(PADDING + (BOARD_SIZE - 1) * CELL_SIZE, PADDING + i * CELL_SIZE);
                ctx.stroke();
                
                // Vertical lines
                ctx.beginPath();
                ctx.moveTo(PADDING + i * CELL_SIZE, PADDING);
                ctx.lineTo(PADDING + i * CELL_SIZE, PADDING + (BOARD_SIZE - 1) * CELL_SIZE);
                ctx.stroke();
            }
            
            // Draw star points (hoshi)
            const starPoints = [3, 9, 15];
            ctx.fillStyle = '#000';
            for (let i of starPoints) {
                for (let j of starPoints) {
                    ctx.beginPath();
                    ctx.arc(PADDING + i * CELL_SIZE, PADDING + j * CELL_SIZE, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            // Draw stones
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j]) {
                        drawStone(i, j, board[i][j]);
                    }
                }
            }
        }

        function drawStone(x, y, color) {
            const centerX = PADDING + x * CELL_SIZE;
            const centerY = PADDING + y * CELL_SIZE;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, STONE_RADIUS, 0, Math.PI * 2);
            
            if (color === 'black') {
                const gradient = ctx.createRadialGradient(centerX - 4, centerY - 4, 0, centerX, centerY, STONE_RADIUS);
                gradient.addColorStop(0, '#555');
                gradient.addColorStop(1, '#000');
                ctx.fillStyle = gradient;
            } else {
                const gradient = ctx.createRadialGradient(centerX - 4, centerY - 4, 0, centerX, centerY, STONE_RADIUS);
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#ddd');
                ctx.fillStyle = gradient;
            }
            
            ctx.fill();
            ctx.strokeStyle = color === 'white' ? '#ccc' : '#000';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function getIntersection(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            const x = clientX - rect.left;
            const y = clientY - rect.top;
            
            const gridX = Math.round((x - PADDING) / CELL_SIZE);
            const gridY = Math.round((y - PADDING) / CELL_SIZE);
            
            if (gridX >= 0 && gridX < BOARD_SIZE && gridY >= 0 && gridY < BOARD_SIZE) {
                return { x: gridX, y: gridY };
            }
            return null;
        }

        function getLiberties(x, y, color, visited) {
            const key = `${x},${y}`;
            if (visited.has(key)) return [];
            visited.add(key);
            
            const liberties = [];
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            
            for (const [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;
                
                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                    if (board[nx][ny] === null) {
                        if (!liberties.some(l => l.x === nx && l.y === ny)) {
                            liberties.push({ x: nx, y: ny });
                        }
                    } else if (board[nx][ny] === color) {
                        const moreLiberties = getLiberties(nx, ny, color, visited);
                        for (const lib of moreLiberties) {
                            if (!liberties.some(l => l.x === lib.x && l.y === lib.y)) {
                                liberties.push(lib);
                            }
                        }
                    }
                }
            }
            
            return liberties;
        }

        function getGroup(x, y, color, visited) {
            const key = `${x},${y}`;
            if (visited.has(key)) return [];
            visited.add(key);
            
            const group = [{ x, y }];
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            
            for (const [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;
                
                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                    if (board[nx][ny] === color) {
                        const more = getGroup(nx, ny, color, visited);
                        group.push(...more);
                    }
                }
            }
            
            return group;
        }

        function captureStones(x, y) {
            const opponent = currentPlayer === 'black' ? 'white' : 'black';
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            let captured = 0;
            
            for (const [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;
                
                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                    if (board[nx][ny] === opponent) {
                        const visited = new Set();
                        const group = getGroup(nx, ny, opponent, visited);
                        const liberties = getLiberties(nx, ny, opponent, new Set());
                        
                        if (liberties.length === 0) {
                            for (const stone of group) {
                                board[stone.x][stone.y] = null;
                                captured++;
                            }
                        }
                    }
                }
            }
            
            return captured;
        }

        function isValidMove(x, y) {
            if (board[x][y] !== null) return { valid: false, reason: 'Position already occupied' };

            // Temporarily place stone
            board[x][y] = currentPlayer;

            // Check if this move captures opponent stones
            const opponent = currentPlayer === 'black' ? 'white' : 'black';
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            let captures = false;

            for (const [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;

                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                    if (board[nx][ny] === opponent) {
                        const liberties = getLiberties(nx, ny, opponent, new Set());
                        if (liberties.length === 0) {
                            captures = true;
                            break;
                        }
                    }
                }
            }

            // Check if the placed stone has liberties or captures
            const liberties = getLiberties(x, y, currentPlayer, new Set());
            const hasLiberties = liberties.length > 0;

            // Ko rule check - simulate the move and check board state
            let isKo = false;
            if (captures) {
                // Temporarily capture stones to check board state
                const tempBoard = cloneBoard(board);
                let captureCount = 0;
                for (const [dx, dy] of directions) {
                    const nx = x + dx;
                    const ny = y + dy;
                    if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                        if (tempBoard[nx][ny] === opponent) {
                            const groupVisited = new Set();
                            const group = getGroup(nx, ny, opponent, groupVisited);
                            const lib = getLiberties(nx, ny, opponent, new Set());
                            if (lib.length === 0) {
                                for (const stone of group) {
                                    tempBoard[stone.x][stone.y] = null;
                                    captureCount++;
                                }
                            }
                        }
                    }
                }
                if (lastBoard && boardEquals(tempBoard, lastBoard)) {
                    isKo = true;
                }
            }

            // Remove temporary stone
            board[x][y] = null;

            // Suicide move check
            if (!captures && !hasLiberties) {
                return { valid: false, reason: 'Suicide move is not allowed' };
            }

            // Ko rule check
            if (isKo) {
                return { valid: false, reason: 'Ko rule - cannot repeat board position' };
            }

            return { valid: true };
        }

        function boardEquals(b1, b2) {
            if (!b2) return false;
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (b1[i][j] !== b2[i][j]) return false;
                }
            }
            return true;
        }

        function cloneBoard(b) {
            const newBoard = [];
            for (let i = 0; i < BOARD_SIZE; i++) {
                newBoard[i] = [...b[i]];
            }
            return newBoard;
        }

        canvas.addEventListener('click', function(e) {
            if (gameOver) return;

            const pos = getIntersection(e.clientX, e.clientY);
            if (!pos) return;

            const validation = isValidMove(pos.x, pos.y);
            if (!validation.valid) {
                setMessage(validation.reason || 'Invalid move! Try again.');
                return;
            }

            // Save board state for ko rule
            const beforeBoard = cloneBoard(board);

            // Place stone
            board[pos.x][pos.y] = currentPlayer;

            // Capture opponent stones
            const captured = captureStones(pos.x, pos.y);
            if (captured > 0) {
                if (currentPlayer === 'black') {
                    blackCaptured += captured;
                } else {
                    whiteCaptured += captured;
                }
                updateCaptured();
            }

            // Check ko rule (double check - also checked in isValidMove)
            if (boardEquals(board, lastBoard)) {
                board = beforeBoard;
                setMessage('Ko rule! Cannot repeat board position.');
                return;
            }

            lastBoard = beforeBoard;
            passCount = 0;

            drawBoard();
            switchPlayer();
        });

        function switchPlayer() {
            currentPlayer = currentPlayer === 'black' ? 'white' : 'black';
            updatePlayerInfo();
            setMessage(`${currentPlayer === 'black' ? 'Black' : 'White'}'s turn - Click to place a stone`);
        }

        function updatePlayerInfo() {
            const blackPlayer = document.getElementById('black-player');
            const whitePlayer = document.getElementById('white-player');
            
            if (currentPlayer === 'black') {
                blackPlayer.classList.add('active');
                whitePlayer.classList.remove('active');
            } else {
                whitePlayer.classList.add('active');
                blackPlayer.classList.remove('active');
            }
        }

        function updateCaptured() {
            document.getElementById('black-captured').textContent = `Captured: ${blackCaptured}`;
            document.getElementById('white-captured').textContent = `Captured: ${whiteCaptured}`;
        }

        function setMessage(msg) {
            document.getElementById('message').textContent = msg;
        }

        function pass() {
            if (gameOver) return;

            const passedPlayer = currentPlayer;
            passCount++;

            if (passCount >= 2) {
                gameOver = true;
                const winner = blackCaptured > whiteCaptured ? 'Black' : (whiteCaptured > blackCaptured ? 'White' : 'Tie');
                setMessage(`Game Over! Both players passed. ${winner === 'Tie' ? "It's a tie!" : winner + ' wins!'}`);
                return;
            }

            switchPlayer();
            setMessage(`${passedPlayer === 'black' ? 'Black' : 'White'} passed. ${currentPlayer === 'black' ? 'Black' : 'White'}'s turn`);
        }

        function resetGame() {
            initBoard();
            currentPlayer = 'black';
            blackCaptured = 0;
            whiteCaptured = 0;
            passCount = 0;
            lastBoard = null;
            gameOver = false;
            
            updatePlayerInfo();
            updateCaptured();
            drawBoard();
            setMessage("Black's turn - Click to place a stone");
        }

        // Initialize game
        initBoard();
        drawBoard();
    </script>
</body>
</html>
