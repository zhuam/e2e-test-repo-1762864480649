<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋 - Go Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-info {
            display: flex;
            gap: 40px;
            margin-bottom: 20px;
            align-items: center;
        }

        .player-info {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .player-info.active {
            transform: scale(1.05);
            background: rgba(255,255,255,0.2);
            border: 2px solid #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.5);
        }

        .player-info h3 {
            font-size: 1.1em;
            margin-bottom: 8px;
        }

        .stone-icon {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-block;
            vertical-align: middle;
            margin-right: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .stone-black {
            background: radial-gradient(circle at 30% 30%, #4a4a4a, #000);
        }

        .stone-white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
        }

        .captured {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 5px;
        }

        .board-container {
            position: relative;
            padding: 30px;
            background: linear-gradient(145deg, #d4a574, #c9985c);
            border-radius: 10px;
            box-shadow: 
                0 20px 60px rgba(0,0,0,0.5),
                inset 0 2px 10px rgba(255,255,255,0.2);
            border: 8px solid #8b5a2b;
        }

        .board-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" /></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.08"/></svg>');
            pointer-events: none;
            border-radius: 2px;
        }

        #board {
            display: block;
            cursor: pointer;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-pass {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.4);
        }

        .btn-pass:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(52, 152, 219, 0.6);
        }

        .btn-reset {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-reset:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6);
        }

        .btn-undo {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
        }

        .btn-undo:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(155, 89, 182, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 1.1em;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .message.show {
            opacity: 1;
        }

        .message.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }

        .message.success {
            background: linear-gradient(135deg, #27ae60, #229954);
        }

        .coordinates {
            position: absolute;
            font-size: 12px;
            color: #5d4e37;
            font-weight: bold;
        }

        .coord-top {
            top: 10px;
        }

        .coord-left {
            left: 10px;
        }

        .coord-bottom {
            bottom: 10px;
        }

        .coord-right {
            right: 10px;
        }

        .rules {
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 10px;
            max-width: 600px;
            font-size: 0.85em;
            line-height: 1.6;
            color: #aaa;
        }

        .rules h4 {
            color: #f39c12;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>围棋 Go Game</h1>
    
    <div class="game-info">
        <div class="player-info active" id="black-player">
            <h3><span class="stone-icon stone-black"></span>黑方 Black</h3>
            <div class="captured">提子 Captured: <span id="black-captured">0</span></div>
        </div>
        <div class="player-info" id="white-player">
            <h3><span class="stone-icon stone-white"></span>白方 White</h3>
            <div class="captured">提子 Captured: <span id="white-captured">0</span></div>
        </div>
    </div>

    <div class="board-container">
        <canvas id="board" width="570" height="570"></canvas>
    </div>

    <div class="controls">
        <button class="btn-pass" onclick="pass()">停一手 Pass</button>
        <button class="btn-undo" onclick="undo()">悔棋 Undo</button>
        <button class="btn-reset" onclick="resetGame()">重新开始 Reset</button>
    </div>

    <div class="message" id="message"></div>

    <div class="rules">
        <h4>游戏规则 Rules:</h4>
        点击棋盘交叉点落子 | 黑方先行 | 围住对方棋子可提吃 | 禁止自杀和全局同型
    </div>

    <script>
        const BOARD_SIZE = 19;
        const CELL_SIZE = 30;
        const PADDING = 15;
        const EMPTY = 0;
        const BLACK = 1;
        const WHITE = 2;

        let canvas, ctx;
        let board = [];
        let currentPlayer = BLACK;
        let blackCaptured = 0;
        let whiteCaptured = 0;
        let lastMove = null;
        let moveHistory = [];
        let consecutivePasses = 0;
        let koPoint = null; // 劫的禁着点

        function init() {
            canvas = document.getElementById('board');
            ctx = canvas.getContext('2d');
            
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseleave', handleMouseLeave);
            
            resetGame();
        }

        function resetGame() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY));
            currentPlayer = BLACK;
            blackCaptured = 0;
            whiteCaptured = 0;
            lastMove = null;
            moveHistory = [];
            consecutivePasses = 0;
            koPoint = null;
            
            updateUI();
            drawBoard();
        }

        function handleClick(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left - PADDING) / CELL_SIZE);
            const y = Math.round((e.clientY - rect.top - PADDING) / CELL_SIZE);
            
            if (x >= 0 && x < BOARD_SIZE && y >= 0 && y < BOARD_SIZE) {
                placeStone(x, y);
            }
        }

        function handleMouseMove(e) {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left - PADDING) / CELL_SIZE);
            const y = Math.round((e.clientY - rect.top - PADDING) / CELL_SIZE);
            
            drawBoard();
            
            if (x >= 0 && x < BOARD_SIZE && y >= 0 && y < BOARD_SIZE && board[y][x] === EMPTY) {
                drawStone(x, y, currentPlayer, 0.5);
                drawPreview(x, y);
            }
        }

        function handleMouseLeave() {
            drawBoard();
        }

        function drawPreview(x, y) {
            ctx.beginPath();
            ctx.arc(PADDING + x * CELL_SIZE, PADDING + y * CELL_SIZE, 5, 0, Math.PI * 2);
            ctx.fillStyle = currentPlayer === BLACK ? 'rgba(0,0,0,0.3)' : 'rgba(255,255,255,0.5)';
            ctx.fill();
        }

        function placeStone(x, y) {
            if (board[y][x] !== EMPTY) {
                showMessage('此处已有棋子! Stone already exists!', 'error');
                return;
            }

            // 检查劫
            if (koPoint && koPoint.x === x && koPoint.y === y) {
                showMessage('劫! Ko - cannot play here immediately!', 'error');
                return;
            }

            // 保存状态用于悔棋
            const previousBoard = board.map(row => [...row]);
            
            // 尝试落子
            board[y][x] = currentPlayer;
            
            // 检查提子
            const captured = checkCaptures(x, y, currentPlayer);
            
            // 检查自杀
            if (captured === 0 && getLiberties(x, y) === 0) {
                board[y][x] = EMPTY;
                showMessage('禁入点! Suicide is forbidden!', 'error');
                return;
            }

            // 检查全局同型
            if (isKoViolation()) {
                board = previousBoard;
                showMessage('全局同型! Ko violation!', 'error');
                return;
            }

            // 设置劫点
            if (captured === 1) {
                const capturedStone = findCapturedStone(x, y, currentPlayer);
                if (capturedStone && getLiberties(capturedStone.x, capturedStone.y) === 0 && 
                    countGroup(capturedStone.x, capturedStone.y) === 1) {
                    koPoint = { x: capturedStone.x, y: capturedStone.y };
                } else {
                    koPoint = null;
                }
            } else {
                koPoint = null;
            }

            // 记录历史
            moveHistory.push({
                board: previousBoard,
                player: currentPlayer,
                blackCaptured,
                whiteCaptured,
                koPoint: koPoint
            });

            lastMove = { x, y };
            consecutivePasses = 0;

            // 切换玩家
            currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
            
            updateUI();
            drawBoard();
        }

        function checkCaptures(x, y, player) {
            const opponent = player === BLACK ? WHITE : BLACK;
            let totalCaptured = 0;
            
            const neighbors = [
                { dx: 0, dy: -1 },
                { dx: 1, dy: 0 },
                { dx: 0, dy: 1 },
                { dx: -1, dy: 0 }
            ];

            for (const { dx, dy } of neighbors) {
                const nx = x + dx;
                const ny = y + dy;
                
                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                    if (board[ny][nx] === opponent) {
                        const liberties = getLiberties(nx, ny);
                        if (liberties === 0) {
                            totalCaptured += removeGroup(nx, ny);
                        }
                    }
                }
            }

            if (player === BLACK) {
                blackCaptured += totalCaptured;
            } else {
                whiteCaptured += totalCaptured;
            }

            return totalCaptured;
        }

        function getLiberties(x, y) {
            const color = board[y][x];
            if (color === EMPTY) return -1;
            
            const visited = new Set();
            const queue = [{ x, y }];
            visited.add(`${x},${y}`);
            let liberties = new Set();
            
            while (queue.length > 0) {
                const current = queue.shift();
                const neighbors = [
                    { dx: 0, dy: -1 },
                    { dx: 1, dy: 0 },
                    { dx: 0, dy: 1 },
                    { dx: -1, dy: 0 }
                ];

                for (const { dx, dy } of neighbors) {
                    const nx = current.x + dx;
                    const ny = current.y + dy;
                    
                    if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                        if (board[ny][nx] === EMPTY) {
                            liberties.add(`${nx},${ny}`);
                        } else if (board[ny][nx] === color && !visited.has(`${nx},${ny}`)) {
                            visited.add(`${nx},${ny}`);
                            queue.push({ x: nx, y: ny });
                        }
                    }
                }
            }

            return liberties.size;
        }

        function countGroup(x, y) {
            const color = board[y][x];
            if (color === EMPTY) return 0;
            
            const visited = new Set();
            const queue = [{ x, y }];
            visited.add(`${x},${y}`);
            
            while (queue.length > 0) {
                const current = queue.shift();
                const neighbors = [
                    { dx: 0, dy: -1 },
                    { dx: 1, dy: 0 },
                    { dx: 0, dy: 1 },
                    { dx: -1, dy: 0 }
                ];

                for (const { dx, dy } of neighbors) {
                    const nx = current.x + dx;
                    const ny = current.y + dy;
                    
                    if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                        if (board[ny][nx] === color && !visited.has(`${nx},${ny}`)) {
                            visited.add(`${nx},${ny}`);
                            queue.push({ x: nx, y: ny });
                        }
                    }
                }
            }

            return visited.size;
        }

        function removeGroup(x, y) {
            const color = board[y][x];
            const visited = new Set();
            const queue = [{ x, y }];
            visited.add(`${x},${y}`);
            board[y][x] = EMPTY;
            
            while (queue.length > 0) {
                const current = queue.shift();
                const neighbors = [
                    { dx: 0, dy: -1 },
                    { dx: 1, dy: 0 },
                    { dx: 0, dy: 1 },
                    { dx: -1, dy: 0 }
                ];

                for (const { dx, dy } of neighbors) {
                    const nx = current.x + dx;
                    const ny = current.y + dy;
                    
                    if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                        if (board[ny][nx] === color && !visited.has(`${nx},${ny}`)) {
                            visited.add(`${nx},${ny}`);
                            board[ny][nx] = EMPTY;
                            queue.push({ x: nx, y: ny });
                        }
                    }
                }
            }

            return visited.size;
        }

        function findCapturedStone(x, y, player) {
            const opponent = player === BLACK ? WHITE : BLACK;
            const neighbors = [
                { dx: 0, dy: -1 },
                { dx: 1, dy: 0 },
                { dx: 0, dy: 1 },
                { dx: -1, dy: 0 }
            ];

            for (const { dx, dy } of neighbors) {
                const nx = x + dx;
                const ny = y + dy;
                
                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                    if (board[ny][nx] === opponent) {
                        return { x: nx, y: ny };
                    }
                }
            }

            return null;
        }

        function isKoViolation() {
            if (moveHistory.length < 1) return false;
            
            const currentBoard = JSON.stringify(board);
            for (const move of moveHistory) {
                if (JSON.stringify(move.board) === currentBoard) {
                    return true;
                }
            }
            return false;
        }

        function pass() {
            consecutivePasses++;
            
            moveHistory.push({
                board: board.map(row => [...row]),
                player: currentPlayer,
                blackCaptured,
                whiteCaptured,
                koPoint
            });

            if (consecutivePasses >= 2) {
                showMessage('双方连续停手，游戏结束! Game Over!', 'success');
                return;
            }

            showMessage(`${currentPlayer === BLACK ? '黑方' : '白方'} 停一手 Pass`, 'success');
            currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
            koPoint = null;
            lastMove = null;
            
            updateUI();
            drawBoard();
        }

        function undo() {
            if (moveHistory.length === 0) {
                showMessage('无法悔棋! Nothing to undo!', 'error');
                return;
            }

            const lastState = moveHistory.pop();
            board = lastState.board;
            currentPlayer = lastState.player;
            blackCaptured = lastState.blackCaptured;
            whiteCaptured = lastState.whiteCaptured;
            koPoint = lastState.koPoint;
            
            if (moveHistory.length > 0) {
                const prevMove = moveHistory[moveHistory.length - 1];
                lastMove = { x: -1, y: -1 };
            } else {
                lastMove = null;
            }

            updateUI();
            drawBoard();
            showMessage('悔棋成功! Undo successful!', 'success');
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格线
            ctx.strokeStyle = '#5d4e37';
            ctx.lineWidth = 1;

            for (let i = 0; i < BOARD_SIZE; i++) {
                // 横线
                ctx.beginPath();
                ctx.moveTo(PADDING, PADDING + i * CELL_SIZE);
                ctx.lineTo(PADDING + (BOARD_SIZE - 1) * CELL_SIZE, PADDING + i * CELL_SIZE);
                ctx.stroke();

                // 竖线
                ctx.beginPath();
                ctx.moveTo(PADDING + i * CELL_SIZE, PADDING);
                ctx.lineTo(PADDING + i * CELL_SIZE, PADDING + (BOARD_SIZE - 1) * CELL_SIZE);
                ctx.stroke();
            }

            // 绘制星位
            const starPoints = [
                [3, 3], [3, 9], [3, 15],
                [9, 3], [9, 9], [9, 15],
                [15, 3], [15, 9], [15, 15]
            ];

            ctx.fillStyle = '#5d4e37';
            for (const [x, y] of starPoints) {
                ctx.beginPath();
                ctx.arc(PADDING + x * CELL_SIZE, PADDING + y * CELL_SIZE, 4, 0, Math.PI * 2);
                ctx.fill();
            }

            // 绘制坐标标签
            ctx.fillStyle = '#5d4e37';
            ctx.font = 'bold 11px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            const labels = 'ABCDEFGHJKLMNOPQRST';
            for (let i = 0; i < BOARD_SIZE; i++) {
                // 顶部
                ctx.fillText(labels[i], PADDING + i * CELL_SIZE, PADDING - 10);
                // 底部
                ctx.fillText(labels[i], PADDING + i * CELL_SIZE, PADDING + (BOARD_SIZE - 1) * CELL_SIZE + 10);
                // 左侧
                ctx.fillText(BOARD_SIZE - i, PADDING - 12, PADDING + i * CELL_SIZE);
                // 右侧
                ctx.fillText(BOARD_SIZE - i, PADDING + (BOARD_SIZE - 1) * CELL_SIZE + 12, PADDING + i * CELL_SIZE);
            }

            // 绘制棋子
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (board[y][x] !== EMPTY) {
                        drawStone(x, y, board[y][x]);
                    }
                }
            }

            // 标记最后一手
            if (lastMove && lastMove.x >= 0) {
                ctx.beginPath();
                ctx.arc(PADDING + lastMove.x * CELL_SIZE, PADDING + lastMove.y * CELL_SIZE, 5, 0, Math.PI * 2);
                ctx.fillStyle = board[lastMove.y][lastMove.x] === BLACK ? 'white' : 'black';
                ctx.fill();
            }

            // 标记劫点
            if (koPoint) {
                ctx.beginPath();
                ctx.arc(PADDING + koPoint.x * CELL_SIZE, PADDING + koPoint.y * CELL_SIZE, 5, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(231, 76, 60, 0.5)';
                ctx.fill();
            }
        }

        function drawStone(x, y, color, alpha = 1) {
            const centerX = PADDING + x * CELL_SIZE;
            const centerY = PADDING + y * CELL_SIZE;
            const radius = CELL_SIZE / 2 - 1;

            // 绘制阴影
            ctx.beginPath();
            ctx.arc(centerX + 2, centerY + 2, radius, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 0, 0, ${0.3 * alpha})`;
            ctx.fill();

            // 绘制棋子
            const gradient = ctx.createRadialGradient(
                centerX - radius / 3, centerY - radius / 3, 0,
                centerX, centerY, radius
            );

            if (color === BLACK) {
                gradient.addColorStop(0, `rgba(100, 100, 100, ${alpha})`);
                gradient.addColorStop(1, `rgba(0, 0, 0, ${alpha})`);
            } else {
                gradient.addColorStop(0, `rgba(255, 255, 255, ${alpha})`);
                gradient.addColorStop(1, `rgba(200, 200, 200, ${alpha})`);
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        function updateUI() {
            document.getElementById('black-captured').textContent = blackCaptured;
            document.getElementById('white-captured').textContent = whiteCaptured;

            document.getElementById('black-player').classList.toggle('active', currentPlayer === BLACK);
            document.getElementById('white-player').classList.toggle('active', currentPlayer === WHITE);
        }

        function showMessage(text, type = '') {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message show ' + type;
            
            setTimeout(() => {
                messageEl.classList.remove('show');
            }, 2000);
        }

        // 初始化游戏
        window.onload = init;
    </script>
</body>
</html>
