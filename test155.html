<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋 - Go Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 800px;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
        }

        .info-item {
            text-align: center;
        }

        .info-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .current-player {
            display: inline-block;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            vertical-align: middle;
            margin-left: 10px;
            border: 2px solid #333;
        }

        .current-player.black {
            background: radial-gradient(circle at 30% 30%, #444, #000);
        }

        .current-player.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
        }

        .board-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .board {
            background: linear-gradient(135deg, #DEB887 0%, #D2A454 100%);
            border: 8px solid #8B4513;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: pointer;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-pass {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-restart {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-undo {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            text-align: center;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }

        .message.show {
            display: block;
        }

        .message.capture {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            color: #d35400;
        }

        .message.pass {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            color: #16a085;
        }

        .message.gameover {
            background: linear-gradient(135deg, #d299c2 0%, #fef9d7 100%);
            color: #8e44ad;
        }

        .mode-selector {
            text-align: center;
            margin-bottom: 20px;
        }

        .mode-selector label {
            margin-right: 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .mode-selector input[type="radio"] {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>围棋 Go Game</h1>
        
        <div class="mode-selector">
            <label>
                <input type="radio" name="boardSize" value="9" checked> 9×9 (学习)
            </label>
            <label>
                <input type="radio" name="boardSize" value="13"> 13×13 (中级)
            </label>
            <label>
                <input type="radio" name="boardSize" value="19"> 19×19 (标准)
            </label>
        </div>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">当前执子 Current Player</div>
                <div class="info-value">
                    黑方 Black
                    <span class="current-player black" id="currentPlayerIndicator"></span>
                </div>
            </div>
            <div class="info-item">
                <div class="info-label">黑方提子 Black Captures</div>
                <div class="info-value" id="blackCaptures">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">白方提子 White Captures</div>
                <div class="info-value" id="whiteCaptures">0</div>
            </div>
        </div>

        <div class="board-container">
            <canvas id="goBoard" class="board" width="540" height="540"></canvas>
        </div>

        <div class="controls">
            <button class="btn-pass" onclick="pass()">停着 Pass</button>
            <button class="btn-undo" onclick="undo()">悔棋 Undo</button>
            <button class="btn-restart" onclick="restart()">重新开始 Restart</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <script>
        const canvas = document.getElementById('goBoard');
        const ctx = canvas.getContext('2d');
        
        let boardSize = 9;
        let cellSize;
        let board = [];
        let currentPlayer = 'black'; // 'black' or 'white'
        let blackCaptures = 0;
        let whiteCaptures = 0;
        let moveHistory = [];
        let consecutivePasses = 0;
        let lastMove = null;
        let koPoint = null; // 用于处理打劫规则

        // 初始化棋盘
        function initBoard() {
            board = [];
            for (let i = 0; i < boardSize; i++) {
                board[i] = [];
                for (let j = 0; j < boardSize; j++) {
                    board[i][j] = null;
                }
            }
            currentPlayer = 'black';
            blackCaptures = 0;
            whiteCaptures = 0;
            moveHistory = [];
            consecutivePasses = 0;
            lastMove = null;
            koPoint = null;
            updateInfo();
        }

        // 绘制棋盘
        function drawBoard() {
            cellSize = canvas.width / (boardSize + 1);
            
            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格线
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            
            for (let i = 0; i < boardSize; i++) {
                // 横线
                ctx.beginPath();
                ctx.moveTo(cellSize, cellSize * (i + 1));
                ctx.lineTo(cellSize * boardSize, cellSize * (i + 1));
                ctx.stroke();
                
                // 竖线
                ctx.beginPath();
                ctx.moveTo(cellSize * (i + 1), cellSize);
                ctx.lineTo(cellSize * (i + 1), cellSize * boardSize);
                ctx.stroke();
            }
            
            // 绘制星位
            if (boardSize >= 9) {
                const starPoints = getStarPoints();
                ctx.fillStyle = '#000';
                starPoints.forEach(point => {
                    ctx.beginPath();
                    ctx.arc(
                        cellSize * (point.x + 1),
                        cellSize * (point.y + 1),
                        4,
                        0,
                        Math.PI * 2
                    );
                    ctx.fill();
                });
            }
            
            // 绘制棋子
            for (let i = 0; i < boardSize; i++) {
                for (let j = 0; j < boardSize; j++) {
                    if (board[i][j]) {
                        drawStone(i, j, board[i][j]);
                    }
                }
            }
            
            // 标记最后一手
            if (lastMove) {
                ctx.strokeStyle = '#ff0';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(
                    cellSize * (lastMove.x + 1),
                    cellSize * (lastMove.y + 1),
                    cellSize * 0.2,
                    0,
                    Math.PI * 2
                );
                ctx.stroke();
            }
            
            // 标记打劫点
            if (koPoint) {
                ctx.strokeStyle = '#f00';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(
                    cellSize * (koPoint.x + 1),
                    cellSize * (koPoint.y + 1),
                    cellSize * 0.15,
                    0,
                    Math.PI * 2
                );
                ctx.stroke();
            }
        }

        // 获取星位位置
        function getStarPoints() {
            const points = [];
            if (boardSize === 9) {
                points.push({x: 2, y: 2}, {x: 6, y: 2}, {x: 4, y: 4});
                points.push({x: 2, y: 6}, {x: 6, y: 6});
            } else if (boardSize === 13) {
                points.push({x: 3, y: 3}, {x: 9, y: 3}, {x: 6, y: 6});
                points.push({x: 3, y: 9}, {x: 9, y: 9});
            } else if (boardSize === 19) {
                points.push({x: 3, y: 3}, {x: 9, y: 3}, {x: 15, y: 3});
                points.push({x: 3, y: 9}, {x: 9, y: 9}, {x: 15, y: 9});
                points.push({x: 3, y: 15}, {x: 9, y: 15}, {x: 15, y: 15});
            }
            return points;
        }

        // 绘制单个棋子
        function drawStone(x, y, color) {
            const centerX = cellSize * (x + 1);
            const centerY = cellSize * (y + 1);
            const radius = cellSize * 0.45;
            
            // 绘制棋子阴影
            ctx.beginPath();
            ctx.arc(centerX + 2, centerY + 2, radius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fill();
            
            // 绘制棋子
            const gradient = ctx.createRadialGradient(
                centerX - radius * 0.3,
                centerY - radius * 0.3,
                radius * 0.1,
                centerX,
                centerY,
                radius
            );
            
            if (color === 'black') {
                gradient.addColorStop(0, '#444');
                gradient.addColorStop(1, '#000');
            } else {
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#ddd');
            }
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 添加棋子边缘
            ctx.strokeStyle = color === 'black' ? '#333' : '#999';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // 处理点击事件
        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.round((e.clientX - rect.left) / cellSize) - 1;
            const y = Math.round((e.clientY - rect.top) / cellSize) - 1;
            
            if (x >= 0 && x < boardSize && y >= 0 && y < boardSize) {
                placeStone(x, y);
            }
        });

        // 落子
        function placeStone(x, y) {
            if (board[x][y] !== null) {
                showMessage('此处已有棋子！Invalid move!', 'capture');
                return;
            }
            
            // 检查打劫规则
            if (koPoint && koPoint.x === x && koPoint.y === y) {
                showMessage('打劫！不能立即回提 Ko rule!', 'capture');
                return;
            }
            
            // 保存当前状态用于悔棋
            const previousState = {
                board: board.map(row => [...row]),
                currentPlayer: currentPlayer,
                blackCaptures: blackCaptures,
                whiteCaptures: whiteCaptures,
                koPoint: koPoint
            };
            
            // 尝试落子
            board[x][y] = currentPlayer;
            
            // 检查并移除被吃掉的对方棋子
            const opponent = currentPlayer === 'black' ? 'white' : 'black';
            const capturedStones = [];
            
            // 检查四周的对方棋子组
            const neighbors = getNeighbors(x, y);
            neighbors.forEach(([nx, ny]) => {
                if (board[nx][ny] === opponent) {
                    const group = getGroup(nx, ny);
                    if (getLiberties(group).length === 0) {
                        capturedStones.push(...group);
                    }
                }
            });
            
            // 检查自杀规则（自己的棋子组没有气且没有吃掉对方棋子）
            const myGroup = getGroup(x, y);
            const myLiberties = getLiberties(myGroup);
            
            if (myLiberties.length === 0 && capturedStones.length === 0) {
                board[x][y] = null;
                showMessage('禁止自杀！Suicide is not allowed!', 'capture');
                return;
            }
            
            // 移除被吃掉的棋子
            capturedStones.forEach(([cx, cy]) => {
                board[cx][cy] = null;
            });
            
            // 更新提子数
            if (currentPlayer === 'black') {
                blackCaptures += capturedStones.length;
            } else {
                whiteCaptures += capturedStones.length;
            }
            
            // 处理打劫
            if (capturedStones.length === 1 && myGroup.length === 1 && myLiberties.length === 1) {
                koPoint = {x: capturedStones[0][0], y: capturedStones[0][1]};
            } else {
                koPoint = null;
            }
            
            // 显示提子信息
            if (capturedStones.length > 0) {
                showMessage(`提子 ${capturedStones.length} 颗! Captured ${capturedStones.length} stones!`, 'capture');
            }
            
            // 保存历史
            moveHistory.push(previousState);
            lastMove = {x, y};
            consecutivePasses = 0;
            
            // 切换玩家
            currentPlayer = opponent;
            updateInfo();
            drawBoard();
            hideMessage();
        }

        // 获取相邻位置
        function getNeighbors(x, y) {
            const neighbors = [];
            if (x > 0) neighbors.push([x - 1, y]);
            if (x < boardSize - 1) neighbors.push([x + 1, y]);
            if (y > 0) neighbors.push([x, y - 1]);
            if (y < boardSize - 1) neighbors.push([x, y + 1]);
            return neighbors;
        }

        // 获取棋子组（连通的相同颜色棋子）
        function getGroup(x, y) {
            const color = board[x][y];
            if (!color) return [];
            
            const group = [];
            const visited = new Set();
            const stack = [[x, y]];
            
            while (stack.length > 0) {
                const [cx, cy] = stack.pop();
                const key = `${cx},${cy}`;
                
                if (visited.has(key)) continue;
                if (board[cx][cy] !== color) continue;
                
                visited.add(key);
                group.push([cx, cy]);
                
                getNeighbors(cx, cy).forEach(([nx, ny]) => {
                    if (!visited.has(`${nx},${ny}`)) {
                        stack.push([nx, ny]);
                    }
                });
            }
            
            return group;
        }

        // 获取棋子组的气
        function getLiberties(group) {
            const liberties = new Set();
            
            group.forEach(([x, y]) => {
                getNeighbors(x, y).forEach(([nx, ny]) => {
                    if (board[nx][ny] === null) {
                        liberties.add(`${nx},${ny}`);
                    }
                });
            });
            
            return Array.from(liberties);
        }

        // 停着
        function pass() {
            const opponent = currentPlayer === 'black' ? 'white' : 'black';
            moveHistory.push({
                board: board.map(row => [...row]),
                currentPlayer: currentPlayer,
                blackCaptures: blackCaptures,
                whiteCaptures: whiteCaptures,
                koPoint: koPoint,
                isPass: true
            });
            
            consecutivePasses++;
            koPoint = null;
            
            if (consecutivePasses >= 2) {
                showMessage('双方停着，游戏结束！Game Over!', 'gameover');
                setTimeout(() => {
                    if (confirm('游戏结束！是否重新开始？Game Over! Restart?')) {
                        restart();
                    }
                }, 1500);
            } else {
                showMessage(`${currentPlayer === 'black' ? '黑方' : '白方'}停着 Pass`, 'pass');
            }
            
            currentPlayer = opponent;
            lastMove = null;
            updateInfo();
            drawBoard();
            
            setTimeout(hideMessage, 2000);
        }

        // 悔棋
        function undo() {
            if (moveHistory.length === 0) {
                showMessage('没有可以悔棋的步骤！No moves to undo!', 'capture');
                setTimeout(hideMessage, 2000);
                return;
            }
            
            const previousState = moveHistory.pop();
            board = previousState.board;
            currentPlayer = previousState.currentPlayer;
            blackCaptures = previousState.blackCaptures;
            whiteCaptures = previousState.whiteCaptures;
            koPoint = previousState.koPoint;
            
            if (previousState.isPass) {
                consecutivePasses = Math.max(0, consecutivePasses - 1);
            }
            
            updateLastMove();
            updateInfo();
            drawBoard();
            showMessage('已悔棋 Undo successful!', 'pass');
            setTimeout(hideMessage, 1500);
        }

        // 更新最后一手标记
        function updateLastMove() {
            if (moveHistory.length > 0) {
                const lastState = moveHistory[moveHistory.length - 1];
                // 找到最后落子的位置
                for (let i = 0; i < boardSize; i++) {
                    for (let j = 0; j < boardSize; j++) {
                        if (lastState.board[i][j] && !lastState.isPass) {
                            // 简单处理：标记第一个不同的位置
                            if (board[i][j] !== lastState.board[i][j]) {
                                lastMove = {x: i, y: j};
                                return;
                            }
                        }
                    }
                }
                lastMove = null;
            } else {
                lastMove = null;
            }
        }

        // 重新开始
        function restart() {
            initBoard();
            drawBoard();
            showMessage('游戏已重新开始！Game restarted!', 'pass');
            setTimeout(hideMessage, 1500);
        }

        // 更新信息显示
        function updateInfo() {
            document.getElementById('blackCaptures').textContent = blackCaptures;
            document.getElementById('whiteCaptures').textContent = whiteCaptures;
            
            const indicator = document.getElementById('currentPlayerIndicator');
            indicator.className = 'current-player ' + currentPlayer;
            
            const playerText = document.querySelector('.info-value');
            playerText.childNodes[0].textContent = 
                currentPlayer === 'black' ? '黑方 Black ' : '白方 White ';
        }

        // 显示消息
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message show ' + type;
        }

        // 隐藏消息
        function hideMessage() {
            const messageEl = document.getElementById('message');
            messageEl.className = 'message';
        }

        // 棋盘大小选择
        document.querySelectorAll('input[name="boardSize"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                boardSize = parseInt(e.target.value);
                initBoard();
                drawBoard();
            });
        });

        // 初始化游戏
        initBoard();
        drawBoard();
    </script>
</body>
</html>
