<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 用户管理系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-brand">
                <span class="logo">UserSystem</span>
            </div>
            <div class="nav-links">
                <div id="guestNav">
                    <a href="/login.html" class="nav-link">登录</a>
                    <a href="/register.html" class="nav-link btn-primary">注册</a>
                </div>
                <div id="userNav" class="hidden">
                    <span id="welcomeUser">欢迎, </span>
                    <button onclick="logout()" class="nav-link btn-secondary">退出</button>
                </div>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <div class="hero">
                <h1 class="hero-title">欢迎使用用户管理系统</h1>
                <p class="hero-subtitle">安全、简单、高效的用户认证解决方案</p>
                <div class="hero-buttons">
                    <a href="/register.html" class="btn btn-primary btn-lg">立即注册</a>
                    <a href="/login.html" class="btn btn-outline btn-lg">登录账户</a>
                </div>
            </div>

            <!-- 功能特性 -->
            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">🔒</div>
                    <h3>安全认证</h3>
                    <p>基于 JWT 的安全认证机制，保护您的账户安全</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">⚡</div>
                    <h3>快速响应</h3>
                    <p>采用 Spring Boot 框架，提供高性能的后端服务</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🎨</div>
                    <h3>现代界面</h3>
                    <p>简洁美观的用户界面，提供流畅的用户体验</p>
                </div>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>&copy; 2024 用户管理系统. 保留所有权利.</p>
        </footer>
    </div>

    <script src="/js/app.js"></script>
    <script>
        checkAuthStatus();
    </script>
</body>
</html>
