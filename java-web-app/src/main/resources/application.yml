server:
  port: 8080

spring:
  application:
    name: webapp

  datasource:
    url: jdbc:mysql://localhost:3306/webapp?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: always

jwt:
  secret: yourSecretKeyHereWhichShouldBeAtLeast256BitsLongForHS256Algorithm
  expiration: 86400000  # 24 hours in milliseconds

logging:
  level:
    com.example.webapp: DEBUG
    org.springframework.security: INFO
