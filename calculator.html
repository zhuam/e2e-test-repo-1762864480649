<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
            font-size: 1.8em;
        }

        .display {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .expression {
            color: #666;
            font-size: 1em;
            min-height: 24px;
            word-wrap: break-word;
        }

        .result {
            color: #333;
            font-size: 2.2em;
            font-weight: bold;
            word-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 20px;
            font-size: 1.3em;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        .number {
            background: #e9ecef;
            color: #333;
        }

        .number:hover {
            background: #dee2e6;
        }

        .operator {
            background: #667eea;
            color: white;
        }

        .operator:hover {
            background: #5a67d8;
        }

        .clear {
            background: #ff6b6b;
            color: white;
        }

        .clear:hover {
            background: #ee5a5a;
        }

        .equals {
            background: #51cf66;
            color: white;
            grid-column: span 2;
        }

        .equals:hover {
            background: #40c057;
        }

        .zero {
            grid-column: span 2;
        }

        .info {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 480px) {
            .calculator {
                padding: 20px;
            }

            button {
                padding: 18px;
                font-size: 1.2em;
            }

            .result {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>🧮 简易计算器</h1>
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="clear" onclick="clearAll()">AC</button>
            <button class="clear" onclick="clearEntry()">CE</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>

            <button class="number" onclick="appendNumber('7')">7</button>
            <button class="number" onclick="appendNumber('8')">8</button>
            <button class="number" onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">−</button>

            <button class="number" onclick="appendNumber('4')">4</button>
            <button class="number" onclick="appendNumber('5')">5</button>
            <button class="number" onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>

            <button class="number" onclick="appendNumber('1')">1</button>
            <button class="number" onclick="appendNumber('2')">2</button>
            <button class="number" onclick="appendNumber('3')">3</button>
            <button class="equals" onclick="calculate()">=</button>

            <button class="number zero" onclick="appendNumber('0')">0</button>
            <button class="number" onclick="appendDecimal()">.</button>
        </div>
        <p class="info">支持 10 以内的加减乘除运算</p>
    </div>

    <script>
        let currentInput = '';
        let expression = '';
        let shouldResetScreen = false;

        function updateDisplay() {
            document.getElementById('expression').textContent = expression;
            document.getElementById('result').textContent = currentInput || '0';
        }

        function appendNumber(number) {
            if (shouldResetScreen) {
                currentInput = '';
                shouldResetScreen = false;
            }
            // 限制输入长度
            if (currentInput.length >= 10) return;
            currentInput += number;
            updateDisplay();
        }

        function appendDecimal() {
            if (shouldResetScreen) {
                currentInput = '';
                shouldResetScreen = false;
            }
            if (!currentInput.includes('.')) {
                currentInput += currentInput === '' ? '0.' : '.';
                updateDisplay();
            }
        }

        function appendOperator(operator) {
            if (currentInput === '') {
                // 如果当前没有输入，但有之前的表达式，可以替换运算符
                if (expression !== '') {
                    expression = expression.slice(0, -1) + operator;
                    updateDisplay();
                }
                return;
            }

            // 验证数字是否在10以内
            const num = parseFloat(currentInput);
            if (num > 10) {
                alert('本计算器仅支持 10 以内的数字运算！');
                return;
            }

            expression += currentInput + ' ' + operator + ' ';
            currentInput = '';
            shouldResetScreen = false;
            updateDisplay();
        }

        function calculate() {
            if (expression === '' || currentInput === '') {
                return;
            }

            // 验证最后一个数字是否在10以内
            const num = parseFloat(currentInput);
            if (num > 10) {
                alert('本计算器仅支持 10 以内的数字运算！');
                return;
            }

            expression += currentInput;
            try {
                // 安全地计算表达式
                const result = safeCalculate(expression);
                currentInput = formatResult(result);
                expression = '';
                shouldResetScreen = true;
                updateDisplay();
            } catch (error) {
                alert('计算错误：' + error.message);
                clearAll();
            }
        }

        function safeCalculate(expr) {
            // 将表达式拆分为数组
            const tokens = expr.split(' ').filter(token => token !== '');

            if (tokens.length < 3) {
                throw new Error('表达式不完整');
            }

            // 检查所有数字是否在10以内
            for (let i = 0; i < tokens.length; i += 2) {
                const num = parseFloat(tokens[i]);
                if (num > 10) {
                    throw new Error('仅支持 10 以内的数字运算');
                }
            }

            // 按照先乘除后加减的顺序计算
            const numbers = [];
            const operators = [];

            for (let i = 0; i < tokens.length; i++) {
                if (i % 2 === 0) {
                    numbers.push(parseFloat(tokens[i]));
                } else {
                    operators.push(tokens[i]);
                }
            }

            // 先处理乘除
            let i = 0;
            while (i < operators.length) {
                if (operators[i] === '*' || operators[i] === '/') {
                    const left = numbers[i];
                    const right = numbers[i + 1];
                    let result;

                    if (operators[i] === '*') {
                        result = left * right;
                    } else {
                        if (right === 0) {
                            throw new Error('不能除以零');
                        }
                        result = left / right;
                    }

                    numbers.splice(i, 2, result);
                    operators.splice(i, 1);
                } else {
                    i++;
                }
            }

            // 再处理加减
            let result = numbers[0];
            for (let j = 0; j < operators.length; j++) {
                if (operators[j] === '+') {
                    result += numbers[j + 1];
                } else if (operators[j] === '-') {
                    result -= numbers[j + 1];
                }
            }

            return result;
        }

        function formatResult(result) {
            // 格式化结果，保留最多6位小数，去掉末尾的0
            const formatted = parseFloat(result.toFixed(6)).toString();
            // 如果结果太长，使用科学计数法
            if (formatted.length > 10) {
                return result.toExponential(4);
            }
            return formatted;
        }

        function clearAll() {
            currentInput = '';
            expression = '';
            shouldResetScreen = false;
            updateDisplay();
        }

        function clearEntry() {
            currentInput = '';
            updateDisplay();
        }

        // 键盘支持
        document.addEventListener('keydown', function(event) {
            if (event.key >= '0' && event.key <= '9') {
                appendNumber(event.key);
            } else if (event.key === '.') {
                appendDecimal();
            } else if (event.key === '+' || event.key === '-' || event.key === '*' || event.key === '/') {
                appendOperator(event.key);
            } else if (event.key === 'Enter' || event.key === '=') {
                event.preventDefault();
                calculate();
            } else if (event.key === 'Escape' || event.key === 'c' || event.key === 'C') {
                clearAll();
            } else if (event.key === 'Backspace') {
                currentInput = currentInput.slice(0, -1);
                updateDisplay();
            }
        });
    </script>
</body>
</html>
