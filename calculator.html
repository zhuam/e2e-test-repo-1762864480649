<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .calculator {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        .display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .display .expression {
            font-size: 14px;
            color: #666;
            min-height: 20px;
            word-break: break-all;
        }

        .display .result {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-top: 5px;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            padding: 20px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-number {
            background: #e9ecef;
            color: #333;
        }

        .btn-number:hover {
            background: #dee2e6;
        }

        .btn-operator {
            background: #ff9500;
            color: white;
        }

        .btn-operator:hover {
            background: #e6850b;
        }

        .btn-clear {
            background: #ff3b30;
            color: white;
        }

        .btn-clear:hover {
            background: #e02e24;
        }

        .btn-equal {
            background: #34c759;
            color: white;
            grid-column: span 2;
        }

        .btn-equal:hover {
            background: #2eb350;
        }

        .btn-zero {
            grid-column: span 2;
        }

        .title {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }

        .info {
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1 class="title">🧮 简易计算器</h1>
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="btn btn-clear" onclick="clearAll()">C</button>
            <button class="btn btn-clear" onclick="clearEntry()">CE</button>
            <button class="btn btn-operator" onclick="appendOperator('/')">÷</button>
            <button class="btn btn-operator" onclick="appendOperator('*')">×</button>

            <button class="btn btn-number" onclick="appendNumber('7')">7</button>
            <button class="btn btn-number" onclick="appendNumber('8')">8</button>
            <button class="btn btn-number" onclick="appendNumber('9')">9</button>
            <button class="btn btn-operator" onclick="appendOperator('-')">−</button>

            <button class="btn btn-number" onclick="appendNumber('4')">4</button>
            <button class="btn btn-number" onclick="appendNumber('5')">5</button>
            <button class="btn btn-number" onclick="appendNumber('6')">6</button>
            <button class="btn btn-operator" onclick="appendOperator('+')">+</button>

            <button class="btn btn-number" onclick="appendNumber('1')">1</button>
            <button class="btn btn-number" onclick="appendNumber('2')">2</button>
            <button class="btn btn-number" onclick="appendNumber('3')">3</button>
            <button class="btn btn-operator" onclick="calculate()">=</button>

            <button class="btn btn-number btn-zero" onclick="appendNumber('0')">0</button>
            <button class="btn btn-number" onclick="appendNumber('10')">10</button>
        </div>
        <div class="info">支持 10 以内数字的加减乘除计算</div>
    </div>

    <script>
        let expression = '';
        let currentInput = '0';
        let shouldResetScreen = false;

        const expressionElement = document.getElementById('expression');
        const resultElement = document.getElementById('result');

        function updateDisplay() {
            expressionElement.textContent = expression;
            resultElement.textContent = currentInput;
        }

        function appendNumber(number) {
            if (shouldResetScreen) {
                currentInput = number;
                shouldResetScreen = false;
            } else {
                // 对于10这个特殊数字，直接替换当前输入
                if (number === '10') {
                    currentInput = number;
                } else if (currentInput === '0') {
                    currentInput = number;
                } else {
                    // 限制只能输入10以内的数字
                    let newInput = currentInput + number;
                    if (parseFloat(newInput) <= 10) {
                        currentInput = newInput;
                    }
                }
            }
            updateDisplay();
        }

        function appendOperator(operator) {
            // 限制数字在10以内
            if (parseFloat(currentInput) > 10) {
                currentInput = '超出范围(>10)';
                shouldResetScreen = true;
                updateDisplay();
                return;
            }

            if (shouldResetScreen) {
                expression = currentInput + ' ' + operator + ' ';
                shouldResetScreen = false;
            } else {
                if (expression === '') {
                    expression = currentInput + ' ' + operator + ' ';
                } else {
                    expression += currentInput + ' ' + operator + ' ';
                }
            }
            currentInput = '0';
            updateDisplay();
        }

        function calculate() {
            if (expression === '') {
                return;
            }

            // 限制数字在10以内
            if (parseFloat(currentInput) > 10) {
                currentInput = '超出范围(>10)';
                shouldResetScreen = true;
                updateDisplay();
                return;
            }

            expression += currentInput;
            
            try {
                // 替换显示符号为实际运算符
                let evalExpression = expression.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                
                // 安全检查：只允许数字和基本运算符
                if (!/^[\d+\-*/\s]+$/.test(evalExpression)) {
                    throw new Error('Invalid expression');
                }

                let result = eval(evalExpression);
                
                // 处理除零错误
                if (!isFinite(result)) {
                    currentInput = '错误';
                } else {
                    // 限制结果为整数或最多4位小数
                    currentInput = parseFloat(result.toFixed(4)).toString();
                }
                
                expression = '';
                shouldResetScreen = true;
            } catch (error) {
                currentInput = '错误';
                expression = '';
                shouldResetScreen = true;
            }
            
            updateDisplay();
        }

        function clearAll() {
            expression = '';
            currentInput = '0';
            shouldResetScreen = false;
            updateDisplay();
        }

        function clearEntry() {
            currentInput = '0';
            updateDisplay();
        }

        // 键盘支持
        document.addEventListener('keydown', (event) => {
            if (event.key >= '0' && event.key <= '9') {
                appendNumber(event.key);
            } else if (event.key === '+' || event.key === '-' || event.key === '*' || event.key === '/') {
                appendOperator(event.key);
            } else if (event.key === 'Enter' || event.key === '=') {
                event.preventDefault();
                calculate();
            } else if (event.key === 'Escape' || event.key === 'c' || event.key === 'C') {
                clearAll();
            } else if (event.key === 'Backspace') {
                if (currentInput.length > 1 && !shouldResetScreen) {
                    currentInput = currentInput.slice(0, -1);
                } else {
                    currentInput = '0';
                }
                updateDisplay();
            }
        });
    </script>
</body>
</html>
