<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .calculator {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 320px;
        }

        .display {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
        }

        .display .previous {
            color: #666;
            font-size: 16px;
            min-height: 24px;
            word-wrap: break-word;
        }

        .display .current {
            color: #333;
            font-size: 36px;
            font-weight: bold;
            min-height: 48px;
            word-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-number {
            background: #e9ecef;
            color: #333;
        }

        .btn-number:hover {
            background: #dee2e6;
        }

        .btn-operator {
            background: #ff9500;
            color: white;
        }

        .btn-operator:hover {
            background: #e68600;
        }

        .btn-clear {
            background: #ff3b30;
            color: white;
        }

        .btn-clear:hover {
            background: #e6352b;
        }

        .btn-equal {
            background: #34c759;
            color: white;
        }

        .btn-equal:hover {
            background: #2fb350;
        }

        .btn-zero {
            grid-column: span 2;
        }

        .title {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: 600;
        }

        .error {
            color: #ff3b30;
            font-size: 14px;
            margin-top: 5px;
        }

        .shortcuts {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
        }

        .shortcuts h3 {
            font-size: 13px;
            margin-bottom: 5px;
            color: #333;
        }

        .shortcuts p {
            margin: 3px 0;
        }

        .shortcuts kbd {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 3px;
            padding: 1px 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1 class="title">简易计算器</h1>
        <div class="display">
            <div class="previous" id="previous"></div>
            <div class="current" id="current">0</div>
        </div>
        <div class="buttons">
            <button class="btn btn-clear" onclick="clearAll()">C</button>
            <button class="btn btn-clear" onclick="clearEntry()">CE</button>
            <button class="btn btn-operator" onclick="appendOperator('/')">÷</button>
            <button class="btn btn-operator" onclick="appendOperator('*')">×</button>

            <button class="btn btn-number" onclick="appendNumber('7')">7</button>
            <button class="btn btn-number" onclick="appendNumber('8')">8</button>
            <button class="btn btn-number" onclick="appendNumber('9')">9</button>
            <button class="btn btn-operator" onclick="appendOperator('-')">−</button>

            <button class="btn btn-number" onclick="appendNumber('4')">4</button>
            <button class="btn btn-number" onclick="appendNumber('5')">5</button>
            <button class="btn btn-number" onclick="appendNumber('6')">6</button>
            <button class="btn btn-operator" onclick="appendOperator('+')">+</button>

            <button class="btn btn-number" onclick="appendNumber('1')">1</button>
            <button class="btn btn-number" onclick="appendNumber('2')">2</button>
            <button class="btn btn-number" onclick="appendNumber('3')">3</button>
            <button class="btn btn-equal" onclick="calculate()">=</button>

            <button class="btn btn-number btn-zero" onclick="appendNumber('0')">0</button>
            <button class="btn btn-number" onclick="appendNumber('10')">10</button>
            <button class="btn btn-clear" onclick="backspace()">⌫</button>
        </div>
        <div class="shortcuts">
            <h3>⌨️ 键盘快捷键</h3>
            <p><kbd>0-9</kbd> 输入数字 | <kbd>Shift+1</kbd> 输入10</p>
            <p><kbd>+-*/</kbd> 运算符 | <kbd>Enter</kbd> 计算 | <kbd>Esc</kbd> 清空</p>
        </div>
    </div>

    <script>
        let currentValue = '0';
        let previousValue = '';
        let operator = null;
        let shouldResetScreen = false;

        const currentDisplay = document.getElementById('current');
        const previousDisplay = document.getElementById('previous');

        function updateDisplay() {
            currentDisplay.textContent = currentValue;
            if (operator) {
                previousDisplay.textContent = `${previousValue} ${getOperatorSymbol(operator)}`;
            } else {
                previousDisplay.textContent = previousValue;
            }
        }

        function getOperatorSymbol(op) {
            switch(op) {
                case '+': return '+';
                case '-': return '−';
                case '*': return '×';
                case '/': return '÷';
                default: return op;
            }
        }

        function appendNumber(number) {
            if (shouldResetScreen) {
                currentValue = '0';
                shouldResetScreen = false;
            }

            // 如果点击的是10，直接设置为10
            if (number === '10') {
                currentValue = '10';
                updateDisplay();
                return;
            }

            // 限制输入10以内的整数
            if (currentValue === '0') {
                currentValue = number;
            } else {
                currentValue += number;
            }

            // 验证数值范围
            const numValue = parseFloat(currentValue);
            if (numValue > 10) {
                currentValue = '10';
            }

            updateDisplay();
        }

        function appendOperator(op) {
            if (operator !== null && !shouldResetScreen) {
                calculate();
            }
            operator = op;
            previousValue = currentValue;
            shouldResetScreen = true;
            updateDisplay();
        }

        function calculate() {
            if (operator === null || shouldResetScreen) return;

            const prev = parseFloat(previousValue);
            const current = parseFloat(currentValue);

            if (isNaN(prev) || isNaN(current)) return;

            let result;
            switch (operator) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    if (current === 0) {
                        currentValue = '错误';
                        operator = null;
                        previousValue = '';
                        shouldResetScreen = true;
                        updateDisplay();
                        return;
                    }
                    result = prev / current;
                    break;
                default:
                    return;
            }

            // 限制结果为10以内
            if (result > 10) {
                result = 10;
            } else if (result < -10) {
                result = -10;
            }

            // 格式化结果，处理浮点数精度问题
            currentValue = Number.isInteger(result) ? result.toString() : result.toFixed(2).replace(/\.?0+$/, '');
            operator = null;
            previousValue = '';
            shouldResetScreen = true;
            updateDisplay();
        }

        function clearAll() {
            currentValue = '0';
            previousValue = '';
            operator = null;
            shouldResetScreen = false;
            updateDisplay();
        }

        function clearEntry() {
            currentValue = '0';
            updateDisplay();
        }

        function backspace() {
            if (currentValue.length > 1) {
                currentValue = currentValue.slice(0, -1);
            } else {
                currentValue = '0';
            }
            updateDisplay();
        }

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            // 支持数字键 0-9
            if (e.key >= '0' && e.key <= '9') appendNumber(e.key);
            // 支持 Shift+1 输入 10
            if (e.shiftKey && e.key === '!') appendNumber('10');
            if (e.key === '+') appendOperator('+');
            if (e.key === '-') appendOperator('-');
            if (e.key === '*') appendOperator('*');
            if (e.key === '/') {
                e.preventDefault();
                appendOperator('/');
            }
            if (e.key === 'Enter' || e.key === '=') calculate();
            if (e.key === 'Escape') clearAll();
            if (e.key === 'Backspace') backspace();
            // 支持 Delete 键清除
            if (e.key === 'Delete') clearEntry();
        });
    </script>
</body>
</html>
