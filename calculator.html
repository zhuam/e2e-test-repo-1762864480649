<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .calculator {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            padding: 30px;
            width: 320px;
        }

        .title {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .display {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: right;
        }

        .display .expression {
            color: #6c757d;
            font-size: 14px;
            min-height: 20px;
            word-break: break-all;
        }

        .display .result {
            color: #333;
            font-size: 32px;
            font-weight: bold;
            min-height: 40px;
            word-break: break-all;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-number {
            background: #f8f9fa;
            color: #333;
        }

        .btn-number:hover {
            background: #e9ecef;
        }

        .btn-operator {
            background: #667eea;
            color: #fff;
        }

        .btn-operator:hover {
            background: #5a6fd6;
        }

        .btn-clear {
            background: #dc3545;
            color: #fff;
        }

        .btn-clear:hover {
            background: #c82333;
        }

        .btn-equal {
            background: #28a745;
            color: #fff;
            grid-column: span 3;
        }

        .btn-equal:hover {
            background: #218838;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .hint {
            text-align: center;
            color: #6c757d;
            font-size: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1 class="title">🧮 简易计算器</h1>
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="btn btn-clear" onclick="clearAll()">C</button>
            <button class="btn btn-clear" onclick="clearEntry()">CE</button>
            <button class="btn btn-operator" onclick="appendOperator('/')">÷</button>
            <button class="btn btn-operator" onclick="appendOperator('*')">×</button>

            <button class="btn btn-number" onclick="appendNumber('7')">7</button>
            <button class="btn btn-number" onclick="appendNumber('8')">8</button>
            <button class="btn btn-number" onclick="appendNumber('9')">9</button>
            <button class="btn btn-operator" onclick="appendOperator('-')">-</button>

            <button class="btn btn-number" onclick="appendNumber('4')">4</button>
            <button class="btn btn-number" onclick="appendNumber('5')">5</button>
            <button class="btn btn-number" onclick="appendNumber('6')">6</button>
            <button class="btn btn-operator" onclick="appendOperator('+')">+</button>

            <button class="btn btn-number" onclick="appendNumber('1')">1</button>
            <button class="btn btn-number" onclick="appendNumber('2')">2</button>
            <button class="btn btn-number" onclick="appendNumber('3')">3</button>
            <button class="btn btn-number" onclick="appendNumber('0')">0</button>

            <button class="btn btn-number" onclick="appendNumber('10')">10</button>
            <button class="btn btn-equal" onclick="calculate()">=</button>
        </div>
        <p class="hint">支持 10 以内的加减乘除运算</p>
        <div class="back-link">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>

    <script>
        let currentInput = '';
        let expression = '';
        let shouldResetDisplay = false;

        const resultDisplay = document.getElementById('result');
        const expressionDisplay = document.getElementById('expression');

        function updateDisplay() {
            resultDisplay.textContent = currentInput || '0';
            expressionDisplay.textContent = expression;
        }

        function appendNumber(num) {
            // 限制数字在 0-10 范围内
            if (parseInt(num) > 10) return;

            if (shouldResetDisplay) {
                currentInput = '';
                shouldResetDisplay = false;
            }

            // 如果点击的是10，直接设置为10
            if (num === '10') {
                currentInput = '10';
                updateDisplay();
                return;
            }

            // 计算组合后的数字
            const combined = currentInput + num;

            // 如果组合后的数字超过10，替换为新输入的数字
            if (parseInt(combined) > 10) {
                currentInput = num;
                updateDisplay();
                return;
            }

            // 限制输入长度为 2 位（最大支持10）
            if (currentInput.length >= 2) return;

            currentInput += num;
            updateDisplay();
        }

        function appendOperator(op) {
            if (currentInput === '') return;

            expression = currentInput + ' ' + op + ' ';
            shouldResetDisplay = true;
            updateDisplay();
        }

        function clearAll() {
            currentInput = '';
            expression = '';
            shouldResetDisplay = false;
            updateDisplay();
        }

        function clearEntry() {
            currentInput = '';
            updateDisplay();
        }

        function calculate() {
            if (expression === '' || currentInput === '') return;

            try {
                const fullExpression = expression + currentInput;
                // 使用 Function 安全地计算表达式
                const result = Function('"use strict"; return (' + fullExpression + ')')();

                // 检查结果是否在有效范围内（10以内运算，结果不应太大）
                if (!isFinite(result) || isNaN(result)) {
                    currentInput = '错误';
                } else {
                    // 格式化结果，保留最多 4 位小数
                    currentInput = parseFloat(result.toFixed(4)).toString();
                }

                expression = '';
                shouldResetDisplay = true;
                updateDisplay();
            } catch (e) {
                currentInput = '错误';
                expression = '';
                shouldResetDisplay = true;
                updateDisplay();
            }
        }

        // 键盘支持
        document.addEventListener('keydown', function(e) {
            if (e.key >= '0' && e.key <= '9') {
                appendNumber(e.key);
            } else if (e.key === '+' || e.key === '-' || e.key === '*' || e.key === '/') {
                appendOperator(e.key);
            } else if (e.key === 'Enter' || e.key === '=') {
                e.preventDefault();
                calculate();
            } else if (e.key === 'Escape' || e.key === 'c' || e.key === 'C') {
                clearAll();
            } else if (e.key === 'Backspace') {
                currentInput = currentInput.slice(0, -1);
                updateDisplay();
            }
        });
    </script>
</body>
</html>
