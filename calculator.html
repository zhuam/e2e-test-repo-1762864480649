<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .calculator {
            background: #fff;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            width: 320px;
        }

        .display {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: right;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .expression {
            color: #888;
            font-size: 14px;
            min-height: 20px;
            margin-bottom: 5px;
        }

        .result {
            color: #333;
            font-size: 36px;
            font-weight: bold;
            word-wrap: break-word;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .num-btn {
            background: #e9ecef;
            color: #333;
        }

        .num-btn:hover {
            background: #dee2e6;
        }

        .op-btn {
            background: #ff9500;
            color: white;
        }

        .op-btn:hover {
            background: #ff8000;
        }

        .clear-btn {
            background: #ff3b30;
            color: white;
            grid-column: span 2;
        }

        .clear-btn:hover {
            background: #e63329;
        }

        .equals-btn {
            background: #34c759;
            color: white;
            grid-column: span 2;
        }

        .equals-btn:hover {
            background: #2db34d;
        }

        .zero-btn {
            grid-column: span 2;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
            font-size: 24px;
        }

        .error {
            color: #ff3b30;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <h1>简易计算器</h1>
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="clear-btn" onclick="clearAll()">C</button>
            <button class="op-btn" onclick="appendOperator('/')">÷</button>
            <button class="op-btn" onclick="appendOperator('*')">×</button>

            <button class="num-btn" onclick="appendNumber('7')">7</button>
            <button class="num-btn" onclick="appendNumber('8')">8</button>
            <button class="num-btn" onclick="appendNumber('9')">9</button>
            <button class="op-btn" onclick="appendOperator('-')">-</button>

            <button class="num-btn" onclick="appendNumber('4')">4</button>
            <button class="num-btn" onclick="appendNumber('5')">5</button>
            <button class="num-btn" onclick="appendNumber('6')">6</button>
            <button class="op-btn" onclick="appendOperator('+')">+</button>

            <button class="num-btn" onclick="appendNumber('1')">1</button>
            <button class="num-btn" onclick="appendNumber('2')">2</button>
            <button class="num-btn" onclick="appendNumber('3')">3</button>
            <button class="op-btn" onclick="deleteLast()">←</button>

            <button class="num-btn zero-btn" onclick="appendNumber('0')">0</button>
            <button class="num-btn" onclick="appendNumber('.')">.</button>
            <button class="equals-btn" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentExpression = '';
        let shouldReset = false;

        function updateDisplay() {
            document.getElementById('expression').textContent = currentExpression;
        }

        function appendNumber(num) {
            if (shouldReset) {
                currentExpression = '';
                shouldReset = false;
            }
            currentExpression += num;
            updateDisplay();
        }

        function appendOperator(op) {
            if (shouldReset) {
                shouldReset = false;
            }
            // 防止连续输入运算符
            if (currentExpression.length > 0 && isOperator(currentExpression[currentExpression.length - 1])) {
                currentExpression = currentExpression.slice(0, -1);
            }
            currentExpression += op;
            updateDisplay();
        }

        function isOperator(char) {
            return ['+', '-', '*', '/'].includes(char);
        }

        function clearAll() {
            currentExpression = '';
            document.getElementById('result').textContent = '0';
            document.getElementById('result').classList.remove('error');
            updateDisplay();
        }

        function deleteLast() {
            currentExpression = currentExpression.slice(0, -1);
            updateDisplay();
        }

        function calculate() {
            if (!currentExpression) return;

            try {
                // 验证表达式只包含数字和允许的运算符
                if (!/^[\d+\-*/.]+$/.test(currentExpression)) {
                    throw new Error('非法表达式');
                }

                // 提取数字并检查是否都在10以内
                const numbers = currentExpression.match(/\d+\.?\d*/g);
                if (numbers) {
                    for (let num of numbers) {
                        if (parseFloat(num) > 10) {
                            document.getElementById('result').textContent = '限10内数字';
                            document.getElementById('result').classList.add('error');
                            shouldReset = true;
                            return;
                        }
                    }
                }

                // 计算结果
                const result = eval(currentExpression);

                // 检查除零错误
                if (!isFinite(result)) {
                    throw new Error('除数不能为零');
                }

                // 格式化结果
                const formattedResult = Math.round(result * 1000000) / 1000000;

                document.getElementById('result').textContent = formattedResult;
                document.getElementById('result').classList.remove('error');
                currentExpression = formattedResult.toString();
                shouldReset = true;
            } catch (error) {
                document.getElementById('result').textContent = error.message || '错误';
                document.getElementById('result').classList.add('error');
                shouldReset = true;
            }
        }

        // 键盘支持
        document.addEventListener('keydown', function(event) {
            const key = event.key;

            if (/[0-9.]/.test(key)) {
                appendNumber(key);
            } else if (['+', '-', '*', '/'].includes(key)) {
                appendOperator(key);
            } else if (key === 'Enter' || key === '=') {
                event.preventDefault();
                calculate();
            } else if (key === 'Escape' || key === 'c' || key === 'C') {
                clearAll();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
