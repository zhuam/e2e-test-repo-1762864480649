<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>四川麻将 - Sichuan Mahjong</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --table-green: #1a5c3a;
            --table-green-dark: #0d4a2e;
            --tile-bg: linear-gradient(145deg, #fff 0%, #f5f5f5 100%);
            --tile-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.8);
            --gold: #ffd700;
            --blue: #4facfe;
            --red: #c41e3a;
        }

        body {
            font-family: 'Microsoft YaHei', 'Noto Serif SC', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 50%, #0f1a2e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            overflow-x: hidden;
        }

        .game-container {
            background: linear-gradient(145deg, #1a1a2e 0%, #0f1629 100%);
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6),
                        inset 0 1px 0 rgba(255,255,255,0.1),
                        0 0 100px rgba(79, 172, 254, 0.1);
            max-width: 1400px;
            width: 100%;
            position: relative;
        }

        .game-header {
            text-align: center;
            margin-bottom: 15px;
            color: #fff;
        }

        .game-header h1 {
            font-size: 2.2em;
            margin-bottom: 8px;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            background: linear-gradient(45deg, #ffd700 0%, #ff8c00 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 4px;
        }

        .game-info {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 15px;
            color: #a0a0a0;
            font-size: 0.9em;
            flex-wrap: wrap;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .info-value {
            color: var(--gold);
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .game-table {
            position: relative;
            background: radial-gradient(ellipse at center, #1a5c3a 0%, #0d4a2e 40%, #082820 100%);
            border-radius: 20px;
            padding: 25px;
            min-height: 550px;
            box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.4),
                        inset 0 0 150px rgba(255,255,255,0.03),
                        0 0 30px rgba(0, 0, 0, 0.5);
            border: 4px solid #2d7a4a;
        }

        /* 麻将牌 - 更精致的设计 */
        .tile {
            width: 38px;
            height: 52px;
            background: var(--tile-bg);
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--tile-shadow);
            position: relative;
            user-select: none;
            border: 1px solid #d0d0d0;
            overflow: hidden;
        }

        .tile::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 30%;
            background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 100%);
            border-radius: 5px 5px 0 0;
            pointer-events: none;
        }

        .tile:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .tile.selected {
            transform: translateY(-15px);
            box-shadow: 0 12px 30px rgba(79, 172, 254, 0.6);
            border: 2px solid var(--blue);
            background: linear-gradient(145deg, #e8f4ff 0%, #d0e8ff 100%);
        }

        .tile.hidden {
            background: linear-gradient(145deg, #1565C0 0%, #0D47A1 100%);
            color: transparent;
            border: 1px solid #1565C0;
        }

        .tile.hidden::before {
            content: '';
            position: absolute;
            width: 80%;
            height: 60%;
            background: linear-gradient(135deg, #1976d2 0%, #0d47a1 100%);
            border-radius: 3px;
            opacity: 0.5;
        }

        .tile.last-drawn {
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            animation: drawPulse 1s infinite;
        }

        @keyframes drawPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.7); }
        }

        /* 花色颜色 - 更鲜艳 */
        .tile.wan {
            color: #c41e3a;
            background: linear-gradient(145deg, #fff 0%, #ffebee 100%);
        }
        .tile.tong {
            color: #1976d2;
            background: linear-gradient(145deg, #fff 0%, #e3f2fd 100%);
        }
        .tile.tiao {
            color: #2e7d32;
            background: linear-gradient(145deg, #fff 0%, #e8f5e9 100%);
        }

        /* 牌面数字小字体 */
        .tile .tile-number {
            font-size: 0.55em;
            line-height: 1;
            margin-top: 2px;
            opacity: 0.7;
        }

        .tile .tile-suit {
            font-size: 1.4em;
            line-height: 1;
        }

        /* 玩家区域 */
        .player-area {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .player-info {
            background: rgba(255, 255, 255, 0.12);
            padding: 8px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
            color: #fff;
            font-size: 0.85em;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .player-info .player-name {
            font-weight: bold;
        }

        .player-info .player-cards {
            font-size: 0.8em;
            opacity: 0.8;
        }

        .player-info.active {
            background: linear-gradient(135deg, rgba(79, 172, 254, 0.5) 0%, rgba(79, 172, 254, 0.3) 100%);
            border-color: var(--blue);
            animation: playerPulse 1.5s infinite;
            box-shadow: 0 0 20px rgba(79, 172, 254, 0.5);
        }

        .player-info.hu {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.5) 0%, rgba(255, 180, 0, 0.3) 100%);
            border-color: var(--gold);
            animation: huPulse 0.5s infinite;
        }

        @keyframes playerPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(79, 172, 254, 0.4); }
            50% { box-shadow: 0 0 25px rgba(79, 172, 254, 0.7); }
        }

        @keyframes huPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .player-hand {
            display: flex;
            gap: 3px;
            justify-content: center;
            flex-wrap: nowrap;
        }

        /* 玩家位置 */
        .player-top {
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
        }

        .player-left {
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        .player-left .player-hand {
            flex-direction: column;
        }

        .player-left .tile {
            width: 34px;
            height: 46px;
            font-size: 1em;
        }

        .player-right {
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
        }

        .player-right .player-hand {
            flex-direction: column;
        }

        .player-right .tile {
            width: 34px;
            height: 46px;
            font-size: 1em;
        }

        .player-bottom {
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
        }

        .player-bottom .tile {
            width: 44px;
            height: 58px;
            font-size: 1.3em;
        }

        /* 中央区域 */
        .center-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
            max-width: 450px;
        }

        .discard-pool {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 12px;
            max-height: 160px;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .discard-pool .tile {
            width: 32px;
            height: 42px;
            font-size: 0.9em;
            cursor: default;
        }

        .discard-pool .tile:hover {
            transform: none;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .action-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .action-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
            transform: none;
            filter: grayscale(0.5);
        }

        .btn-discard {
            background: linear-gradient(45deg, #e91e63 0%, #f06292 100%);
        }

        .btn-hu {
            background: linear-gradient(45deg, var(--gold) 0%, #ffb300 100%);
            color: #333;
        }

        .btn-gang {
            background: linear-gradient(45deg, #4caf50 0%, #8bc34a 100%);
        }

        .btn-peng {
            background: linear-gradient(45deg, #ff9800 0%, #ffc107 100%);
            color: #333;
        }

        .btn-chi {
            background: linear-gradient(45deg, #00bcd4 0%, #4dd0e1 100%);
            color: #333;
        }

        .btn-ignore {
            background: linear-gradient(45deg, #607d8b 0%, #90a4ae 100%);
            color: #333;
        }

        .deck-info {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.4);
            padding: 8px 14px;
            border-radius: 15px;
            color: #fff;
            font-size: 0.8em;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .deck-info span {
            color: var(--gold);
            font-weight: bold;
        }

        /* 吃牌选择 */
        .chi-options {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 20px;
            border-radius: 15px;
            z-index: 100;
            text-align: center;
        }

        .chi-options.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .chi-options h3 {
            color: #fff;
            margin-bottom: 15px;
        }

        .chi-option {
            display: flex;
            gap: 5px;
            justify-content: center;
            margin-bottom: 10px;
            cursor: pointer;
            padding: 8px 15px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .chi-option:hover {
            background: rgba(79, 172, 254, 0.3);
        }

        .chi-option .tile {
            cursor: pointer;
            width: 30px;
            height: 40px;
            font-size: 0.8em;
        }

        /* 游戏消息弹窗 */
        .game-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #1a1a2e 0%, #0f1629 100%);
            color: #fff;
            padding: 40px 60px;
            border-radius: 25px;
            font-size: 1.5em;
            z-index: 1000;
            display: none;
            text-align: center;
            animation: fadeIn 0.4s ease;
            border: 2px solid rgba(255, 215, 0, 0.5);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6), 0 0 50px rgba(255, 215, 0, 0.2);
            min-width: 350px;
        }

        .game-message.show {
            display: block;
        }

        .game-message .hu-text {
            color: var(--gold);
            font-size: 1.8em;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            margin-bottom: 10px;
        }

        .game-message .hu-details {
            font-size: 0.7em;
            color: #aaa;
            margin: 15px 0;
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }

        .new-game-btn {
            margin-top: 20px;
            padding: 14px 30px;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .new-game-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
        }

        /* 动作提示 */
        .action-tip {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 18px 30px;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1em;
            z-index: 100;
            display: none;
            animation: fadeIn 0.3s ease;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .action-tip.show {
            display: block;
        }

        /* 吃碰杠区域 */
        .melds-area {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
            flex-wrap: wrap;
            max-width: 200px;
        }

        .meld {
            display: flex;
            gap: 2px;
        }

        .meld .tile {
            width: 28px;
            height: 38px;
            font-size: 0.75em;
            cursor: default;
        }

        .meld .tile:hover {
            transform: none;
        }

        .meld.peng .tile {
            background: linear-gradient(145deg, #fff3e0 0%, #ffe0b2 100%);
        }

        .meld.gang .tile {
            background: linear-gradient(145deg, #e8f5e9 0%, #c8e6c9 100%);
        }

        .meld.chi .tile {
            background: linear-gradient(145deg, #e3f2fd 0%, #bbdefb 100%);
        }

        /* 结算面板 */
        .settlement-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .settlement-panel.show {
            display: flex;
            animation: fadeIn 0.4s ease;
        }

        .settlement-content {
            background: linear-gradient(145deg, #1a1a2e 0%, #0f1629 100%);
            border-radius: 20px;
            padding: 30px 50px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            text-align: center;
            max-width: 500px;
        }

        .settlement-title {
            color: var(--gold);
            font-size: 1.8em;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .settlement-item {
            color: #fff;
            margin: 10px 0;
            font-size: 1.1em;
        }

        .settlement-item .winner {
            color: var(--gold);
            font-weight: bold;
        }

        .settlement-item .score {
            color: var(--blue);
            font-weight: bold;
        }

        /* 响应式 */
        @media (max-width: 900px) {
            .game-container {
                padding: 10px;
            }

            .game-header h1 {
                font-size: 1.6em;
            }

            .tile {
                width: 28px;
                height: 40px;
                font-size: 0.9em;
            }

            .player-bottom .tile {
                width: 34px;
                height: 46px;
                font-size: 1em;
            }

            .game-table {
                padding: 15px;
                min-height: 420px;
            }

            .action-btn {
                padding: 10px 18px;
                font-size: 0.85em;
            }

            .discard-pool .tile {
                width: 26px;
                height: 34px;
                font-size: 0.7em;
            }

            .game-info {
                gap: 15px;
                font-size: 0.8em;
            }
        }

        /* 滚动条美化 */
        .discard-pool::-webkit-scrollbar {
            width: 6px;
        }

        .discard-pool::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
        }

        .discard-pool::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 3px;
        }

        /* 牌墙效果 */
        .wall-tiles {
            position: absolute;
            display: flex;
            gap: 2px;
        }

        .wall-tiles .wall-tile {
            width: 8px;
            height: 20px;
            background: linear-gradient(145deg, #1a5c3a 0%, #0d4a2e 100%);
            border-radius: 2px;
            border: 1px solid #2d7a4a;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-header">
            <h1>🀄 四川麻将</h1>
            <div class="game-info">
                <div class="info-item">剩余牌: <span class="info-value" id="remaining-count">108</span></div>
                <div class="info-item">当前: <span class="info-value" id="current-player-name">玩家</span></div>
                <div class="info-item">庄家: <span class="info-value" id="dealer-name">玩家</span></div>
                <div class="info-item">局数: <span class="info-value" id="round-number">1</span></div>
            </div>
        </div>

        <div class="game-table">
            <div class="deck-info">
                牌墙: <span id="deck-count">108</span> 张
            </div>

            <!-- 顶部玩家 (Bot 2 - 上家) -->
            <div class="player-area player-top">
                <div class="player-info" id="player-2-info">
                    <div class="player-name">🤖 电脑玩家 2</div>
                    <div class="player-cards">牌: <span id="player-2-count">13</span></div>
                </div>
                <div class="player-hand" id="player-2-hand"></div>
                <div class="melds-area" id="player-2-melds"></div>
            </div>

            <!-- 左侧玩家 (Bot 1 - 对家) -->
            <div class="player-area player-left">
                <div class="player-info" id="player-1-info">
                    <div class="player-name">🤖 电脑玩家 1</div>
                    <div class="player-cards">牌: <span id="player-1-count">13</span></div>
                </div>
                <div class="player-hand" id="player-1-hand"></div>
                <div class="melds-area" id="player-1-melds"></div>
            </div>

            <!-- 右侧玩家 (Bot 3 - 下家) -->
            <div class="player-area player-right">
                <div class="player-info" id="player-3-info">
                    <div class="player-name">🤖 电脑玩家 3</div>
                    <div class="player-cards">牌: <span id="player-3-count">13</span></div>
                </div>
                <div class="player-hand" id="player-3-hand"></div>
                <div class="melds-area" id="player-3-melds"></div>
            </div>

            <!-- 中央区域 -->
            <div class="center-area">
                <div class="discard-pool" id="discard-pool"></div>
                <div class="action-buttons" id="action-buttons">
                    <button class="action-btn btn-discard" id="btn-discard" onclick="discardTile()">出牌</button>
                    <button class="action-btn btn-chi" id="btn-chi" onclick="showChiOptions()">吃</button>
                    <button class="action-btn btn-peng" id="btn-peng" onclick="pengAction()">碰</button>
                    <button class="action-btn btn-gang" id="btn-gang" onclick="gangAction()">杠</button>
                    <button class="action-btn btn-hu" id="btn-hu" onclick="huAction()">胡</button>
                    <button class="action-btn btn-ignore" id="btn-ignore" onclick="ignoreAction()" style="display:none;">过</button>
                </div>
            </div>

            <!-- 底部玩家 (人类) -->
            <div class="player-area player-bottom">
                <div class="player-info" id="player-0-info">
                    <div class="player-name">👤 玩家 (你)</div>
                    <div class="player-cards">牌: <span id="player-0-count">13</span></div>
                </div>
                <div class="player-hand" id="player-0-hand"></div>
                <div class="melds-area" id="player-0-melds"></div>
            </div>
        </div>
    </div>

    <!-- 游戏消息弹窗 -->
    <div class="game-message" id="game-message">
        <div id="message-text"></div>
        <button class="new-game-btn" onclick="startNewGame()">再玩一局</button>
    </div>

    <!-- 吃牌选择 -->
    <div class="chi-options" id="chi-options">
        <h3>选择吃牌方式</h3>
        <div id="chi-option-buttons"></div>
    </div>

    <!-- 动作提示 -->
    <div class="action-tip" id="action-tip"></div>

    <!-- 结算面板 -->
    <div class="settlement-panel" id="settlement-panel">
        <div class="settlement-content">
            <div class="settlement-title">🏆 游戏结束</div>
            <div id="settlement-details"></div>
            <button class="new-game-btn" onclick="closeSettlement()">再来一局</button>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const TILE_SYMBOLS = {
            wan: ['🀇', '🀈', '🀉', '🀊', '🀋', '🀌', '🀍', '🀎', '🀏'],
            tong: ['🀙', '🀚', '🀛', '🀜', '🀝', '🀞', '🀟', '🀠', '🀡'],
            tiao: ['🀐', '🀑', '🀒', '🀓', '🀔', '🀕', '🀖', '🀗', '🀘']
        };

        const TILE_NAMES = {
            wan: ['一萬', '二萬', '三萬', '四萬', '五萬', '六萬', '七萬', '八萬', '九萬'],
            tong: ['一筒', '二筒', '三筒', '四筒', '五筒', '六筒', '七筒', '八筒', '九筒'],
            tiao: ['一条', '二条', '三条', '四条', '五条', '六条', '七条', '八条', '九条']
        };

        // ==================== 游戏状态 ====================
        const gameState = {
            players: [
                { name: '玩家', hand: [], discarded: [], melds: [], isBot: false, hu: false, huType: '' },
                { name: '电脑玩家1', hand: [], discarded: [], melds: [], isBot: true, hu: false, huType: '' },
                { name: '电脑玩家2', hand: [], discarded: [], melds: [], isBot: true, hu: false, huType: '' },
                { name: '电脑玩家3', hand: [], discarded: [], melds: [], isBot: true, hu: false, huType: '' }
            ],
            currentPlayer: 0,
            deck: [],
            discardPool: [],
            selectedTile: null,
            dealer: 0,
            lastDiscardedTile: null,
            lastDiscardedPlayer: null,
            isGameOver: false,
            waitingForAction: false,
            pendingActions: [],
            extraTile: null,
            round: 1,
            chiOptions: [],
            canChi: false
        };

        // ==================== 牌操作 ====================
        function createDeck() {
            const deck = [];
            // 四川麻将：万、筒、条各9种，每种4张 = 108张
            ['wan', 'tong', 'tiao'].forEach(suit => {
                for (let value = 1; value <= 9; value++) {
                    for (let i = 0; i < 4; i++) {
                        deck.push({
                            suit: suit,
                            value: value,
                            symbol: TILE_SYMBOLS[suit][value - 1],
                            name: TILE_NAMES[suit][value - 1],
                            id: `${suit}-${value}-${i}-${Date.now()}-${Math.random()}`
                        });
                    }
                }
            });
            return shuffleDeck(deck);
        }

        function shuffleDeck(deck) {
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        function sortHand(hand) {
            hand.sort((a, b) => {
                if (a.suit !== b.suit) {
                    const suitOrder = { 'wan': 0, 'tong': 1, 'tiao': 2 };
                    return suitOrder[a.suit] - suitOrder[b.suit];
                }
                return a.value - b.value;
            });
        }

        function getTileKey(tile) {
            return `${tile.suit}-${tile.value}`;
        }

        // ==================== 游戏流程 ====================
        function startNewGame() {
            // 重置游戏状态
            gameState.players.forEach(player => {
                player.hand = [];
                player.discarded = [];
                player.melds = [];
                player.hu = false;
                player.huType = '';
            });
            gameState.deck = createDeck();
            gameState.discardPool = [];
            gameState.currentPlayer = gameState.dealer;
            gameState.selectedTile = null;
            gameState.lastDiscardedTile = null;
            gameState.lastDiscardedPlayer = null;
            gameState.isGameOver = false;
            gameState.waitingForAction = false;
            gameState.pendingActions = [];
            gameState.extraTile = null;
            gameState.canChi = false;
            gameState.chiOptions = [];

            document.getElementById('game-message').classList.remove('show');
            document.getElementById('settlement-panel').classList.remove('show');
            document.getElementById('chi-options').classList.remove('show');

            dealTiles();
            updateUI();

            // 庄家先摸牌
            setTimeout(() => {
                drawTile(gameState.currentPlayer);
            }, 800);
        }

        function dealTiles() {
            // 每个玩家发13张牌
            for (let i = 0; i < 13; i++) {
                gameState.players.forEach(player => {
                    if (gameState.deck.length > 0) {
                        player.hand.push(gameState.deck.pop());
                    }
                });
            }

            // 排序手牌
            gameState.players.forEach(player => {
                sortHand(player.hand);
            });
        }

        function drawTile(playerIndex) {
            if (gameState.isGameOver) return;

            const player = gameState.players[playerIndex];

            if (gameState.deck.length === 0) {
                // 流局 - 检查查花猪
                checkForSettlement();
                return;
            }

            const tile = gameState.deck.pop();
            player.hand.push(tile);
            gameState.extraTile = tile;
            sortHand(player.hand);

            updateUI();

            // 检查是否自摸
            if (checkHu(player.hand)) {
                if (player.isBot) {
                    setTimeout(() => {
                        player.hu = true;
                        player.huType = '自摸';
                        showHuMessage(playerIndex, '自摸');
                    }, 600);
                } else {
                    showTip('你可以自摸胡牌！');
                    document.getElementById('btn-hu').disabled = false;
                    enablePlayerActions();
                }
                return;
            }

            // 检查暗杠
            const availableGang = findGangTile(player.hand);
            if (availableGang) {
                if (player.isBot) {
                    // 机器人有一定概率杠
                    if (Math.random() > 0.4) {
                        setTimeout(() => {
                            performGang(playerIndex, availableGang, false);
                        }, 600);
                        return;
                    }
                } else {
                    document.getElementById('btn-gang').disabled = false;
                }
            }

            // 检查补杠
            const availableBuGang = findBuGang(player);
            if (availableBuGang) {
                if (player.isBot) {
                    if (Math.random() > 0.5) {
                        setTimeout(() => {
                            performBuGang(playerIndex, availableBuGang);
                        }, 600);
                        return;
                    }
                } else {
                    document.getElementById('btn-gang').disabled = false;
                }
            }

            // 机器人或玩家出牌
            if (player.isBot && !gameState.isGameOver) {
                setTimeout(() => {
                    botPlay(playerIndex);
                }, 800);
            } else if (!player.isBot && !gameState.isGameOver) {
                enablePlayerActions();
            }
        }

        // ==================== 机器人AI ====================
        function botPlay(playerIndex) {
            if (gameState.isGameOver) return;

            const player = gameState.players[playerIndex];

            // 选择要打出的牌
            const tileToDiscard = selectBotDiscardTile(player.hand);

            if (tileToDiscard) {
                discardTileInternal(playerIndex, tileToDiscard);
            }
        }

        function selectBotDiscardTile(hand) {
            // 统计每张牌的数量
            const tileCounts = {};
            hand.forEach(tile => {
                const key = getTileKey(tile);
                tileCounts[key] = (tileCounts[key] || 0) + 1;
            });

            // 策略1: 优先打出孤张（没有相邻牌的牌）
            const loneTiles = hand.filter(tile => {
                const key = getTileKey(tile);
                if (tileCounts[key] > 1) return false; // 不打对子

                // 检查是否有相邻的牌
                let hasNeighbor = false;
                // 检查顺子
                if (tile.value >= 2) {
                    const prevKey = getTileKey({suit: tile.suit, value: tile.value - 1});
                    if (tileCounts[prevKey]) hasNeighbor = true;
                }
                if (tile.value <= 8) {
                    const nextKey = getTileKey({suit: tile.suit, value: tile.value + 1});
                    if (tileCounts[nextKey]) hasNeighbor = true;
                }
                return !hasNeighbor;
            });

            if (loneTiles.length > 0) {
                return loneTiles[Math.floor(Math.random() * loneTiles.length)];
            }

            // 策略2: 打出一个对子中的一张（保留搭子）
            const pairs = hand.filter(tile => tileCounts[getTileKey(tile)] === 2);
            if (pairs.length > 0) {
                return pairs[Math.floor(Math.random() * pairs.length)];
            }

            // 策略3: 随机打一张
            return hand[Math.floor(Math.random() * hand.length)];
        }

        function findGangTile(hand) {
            const tileCounts = {};
            hand.forEach(tile => {
                const key = getTileKey(tile);
                tileCounts[key] = (tileCounts[key] || 0) + 1;
            });

            for (const tile of hand) {
                const key = getTileKey(tile);
                if (tileCounts[key] === 4) {
                    return tile;
                }
            }
            return null;
        }

        function findBuGang(player) {
            // 检查是否有碰过的牌可以补杠
            for (const meld of player.melds) {
                if (meld.type === 'peng') {
                    const pengTile = meld.tiles[0];
                    const count = player.hand.filter(t =>
                        t.suit === pengTile.suit && t.value === pengTile.value
                    ).length;
                    if (count >= 1) {
                        return pengTile;
                    }
                }
            }
            return null;
        }

        // ==================== 出牌 ====================
        function discardTile() {
            if (gameState.selectedTile === null) {
                showTip('请先选择一张牌');
                return;
            }

            const player = gameState.players[gameState.currentPlayer];
            const tileIndex = player.hand.findIndex(t => t.id === gameState.selectedTile.id);

            if (tileIndex === -1) return;

            const tile = player.hand.splice(tileIndex, 1)[0];
            gameState.extraTile = null;
            gameState.selectedTile = null;

            // 隐藏吃牌选项
            document.getElementById('chi-options').classList.remove('show');
            gameState.canChi = false;

            discardTileInternal(gameState.currentPlayer, tile);
        }

        function discardTileInternal(playerIndex, tile) {
            const player = gameState.players[playerIndex];
            player.discarded.push(tile);
            gameState.discardPool.push(tile);
            gameState.lastDiscardedTile = tile;
            gameState.lastDiscardedPlayer = playerIndex;

            updateUI();

            // 检查其他玩家是否可以动作
            setTimeout(() => {
                checkActionsAfterDiscard(playerIndex, tile);
            }, 300);
        }

        // ==================== 吃碰杠胡检测 ====================
        function checkActionsAfterDiscard(discardPlayerIndex, tile) {
            gameState.pendingActions = [];
            gameState.canChi = false;
            gameState.chiOptions = [];

            // 计算下一个玩家（被吃碰杠的玩家）
            const nextPlayerIndex = (discardPlayerIndex + 1) % 4;

            // 检查每个玩家的动作
            for (let i = 0; i < gameState.players.length; i++) {
                if (i === discardPlayerIndex) continue;

                const player = gameState.players[i];

                // 胡牌检测（优先）
                const tempHand = [...player.hand, tile];
                if (checkHu(tempHand)) {
                    if (i === nextPlayerIndex) {
                        // 下家可以吃，但不胡
                    } else {
                        gameState.pendingActions.push({ player: i, type: 'hu', tile: tile });
                        continue;
                    }
                }

                // 碰检测
                if (canPeng(player.hand, tile)) {
                    if (i === nextPlayerIndex) {
                        // 下家可以吃，先检查吃
                    } else {
                        gameState.pendingActions.push({ player: i, type: 'peng', tile: tile });
                    }
                }

                // 下家吃检测
                if (i === nextPlayerIndex) {
                    const chiResults = canChi(player.hand, tile);
                    if (chiResults.length > 0) {
                        gameState.canChi = true;
                        gameState.chiOptions = chiResults;
                        gameState.pendingActions.push({ player: i, type: 'chi', tile: tile, options: chiResults });
                    }
                }
            }

            // 按优先级排序：胡 > 碰 > 吃
            gameState.pendingActions.sort((a, b) => {
                const priority = { 'hu': 0, 'peng': 1, 'chi': 2 };
                return priority[a.type] - priority[b.type];
            });

            if (gameState.pendingActions.length > 0) {
                processNextAction();
            } else {
                // 没有动作，继续下一个玩家
                setTimeout(() => {
                    nextPlayer();
                }, 400);
            }
        }

        function processNextAction() {
            if (gameState.pendingActions.length === 0) {
                nextPlayer();
                return;
            }

            const action = gameState.pendingActions.shift();
            const player = gameState.players[action.player];

            if (player.isBot) {
                // 机器人动作
                setTimeout(() => {
                    if (action.type === 'hu') {
                        player.hu = true;
                        player.huType = '胡牌';
                        showHuMessage(action.player, '胡牌');
                    } else if (action.type === 'peng') {
                        // 机器人有概率选择碰
                        if (Math.random() > 0.3) {
                            performPeng(action.player, action.tile);
                        } else {
                            processNextAction();
                        }
                    } else if (action.type === 'chi') {
                        // 机器人选择吃
                        if (Math.random() > 0.4) {
                            const chiOption = action.options[Math.floor(Math.random() * action.options.length)];
                            performChi(action.player, action.tile, chiOption);
                        } else {
                            processNextAction();
                        }
                    }
                }, 500);
            } else {
                // 玩家动作
                if (action.type === 'hu') {
                    showTip('你可以胡牌了！');
                    document.getElementById('btn-hu').disabled = false;
                    document.getElementById('btn-ignore').style.display = 'inline-block';
                    disableDiscardButton();
                } else if (action.type === 'peng') {
                    showTip('你可以碰牌！');
                    document.getElementById('btn-peng').disabled = false;
                    document.getElementById('btn-ignore').style.display = 'inline-block';
                    disableDiscardButton();
                } else if (action.type === 'chi') {
                    showTip('你可以吃牌！');
                    showChiOptionsForPlayer(action.options);
                    document.getElementById('btn-chi').disabled = false;
                    document.getElementById('btn-ignore').style.display = 'inline-block';
                    disableDiscardButton();
                }
            }
        }

        function canPeng(hand, tile) {
            const count = hand.filter(t =>
                t.suit === tile.suit && t.value === tile.value
            ).length;
            return count >= 2;
        }

        function canChi(hand, tile) {
            if (tile.suit === 'wan') return []; // 万子不能吃
            const results = [];

            const tileCounts = {};
            hand.forEach(t => {
                const key = getTileKey(t);
                tileCounts[key] = (tileCounts[key] || 0) + 1;
            });

            // 吃上家：牌-2, 牌-1, 牌
            if (tile.value >= 3) {
                const v1 = tile.value - 2;
                const v2 = tile.value - 1;
                const key1 = `${tile.suit}-${v1}`;
                const key2 = `${tile.suit}-${v2}`;
                if ((tileCounts[key1] || 0) > 0 && (tileCounts[key2] || 0) > 0) {
                    results.push({ type: 'left', tiles: [v2, v1, tile.value], suit: tile.suit });
                }
            }

            // 吃中间：牌-1, 牌, 牌+1
            if (tile.value >= 2 && tile.value <= 8) {
                const v1 = tile.value - 1;
                const v3 = tile.value + 1;
                const key1 = `${tile.suit}-${v1}`;
                const key3 = `${tile.suit}-${v3}`;
                if ((tileCounts[key1] || 0) > 0 && (tileCounts[key3] || 0) > 0) {
                    results.push({ type: 'middle', tiles: [v1, tile.value, v3], suit: tile.suit });
                }
            }

            // 吃下家：牌, 牌+1, 牌+2
            if (tile.value <= 7) {
                const v2 = tile.value + 1;
                const v3 = tile.value + 2;
                const key2 = `${tile.suit}-${v2}`;
                const key3 = `${tile.suit}-${v3}`;
                if ((tileCounts[key2] || 0) > 0 && (tileCounts[key3] || 0) > 0) {
                    results.push({ type: 'right', tiles: [tile.value, v2, v3], suit: tile.suit });
                }
            }

            return results;
        }

        function showChiOptions() {
            if (!gameState.canChi || gameState.chiOptions.length === 0) return;
            showChiOptionsForPlayer(gameState.chiOptions);
        }

        function showChiOptionsForPlayer(options) {
            const container = document.getElementById('chi-option-buttons');
            container.innerHTML = '';

            options.forEach((option, index) => {
                const div = document.createElement('div');
                div.className = 'chi-option';
                div.onclick = () => {
                    document.getElementById('chi-options').classList.remove('show');
                    performChi(0, gameState.lastDiscardedTile, option);
                };

                option.tiles.forEach(value => {
                    const tileDiv = document.createElement('div');
                    tileDiv.className = `tile ${option.suit}`;
                    tileDiv.textContent = TILE_SYMBOLS[option.suit][value - 1];
                    div.appendChild(tileDiv);
                });

                container.appendChild(div);
            });

            document.getElementById('chi-options').classList.add('show');
        }

        function performChi(playerIndex, discardedTile, chiOption) {
            const player = gameState.players[playerIndex];

            // 移除两张牌
            const toRemove = chiOption.tiles.slice(0, 2);
            const remainingHand = [];

            for (const t of player.hand) {
                let removed = false;
                for (let i = 0; i < toRemove.length; i++) {
                    if (!removed && t.suit === chiOption.suit && t.value === toRemove[i]) {
                        toRemove.splice(i, 1);
                        removed = true;
                    }
                }
                if (!removed) {
                    remainingHand.push(t);
                }
            }

            player.hand = remainingHand;

            // 记录吃副露（按顺序排列）
            const meldTiles = chiOption.tiles.map((v, i) => ({
                suit: chiOption.suit,
                value: v,
                symbol: TILE_SYMBOLS[chiOption.suit][v - 1],
                name: TILE_NAMES[chiOption.suit][v - 1],
                id: `chi-${i}-${Date.now()}`
            }));

            player.melds.push({
                type: 'chi',
                tiles: meldTiles,
                from: gameState.lastDiscardedPlayer
            });

            // 从弃牌池移除被吃的牌
            const discardIdx = gameState.discardPool.findIndex(t =>
                t.suit === discardedTile.suit && t.value === discardedTile.value
            );
            if (discardIdx > -1) {
                gameState.discardPool.splice(discardIdx, 1);
            }

            gameState.currentPlayer = playerIndex;
            gameState.lastDiscardedTile = null;
            gameState.lastDiscardedPlayer = null;
            gameState.extraTile = null;
            gameState.pendingActions = [];
            gameState.canChi = false;

            updateUI();
            hideTip();

            // 吃完出牌
            if (player.isBot) {
                setTimeout(() => {
                    botPlay(playerIndex);
                }, 800);
            } else {
                enablePlayerActions();
            }
        }

        function performPeng(playerIndex, tile) {
            const player = gameState.players[playerIndex];

            // 找到两张相同的牌
            const tilesToRemove = [];
            for (let i = 0; i < player.hand.length; i++) {
                if (tilesToRemove.length < 2 &&
                    player.hand[i].suit === tile.suit &&
                    player.hand[i].value === tile.value) {
                    tilesToRemove.push(i);
                }
            }

            // 移除两张牌
            tilesToRemove.sort((a, b) => b - a).forEach(idx => {
                player.hand.splice(idx, 1);
            });

            // 记录碰副露
            const meldTiles = [
                { ...tile, id: tile.id + '-meld1' },
                { ...tile, id: tile.id + '-meld2' },
                { ...tile, id: tile.id + '-meld3' }
            ];
            player.melds.push({
                type: 'peng',
                tiles: meldTiles,
                from: gameState.lastDiscardedPlayer
            });

            // 从弃牌池移除被碰的牌
            const discardIdx = gameState.discardPool.findIndex(t =>
                t.suit === tile.suit && t.value === tile.value
            );
            if (discardIdx > -1) {
                gameState.discardPool.splice(discardIdx, 1);
            }

            gameState.currentPlayer = playerIndex;
            gameState.lastDiscardedTile = null;
            gameState.lastDiscardedPlayer = null;
            gameState.extraTile = null;
            gameState.pendingActions = [];

            updateUI();
            hideTip();

            // 碰后出牌
            if (player.isBot) {
                setTimeout(() => {
                    botPlay(playerIndex);
                }, 800);
            } else {
                enablePlayerActions();
            }
        }

        function performGang(playerIndex, tile, isBuGang) {
            const player = gameState.players[playerIndex];

            // 移除四张相同的牌
            const remainingHand = [];
            let removedCount = 0;

            for (const t of player.hand) {
                if (removedCount < 4 && t.suit === tile.suit && t.value === tile.value) {
                    removedCount++;
                } else {
                    remainingHand.push(t);
                }
            }

            player.hand = remainingHand;

            // 记录杠副露
            const meldTiles = [];
            for (let i = 0; i < 4; i++) {
                meldTiles.push({ ...tile, id: tile.id + '-gang' + i });
            }
            player.melds.push({
                type: 'gang',
                tiles: meldTiles,
                isBuGang: isBuGang,
                from: isBuGang ? null : gameState.lastDiscardedPlayer
            });

            gameState.currentPlayer = playerIndex;
            gameState.lastDiscardedTile = null;
            gameState.lastDiscardedPlayer = null;
            gameState.extraTile = null;

            updateUI();

            // 杠后摸牌
            setTimeout(() => {
                drawTile(playerIndex);
            }, 600);
        }

        function performBuGang(playerIndex, tile) {
            // 移除一张牌
            const remainingHand = [];
            let removed = false;

            for (const t of player.hand) {
                if (!removed && t.suit === tile.suit && t.value === tile.value) {
                    removed = true;
                } else {
                    remainingHand.push(t);
                }
            }

            gameState.players[playerIndex].hand = remainingHand;

            // 更新补杠状态
            const player = gameState.players[playerIndex];
            for (const meld of player.melds) {
                if (meld.type === 'peng' && meld.tiles[0].suit === tile.suit && meld.tiles[0].value === tile.value) {
                    // 转换为杠
                    meld.type = 'gang';
                    meld.isBuGang = true;
                    meld.tiles.push({ ...tile, id: tile.id + '-bu-gang' });
                    break;
                }
            }

            gameState.currentPlayer = playerIndex;
            gameState.lastDiscardedTile = null;
            gameState.extraTile = null;

            updateUI();

            // 杠后摸牌
            setTimeout(() => {
                drawTile(playerIndex);
            }, 600);
        }

        function gangAction() {
            const player = gameState.players[0];

            // 先检查暗杠
            const gangTile = findGangTile(player.hand);
            if (gangTile) {
                performGang(0, gangTile, false);
                return;
            }

            // 再检查补杠
            const buGangTile = findBuGang(player);
            if (buGangTile) {
                performBuGang(0, buGangTile);
                return;
            }
        }

        // ==================== 胡牌检测 ====================
        function checkHu(hand) {
            if (hand.length % 3 !== 2) return false;

            // 创建牌计数
            const tileCounts = {};
            hand.forEach(tile => {
                const key = getTileKey(tile);
                tileCounts[key] = (tileCounts[key] || 0) + 1;
            });

            // 尝试每种牌作为将牌
            for (const key of Object.keys(tileCounts)) {
                if (tileCounts[key] >= 2) {
                    const testCounts = { ...tileCounts };
                    testCounts[key] -= 2;

                    if (canFormSets(testCounts)) {
                        return true;
                    }
                }
            }

            return false;
        }

        function canFormSets(tileCounts) {
            const counts = { ...tileCounts };

            // 尝试组成刻子
            for (const key of Object.keys(counts)) {
                while (counts[key] >= 3) {
                    counts[key] -= 3;
                }
            }

            // 尝试组成顺子
            for (const suit of ['wan', 'tong', 'tiao']) {
                for (let value = 1; value <= 7; value++) {
                    const key1 = `${suit}-${value}`;
                    const key2 = `${suit}-${value + 1}`;
                    const key3 = `${suit}-${value + 2}`;

                    while ((counts[key1] || 0) > 0 && (counts[key2] || 0) > 0 && (counts[key3] || 0) > 0) {
                        counts[key1]--;
                        counts[key2]--;
                        counts[key3]--;
                    }
                }
            }

            return Object.values(counts).every(count => count === 0);
        }

        function huAction() {
            gameState.players[0].hu = true;
            gameState.players[0].huType = '胡牌';
            showHuMessage(0, '胡牌');
        }

        function showHuMessage(playerIndex, huType) {
            const player = gameState.players[playerIndex];
            const huDetails = calculateHuScore(player);

            let message = `<div class="hu-text">🎉 ${player.name} ${huType}！</div>`;
            message += `<div class="hu-details">${huDetails}</div>`;

            document.getElementById('message-text').innerHTML = message;
            document.getElementById('game-message').classList.add('show');

            // 更新玩家状态显示
            const infoEl = document.getElementById(`player-${playerIndex}-info`);
            infoEl.classList.add('hu');

            gameState.isGameOver = true;
            disablePlayerActions();
        }

        function calculateHuScore(player) {
            let score = 0;
            let details = [];

            // 基础分
            score += 2;
            details.push('基础分：2分');

            // 自摸加1分
            if (player.huType === '自摸') {
                score += 1;
                details.push('自摸：+1分');
            }

            // 杠分
            let gangCount = 0;
            player.melds.forEach(meld => {
                if (meld.type === 'gang') {
                    gangCount++;
                }
            });
            if (gangCount > 0) {
                score += gangCount;
                details.push(`杠牌：+${gangCount}分`);
            }

            // 碰牌碰碰胡
            if (player.melds.length >= 3 && player.melds.every(m => m.type === 'peng' || m.type === 'gang')) {
                score += 2;
                details.push('碰碰胡：+2分');
            }

            details.push(`<strong>总计：${score}分</strong>`);
            return details.join('<br>');
        }

        // ==================== 流局检查 ====================
        function checkForSettlement() {
            // 检查花猪（缺一门）
            let huazhuPlayers = [];
            gameState.players.forEach((player, index) => {
                const suits = new Set(player.hand.map(t => t.suit));
                if (suits.size < 3) {
                    huazhuPlayers.push(index);
                }
                player.melds.forEach(meld => {
                    meld.tiles.forEach(tile => suits.add(tile.suit));
                });
                if (suits.size < 3) {
                    huazhuPlayers.push(index);
                }
            });

            if (huazhuPlayers.length > 0) {
                showSettlement(huazhuPlayers);
            } else {
                endGame('流局！牌墙已空');
            }
        }

        function showSettlement(huazhuPlayers) {
            const panel = document.getElementById('settlement-panel');
            const details = document.getElementById('settlement-details');

            let html = '<div class="settlement-title">流局 - 查花猪</div>';

            huazhuPlayers.forEach(index => {
                const player = gameState.players[index];
                const suitNames = [];
                const allSuits = new Set();
                player.hand.forEach(t => allSuits.add(t.suit));
                player.melds.forEach(m => m.tiles.forEach(t => allSuits.add(t.suit)));

                ['wan', 'tong', 'tiao'].forEach(s => {
                    if (!allSuits.has(s)) {
                        suitNames.push(s === 'wan' ? '万' : s === 'tong' ? '筒' : '条');
                    }
                });

                html += `<div class="settlement-item">${player.name} 缺 ${suitNames.join('')}</div>`;
            });

            const nonHuazhu = gameState.players.filter((_, i) => !huazhuPlayers.includes(i));
            html += `<div class="settlement-item">${nonHuazhu.map(p => p.name).join('、')} 正确</div>`;

            details.innerHTML = html;
            panel.classList.add('show');
        }

        function closeSettlement() {
            document.getElementById('settlement-panel').classList.remove('show');
            startNewGame();
        }

        // ==================== 玩家动作 ====================
        function pengAction() {
            if (!gameState.lastDiscardedTile) return;
            document.getElementById('btn-ignore').style.display = 'none';
            performPeng(0, gameState.lastDiscardedTile);
        }

        function ignoreAction() {
            document.getElementById('btn-ignore').style.display = 'none';
            document.getElementById('btn-peng').disabled = true;
            document.getElementById('btn-hu').disabled = true;
            document.getElementById('btn-chi').disabled = true;
            document.getElementById('chi-options').classList.remove('show');
            hideTip();
            processNextAction();
        }

        function nextPlayer() {
            gameState.currentPlayer = (gameState.currentPlayer + 1) % 4;
            gameState.selectedTile = null;
            gameState.extraTile = null;

            updateUI();
            drawTile(gameState.currentPlayer);
        }

        // ==================== UI操作 ====================
        function enablePlayerActions() {
            document.getElementById('btn-discard').disabled = false;

            const player = gameState.players[0];
            const gangTile = findGangTile(player.hand);
            const buGangTile = findBuGang(player);
            document.getElementById('btn-gang').disabled = !(gangTile || buGangTile);

            document.getElementById('btn-peng').disabled = true;
            document.getElementById('btn-hu').disabled = true;
            document.getElementById('btn-chi').disabled = true;
            document.getElementById('btn-ignore').style.display = 'none';
        }

        function disablePlayerActions() {
            document.getElementById('btn-discard').disabled = true;
            document.getElementById('btn-peng').disabled = true;
            document.getElementById('btn-gang').disabled = true;
            document.getElementById('btn-hu').disabled = true;
            document.getElementById('btn-chi').disabled = true;
            document.getElementById('btn-ignore').style.display = 'none';
        }

        function disableDiscardButton() {
            document.getElementById('btn-discard').disabled = true;
            document.getElementById('btn-gang').disabled = true;
        }

        function showTip(message) {
            const tip = document.getElementById('action-tip');
            tip.textContent = message;
            tip.classList.add('show');
            setTimeout(() => {
                tip.classList.remove('show');
            }, 2500);
        }

        function hideTip() {
            document.getElementById('action-tip').classList.remove('show');
        }

        function endGame(message) {
            gameState.isGameOver = true;
            document.getElementById('message-text').innerHTML = `<div class="hu-text">${message}</div>`;
            document.getElementById('game-message').classList.add('show');
            disablePlayerActions();
        }

        function updateUI() {
            // 更新信息
            document.getElementById('remaining-count').textContent = gameState.deck.length;
            document.getElementById('deck-count').textContent = gameState.deck.length;
            document.getElementById('current-player-name').textContent = gameState.players[gameState.currentPlayer].name;
            document.getElementById('dealer-name').textContent = gameState.players[gameState.dealer].name;
            document.getElementById('round-number').textContent = gameState.round;

            // 更新每个玩家
            gameState.players.forEach((player, index) => {
                const handElement = document.getElementById(`player-${index}-hand`);
                const countElement = document.getElementById(`player-${index}-count`);
                const infoElement = document.getElementById(`player-${index}-info`);
                const meldsElement = document.getElementById(`player-${index}-melds`);

                handElement.innerHTML = '';
                countElement.textContent = player.hand.length;

                // 当前玩家高亮
                if (index === gameState.currentPlayer) {
                    infoElement.classList.add('active');
                } else {
                    infoElement.classList.remove('active');
                }

                // 胡牌高亮
                if (player.hu) {
                    infoElement.classList.add('hu');
                } else {
                    infoElement.classList.remove('hu');
                }

                // 渲染副露
                meldsElement.innerHTML = '';
                player.melds.forEach(meld => {
                    const meldDiv = document.createElement('div');
                    meldDiv.className = `meld ${meld.type}`;
                    meld.tiles.forEach(tile => {
                        const tileEl = document.createElement('div');
                        tileEl.className = `tile ${tile.suit}`;
                        tileEl.textContent = tile.symbol || tile;
                        meldDiv.appendChild(tileEl);
                    });
                    meldsElement.appendChild(meldDiv);
                });

                // 渲染手牌
                player.hand.forEach((tile, tileIndex) => {
                    const tileElement = document.createElement('div');
                    tileElement.className = `tile ${tile.suit}`;

                    // 最后摸到的牌高亮
                    if (index === gameState.currentPlayer &&
                        gameState.extraTile &&
                        tile.id === gameState.extraTile.id) {
                        tileElement.classList.add('last-drawn');
                    }

                    if (index === 0) {
                        // 玩家可见
                        tileElement.textContent = tile.symbol;
                        tileElement.onclick = () => selectTile(tile, tileElement);

                        // 恢复选中状态
                        if (gameState.selectedTile && gameState.selectedTile.id === tile.id) {
                            tileElement.classList.add('selected');
                        }
                    } else {
                        // 机器人隐藏
                        tileElement.classList.add('hidden');
                    }

                    handElement.appendChild(tileElement);
                });
            });

            // 渲染弃牌池
            const discardPoolElement = document.getElementById('discard-pool');
            discardPoolElement.innerHTML = '';
            gameState.discardPool.forEach(tile => {
                const tileElement = document.createElement('div');
                tileElement.className = `tile ${tile.suit}`;
                tileElement.textContent = tile.symbol;
                discardPoolElement.appendChild(tileElement);
            });
        }

        function selectTile(tile, element) {
            // 移除之前的选择
            document.querySelectorAll('.tile.selected').forEach(el => {
                el.classList.remove('selected');
            });

            // 选择新牌
            element.classList.add('selected');
            gameState.selectedTile = tile;
        }

        // ==================== 初始化 ====================
        window.onload = function() {
            startNewGame();
        };
    </script>
</body>
</html>
