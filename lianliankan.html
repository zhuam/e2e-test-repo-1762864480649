<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连连看游戏</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }

        .game-container {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            color: #00d4ff;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .info-item {
            text-align: center;
            padding: 10px 20px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.3);
            min-width: 120px;
        }

        .info-label {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00d4ff;
        }

        .game-board {
            display: grid;
            gap: 5px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(1rem, 4vw, 1.8rem);
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid rgba(255, 255, 255, 0.1);
            user-select: none;
            min-width: 35px;
            min-height: 35px;
        }

        .cell:hover {
            transform: scale(1.1);
            border-color: rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
        }

        .cell.selected {
            background: linear-gradient(145deg, #00d4ff, #0099cc);
            border-color: #fff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.8);
            transform: scale(1.15);
        }

        .cell.matched {
            background: linear-gradient(145deg, #00ff88, #00cc6a);
            opacity: 0;
            pointer-events: none;
            transform: scale(0);
        }

        .cell.hint {
            animation: hint-pulse 1s infinite;
        }

        @keyframes hint-pulse {
            0%, 100% { box-shadow: 0 0 10px rgba(255, 255, 0, 0.5); }
            50% { box-shadow: 0 0 25px rgba(255, 255, 0, 0.8); }
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(145deg, #00d4ff, #0099cc);
            color: #1a1a2e;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(145deg, #ff6b6b, #ee5a5a);
            color: #fff;
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.5);
        }

        .btn-hint {
            background: linear-gradient(145deg, #ffd93d, #ffcc00);
            color: #1a1a2e;
        }

        .btn-hint:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(255, 217, 61, 0.5);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(0, 212, 255, 0.5);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.3);
            max-width: 90%;
        }

        .modal-title {
            font-size: 2rem;
            color: #00d4ff;
            margin-bottom: 20px;
        }

        .modal-text {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: #fff;
        }

        .difficulty-select {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .difficulty-btn {
            padding: 10px 20px;
            border: 2px solid rgba(0, 212, 255, 0.3);
            background: rgba(0, 212, 255, 0.1);
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn:hover,
        .difficulty-btn.active {
            background: rgba(0, 212, 255, 0.3);
            border-color: #00d4ff;
        }

        .path-line {
            position: absolute;
            pointer-events: none;
            z-index: 100;
        }

        .path-line line {
            stroke: #00d4ff;
            stroke-width: 4;
            stroke-linecap: round;
            filter: drop-shadow(0 0 5px rgba(0, 212, 255, 0.8));
            animation: path-draw 0.3s ease-out forwards;
        }

        @keyframes path-draw {
            from { stroke-dasharray: 100; stroke-dashoffset: 100; }
            to { stroke-dasharray: 100; stroke-dashoffset: 0; }
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .game-board {
                gap: 3px;
                padding: 10px;
            }

            .cell {
                border-radius: 6px;
                min-width: 28px;
                min-height: 28px;
            }

            .game-info {
                padding: 10px;
            }

            .info-item {
                min-width: 80px;
                padding: 8px 15px;
            }

            .info-value {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🔗 连连看</h1>

        <div class="game-info">
            <div class="info-item">
                <div class="info-label">得分</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">剩余</div>
                <div class="info-value" id="remaining">0</div>
            </div>
            <div class="info-item">
                <div class="info-label">时间</div>
                <div class="info-value" id="timer">0:00</div>
            </div>
            <div class="info-item">
                <div class="info-label">最高分</div>
                <div class="info-value" id="high-score">0</div>
            </div>
        </div>

        <div class="difficulty-select">
            <button class="difficulty-btn" data-rows="6" data-cols="8">简单</button>
            <button class="difficulty-btn active" data-rows="8" data-cols="10">中等</button>
            <button class="difficulty-btn" data-rows="10" data-cols="12">困难</button>
        </div>

        <div class="game-board" id="game-board"></div>

        <div class="controls">
            <button class="btn btn-primary" id="new-game">新游戏</button>
            <button class="btn btn-hint" id="hint-btn">提示</button>
            <button class="btn btn-secondary" id="shuffle-btn">重排</button>
        </div>
    </div>

    <div class="modal" id="game-over-modal">
        <div class="modal-content">
            <div class="modal-title" id="modal-title">游戏结束!</div>
            <div class="modal-text" id="modal-text">你的得分：0</div>
            <button class="btn btn-primary" id="modal-new-game">再来一局</button>
        </div>
    </div>

    <svg class="path-line" id="path-svg" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999;"></svg>

    <script>
        $(function() {
            // 游戏配置
            const CONFIG = {
                emojis: ['🍎', '🍊', '🍇', '🍓', '🍒', '🍑', '🍍', '🥝', '🥥', '🍌', '🥭', '🍐',
                         '🍋', '🍈', '🍉', '🥕', '🌽', '🍆', '🥒', '🥦', '🍄', '🥜', '🌰', '🍞',
                         '🧀', '🍖', '🍗', '🥩', '🥓', '🍔', '🍟', '🍕', '🌭', '🥪', '🌮', '🌯'],
                maxTime: 300
            };

            // 游戏状态
            let gameState = {
                rows: 8,
                cols: 10,
                board: [],
                selected: null,
                score: 0,
                remaining: 0,
                timer: 0,
                timerInterval: null,
                highScore: parseInt(localStorage.getItem('lianliankan-highscore')) || 0,
                shuffleCount: 3
            };

            // 初始化
            function init() {
                $('#high-score').text(gameState.highScore);
                bindEvents();
                startNewGame();
            }

            // 绑定事件
            function bindEvents() {
                $('#new-game').on('click', startNewGame);
                $('#modal-new-game').on('click', () => {
                    $('#game-over-modal').hide();
                    startNewGame();
                });
                $('#hint-btn').on('click', showHint);
                $('#shuffle-btn').on('click', shuffleBoard);

                $('.difficulty-btn').on('click', function() {
                    $('.difficulty-btn').removeClass('active');
                    $(this).addClass('active');
                    gameState.rows = parseInt($(this).data('rows'));
                    gameState.cols = parseInt($(this).data('cols'));
                    startNewGame();
                });
            }

            // 开始新游戏
            function startNewGame() {
                // 重置状态
                clearInterval(gameState.timerInterval);
                gameState.selected = null;
                gameState.score = 0;
                gameState.timer = 0;
                gameState.shuffleCount = 3;
                $('#score').text('0');
                $('#timer').text('0:00');
                $('#shuffle-btn').prop('disabled', false);

                // 创建游戏板
                createBoard();
                renderBoard();

                // 启动计时器
                gameState.timerInterval = setInterval(() => {
                    gameState.timer++;
                    const mins = Math.floor(gameState.timer / 60);
                    const secs = gameState.timer % 60;
                    $('#timer').text(`${mins}:${secs.toString().padStart(2, '0')}`);

                    // 超时游戏结束
                    if (gameState.timer >= CONFIG.maxTime) {
                        endGame(false);
                    }
                }, 1000);
            }

            // 创建游戏板
            function createBoard() {
                const totalCells = gameState.rows * gameState.cols;
                const pairCount = totalCells / 2;

                // 生成成对的 emoji
                let pairs = [];
                for (let i = 0; i < pairCount; i++) {
                    const emoji = CONFIG.emojis[i % CONFIG.emojis.length];
                    pairs.push(emoji, emoji);
                }

                // 洗牌算法
                for (let i = pairs.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
                }

                // 创建二维数组（添加边框）
                gameState.board = [];
                for (let i = -1; i <= gameState.rows; i++) {
                    const row = [];
                    for (let j = -1; j <= gameState.cols; j++) {
                        if (i === -1 || i === gameState.rows || j === -1 || j === gameState.cols) {
                            row.push(null); // 边框
                        } else {
                            row.push(pairs.shift());
                        }
                    }
                    gameState.board.push(row);
                }

                gameState.remaining = totalCells;
                $('#remaining').text(gameState.remaining);
            }

            // 渲染游戏板
            function renderBoard() {
                const boardEl = $('#game-board');
                boardEl.empty();
                boardEl.css('grid-template-columns', `repeat(${gameState.cols}, 1fr)`);

                for (let i = 0; i < gameState.rows; i++) {
                    for (let j = 0; j < gameState.cols; j++) {
                        const cell = $('<div class="cell"></div>');
                        const emoji = gameState.board[i][j];

                        if (emoji) {
                            cell.text(emoji);
                            cell.data('row', i);
                            cell.data('col', j);
                            cell.on('click', () => handleCellClick(i, j));
                        }

                        boardEl.append(cell);
                    }
                }
            }

            // 处理单元格点击
            function handleCellClick(row, col) {
                const emoji = gameState.board[row][col];
                if (!emoji) return;

                const cell = getCell(row, col);

                // 已选中的单元格再次点击，取消选中
                if (gameState.selected &&
                    gameState.selected.row === row &&
                    gameState.selected.col === col) {
                    cell.removeClass('selected');
                    gameState.selected = null;
                    return;
                }

                // 第一个选择
                if (!gameState.selected) {
                    gameState.selected = { row, col, emoji };
                    cell.addClass('selected');
                    return;
                }

                // 第二个选择，检查是否匹配
                const prevCell = getCell(gameState.selected.row, gameState.selected.col);
                prevCell.removeClass('selected');

                if (gameState.selected.emoji === emoji) {
                    // 检查是否可以连接
                    const path = findPath(gameState.selected.row, gameState.selected.col, row, col);
                    if (path) {
                        // 匹配成功
                        drawPath(path);
                        setTimeout(() => {
                            clearPath();
                            matchCells(gameState.selected.row, gameState.selected.col, row, col);
                        }, 300);
                        gameState.selected = null;
                        return;
                    }
                }

                // 不匹配，选择新的
                gameState.selected = { row, col, emoji };
                cell.addClass('selected');
            }

            // 获取单元格元素
            function getCell(row, col) {
                return $(`.cell[data-row="${row}"][data-col="${col}"]`);
            }

            // 匹配单元格
            function matchCells(row1, col1, row2, col2) {
                const cell1 = getCell(row1, col1);
                const cell2 = getCell(row2, col2);

                cell1.addClass('matched');
                cell2.addClass('matched');

                gameState.board[row1][col1] = null;
                gameState.board[row2][col2] = null;

                gameState.score += 10;
                gameState.remaining -= 2;
                $('#score').text(gameState.score);
                $('#remaining').text(gameState.remaining);

                // 检查游戏结束
                if (gameState.remaining === 0) {
                    endGame(true);
                    return;
                }

                // 检查是否还有可匹配的
                if (!hasAvailableMoves()) {
                    setTimeout(() => {
                        if (!hasAvailableMoves()) {
                            endGame(false);
                        }
                    }, 500);
                }
            }

            // 寻找路径（最多两个转折）
            function findPath(r1, c1, r2, c2) {
                // 直连
                if (canConnectDirect(r1, c1, r2, c2)) {
                    return [{row: r1, col: c1}, {row: r2, col: c2}];
                }

                // 一个转折
                for (let r = -1; r <= gameState.rows; r++) {
                    if (r !== r1 && r !== r2) continue;
                    if (canConnectDirect(r1, c1, r, c2) && canConnectDirect(r, c2, r2, c2)) {
                        return [{row: r1, col: c1}, {row: r, col: c2}, {row: r2, col: c2}];
                    }
                    if (canConnectDirect(r1, c1, r, c1) && canConnectDirect(r, c1, r2, c2)) {
                        return [{row: r1, col: c1}, {row: r, col: c1}, {row: r2, col: c2}];
                    }
                }

                for (let c = -1; c <= gameState.cols; c++) {
                    if (c !== c1 && c !== c2) continue;
                    if (canConnectDirect(r1, c1, r2, c) && canConnectDirect(r2, c, r2, c2)) {
                        return [{row: r1, col: c1}, {row: r2, col: c}, {row: r2, col: c2}];
                    }
                    if (canConnectDirect(r1, c1, r1, c) && canConnectDirect(r1, c, r2, c2)) {
                        return [{row: r1, col: c1}, {row: r1, col: c}, {row: r2, col: c2}];
                    }
                }

                // 两个转折
                for (let r = -1; r <= gameState.rows; r++) {
                    for (let c = -1; c <= gameState.cols; c++) {
                        if (gameState.board[r]?.[c] !== null && !(r === -1 || r === gameState.rows || c === -1 || c === gameState.cols)) continue;

                        // 通过中转点
                        if (canConnectDirect(r1, c1, r, c1) &&
                            canConnectDirect(r, c1, r, c) &&
                            canConnectDirect(r, c, r2, c)) {
                            return [{row: r1, col: c1}, {row: r, col: c1}, {row: r, col: c}, {row: r2, col: c}];
                        }
                        if (canConnectDirect(r1, c1, r1, c) &&
                            canConnectDirect(r1, c, r, c) &&
                            canConnectDirect(r, c, r2, c)) {
                            return [{row: r1, col: c1}, {row: r1, col: c}, {row: r, col: c}, {row: r2, col: c}];
                        }
                    }
                }

                return null;
            }

            // 检查是否可以直接连接（直线，无阻挡）
            function canConnectDirect(r1, c1, r2, c2) {
                if (r1 === r2) {
                    // 同行
                    const min = Math.min(c1, c2);
                    const max = Math.max(c1, c2);
                    for (let c = min + 1; c < max; c++) {
                        if (gameState.board[r1][c] !== null) return false;
                    }
                    return true;
                }
                if (c1 === c2) {
                    // 同列
                    const min = Math.min(r1, r2);
                    const max = Math.max(r1, r2);
                    for (let r = min + 1; r < max; r++) {
                        if (gameState.board[r][c1] !== null) return false;
                    }
                    return true;
                }
                return false;
            }

            // 检查是否有可移动的
            function hasAvailableMoves() {
                const cells = [];
                for (let i = 0; i < gameState.rows; i++) {
                    for (let j = 0; j < gameState.cols; j++) {
                        if (gameState.board[i][j]) {
                            cells.push({row: i, col: j, emoji: gameState.board[i][j]});
                        }
                    }
                }

                for (let i = 0; i < cells.length; i++) {
                    for (let j = i + 1; j < cells.length; j++) {
                        if (cells[i].emoji === cells[j].emoji) {
                            if (findPath(cells[i].row, cells[i].col, cells[j].row, cells[j].col)) {
                                return true;
                            }
                        }
                    }
                }
                return false;
            }

            // 显示提示
            function showHint() {
                $('.cell.hint').removeClass('hint');

                for (let i = 0; i < gameState.rows; i++) {
                    for (let j = 0; j < gameState.cols; j++) {
                        if (!gameState.board[i][j]) continue;

                        for (let k = i; k < gameState.rows; k++) {
                            const startCol = (k === i) ? j + 1 : 0;
                            for (let l = startCol; l < gameState.cols; l++) {
                                if (k === i && l <= j) continue;
                                if (!gameState.board[k][l]) continue;

                                if (gameState.board[i][j] === gameState.board[k][l]) {
                                    const path = findPath(i, j, k, l);
                                    if (path) {
                                        getCell(i, j).addClass('hint');
                                        getCell(k, l).addClass('hint');
                                        return;
                                    }
                                }
                            }
                        }
                    }
                }
            }

            // 重排
            function shuffleBoard() {
                if (gameState.shuffleCount <= 0) {
                    alert('没有重排次数了！');
                    return;
                }

                // 收集剩余的 emoji
                const remaining = [];
                for (let i = 0; i < gameState.rows; i++) {
                    for (let j = 0; j < gameState.cols; j++) {
                        if (gameState.board[i][j]) {
                            remaining.push(gameState.board[i][j]);
                        }
                    }
                }

                // 重新洗牌
                for (let i = remaining.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
                }

                // 重新填充
                for (let i = 0; i < gameState.rows; i++) {
                    for (let j = 0; j < gameState.cols; j++) {
                        if (gameState.board[i][j]) {
                            gameState.board[i][j] = remaining.shift();
                        }
                    }
                }

                gameState.shuffleCount--;
                renderBoard();

                // 检查是否有可移动的
                if (!hasAvailableMoves()) {
                    setTimeout(shuffleBoard, 100);
                }
            }

            // 绘制路径
            function drawPath(path) {
                const svg = $('#path-svg');
                svg.empty();

                let points = '';
                path.forEach((p, index) => {
                    const cell = getCell(p.row, p.col);
                    if (cell.length) {
                        const offset = cell.offset();
                        const x = offset.left + cell.width() / 2;
                        const y = offset.top + cell.height() / 2;

                        if (index === 0) {
                            points += `M ${x} ${y}`;
                        } else {
                            points += ` L ${x} ${y}`;
                        }
                    }
                });

                if (points) {
                    svg.append(`<line x1="${points.match(/\d+\.?\d*/g)?.[0]}" y1="${points.match(/\d+\.?\d*/g)?.[1]}" x2="${points.match(/\d+\.?\d*/g)?.[2]}" y2="${points.match(/\d+\.?\d*/g)?.[3]}" />`);
                }
            }

            // 清除路径
            function clearPath() {
                $('#path-svg').empty();
            }

            // 游戏结束
            function endGame(win) {
                clearInterval(gameState.timerInterval);

                const modal = $('#game-over-modal');
                const title = $('#modal-title');
                const text = $('#modal-text');

                if (win) {
                    title.text('🎉 恭喜通关！');
                    //  bonus based on time
                    const timeBonus = Math.max(0, CONFIG.maxTime - gameState.timer) * 0.1;
                    gameState.score = Math.floor(gameState.score + timeBonus);
                    text.html(`你的得分：<strong style="color: #00d4ff; font-size: 1.5rem;">${gameState.score}</strong><br>用时：${Math.floor(gameState.timer / 60)}分${gameState.timer % 60}秒`);

                    if (gameState.score > gameState.highScore) {
                        gameState.highScore = gameState.score;
                        localStorage.setItem('lianliankan-highscore', gameState.highScore);
                        $('#high-score').text(gameState.highScore);
                    }
                } else {
                    title.text('😔 游戏结束');
                    text.html(`时间到！<br>你的得分：<strong style="color: #ff6b6b;">${gameState.score}</strong>`);
                }

                modal.css('display', 'flex');
            }

            // 启动游戏
            init();
        });
    </script>
</body>
</html>
