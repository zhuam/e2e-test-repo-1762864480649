<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .status {
            text-align: center;
            font-size: 1.3em;
            margin-bottom: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 10px;
            font-weight: bold;
        }

        .current-player {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            margin: 0 10px;
        }

        .black-player {
            background: #333;
            color: white;
        }

        .white-player {
            background: #fff;
            color: #333;
            border: 2px solid #333;
        }

        .board-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(15, 30px);
            grid-template-rows: repeat(15, 30px);
            gap: 0;
            background: #daa520;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 3px solid #8b6914;
        }

        .cell {
            width: 30px;
            height: 30px;
            border: 1px solid #8b6914;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: background-color 0.2s;
        }

        .cell:hover:not(.occupied) {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .cell.occupied {
            cursor: not-allowed;
        }

        .stone {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            position: absolute;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stone.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }

        .stone.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border: 1px solid #999;
        }

        .winning-stone {
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
                box-shadow: 0 0 5px rgba(255, 215, 0, 0.8);
            }
            to {
                transform: scale(1.1);
                box-shadow: 0 0 20px rgba(255, 215, 0, 1);
            }
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .restart-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .undo-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .undo-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .winner-message {
            text-align: center;
            font-size: 1.5em;
            padding: 20px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffd89b 0%, #19547b 100%);
            color: white;
            border-radius: 10px;
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        .winner-message.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .rules {
            margin-top: 20px;
            padding: 15px;
            background: #f5f7fa;
            border-radius: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .rules h3 {
            margin-bottom: 10px;
            color: #333;
        }

        .rules ul {
            margin-left: 20px;
        }

        .rules li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 五子棋</h1>
        
        <div class="status">
            当前玩家: <span class="current-player black-player">⚫ 黑方</span>
        </div>
        
        <div class="winner-message" id="winnerMessage">
            🎉 恭喜！<span id="winner"></span>获胜！🎉
        </div>
        
        <div class="board-container">
            <div class="board" id="board"></div>
        </div>
        
        <div class="controls">
            <button class="restart-btn" onclick="restartGame()">🔄 重新开始</button>
            <button class="undo-btn" onclick="undoMove()">↩️ 悔棋</button>
        </div>
        
        <div class="rules">
            <h3>📜 游戏规则</h3>
            <ul>
                <li>黑方先行，双方轮流落子</li>
                <li>点击棋盘交叉点落子</li>
                <li>先连成五子（横、竖、斜）者获胜</li>
                <li>支持悔棋功能</li>
            </ul>
        </div>
    </div>

    <script>
        const BOARD_SIZE = 15;
        const EMPTY = 0;
        const BLACK = 1;
        const WHITE = 2;

        let board = [];
        let currentPlayer = BLACK;
        let gameOver = false;
        let moveHistory = [];

        function initBoard() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(EMPTY));
            currentPlayer = BLACK;
            gameOver = false;
            moveHistory = [];
            renderBoard();
            updateStatus();
            document.getElementById('winnerMessage').classList.remove('show');
        }

        function renderBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';

            for (let row = 0; row < BOARD_SIZE; row++) {
                for (let col = 0; col < BOARD_SIZE; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;

                    if (board[row][col] !== EMPTY) {
                        cell.classList.add('occupied');
                        const stone = document.createElement('div');
                        stone.className = `stone ${board[row][col] === BLACK ? 'black' : 'white'}`;
                        cell.appendChild(stone);
                    }

                    cell.addEventListener('click', () => handleCellClick(row, col));
                    boardElement.appendChild(cell);
                }
            }
        }

        function handleCellClick(row, col) {
            if (gameOver || board[row][col] !== EMPTY) {
                return;
            }

            board[row][col] = currentPlayer;
            moveHistory.push({ row, col, player: currentPlayer });
            
            renderBoard();

            if (checkWin(row, col)) {
                gameOver = true;
                highlightWinningStones(row, col);
                showWinner(currentPlayer === BLACK ? '黑方' : '白方');
                return;
            }

            if (isBoardFull()) {
                gameOver = true;
                showWinner('平局');
                return;
            }

            currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
            updateStatus();
        }

        function checkWin(row, col) {
            const directions = [
                [[0, 1], [0, -1]],   // 水平
                [[1, 0], [-1, 0]],   // 垂直
                [[1, 1], [-1, -1]],  // 对角线
                [[1, -1], [-1, 1]]   // 反对角线
            ];

            const player = board[row][col];

            for (const direction of directions) {
                let count = 1;

                for (const [dr, dc] of direction) {
                    let r = row + dr;
                    let c = col + dc;

                    while (
                        r >= 0 && r < BOARD_SIZE &&
                        c >= 0 && c < BOARD_SIZE &&
                        board[r][c] === player
                    ) {
                        count++;
                        r += dr;
                        c += dc;
                    }
                }

                if (count >= 5) {
                    return true;
                }
            }

            return false;
        }

        function highlightWinningStones(row, col) {
            const directions = [
                [[0, 1], [0, -1]],   // 水平
                [[1, 0], [-1, 0]],   // 垂直
                [[1, 1], [-1, -1]],  // 对角线
                [[1, -1], [-1, 1]]   // 反对角线
            ];

            const player = board[row][col];
            const boardElement = document.getElementById('board');

            for (const direction of directions) {
                const stones = [[row, col]];

                for (const [dr, dc] of direction) {
                    let r = row + dr;
                    let c = col + dc;

                    while (
                        r >= 0 && r < BOARD_SIZE &&
                        c >= 0 && c < BOARD_SIZE &&
                        board[r][c] === player
                    ) {
                        stones.push([r, c]);
                        r += dr;
                        c += dc;
                    }
                }

                if (stones.length >= 5) {
                    stones.forEach(([r, c]) => {
                        const index = r * BOARD_SIZE + c;
                        const cell = boardElement.children[index];
                        const stone = cell.querySelector('.stone');
                        if (stone) {
                            stone.classList.add('winning-stone');
                        }
                    });
                    return;
                }
            }
        }

        function isBoardFull() {
            return board.every(row => row.every(cell => cell !== EMPTY));
        }

        function updateStatus() {
            const statusElement = document.querySelector('.status');
            const playerSpan = statusElement.querySelector('.current-player');
            
            if (currentPlayer === BLACK) {
                playerSpan.textContent = '⚫ 黑方';
                playerSpan.className = 'current-player black-player';
            } else {
                playerSpan.textContent = '⚪ 白方';
                playerSpan.className = 'current-player white-player';
            }
        }

        function showWinner(winner) {
            const winnerMessage = document.getElementById('winnerMessage');
            const winnerSpan = document.getElementById('winner');
            winnerSpan.textContent = winner;
            winnerMessage.classList.add('show');
        }

        function restartGame() {
            initBoard();
        }

        function undoMove() {
            if (moveHistory.length === 0 || gameOver) {
                return;
            }

            const lastMove = moveHistory.pop();
            board[lastMove.row][lastMove.col] = EMPTY;
            currentPlayer = lastMove.player;
            
            renderBoard();
            updateStatus();
        }

        // 初始化游戏
        initBoard();
    </script>
</body>
</html>
