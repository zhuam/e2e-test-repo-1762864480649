<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 32px;
        }
        
        .game-info {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        
        .current-player {
            font-size: 18px;
            font-weight: bold;
            color: #333;
        }
        
        .player-indicator {
            display: inline-block;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-left: 10px;
            vertical-align: middle;
            border: 2px solid #333;
        }
        
        .player-indicator.black {
            background: #000;
        }
        
        .player-indicator.white {
            background: #fff;
        }
        
        #gameBoard {
            margin: 0 auto;
            display: block;
            cursor: pointer;
            border: 3px solid #333;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
        
        .controls {
            margin-top: 20px;
        }
        
        button {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .winner-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .winner-modal.show {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .modal-content h2 {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .modal-content p {
            font-size: 24px;
            color: #333;
            margin-bottom: 30px;
        }
        
        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            font-size: 14px;
            color: #666;
            text-align: left;
        }
        
        .instructions h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .instructions ul {
            margin-left: 20px;
        }
        
        .instructions li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 五子棋游戏</h1>
        
        <div class="game-info">
            <div class="current-player">
                当前玩家: <span id="currentPlayerText">黑方</span>
                <span class="player-indicator black" id="playerIndicator"></span>
            </div>
            <div class="score">
                <span style="margin-right: 20px;">⚫ 黑方: <strong id="blackScore">0</strong></span>
                <span>⚪ 白方: <strong id="whiteScore">0</strong></span>
            </div>
        </div>
        
        <canvas id="gameBoard" width="570" height="570"></canvas>
        
        <div class="controls">
            <button onclick="resetGame()">🔄 重新开始</button>
            <button onclick="resetScores()" style="margin-left: 10px;">📊 重置比分</button>
        </div>
        
        <div class="instructions">
            <h3>📖 游戏规则</h3>
            <ul>
                <li>黑方先行，双方轮流落子</li>
                <li>点击棋盘交叉点落子</li>
                <li>横、竖、斜任意方向连成五子者获胜</li>
                <li>先胜一局者得1分</li>
            </ul>
        </div>
    </div>
    
    <div class="winner-modal" id="winnerModal">
        <div class="modal-content">
            <h2>🎉 游戏结束!</h2>
            <p id="winnerText"></p>
            <button onclick="closeModal()">继续游戏</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const BOARD_SIZE = 15;
        const CELL_SIZE = 38;
        const PADDING = 19;
        
        // 游戏状态
        let board = [];
        let currentPlayer = 1; // 1: 黑方, 2: 白方
        let gameOver = false;
        let blackScore = 0;
        let whiteScore = 0;
        
        // 获取Canvas和上下文
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');
        
        // 初始化游戏
        function initGame() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
            currentPlayer = 1;
            gameOver = false;
            drawBoard();
            updatePlayerIndicator();
        }
        
        // 绘制棋盘
        function drawBoard() {
            // 清空画布
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制网格线
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1;
            
            for (let i = 0; i < BOARD_SIZE; i++) {
                // 横线
                ctx.beginPath();
                ctx.moveTo(PADDING, PADDING + i * CELL_SIZE);
                ctx.lineTo(PADDING + (BOARD_SIZE - 1) * CELL_SIZE, PADDING + i * CELL_SIZE);
                ctx.stroke();
                
                // 竖线
                ctx.beginPath();
                ctx.moveTo(PADDING + i * CELL_SIZE, PADDING);
                ctx.lineTo(PADDING + i * CELL_SIZE, PADDING + (BOARD_SIZE - 1) * CELL_SIZE);
                ctx.stroke();
            }
            
            // 绘制天元和星位
            const starPoints = [
                [3, 3], [3, 7], [3, 11],
                [7, 3], [7, 7], [7, 11],
                [11, 3], [11, 7], [11, 11]
            ];
            
            starPoints.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(PADDING + x * CELL_SIZE, PADDING + y * CELL_SIZE, 4, 0, 2 * Math.PI);
                ctx.fillStyle = '#000';
                ctx.fill();
            });
            
            // 绘制已落的棋子
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] !== 0) {
                        drawPiece(i, j, board[i][j]);
                    }
                }
            }
        }
        
        // 绘制棋子
        function drawPiece(x, y, player) {
            const centerX = PADDING + x * CELL_SIZE;
            const centerY = PADDING + y * CELL_SIZE;
            const radius = 16;
            
            // 绘制阴影
            ctx.beginPath();
            ctx.arc(centerX + 2, centerY + 2, radius, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fill();
            
            // 绘制棋子
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            
            if (player === 1) {
                // 黑子
                const gradient = ctx.createRadialGradient(centerX - 5, centerY - 5, 0, centerX, centerY, radius);
                gradient.addColorStop(0, '#555');
                gradient.addColorStop(1, '#000');
                ctx.fillStyle = gradient;
            } else {
                // 白子
                const gradient = ctx.createRadialGradient(centerX - 5, centerY - 5, 0, centerX, centerY, radius);
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#ccc');
                ctx.fillStyle = gradient;
            }
            
            ctx.fill();
            
            // 添加高光
            ctx.beginPath();
            ctx.arc(centerX - 5, centerY - 5, radius / 3, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.fill();
        }
        
        // 处理点击事件
        canvas.addEventListener('click', function(event) {
            if (gameOver) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;
            
            // 计算最近的交叉点
            const col = Math.round((x - PADDING) / CELL_SIZE);
            const row = Math.round((y - PADDING) / CELL_SIZE);
            
            // 检查是否在有效范围内
            if (col < 0 || col >= BOARD_SIZE || row < 0 || row >= BOARD_SIZE) return;
            
            // 检查位置是否已被占用
            if (board[row][col] !== 0) return;
            
            // 落子
            board[row][col] = currentPlayer;
            drawPiece(col, row, currentPlayer);
            
            // 检查是否获胜
            if (checkWin(row, col)) {
                gameOver = true;
                showWinner(currentPlayer);
                return;
            }
            
            // 切换玩家
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updatePlayerIndicator();
        });
        
        // 检查是否获胜
        function checkWin(row, col) {
            const player = board[row][col];
            const directions = [
                [0, 1],   // 横向
                [1, 0],   // 纵向
                [1, 1],   // 主对角线
                [1, -1]   // 副对角线
            ];
            
            for (const [dx, dy] of directions) {
                let count = 1;
                
                // 正方向
                for (let i = 1; i < 5; i++) {
                    const newRow = row + dx * i;
                    const newCol = col + dy * i;
                    if (newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) break;
                    if (board[newRow][newCol] !== player) break;
                    count++;
                }
                
                // 反方向
                for (let i = 1; i < 5; i++) {
                    const newRow = row - dx * i;
                    const newCol = col - dy * i;
                    if (newRow < 0 || newRow >= BOARD_SIZE || newCol < 0 || newCol >= BOARD_SIZE) break;
                    if (board[newRow][newCol] !== player) break;
                    count++;
                }
                
                if (count >= 5) return true;
            }
            
            return false;
        }
        
        // 更新玩家指示器
        function updatePlayerIndicator() {
            const playerText = document.getElementById('currentPlayerText');
            const indicator = document.getElementById('playerIndicator');
            
            if (currentPlayer === 1) {
                playerText.textContent = '黑方';
                indicator.className = 'player-indicator black';
            } else {
                playerText.textContent = '白方';
                indicator.className = 'player-indicator white';
            }
        }
        
        // 显示获胜者
        function showWinner(player) {
            const modal = document.getElementById('winnerModal');
            const winnerText = document.getElementById('winnerText');
            
            if (player === 1) {
                winnerText.textContent = '⚫ 黑方获胜!';
                blackScore++;
            } else {
                winnerText.textContent = '⚪ 白方获胜!';
                whiteScore++;
            }
            
            updateScores();
            modal.classList.add('show');
        }
        
        // 更新比分
        function updateScores() {
            document.getElementById('blackScore').textContent = blackScore;
            document.getElementById('whiteScore').textContent = whiteScore;
        }
        
        // 关闭弹窗并重新开始
        function closeModal() {
            document.getElementById('winnerModal').classList.remove('show');
            initGame();
        }
        
        // 重新开始游戏
        function resetGame() {
            initGame();
        }
        
        // 重置比分
        function resetScores() {
            blackScore = 0;
            whiteScore = 0;
            updateScores();
            initGame();
        }
        
        // 初始化
        initGame();
    </script>
</body>
</html>
