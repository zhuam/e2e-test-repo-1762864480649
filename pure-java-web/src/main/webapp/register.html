<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - 用户管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 40px 20px;
        }
        .register-container {
            width: 100%;
            max-width: 480px;
        }
        .register-box {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-header .logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 30px;
            color: white;
            box-shadow: 0 8px 20px rgba(17, 153, 142, 0.4);
        }
        .register-header h1 {
            font-size: 26px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .register-header p {
            color: #888;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 45px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            box-sizing: border-box;
            background: #f9f9f9;
        }
        .form-group input:focus {
            outline: none;
            border-color: #11998e;
            background: white;
            box-shadow: 0 0 0 4px rgba(17, 153, 142, 0.1);
        }
        .form-group input.error {
            border-color: #e74c3c;
            background: #fef5f5;
        }
        .form-group input.success {
            border-color: #27ae60;
            background: #f5fef8;
        }
        .form-group .input-icon {
            position: absolute;
            left: 16px;
            top: 42px;
            color: #aaa;
            font-size: 16px;
        }
        .form-group .toggle-password {
            position: absolute;
            right: 16px;
            top: 42px;
            cursor: pointer;
            color: #aaa;
            transition: color 0.3s;
        }
        .form-group .toggle-password:hover {
            color: #11998e;
        }
        .form-group .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .password-strength {
            margin-top: 8px;
            height: 4px;
            background: #e8e8e8;
            border-radius: 2px;
            overflow: hidden;
        }
        .password-strength .bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }
        .password-strength .bar.weak { width: 33%; background: #e74c3c; }
        .password-strength .bar.medium { width: 66%; background: #f39c12; }
        .password-strength .bar.strong { width: 100%; background: #27ae60; }
        .password-strength-text {
            font-size: 12px;
            margin-top: 5px;
            color: #888;
        }
        .btn-register {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
            margin-top: 10px;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.5);
        }
        .btn-register:active {
            transform: translateY(0);
        }
        .btn-register:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #666;
            font-size: 14px;
        }
        .login-link a {
            color: #11998e;
            text-decoration: none;
            font-weight: 600;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .alert {
            padding: 14px 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        .alert-error {
            background: #fee;
            color: #c33;
            border-left: 4px solid #c33;
        }
        .alert-success {
            background: #efe;
            color: #3c3;
            border-left: 4px solid #3c3;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-box">
            <div class="register-header">
                <div class="logo">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>创建账户</h1>
                <p>注册一个新账户开始使用</p>
            </div>

            <div id="alertMessage" class="alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label for="username">用户名 <span style="color: #e74c3c;">*</span></label>
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="username" name="username" placeholder="4-20位字母数字下划线" required>
                    <div class="error-message" id="usernameError">用户名格式不正确</div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">密码 <span style="color: #e74c3c;">*</span></label>
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" placeholder="至少6位" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('password')"></i>
                        <div class="password-strength">
                            <div class="bar" id="passwordStrengthBar"></div>
                        </div>
                        <div class="password-strength-text" id="passwordStrengthText"></div>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">确认密码 <span style="color: #e74c3c;">*</span></label>
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="再次输入密码" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword('confirmPassword')"></i>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">邮箱</label>
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" name="email" placeholder="example@email.com">
                    </div>

                    <div class="form-group">
                        <label for="phone">手机号</label>
                        <i class="fas fa-phone input-icon"></i>
                        <input type="tel" id="phone" name="phone" placeholder="请输入手机号">
                    </div>
                </div>

                <div class="form-group">
                    <label for="realName">真实姓名</label>
                    <i class="fas fa-id-card input-icon"></i>
                    <input type="text" id="realName" name="realName" placeholder="请输入真实姓名（可选）">
                </div>

                <button type="submit" class="btn-register" id="registerBtn">
                    <span>立即注册</span>
                </button>
            </form>

            <div class="login-link">
                已有账户？ <a href="login.html">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(fieldId) {
            const passwordInput = document.getElementById(fieldId);
            const toggleIcon = passwordInput.parentElement.querySelector('.toggle-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // 密码强度检测
        document.getElementById('password').addEventListener('input', function() {
            const password = this.value;
            const bar = document.getElementById('passwordStrengthBar');
            const text = document.getElementById('passwordStrengthText');

            bar.className = 'bar';
            text.textContent = '';

            if (password.length < 6) {
                return;
            }

            let strength = 0;
            if (password.length >= 8) strength++;
            if (/[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            if (strength <= 1) {
                bar.classList.add('weak');
                text.textContent = '密码强度：弱';
                text.style.color = '#e74c3c';
            } else if (strength <= 2) {
                bar.classList.add('medium');
                text.textContent = '密码强度：中';
                text.style.color = '#f39c12';
            } else {
                bar.classList.add('strong');
                text.textContent = '密码强度：强';
                text.style.color = '#27ae60';
            }
        });

        // 用户名实时验证
        document.getElementById('username').addEventListener('blur', function() {
            const username = this.value.trim();
            const errorEl = document.getElementById('usernameError');

            if (username && !username.match(/^[a-zA-Z0-9_]{4,20}$/)) {
                this.classList.add('error');
                this.classList.remove('success');
                errorEl.style.display = 'block';
            } else if (username) {
                this.classList.remove('error');
                this.classList.add('success');
                errorEl.style.display = 'none';
            }
        });

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const realName = document.getElementById('realName').value.trim();
            const registerBtn = document.getElementById('registerBtn');
            const alertMessage = document.getElementById('alertMessage');

            // 验证密码一致性
            if (password !== confirmPassword) {
                alertMessage.className = 'alert alert-error';
                alertMessage.textContent = '两次输入的密码不一致';
                alertMessage.style.display = 'block';
                return;
            }

            // 显示加载状态
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="spinner"></span>注册中...';
            alertMessage.style.display = 'none';

            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                formData.append('confirmPassword', confirmPassword);
                formData.append('email', email);
                formData.append('phone', phone);
                formData.append('realName', realName);

                const response = await fetch('api/register', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (result.success) {
                    alertMessage.className = 'alert alert-success';
                    alertMessage.textContent = result.message + '，即将跳转到登录页面...';
                    alertMessage.style.display = 'block';

                    // 注册成功，跳转到登录页
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    alertMessage.className = 'alert alert-error';
                    alertMessage.textContent = result.message;
                    alertMessage.style.display = 'block';
                }
            } catch (error) {
                alertMessage.className = 'alert alert-error';
                alertMessage.textContent = '网络错误，请稍后重试';
                alertMessage.style.display = 'block';
            } finally {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<span>立即注册</span>';
            }
        });
    </script>
</body>
</html>
