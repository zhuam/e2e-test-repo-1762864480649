<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00ff87, #60efff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(0, 255, 135, 0.3);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }

        .score-board {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
        }

        .score-board .label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 5px;
        }

        .score-board .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #00ff87;
        }

        .difficulty-selector {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .difficulty-selector label {
            font-size: 0.9rem;
            color: #888;
        }

        .difficulty-selector select {
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            cursor: pointer;
            outline: none;
            transition: transform 0.2s;
        }

        .difficulty-selector select:hover {
            transform: scale(1.05);
        }

        .difficulty-selector select option {
            background: #1a1a2e;
            color: white;
        }

        #gameCanvas {
            display: block;
            background: linear-gradient(135deg, #0a0a15 0%, #1a1a2e 100%);
            border-radius: 10px;
            border: 3px solid rgba(0, 255, 135, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 135, 0.1);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn-start {
            background: linear-gradient(135deg, #00ff87 0%, #60efff 100%);
            color: #1a1a2e;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 135, 0.4);
        }

        .btn-pause {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-pause:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(240, 147, 251, 0.4);
        }

        .btn-restart {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .game-over-modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
        }

        .game-over-modal h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #f5576c, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .game-over-modal p {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: #00ff87;
        }

        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            color: #888;
        }

        .instructions kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            margin: 0 2px;
        }

        @media (max-width: 500px) {
            .game-container {
                padding: 15px;
            }

            h1 {
                font-size: 1.8rem;
            }

            .game-info {
                flex-direction: column;
            }

            .controls {
                flex-wrap: wrap;
            }

            .btn {
                padding: 10px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>

        <div class="game-info">
            <div class="score-board">
                <div class="label">当前得分</div>
                <div class="value" id="score">0</div>
            </div>

            <div class="score-board">
                <div class="label">最高得分</div>
                <div class="value" id="highScore">0</div>
            </div>

            <div class="difficulty-selector">
                <label for="difficulty">难度选择</label>
                <select id="difficulty">
                    <option value="easy">简单</option>
                    <option value="medium" selected>中等</option>
                    <option value="hard">困难</option>
                </select>
            </div>
        </div>

        <canvas id="gameCanvas" width="400" height="400"></canvas>

        <div class="controls">
            <button class="btn btn-start" id="startBtn">开始游戏</button>
            <button class="btn btn-pause" id="pauseBtn" disabled>暂停</button>
            <button class="btn btn-restart" id="restartBtn">重新开始</button>
        </div>

        <div class="instructions">
            使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 或 <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> 控制方向
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-modal">
            <h2>游戏结束!</h2>
            <p>得分：<span id="finalScore">0</span></p>
            <button class="btn btn-restart" onclick="closeGameOver()">再玩一次</button>
        </div>
    </div>

    <script>
        // 游戏配置
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // 游戏状态
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let isRunning = false;
        let isPaused = false;
        let gameSpeed = 150;

        // DOM 元素
        const scoreEl = document.getElementById('score');
        const highScoreEl = document.getElementById('highScore');
        const difficultySelect = document.getElementById('difficulty');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const restartBtn = document.getElementById('restartBtn');
        const gameOverOverlay = document.getElementById('gameOverOverlay');
        const finalScoreEl = document.getElementById('finalScore');

        // 初始化最高分显示
        highScoreEl.textContent = highScore;

        // 难度设置
        const difficultySettings = {
            easy: { speed: 200, name: '简单' },
            medium: { speed: 150, name: '中等' },
            hard: { speed: 80, name: '困难' }
        };

        // 初始化游戏
        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            scoreEl.textContent = score;
            spawnFood();
        }

        // 生成食物
        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(segment => segment.x === food.x && segment.y === food.y));
        }

        // 绘制游戏
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物 (带发光效果)
            ctx.shadowColor = '#ff6b6b';
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();
            ctx.shadowBlur = 0;

            // 绘制蛇
            snake.forEach((segment, index) => {
                // 渐变色蛇身
                const gradient = ctx.createLinearGradient(
                    segment.x * gridSize,
                    segment.y * gridSize,
                    (segment.x + 1) * gridSize,
                    (segment.y + 1) * gridSize
                );

                if (index === 0) {
                    // 蛇头
                    gradient.addColorStop(0, '#00ff87');
                    gradient.addColorStop(1, '#60efff');
                    ctx.shadowColor = '#00ff87';
                    ctx.shadowBlur = 10;
                } else {
                    // 蛇身 - 渐变效果
                    const ratio = index / snake.length;
                    gradient.addColorStop(0, `rgba(0, 255, 135, ${1 - ratio * 0.5})`);
                    gradient.addColorStop(1, `rgba(96, 239, 255, ${1 - ratio * 0.5})`);
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();

                // 绘制蛇眼睛
                if (index === 0) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#1a1a2e';
                    const eyeSize = 4;
                    let eye1X, eye1Y, eye2X, eye2Y;

                    switch (direction) {
                        case 'right':
                            eye1X = segment.x * gridSize + gridSize - 6;
                            eye1Y = segment.y * gridSize + 5;
                            eye2X = segment.x * gridSize + gridSize - 6;
                            eye2Y = segment.y * gridSize + gridSize - 8;
                            break;
                        case 'left':
                            eye1X = segment.x * gridSize + 3;
                            eye1Y = segment.y * gridSize + 5;
                            eye2X = segment.x * gridSize + 3;
                            eye2Y = segment.y * gridSize + gridSize - 8;
                            break;
                        case 'up':
                            eye1X = segment.x * gridSize + 5;
                            eye1Y = segment.y * gridSize + 3;
                            eye2X = segment.x * gridSize + gridSize - 8;
                            eye2Y = segment.y * gridSize + 3;
                            break;
                        case 'down':
                            eye1X = segment.x * gridSize + 5;
                            eye1Y = segment.y * gridSize + gridSize - 6;
                            eye2X = segment.x * gridSize + gridSize - 8;
                            eye2Y = segment.y * gridSize + gridSize - 6;
                            break;
                    }

                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize / 2, 0, Math.PI * 2);
                    ctx.arc(eye2X, eye2Y, eyeSize / 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.shadowBlur = 0;
        }

        // 更新游戏状态
        function update() {
            direction = nextDirection;

            const head = { ...snake[0] };

            switch (direction) {
                case 'right': head.x++; break;
                case 'left': head.x--; break;
                case 'up': head.y--; break;
                case 'down': head.y++; break;
            }

            // 检查碰撞
            if (head.x < 0 || head.x >= tileCount ||
                head.y < 0 || head.y >= tileCount ||
                snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 检查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreEl.textContent = score;
                spawnFood();
            } else {
                snake.pop();
            }
        }

        // 游戏循环
        function gameStep() {
            if (!isPaused) {
                update();
                draw();
            }
        }

        // 开始游戏
        function startGame() {
            if (isRunning) return;

            initGame();
            gameSpeed = difficultySettings[difficultySelect.value].speed;
            isRunning = true;
            isPaused = false;
            gameLoop = setInterval(gameStep, gameSpeed);

            startBtn.disabled = true;
            pauseBtn.disabled = false;
            pauseBtn.textContent = '暂停';
            difficultySelect.disabled = true;
            draw();
        }

        // 暂停/继续游戏
        function togglePause() {
            if (!isRunning) return;

            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
        }

        // 重新开始游戏
        function restartGame() {
            if (gameLoop) clearInterval(gameLoop);
            isRunning = false;
            isPaused = false;
            startGame();
        }

        // 游戏结束
        function gameOver() {
            if (gameLoop) clearInterval(gameLoop);
            isRunning = false;

            // 更新最高分
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreEl.textContent = highScore;
            }

            finalScoreEl.textContent = score;
            gameOverOverlay.style.display = 'flex';

            startBtn.disabled = false;
            pauseBtn.disabled = true;
            difficultySelect.disabled = false;
        }

        // 关闭游戏结束弹窗
        function closeGameOver() {
            gameOverOverlay.style.display = 'none';
            restartGame();
        }

        // 键盘控制
        document.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (direction !== 'down') nextDirection = 'up';
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (direction !== 'up') nextDirection = 'down';
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (direction !== 'right') nextDirection = 'left';
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (direction !== 'left') nextDirection = 'right';
                    break;
                case ' ':
                    if (isRunning) togglePause();
                    else startGame();
                    e.preventDefault();
                    break;
            }
        });

        // 按钮事件
        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        restartBtn.addEventListener('click', restartGame);

        // 难度改变事件
        difficultySelect.addEventListener('change', () => {
            if (isRunning) {
                clearInterval(gameLoop);
                gameSpeed = difficultySettings[difficultySelect.value].speed;
                gameLoop = setInterval(gameStep, gameSpeed);
            }
        });

        // 初始绘制
        initGame();
        draw();
    </script>
</body>
</html>
