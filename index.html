<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="game-container">
        <header class="header">
            <h1>TETRIS</h1>
            <p class="subtitle">俄罗斯方块</p>
        </header>

        <div class="game-wrapper">
            <div class="game-board-container">
                <canvas id="gameBoard" width="300" height="600"></canvas>
                <div id="gameOverlay" class="game-overlay hidden">
                    <div class="overlay-content">
                        <h2 id="overlayTitle">游戏结束</h2>
                        <p id="overlayScore">得分：0</p>
                        <button id="startBtn" class="start-btn">开始游戏</button>
                    </div>
                </div>
            </div>

            <aside class="side-panel">
                <div class="panel-section">
                    <h3>下一个</h3>
                    <canvas id="nextPiece" width="100" height="100"></canvas>
                </div>

                <div class="panel-section">
                    <h3>得分</h3>
                    <div id="score" class="score-display">0</div>
                </div>

                <div class="panel-section">
                    <h3>等级</h3>
                    <div id="level" class="level-display">1</div>
                </div>

                <div class="panel-section">
                    <h3>消除行数</h3>
                    <div id="lines" class="lines-display">0</div>
                </div>

                <div class="panel-section controls">
                    <h3>控制</h3>
                    <div class="control-item">
                        <span class="key">← →</span>
                        <span>移动</span>
                    </div>
                    <div class="control-item">
                        <span class="key">↑</span>
                        <span>旋转</span>
                    </div>
                    <div class="control-item">
                        <span class="key">↓</span>
                        <span>加速下落</span>
                    </div>
                    <div class="control-item">
                        <span class="key">空格</span>
                        <span>直接下落</span>
                    </div>
                    <div class="control-item">
                        <span class="key">P</span>
                        <span>暂停</span>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
