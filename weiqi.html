<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>围棋游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'SimSun', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: linear-gradient(145deg, #f5f5dc 0%, #e8e4c9 100%);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            display: flex;
            gap: 30px;
            max-width: 1200px;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 36px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .board-container {
            position: relative;
            padding: 20px;
            background: linear-gradient(145deg, #dcb35c 0%, #c9a227 50%, #b8941f 100%);
            border-radius: 10px;
            box-shadow:
                inset 0 0 20px rgba(0, 0, 0, 0.2),
                0 10px 30px rgba(0, 0, 0, 0.3);
        }

        #gameBoard {
            display: block;
            cursor: pointer;
            border-radius: 5px;
        }

        .right-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-box {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .current-player-box {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        .player-indicator {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .stone-display {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #333;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
        }

        .stone-display.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }

        .stone-display.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
        }

        .score-box {
            margin-top: 10px;
        }

        .score-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .score-item:last-child {
            border-bottom: none;
        }

        .score-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: bold;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #27ae60;
        }

        .captured-box {
            display: flex;
            justify-content: space-around;
        }

        .captured-item {
            text-align: center;
        }

        .captured-count {
            font-size: 28px;
            font-weight: bold;
            color: #e74c3c;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button.pass {
            background: linear-gradient(135deg, #f39c12 0%, #e74c3c 100%);
        }

        button.resign {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }

        button.territory {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }

        .instructions {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            font-size: 13px;
            color: #555;
        }

        .instructions h3 {
            color: #333;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .instructions ul {
            margin-left: 18px;
            line-height: 1.8;
        }

        .instructions li {
            margin: 3px 0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.3s ease;
            max-width: 500px;
        }

        @keyframes popIn {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-content h2 {
            font-size: 32px;
            color: #667eea;
            margin-bottom: 20px;
        }

        .modal-content p {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .final-score {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }

        .final-score-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 18px;
        }

        .winner-text {
            font-size: 24px;
            color: #e74c3c;
            font-weight: bold;
            margin: 20px 0;
        }

        .ko-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(231, 76, 60, 0.95);
            color: white;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            display: none;
            z-index: 100;
            animation: fadeInOut 1.5s ease;
        }

        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }

        .last-move {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #e74c3c;
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 5px rgba(231, 76, 60, 0.8);
        }

        .mode-selector {
            margin-bottom: 15px;
        }

        .mode-selector label {
            font-weight: bold;
            margin-right: 10px;
        }

        .mode-selector select {
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div class="ko-warning" id="koWarning">打劫！此位置禁入</div>

    <div class="container">
        <div class="left-panel">
            <h1>围棋 (Go / Weiqi)</h1>
            <div class="board-container">
                <canvas id="gameBoard" width="760" height="760"></canvas>
            </div>
        </div>

        <div class="right-panel">
            <div class="info-box current-player-box">
                <div>当前玩家</div>
                <div class="player-indicator">
                    <div class="stone-display black" id="playerStone"></div>
                    <span id="currentPlayerText">黑方</span>
                </div>
            </div>

            <div class="info-box">
                <div class="score-box">
                    <div class="score-item">
                        <span class="score-label">
                            <div class="stone-display black"></div>
                            黑方
                        </span>
                        <span class="score-value" id="blackScore">0</span>
                    </div>
                    <div class="score-item">
                        <span class="score-label">
                            <div class="stone-display white"></div>
                            白方
                        </span>
                        <span class="score-value" id="whiteScore">6.5</span>
                    </div>
                </div>
            </div>

            <div class="info-box">
                <h3 style="text-align: center; margin-bottom: 10px;">提子数</h3>
                <div class="captured-box">
                    <div class="captured-item">
                        <div class="stone-display black"></div>
                        <div class="captured-count" id="blackCaptured">0</div>
                    </div>
                    <div class="captured-item">
                        <div class="stone-display white"></div>
                        <div class="captured-count" id="whiteCaptured">0</div>
                    </div>
                </div>
            </div>

            <div class="info-box">
                <div class="mode-selector">
                    <label>棋盘大小:</label>
                    <select id="boardSize" onchange="changeBoardSize()">
                        <option value="19" selected>19路标准</option>
                        <option value="13">13路</option>
                        <option value="9">9路</option>
                    </select>
                </div>
            </div>

            <div class="controls">
                <button onclick="passTurn()" class="pass">停一手 (Pass)</button>
                <button onclick="calculateTerritory()" class="territory">计算地盘</button>
                <button onclick="resetGame()">🔄 重新开始</button>
                <button onclick="resignGame()" class="resign">🏳️ 认输</button>
            </div>

            <div class="instructions">
                <h3>📖 游戏规则</h3>
                <ul>
                    <li>黑方先行，双方轮流落子</li>
                    <li>棋子落在交叉点上</li>
                    <li>无气之棋子被提走（吃子）</li>
                    <li>禁止自杀（落子后自己无气）</li>
                    <li>禁止全局同形（打劫）</li>
                    <li>双方连续停手则游戏结束</li>
                    <li>计算地盘多者获胜</li>
                </ul>
            </div>

            <div class="instructions" style="margin-top: 10px;">
                <h3>💡 操作提示</h3>
                <ul>
                    <li>点击棋盘落子</li>
                    <li>红圈标记为最后落子位置</li>
                    <li>可中途计算地盘</li>
                    <li>双方停手可结束对局</li>
                </ul>
            </div>
        </div>
    </div>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <h2 id="modalTitle">游戏结束!</h2>
            <p id="modalText"></p>
            <div class="final-score" id="finalScore" style="display: none;">
                <div class="final-score-row">
                    <span>黑方: 地盘 <span id="blackTerritory">0</span> + 提子 <span id="blackCaps">0</span></span>
                    <span>= <span id="blackTotal">0</span></span>
                </div>
                <div class="final-score-row">
                    <span>白方: 地盘 <span id="whiteTerritory">0</span> + 提子 <span id="whiteCaps">0</span> + 贴目 6.5</span>
                    <span>= <span id="whiteTotal">0</span></span>
                </div>
                <div class="winner-text" id="winnerText"></div>
            </div>
            <button onclick="closeModal()">确定</button>
        </div>
    </div>

    <script>
        // 游戏配置
        let BOARD_SIZE = 19;
        const CELL_SIZE = 38;
        const PADDING = 25;

        // 游戏状态
        let board = [];
        let currentPlayer = 1; // 1: 黑方, 2: 白方
        let gameOver = false;
        let blackCaptured = 0;
        let whiteCaptured = 0;
        let consecutivePasses = 0;
        let lastMove = null;
        let koPosition = null; // 打劫位置
        let moveHistory = []; // 用于检测全局同形

        // 获取Canvas和上下文
        const canvas = document.getElementById('gameBoard');
        const ctx = canvas.getContext('2d');

        // 改变棋盘大小
        function changeBoardSize() {
            BOARD_SIZE = parseInt(document.getElementById('boardSize').value);
            resetGame();
        }

        // 初始化游戏
        function initGame() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
            currentPlayer = 1;
            gameOver = false;
            blackCaptured = 0;
            whiteCaptured = 0;
            consecutivePasses = 0;
            lastMove = null;
            koPosition = null;
            moveHistory = [];

            // 调整画布大小
            const canvasSize = PADDING * 2 + (BOARD_SIZE - 1) * CELL_SIZE;
            canvas.width = canvasSize;
            canvas.height = canvasSize;

            drawBoard();
            updateUI();
        }

        // 绘制棋盘
        function drawBoard() {
            // 清空画布
            ctx.fillStyle = '#dcb35c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制木纹效果
            ctx.strokeStyle = 'rgba(160, 120, 60, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < 50; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                ctx.stroke();
            }

            // 绘制网格线
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;

            for (let i = 0; i < BOARD_SIZE; i++) {
                // 横线
                ctx.beginPath();
                ctx.moveTo(PADDING, PADDING + i * CELL_SIZE);
                ctx.lineTo(PADDING + (BOARD_SIZE - 1) * CELL_SIZE, PADDING + i * CELL_SIZE);
                ctx.stroke();

                // 竖线
                ctx.beginPath();
                ctx.moveTo(PADDING + i * CELL_SIZE, PADDING);
                ctx.lineTo(PADDING + i * CELL_SIZE, PADDING + (BOARD_SIZE - 1) * CELL_SIZE);
                ctx.stroke();
            }

            // 绘制星位
            const starPoints = getStarPoints();
            ctx.fillStyle = '#333';
            starPoints.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(PADDING + x * CELL_SIZE, PADDING + y * CELL_SIZE, 4, 0, 2 * Math.PI);
                ctx.fill();
            });

            // 绘制棋子
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] !== 0) {
                        drawPiece(j, i, board[i][j]);
                    }
                }
            }

            // 绘制最后落子标记
            if (lastMove) {
                drawLastMoveMarker(lastMove.x, lastMove.y);
            }
        }

        // 获取星位坐标
        function getStarPoints() {
            if (BOARD_SIZE === 19) {
                return [
                    [3, 3], [3, 9], [3, 15],
                    [9, 3], [9, 9], [9, 15],
                    [15, 3], [15, 9], [15, 15]
                ];
            } else if (BOARD_SIZE === 13) {
                return [
                    [3, 3], [3, 6], [3, 9],
                    [6, 3], [6, 6], [6, 9],
                    [9, 3], [9, 6], [9, 9]
                ];
            } else if (BOARD_SIZE === 9) {
                return [
                    [2, 2], [2, 4], [2, 6],
                    [4, 2], [4, 4], [4, 6],
                    [6, 2], [6, 4], [6, 6]
                ];
            }
            return [];
        }

        // 绘制棋子
        function drawPiece(x, y, player) {
            const centerX = PADDING + x * CELL_SIZE;
            const centerY = PADDING + y * CELL_SIZE;
            const radius = 16;

            // 阴影
            ctx.beginPath();
            ctx.arc(centerX + 2, centerY + 2, radius, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fill();

            // 棋子
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);

            if (player === 1) {
                // 黑子
                const gradient = ctx.createRadialGradient(
                    centerX - 5, centerY - 5, 0,
                    centerX, centerY, radius
                );
                gradient.addColorStop(0, '#555');
                gradient.addColorStop(0.3, '#333');
                gradient.addColorStop(1, '#000');
                ctx.fillStyle = gradient;
            } else {
                // 白子
                const gradient = ctx.createRadialGradient(
                    centerX - 5, centerY - 5, 0,
                    centerX, centerY, radius
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(0.5, '#f0f0f0');
                gradient.addColorStop(1, '#d0d0d0');
                ctx.fillStyle = gradient;
            }

            ctx.fill();

            // 高光
            ctx.beginPath();
            ctx.arc(centerX - 5, centerY - 5, radius / 3.5, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fill();
        }

        // 绘制最后落子标记
        function drawLastMoveMarker(x, y) {
            const centerX = PADDING + x * CELL_SIZE;
            const centerY = PADDING + y * CELL_SIZE;

            ctx.beginPath();
            ctx.arc(centerX, centerY, 6, 0, 2 * Math.PI);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(centerX, centerY, 10, 0, 2 * Math.PI);
            ctx.strokeStyle = 'rgba(231, 76, 60, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // 处理点击事件
        canvas.addEventListener('click', function(event) {
            if (gameOver) return;

            const rect = canvas.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const y = event.clientY - rect.top;

            // 计算最近的交叉点
            const col = Math.round((x - PADDING) / CELL_SIZE);
            const row = Math.round((y - PADDING) / CELL_SIZE);

            // 检查是否在有效范围内
            if (col < 0 || col >= BOARD_SIZE || row < 0 || row >= BOARD_SIZE) return;

            // 检查位置是否已被占用
            if (board[row][col] !== 0) return;

            // 检查打劫
            if (koPosition && koPosition.x === col && koPosition.y === row) {
                showKoWarning();
                return;
            }

            // 尝试落子
            makeMove(col, row);
        });

        // 落子
        function makeMove(x, y) {
            // 复制当前棋盘用于检测
            const testBoard = board.map(row => [...row]);
            testBoard[y][x] = currentPlayer;

            // 查找并提子
            const capturedStones = findAndRemoveCapturedStones(testBoard, x, y, currentPlayer);

            // 检查自杀
            const liberties = countLiberties(testBoard, x, y, currentPlayer, new Set());
            if (liberties === 0 && capturedStones.length === 0) {
                // 自杀禁入
                return;
            }

            // 检查全局同形（打劫）
            const boardHash = getBoardHash(testBoard);
            if (moveHistory.includes(boardHash)) {
                return; // 全局同形禁入
            }

            // 正式落子
            board[y][x] = currentPlayer;
            lastMove = { x, y };

            // 提子
            const actualCaptured = findAndRemoveCapturedStones(board, x, y, currentPlayer);

            // 更新提子数
            if (currentPlayer === 1) {
                blackCaptured += actualCaptured.length;
            } else {
                whiteCaptured += actualCaptured.length;
            }

            // 更新打劫位置（只提一个子且对方只有一个气）
            if (actualCaptured.length === 1) {
                const capturedStone = actualCaptured[0];
                const opponent = currentPlayer === 1 ? 2 : 1;
                const opponentLiberties = countLiberties(board, capturedStone.x, capturedStone.y, opponent, new Set());
                if (opponentLiberties === 0) {
                    // 找对方棋子的气
                    const opponentGroup = getGroup(board, capturedStone.x, capturedStone.y, opponent);
                    const groupLiberties = getGroupLiberties(board, opponentGroup);
                    if (groupLiberties.length === 1) {
                        koPosition = groupLiberties[0];
                    } else {
                        koPosition = null;
                    }
                } else {
                    koPosition = null;
                }
            } else {
                koPosition = null;
            }

            // 保存历史
            moveHistory.push(getBoardHash(board));
            if (moveHistory.length > 100) moveHistory.shift();

            // 重置连续停手
            consecutivePasses = 0;

            // 切换玩家
            currentPlayer = currentPlayer === 1 ? 2 : 1;

            // 更新界面
            drawBoard();
            updateUI();
        }

        // 查找并移除被提的棋子
        function findAndRemoveCapturedStones(boardState, x, y, player) {
            const opponent = player === 1 ? 2 : 1;
            const capturedStones = [];

            // 检查四周
            const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];
            for (const [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;

                if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) continue;
                if (boardState[ny][nx] !== opponent) continue;

                // 检查对手棋子的气
                const liberties = countLiberties(boardState, nx, ny, opponent, new Set());
                if (liberties === 0) {
                    // 提子
                    const stones = removeGroup(boardState, nx, ny, opponent);
                    capturedStones.push(...stones);
                }
            }

            return capturedStones;
        }

        // 计算气
        function countLiberties(boardState, x, y, player, visited) {
            const key = `${x},${y}`;
            if (visited.has(key)) return 0;
            visited.add(key);

            if (boardState[y][x] !== player) {
                return boardState[y][x] === 0 ? 1 : 0;
            }

            let liberties = 0;
            const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];

            for (const [dx, dy] of directions) {
                const nx = x + dx;
                const ny = y + dy;

                if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) continue;

                if (boardState[ny][nx] === 0) {
                    liberties++;
                } else if (boardState[ny][nx] === player) {
                    liberties += countLiberties(boardState, nx, ny, player, visited);
                }
            }

            return liberties;
        }

        // 获取棋子组
        function getGroup(boardState, x, y, player) {
            const group = [];
            const visited = new Set();
            const queue = [{ x, y }];

            while (queue.length > 0) {
                const { x: cx, y: cy } = queue.pop();
                const key = `${cx},${cy}`;

                if (visited.has(key)) continue;
                visited.add(key);

                if (boardState[cy][cx] !== player) continue;

                group.push({ x: cx, y: cy });

                const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                for (const [dx, dy] of directions) {
                    const nx = cx + dx;
                    const ny = cy + dy;

                    if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                        queue.push({ x: nx, y: ny });
                    }
                }
            }

            return group;
        }

        // 获取棋组的气
        function getGroupLiberties(boardState, group) {
            const liberties = [];
            const visited = new Set();

            for (const stone of group) {
                const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                for (const [dx, dy] of directions) {
                    const nx = stone.x + dx;
                    const ny = stone.y + dy;
                    const key = `${nx},${ny}`;

                    if (visited.has(key)) continue;

                    if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                        if (boardState[ny][nx] === 0) {
                            liberties.push({ x: nx, y: ny });
                            visited.add(key);
                        }
                    }
                }
            }

            return liberties;
        }

        // 移除棋子组
        function removeGroup(boardState, x, y, player) {
            const group = getGroup(boardState, x, y, player);

            for (const stone of group) {
                boardState[stone.y][stone.x] = 0;
            }

            return group;
        }

        // 获取棋盘哈希（用于检测全局同形）
        function getBoardHash(boardState) {
            return boardState.flat().join(',');
        }

        // 显示打劫警告
        function showKoWarning() {
            const warning = document.getElementById('koWarning');
            warning.style.display = 'block';
            setTimeout(() => {
                warning.style.display = 'none';
            }, 1500);
        }

        // 停一手
        function passTurn() {
            if (gameOver) return;

            consecutivePasses++;

            if (consecutivePasses >= 2) {
                endGame();
                return;
            }

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateUI();

            showModal('停一手', `${currentPlayer === 1 ? '白方' : '黑方'}选择停一手，现在轮到${currentPlayer === 1 ? '黑方' : '白方'}`, false);
        }

        // 认输
        function resignGame() {
            if (gameOver) return;

            gameOver = true;
            const winner = currentPlayer === 1 ? '白方' : '黑方';
            showModal('游戏结束', `${currentPlayer === 1 ? '黑方' : '白方'}认输，${winner}获胜！`, false);
        }

        // 结束游戏
        function endGame() {
            gameOver = true;
            calculateFinalScore();
        }

        // 计算地盘（中国数子法）
        function calculateTerritory() {
            const result = countTerritory();

            // 更新显示
            document.getElementById('blackScore').textContent = result.blackTerritory;
            document.getElementById('whiteScore').textContent = (result.whiteTerritory + 6.5).toFixed(1);

            // 高亮地盘
            highlightTerritory(result.blackArea, result.whiteArea);

            // 显示信息
            showModal('地盘计算',
                `黑方地盘: ${result.blackTerritory}<br>` +
                `白方地盘: ${result.whiteTerritory} (含贴目6.5: ${(result.whiteTerritory + 6.5).toFixed(1)})`,
                false);
        }

        // 计算最终得分
        function calculateFinalScore() {
            const result = countTerritory();

            const blackTotal = result.blackTerritory + blackCaptured;
            const whiteTotal = result.whiteTerritory + whiteCaptured + 6.5;

            document.getElementById('blackTerritory').textContent = result.blackTerritory;
            document.getElementById('blackCaps').textContent = blackCaptured;
            document.getElementById('blackTotal').textContent = blackTotal;

            document.getElementById('whiteTerritory').textContent = result.whiteTerritory;
            document.getElementById('whiteCaps').textContent = whiteCaptured;
            document.getElementById('whiteTotal').textContent = whiteTotal.toFixed(1);

            const winner = blackTotal > whiteTotal ? '黑方' : '白方';
            const margin = Math.abs(blackTotal - whiteTotal).toFixed(1);

            document.getElementById('winnerText').textContent = `${winner} 获胜！胜${margin}子`;

            showModal('游戏结束', '双方连续停手，游戏结束', true);
        }

        // 数地盘
        function countTerritory() {
            const visited = new Set();
            let blackTerritory = 0;
            let whiteTerritory = 0;
            const blackArea = [];
            const whiteArea = [];

            // 计算活子数
            let blackStones = 0;
            let whiteStones = 0;

            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (board[y][x] === 1) blackStones++;
                    else if (board[y][x] === 2) whiteStones++;
                }
            }

            // 使用简单的区域填充算法计算地盘
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const key = `${x},${y}`;
                    if (visited.has(key)) continue;
                    if (board[y][x] !== 0) {
                        visited.add(key);
                        continue;
                    }

                    // BFS寻找连通区域
                    const area = [];
                    const queue = [{ x, y }];
                    const borderColors = new Set();

                    while (queue.length > 0) {
                        const { x: cx, y: cy } = queue.pop();
                        const ckey = `${cx},${cy}`;

                        if (visited.has(ckey)) continue;
                        visited.add(ckey);

                        if (board[cy][cx] === 0) {
                            area.push({ x: cx, y: cy });

                            const directions = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                            for (const [dx, dy] of directions) {
                                const nx = cx + dx;
                                const ny = cy + dy;

                                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                                    queue.push({ x: nx, y: ny });
                                }
                            }
                        } else {
                            borderColors.add(board[cy][cx]);
                        }
                    }

                    // 判断地盘归属
                    if (borderColors.size === 1) {
                        const color = Array.from(borderColors)[0];
                        if (color === 1) {
                            blackTerritory += area.length;
                            blackArea.push(...area);
                        } else {
                            whiteTerritory += area.length;
                            whiteArea.push(...area);
                        }
                    }
                }
            }

            // 加上活子数
            blackTerritory += blackStones;
            whiteTerritory += whiteStones;

            return { blackTerritory, whiteTerritory, blackArea, whiteArea };
        }

        // 高亮地盘
        function highlightTerritory(blackArea, whiteArea) {
            // 绘制地盘标记
            ctx.save();

            for (const point of blackArea) {
                const centerX = PADDING + point.x * CELL_SIZE;
                const centerY = PADDING + point.y * CELL_SIZE;
                ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
                ctx.fill();
            }

            for (const point of whiteArea) {
                const centerX = PADDING + point.x * CELL_SIZE;
                const centerY = PADDING + point.y * CELL_SIZE;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(centerX, centerY, 5, 0, 2 * Math.PI);
                ctx.fill();
            }

            ctx.restore();
        }

        // 更新UI
        function updateUI() {
            const playerText = document.getElementById('currentPlayerText');
            const playerStone = document.getElementById('playerStone');

            if (currentPlayer === 1) {
                playerText.textContent = '黑方';
                playerStone.className = 'stone-display black';
            } else {
                playerText.textContent = '白方';
                playerStone.className = 'stone-display white';
            }

            document.getElementById('blackCaptured').textContent = blackCaptured;
            document.getElementById('whiteCaptured').textContent = whiteCaptured;
        }

        // 显示弹窗
        function showModal(title, text, showScore) {
            document.getElementById('modalTitle').textContent = title;
            document.getElementById('modalText').innerHTML = text;
            document.getElementById('finalScore').style.display = showScore ? 'block' : 'none';
            document.getElementById('gameModal').classList.add('show');
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('gameModal').classList.remove('show');
            if (gameOver) {
                resetGame();
            }
        }

        // 重新开始游戏
        function resetGame() {
            initGame();
        }

        // 初始化
        initGame();
    </script>
