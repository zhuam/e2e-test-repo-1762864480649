<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - Gomoku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            color: #e94560;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            font-size: 2.5em;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 20px;
        }

        .current-player {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            font-size: 1.2em;
        }

        .player-indicator {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 2px solid #fff;
            transition: all 0.3s ease;
        }

        .player-indicator.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }

        .player-indicator.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
        }

        .score-board {
            display: flex;
            gap: 30px;
            color: #fff;
        }

        .score-item {
            text-align: center;
        }

        .score-item .label {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .score-item .value {
            font-size: 1.5em;
            font-weight: bold;
            color: #e94560;
        }

        #board-container {
            position: relative;
            margin: 0 auto;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(15, 40px);
            grid-template-rows: repeat(15, 40px);
            background: #dcb35c;
            border: 3px solid #8b4513;
            border-radius: 5px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .cell {
            width: 40px;
            height: 40px;
            position: relative;
            cursor: pointer;
        }

        .cell::before,
        .cell::after {
            content: '';
            position: absolute;
            background: #8b4513;
        }

        .cell::before {
            width: 100%;
            height: 1px;
            top: 50%;
            left: 0;
        }

        .cell::after {
            width: 1px;
            height: 100%;
            left: 50%;
            top: 0;
        }

        /* 边缘处理 */
        .cell[data-row="0"]::after { top: 50%; height: 50%; }
        .cell[data-row="14"]::after { height: 50%; }
        .cell[data-col="0"]::before { left: 50%; width: 50%; }
        .cell[data-col="14"]::before { width: 50%; }

        /* 星位点 */
        .cell.star-point::before {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: #8b4513;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .cell .stone {
            position: absolute;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            transition: all 0.2s ease;
        }

        .cell .stone.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .cell .stone.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
        }

        .cell .stone.last-move {
            box-shadow: 0 0 10px 3px #e94560;
        }

        .cell .stone.winning {
            animation: pulse 0.5s ease-in-out infinite alternate;
        }

        @keyframes pulse {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.1); }
        }

        .cell:hover::before {
            opacity: 0.7;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        #restart-btn {
            background: linear-gradient(135deg, #e94560, #c73659);
            color: #fff;
        }

        #undo-btn {
            background: linear-gradient(135deg, #4a90a4, #357a8c);
            color: #fff;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            color: #fff;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #e94560;
        }

        .modal-content p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }

        .winner-stone {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 20px auto;
        }

        .winner-stone.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }

        .winner-stone.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
        }
    </style>
</head>
<body>
    <h1>五子棋</h1>
    
    <div class="game-container">
        <div class="game-info">
            <div class="current-player">
                <span>当前玩家:</span>
                <div id="player-indicator" class="player-indicator black"></div>
                <span id="player-text">黑棋</span>
            </div>
            <div class="score-board">
                <div class="score-item">
                    <div class="label">黑棋胜</div>
                    <div class="value" id="black-wins">0</div>
                </div>
                <div class="score-item">
                    <div class="label">白棋胜</div>
                    <div class="value" id="white-wins">0</div>
                </div>
            </div>
        </div>

        <div id="board-container">
            <div id="board"></div>
        </div>

        <div class="controls">
            <button id="undo-btn">悔棋</button>
            <button id="restart-btn">重新开始</button>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2>游戏结束!</h2>
            <div id="winner-stone" class="winner-stone"></div>
            <p id="winner-text"></p>
            <button id="modal-restart-btn">再来一局</button>
        </div>
    </div>

    <script>
        // 游戏状态
        const BOARD_SIZE = 15;
        const EMPTY = 0;
        const BLACK = 1;
        const WHITE = 2;

        let board = [];
        let currentPlayer = BLACK;
        let gameOver = false;
        let moveHistory = [];
        let lastMove = null;
        let blackWins = 0;
        let whiteWins = 0;

        // 星位点位置
        const starPoints = [
            [3, 3], [3, 7], [3, 11],
            [7, 3], [7, 7], [7, 11],
            [11, 3], [11, 7], [11, 11]
        ];

        // 初始化棋盘
        function initBoard() {
            const boardElement = document.getElementById('board');
            boardElement.innerHTML = '';
            board = [];
            moveHistory = [];
            lastMove = null;
            currentPlayer = BLACK;
            gameOver = false;

            for (let i = 0; i < BOARD_SIZE; i++) {
                board[i] = [];
                for (let j = 0; j < BOARD_SIZE; j++) {
                    board[i][j] = EMPTY;
                    
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = i;
                    cell.dataset.col = j;
                    
                    // 添加星位点
                    if (starPoints.some(([r, c]) => r === i && c === j)) {
                        cell.classList.add('star-point');
                    }
                    
                    cell.addEventListener('click', () => handleClick(i, j));
                    boardElement.appendChild(cell);
                }
            }

            updatePlayerDisplay();
        }

        // 处理点击事件
        function handleClick(row, col) {
            if (gameOver || board[row][col] !== EMPTY) return;

            // 放置棋子
            board[row][col] = currentPlayer;
            moveHistory.push({ row, col, player: currentPlayer });

            // 更新显示
            renderStone(row, col, currentPlayer);
            
            // 更新最后一步标记
            if (lastMove) {
                const prevCell = getCell(lastMove.row, lastMove.col);
                const prevStone = prevCell.querySelector('.stone');
                if (prevStone) {
                    prevStone.classList.remove('last-move');
                }
            }
            lastMove = { row, col };
            const currentCell = getCell(row, col);
            const currentStone = currentCell.querySelector('.stone');
            if (currentStone) {
                currentStone.classList.add('last-move');
            }

            // 检查胜利
            if (checkWin(row, col)) {
                gameOver = true;
                const winner = currentPlayer;
                if (winner === BLACK) {
                    blackWins++;
                } else {
                    whiteWins++;
                }
                updateScoreDisplay();
                showWinModal(winner, row, col);
                return;
            }

            // 检查平局
            if (moveHistory.length === BOARD_SIZE * BOARD_SIZE) {
                gameOver = true;
                showDrawModal();
                return;
            }

            // 切换玩家
            currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
            updatePlayerDisplay();
        }

        // 渲染棋子
        function renderStone(row, col, player) {
            const cell = getCell(row, col);
            const stone = document.createElement('div');
            stone.className = `stone ${player === BLACK ? 'black' : 'white'}`;
            cell.appendChild(stone);
        }

        // 获取单元格元素
        function getCell(row, col) {
            return document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
        }

        // 更新玩家显示
        function updatePlayerDisplay() {
            const indicator = document.getElementById('player-indicator');
            const text = document.getElementById('player-text');
            
            if (currentPlayer === BLACK) {
                indicator.className = 'player-indicator black';
                text.textContent = '黑棋';
            } else {
                indicator.className = 'player-indicator white';
                text.textContent = '白棋';
            }
        }

        // 更新分数显示
        function updateScoreDisplay() {
            document.getElementById('black-wins').textContent = blackWins;
            document.getElementById('white-wins').textContent = whiteWins;
        }

        // 检查胜利
        function checkWin(row, col) {
            const player = board[row][col];
            const directions = [
                [[0, 1], [0, -1]],   // 水平
                [[1, 0], [-1, 0]],   // 垂直
                [[1, 1], [-1, -1]], // 对角线
                [[1, -1], [-1, 1]]  // 反对角线
            ];

            for (const [dir1, dir2] of directions) {
                let count = 1;
                const winningCells = [[row, col]];

                // 向一个方向计数
                for (const [dr, dc] of [dir1, dir2]) {
                    let r = row + dr;
                    let c = col + dc;
                    while (r >= 0 && r < BOARD_SIZE && c >= 0 && c < BOARD_SIZE && board[r][c] === player) {
                        count++;
                        winningCells.push([r, c]);
                        r += dr;
                        c += dc;
                    }
                }

                if (count >= 5) {
                    // 标记获胜棋子
                    winningCells.forEach(([wr, wc]) => {
                        const cell = getCell(wr, wc);
                        const stone = cell.querySelector('.stone');
                        if (stone) {
                            stone.classList.add('winning');
                        }
                    });
                    return true;
                }
            }

            return false;
        }

        // 显示胜利弹窗
        function showWinModal(winner, row, col) {
            const modal = document.getElementById('modal');
            const winnerStone = document.getElementById('winner-stone');
            const winnerText = document.getElementById('winner-text');

            winnerStone.className = `winner-stone ${winner === BLACK ? 'black' : 'white'}`;
            winnerText.textContent = `${winner === BLACK ? '黑棋' : '白棋'} 获胜!`;

            modal.classList.add('show');
        }

        // 显示平局弹窗
        function showDrawModal() {
            const modal = document.getElementById('modal');
            const winnerStone = document.getElementById('winner-stone');
            const winnerText = document.getElementById('winner-text');

            winnerStone.className = 'winner-stone';
            winnerStone.style.background = 'linear-gradient(90deg, #000 50%, #fff 50%)';
            winnerText.textContent = '平局!';

            modal.classList.add('show');
        }

        // 隐藏弹窗
        function hideModal() {
            document.getElementById('modal').classList.remove('show');
        }

        // 悔棋
        function undo() {
            if (moveHistory.length === 0 || gameOver) return;

            const lastMoveData = moveHistory.pop();
            board[lastMoveData.row][lastMoveData.col] = EMPTY;

            // 移除棋子
            const cell = getCell(lastMoveData.row, lastMoveData.col);
            const stone = cell.querySelector('.stone');
            if (stone) {
                cell.removeChild(stone);
            }

            // 更新最后一步标记
            if (moveHistory.length > 0) {
                const prevMove = moveHistory[moveHistory.length - 1];
                lastMove = prevMove;
                const prevCell = getCell(prevMove.row, prevMove.col);
                const prevStone = prevCell.querySelector('.stone');
                if (prevStone) {
                    prevStone.classList.add('last-move');
                }
            } else {
                lastMove = null;
            }

            // 切换回上一个玩家
            currentPlayer = lastMoveData.player;
            updatePlayerDisplay();
        }

        // 事件监听
        document.getElementById('restart-btn').addEventListener('click', initBoard);
        document.getElementById('undo-btn').addEventListener('click', undo);
        document.getElementById('modal-restart-btn').addEventListener('click', () => {
            hideModal();
            initBoard();
        });

        // 点击弹窗外部关闭
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') {
                hideModal();
            }
        });

        // 初始化游戏
        initBoard();
    </script>
</body>
</html>
