<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gomoku - Five in a Row</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #333;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            text-align: center;
            color: #999;
            margin-bottom: 20px;
            font-size: 0.9em;
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .player-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .player-indicator.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .player-indicator:not(.active) {
            background: #f0f0f0;
            color: #999;
        }

        .stone-preview {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .stone-preview.black {
            background: radial-gradient(circle at 30% 30%, #666, #000);
        }

        .stone-preview.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border: 1px solid #ccc;
        }

        .status {
            text-align: center;
            padding: 10px 20px;
            background: #f8f9fa;
            border-radius: 10px;
            font-weight: bold;
            color: #667eea;
        }

        .board-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            overflow-x: auto;
        }

        #board {
            background: linear-gradient(135deg, #DEB887 0%, #D2A679 100%);
            border: 5px solid #8B4513;
            border-radius: 5px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(245, 87, 108, 0.6);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: modalPop 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        @keyframes modalPop {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal h2 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 15px;
        }

        .modal p {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 25px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .score-item {
            text-align: center;
        }

        .score-item .label {
            font-size: 0.9em;
            color: #999;
            margin-bottom: 5px;
        }

        .score-item .score {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .container {
                padding: 15px;
            }

            .game-info {
                justify-content: center;
            }

            .controls {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Gomoku</h1>
        <p class="subtitle">Five in a Row - Classic Strategy Game</p>

        <div class="game-info">
            <div class="player-indicator active" id="player1">
                <div class="stone-preview black"></div>
                <span>Player 1 (Black)</span>
            </div>
            <div class="status" id="status">Black's Turn</div>
            <div class="player-indicator" id="player2">
                <div class="stone-preview white"></div>
                <span>Player 2 (White)</span>
            </div>
        </div>

        <div class="score-board">
            <div class="score-item">
                <div class="label">Black Wins</div>
                <div class="score" id="blackScore">0</div>
            </div>
            <div class="score-item">
                <div class="label">White Wins</div>
                <div class="score" id="whiteScore">0</div>
            </div>
        </div>

        <div class="board-container">
            <canvas id="board" width="600" height="600"></canvas>
        </div>

        <div class="controls">
            <button class="btn-primary" onclick="resetGame()">New Game</button>
            <button class="btn-secondary" onclick="undoMove()">Undo Move</button>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2 id="winnerText">Black Wins!</h2>
            <p>🎉 Congratulations! 🎉</p>
            <button class="btn-primary" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const BOARD_SIZE = 15;
        const CELL_SIZE = 40;
        const PADDING = 20;
        const STONE_RADIUS = 16;

        // Game state
        let board = [];
        let currentPlayer = 1; // 1 = black, 2 = white
        let gameOver = false;
        let moveHistory = [];
        let scores = { black: 0, white: 0 };

        // Initialize game
        function init() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(0));
            currentPlayer = 1;
            gameOver = false;
            moveHistory = [];
            drawBoard();
            updateUI();
        }

        // Draw the board
        function drawBoard() {
            // Clear canvas
            ctx.fillStyle = '#DEB887';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid lines
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 1;

            for (let i = 0; i < BOARD_SIZE; i++) {
                // Vertical lines
                ctx.beginPath();
                ctx.moveTo(PADDING + i * CELL_SIZE, PADDING);
                ctx.lineTo(PADDING + i * CELL_SIZE, PADDING + (BOARD_SIZE - 1) * CELL_SIZE);
                ctx.stroke();

                // Horizontal lines
                ctx.beginPath();
                ctx.moveTo(PADDING, PADDING + i * CELL_SIZE);
                ctx.lineTo(PADDING + (BOARD_SIZE - 1) * CELL_SIZE, PADDING + i * CELL_SIZE);
                ctx.stroke();
            }

            // Draw star points (for 15x15 board)
            const starPoints = [
                [3, 3], [3, 11], [7, 7], [11, 3], [11, 11]
            ];

            ctx.fillStyle = '#8B4513';
            starPoints.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.arc(
                    PADDING + x * CELL_SIZE,
                    PADDING + y * CELL_SIZE,
                    4,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
            });

            // Draw stones
            for (let i = 0; i < BOARD_SIZE; i++) {
                for (let j = 0; j < BOARD_SIZE; j++) {
                    if (board[i][j] !== 0) {
                        drawStone(i, j, board[i][j]);
                    }
                }
            }

            // Highlight last move
            if (moveHistory.length > 0) {
                const lastMove = moveHistory[moveHistory.length - 1];
                ctx.strokeStyle = '#FF0000';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(
                    PADDING + lastMove.x * CELL_SIZE,
                    PADDING + lastMove.y * CELL_SIZE,
                    STONE_RADIUS + 2,
                    0,
                    Math.PI * 2
                );
                ctx.stroke();
            }
        }

        // Draw a single stone
        function drawStone(x, y, player) {
            const centerX = PADDING + x * CELL_SIZE;
            const centerY = PADDING + y * CELL_SIZE;

            // Draw stone shadow
            ctx.beginPath();
            ctx.arc(centerX + 2, centerY + 2, STONE_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fill();

            // Draw stone
            const gradient = ctx.createRadialGradient(
                centerX - 5, centerY - 5, 0,
                centerX, centerY, STONE_RADIUS
            );

            if (player === 1) {
                // Black stone
                gradient.addColorStop(0, '#666');
                gradient.addColorStop(1, '#000');
            } else {
                // White stone
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, '#ddd');
            }

            ctx.beginPath();
            ctx.arc(centerX, centerY, STONE_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();

            // Add subtle border for white stones
            if (player === 2) {
                ctx.strokeStyle = '#ccc';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        // Handle click on board
        canvas.addEventListener('click', (e) => {
            if (gameOver) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = Math.round((e.clientX - rect.left) * scaleX - PADDING) / CELL_SIZE;
            const y = Math.round((e.clientY - rect.top) * scaleY - PADDING) / CELL_SIZE;

            if (x >= 0 && x < BOARD_SIZE && y >= 0 && y < BOARD_SIZE) {
                if (board[Math.round(x)][Math.round(y)] === 0) {
                    makeMove(Math.round(x), Math.round(y));
                }
            }
        });

        // Make a move
        function makeMove(x, y) {
            board[x][y] = currentPlayer;
            moveHistory.push({ x, y, player: currentPlayer });
            drawBoard();

            if (checkWin(x, y)) {
                gameOver = true;
                const winner = currentPlayer === 1 ? 'Black' : 'White';
                if (currentPlayer === 1) {
                    scores.black++;
                } else {
                    scores.white++;
                }
                updateScoreBoard();
                showWinModal(winner);
                return;
            }

            if (moveHistory.length === BOARD_SIZE * BOARD_SIZE) {
                gameOver = true;
                showWinModal('Draw');
                return;
            }

            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateUI();
        }

        // Check for win
        function checkWin(x, y) {
            const player = board[x][y];
            const directions = [
                [1, 0],   // Horizontal
                [0, 1],   // Vertical
                [1, 1],   // Diagonal
                [1, -1]   // Anti-diagonal
            ];

            for (const [dx, dy] of directions) {
                let count = 1;

                // Check in positive direction
                let i = 1;
                while (true) {
                    const nx = x + dx * i;
                    const ny = y + dy * i;
                    if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
                    if (board[nx][ny] !== player) break;
                    count++;
                    i++;
                }

                // Check in negative direction
                i = 1;
                while (true) {
                    const nx = x - dx * i;
                    const ny = y - dy * i;
                    if (nx < 0 || nx >= BOARD_SIZE || ny < 0 || ny >= BOARD_SIZE) break;
                    if (board[nx][ny] !== player) break;
                    count++;
                    i++;
                }

                if (count >= 5) return true;
            }

            return false;
        }

        // Update UI elements
        function updateUI() {
            const status = document.getElementById('status');
            const player1 = document.getElementById('player1');
            const player2 = document.getElementById('player2');

            if (currentPlayer === 1) {
                status.textContent = "Black's Turn";
                player1.classList.add('active');
                player2.classList.remove('active');
            } else {
                status.textContent = "White's Turn";
                player2.classList.add('active');
                player1.classList.remove('active');
            }
        }

        // Update score board
        function updateScoreBoard() {
            document.getElementById('blackScore').textContent = scores.black;
            document.getElementById('whiteScore').textContent = scores.white;
        }

        // Show win modal
        function showWinModal(winner) {
            const modal = document.getElementById('winModal');
            const winnerText = document.getElementById('winnerText');

            if (winner === 'Draw') {
                winnerText.textContent = "It's a Draw!";
            } else {
                winnerText.textContent = `${winner} Wins!`;
            }

            modal.classList.add('show');
        }

        // Reset game
        function resetGame() {
            document.getElementById('winModal').classList.remove('show');
            init();
        }

        // Undo last move
        function undoMove() {
            if (moveHistory.length === 0 || gameOver) return;

            const lastMove = moveHistory.pop();
            board[lastMove.x][lastMove.y] = 0;
            currentPlayer = lastMove.player;
            drawBoard();
            updateUI();
        }

        // Start the game
        init();
    </script>
</body>
</html>
