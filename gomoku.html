<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋游戏 - Gomoku</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .current-player {
            font-size: 1.2em;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-indicator {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .player-indicator.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }

        .player-indicator.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ccc);
            border: 2px solid #999;
        }

        .status {
            font-size: 1.1em;
            color: #667eea;
            font-weight: bold;
        }

        .board-container {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(15, 35px);
            grid-template-rows: repeat(15, 35px);
            gap: 0;
            background: #daa520;
            padding: 15px;
            border-radius: 10px;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }

        .cell {
            width: 35px;
            height: 35px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .cell::before,
        .cell::after {
            content: '';
            position: absolute;
            background: #8b6914;
        }

        .cell::before {
            width: 100%;
            height: 1px;
            top: 50%;
            left: 0;
        }

        .cell::after {
            width: 1px;
            height: 100%;
            left: 50%;
            top: 0;
        }

        .cell:hover::before,
        .cell:hover::after {
            background: #667eea;
        }

        .cell.top::before {
            height: 50%;
            top: 50%;
        }

        .cell.bottom::before {
            height: 50%;
            top: 0;
        }

        .cell.left::after {
            width: 50%;
            left: 50%;
        }

        .cell.right::after {
            width: 50%;
            left: 0;
        }

        .stone {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3);
            animation: placeStone 0.2s ease-out;
        }

        @keyframes placeStone {
            0% {
                transform: translate(-50%, -50%) scale(0);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .stone.black {
            background: radial-gradient(circle at 30% 30%, #555, #000);
        }

        .stone.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border: 1px solid #ccc;
        }

        .stone.winning {
            animation: winning 0.5s ease-in-out infinite alternate;
        }

        @keyframes winning {
            from {
                box-shadow: 0 0 10px #ff0;
            }
            to {
                box-shadow: 0 0 20px #ff0, 0 0 30px #ff0;
            }
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        #resetBtn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        #resetBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        #undoBtn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        #undoBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: modalAppear 0.3s ease-out;
        }

        @keyframes modalAppear {
            from {
                transform: scale(0.5);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-content h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #667eea;
        }

        .modal-content p {
            font-size: 1.2em;
            margin-bottom: 30px;
            color: #666;
        }

        @media (max-width: 768px) {
            #board {
                grid-template-columns: repeat(15, 25px);
                grid-template-rows: repeat(15, 25px);
                padding: 10px;
            }

            .cell {
                width: 25px;
                height: 25px;
            }

            .stone {
                width: 20px;
                height: 20px;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 五子棋游戏</h1>
        
        <div class="game-info">
            <div class="current-player">
                <span>当前玩家:</span>
                <span class="player-indicator black" id="playerIndicator"></span>
                <span id="playerText">黑棋</span>
            </div>
            <div class="status" id="status">游戏进行中</div>
        </div>

        <div class="board-container">
            <div id="board"></div>
        </div>

        <div class="controls">
            <button id="undoBtn">↶ 悔棋</button>
            <button id="resetBtn">🔄 重新开始</button>
        </div>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <h2 id="modalTitle">🎉 游戏结束!</h2>
            <p id="modalMessage">黑棋获胜!</p>
            <button id="modalBtn">再来一局</button>
        </div>
    </div>

    <script>
        class Gomoku {
            constructor() {
                this.size = 15;
                this.board = [];
                this.currentPlayer = 'black'; // 'black' or 'white'
                this.gameOver = false;
                this.moveHistory = [];
                
                this.init();
            }

            init() {
                this.createBoard();
                this.bindEvents();
                this.updatePlayerDisplay();
            }

            createBoard() {
                const boardElement = document.getElementById('board');
                boardElement.innerHTML = '';
                
                for (let row = 0; row < this.size; row++) {
                    this.board[row] = [];
                    for (let col = 0; col < this.size; col++) {
                        this.board[row][col] = null;
                        
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = row;
                        cell.dataset.col = col;

                        // Add border classes for edge cells
                        if (row === 0) cell.classList.add('top');
                        if (row === this.size - 1) cell.classList.add('bottom');
                        if (col === 0) cell.classList.add('left');
                        if (col === this.size - 1) cell.classList.add('right');

                        cell.addEventListener('click', () => this.placeStone(row, col));
                        boardElement.appendChild(cell);
                    }
                }
            }

            bindEvents() {
                document.getElementById('resetBtn').addEventListener('click', () => this.reset());
                document.getElementById('undoBtn').addEventListener('click', () => this.undo());
                document.getElementById('modalBtn').addEventListener('click', () => {
                    this.hideModal();
                    this.reset();
                });
            }

            placeStone(row, col) {
                if (this.gameOver || this.board[row][col] !== null) {
                    return;
                }

                // Place the stone
                this.board[row][col] = this.currentPlayer;
                this.moveHistory.push({ row, col, player: this.currentPlayer });

                // Update visual
                const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                const stone = document.createElement('div');
                stone.className = `stone ${this.currentPlayer}`;
                cell.appendChild(stone);

                // Check for win
                if (this.checkWin(row, col)) {
                    this.endGame(this.currentPlayer);
                    return;
                }

                // Check for draw
                if (this.moveHistory.length === this.size * this.size) {
                    this.endGame('draw');
                    return;
                }

                // Switch player
                this.currentPlayer = this.currentPlayer === 'black' ? 'white' : 'black';
                this.updatePlayerDisplay();
            }

            checkWin(row, col) {
                const directions = [
                    [0, 1],   // horizontal
                    [1, 0],   // vertical
                    [1, 1],   // diagonal top-left to bottom-right
                    [1, -1]   // diagonal top-right to bottom-left
                ];

                const player = this.board[row][col];

                for (const [dx, dy] of directions) {
                    let count = 1;
                    let winningStones = [{ row, col }];

                    // Check positive direction
                    for (let i = 1; i < 5; i++) {
                        const newRow = row + dx * i;
                        const newCol = col + dy * i;
                        
                        if (this.isValidPosition(newRow, newCol) && 
                            this.board[newRow][newCol] === player) {
                            count++;
                            winningStones.push({ row: newRow, col: newCol });
                        } else {
                            break;
                        }
                    }

                    // Check negative direction
                    for (let i = 1; i < 5; i++) {
                        const newRow = row - dx * i;
                        const newCol = col - dy * i;
                        
                        if (this.isValidPosition(newRow, newCol) && 
                            this.board[newRow][newCol] === player) {
                            count++;
                            winningStones.push({ row: newRow, col: newCol });
                        } else {
                            break;
                        }
                    }

                    if (count >= 5) {
                        this.highlightWinningStones(winningStones);
                        return true;
                    }
                }

                return false;
            }

            isValidPosition(row, col) {
                return row >= 0 && row < this.size && col >= 0 && col < this.size;
            }

            highlightWinningStones(stones) {
                stones.forEach(({ row, col }) => {
                    const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                    const stone = cell.querySelector('.stone');
                    if (stone) {
                        stone.classList.add('winning');
                    }
                });
            }

            updatePlayerDisplay() {
                const indicator = document.getElementById('playerIndicator');
                const text = document.getElementById('playerText');
                const status = document.getElementById('status');

                indicator.className = `player-indicator ${this.currentPlayer}`;
                text.textContent = this.currentPlayer === 'black' ? '黑棋' : '白棋';
                status.textContent = '游戏进行中';
            }

            endGame(result) {
                this.gameOver = true;
                const status = document.getElementById('status');

                if (result === 'draw') {
                    status.textContent = '平局!';
                    this.showModal('🤝 平局!', '双方势均力敌!');
                } else {
                    const winner = result === 'black' ? '黑棋' : '白棋';
                    status.textContent = `${winner}获胜!`;
                    this.showModal('🎉 游戏结束!', `${winner}获胜!`);
                }
            }

            showModal(title, message) {
                document.getElementById('modalTitle').textContent = title;
                document.getElementById('modalMessage').textContent = message;
                document.getElementById('modal').classList.add('show');
            }

            hideModal() {
                document.getElementById('modal').classList.remove('show');
            }

            undo() {
                if (this.moveHistory.length === 0 || this.gameOver) {
                    return;
                }

                const lastMove = this.moveHistory.pop();
                this.board[lastMove.row][lastMove.col] = null;

                const cell = document.querySelector(`[data-row="${lastMove.row}"][data-col="${lastMove.col}"]`);
                const stone = cell.querySelector('.stone');
                if (stone) {
                    stone.remove();
                }

                // Switch back to previous player
                this.currentPlayer = lastMove.player;
                this.updatePlayerDisplay();
            }

            reset() {
                // Clear board state
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        this.board[row][col] = null;
                    }
                }

                // Remove all stones from visual board
                const stones = document.querySelectorAll('.stone');
                stones.forEach(stone => stone.remove());

                // Reset game state
                this.currentPlayer = 'black';
                this.gameOver = false;
                this.moveHistory = [];

                this.updatePlayerDisplay();
                this.hideModal();
            }
        }

        // Initialize the game when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            new Gomoku();
        });
    </script>
</body>
</html>
