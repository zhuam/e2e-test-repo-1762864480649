<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>连连看 - Link Link Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 10px;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* 背景动画粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(233, 69, 96, 0.6);
            border-radius: 50%;
            animation: float 15s infinite;
            box-shadow: 0 0 10px rgba(233, 69, 96, 0.8);
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }

        .game-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        /* 标题样式 */
        .title {
            font-size: clamp(24px, 5vw, 42px);
            font-weight: 800;
            text-align: center;
            background: linear-gradient(45deg, #ff6b6b, #feca57, #ff6b6b);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
            letter-spacing: 3px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* 信息面板 */
        .info-panel {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .info-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 12px 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            min-width: 120px;
            text-align: center;
        }

        .info-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 700;
            color: #feca57;
        }

        .info-value.danger {
            color: #ff6b6b;
            animation: pulse 0.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* 游戏面板容器 */
        .game-board-wrapper {
            position: relative;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3),
                        inset 0 0 60px rgba(255, 107, 107, 0.05);
        }

        /* 游戏面板 */
        .game-board {
            display: grid;
            gap: 6px;
            position: relative;
        }

        /* 方块样式 */
        .tile {
            width: clamp(35px, 6vw, 55px);
            height: clamp(35px, 6vw, 55px);
            background: linear-gradient(145deg, #2a2a4a, #1a1a3a);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(20px, 4vw, 32px);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        .tile::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.1) 50%,
                transparent 70%
            );
            transform: rotate(45deg);
            transition: all 0.5s;
        }

        .tile:hover::before {
            left: 100%;
        }

        .tile:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
            border-color: rgba(255, 107, 107, 0.5);
        }

        .tile.selected {
            background: linear-gradient(145deg, #3a3a6a, #2a2a5a);
            border-color: #feca57;
            box-shadow: 0 0 30px rgba(254, 202, 87, 0.6),
                        inset 0 0 20px rgba(254, 202, 87, 0.2);
            transform: scale(1.1);
        }

        .tile.matched {
            animation: matchPop 0.5s ease forwards;
        }

        @keyframes matchPop {
            0% {
                transform: scale(1.1);
                opacity: 1;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.8;
            }
            100% {
                transform: scale(0);
                opacity: 0;
            }
        }

        .tile.hint {
            animation: hintPulse 1s ease infinite;
        }

        @keyframes hintPulse {
            0%, 100% {
                box-shadow: 0 0 10px rgba(254, 202, 87, 0.5);
            }
            50% {
                box-shadow: 0 0 30px rgba(254, 202, 87, 0.9);
            }
        }

        /* 连接线 */
        .connection-line {
            position: absolute;
            pointer-events: none;
            z-index: 10;
            stroke: #feca57;
            stroke-width: 4;
            fill: none;
            filter: drop-shadow(0 0 10px rgba(254, 202, 87, 0.8));
        }

        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(45deg, #ff6b6b, #ee5a6f);
            color: white;
            box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #4a4a6a, #3a3a5a);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: linear-gradient(45deg, #5a5a7a, #4a4a6a);
            transform: translateY(-3px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 游戏结束弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 25px;
            padding: 40px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 60px rgba(255, 107, 107, 0.2);
            animation: modalSlide 0.4s ease;
            max-width: 90%;
        }

        @keyframes modalSlide {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal h2 {
            font-size: clamp(24px, 5vw, 36px);
            margin-bottom: 20px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal p {
            font-size: clamp(16px, 3vw, 20px);
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 30px;
        }

        .modal-stats {
            display: flex;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .stat {
            text-align: center;
        }

        .stat-value {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 700;
            color: #feca57;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
        }

        /* 难度选择 */
        .difficulty {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .difficulty-btn {
            padding: 8px 20px;
            font-size: 14px;
            border-radius: 25px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .difficulty-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .difficulty-btn.active {
            background: linear-gradient(45deg, #ff6b6b, #ee5a6f);
            border-color: transparent;
            color: white;
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .game-board-wrapper {
                padding: 10px;
            }

            .game-board {
                gap: 4px;
            }

            .info-panel {
                gap: 10px;
            }

            .info-box {
                padding: 8px 15px;
                min-width: 80px;
            }

            .controls {
                gap: 10px;
            }

            .btn {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        /* 连击效果 */
        .combo-text {
            position: absolute;
            font-size: 24px;
            font-weight: 800;
            color: #feca57;
            text-shadow: 0 0 20px rgba(254, 202, 87, 0.8);
            pointer-events: none;
            animation: comboFloat 1s ease forwards;
            z-index: 100;
        }

        @keyframes comboFloat {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-50px) scale(1.5);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="particles" id="particles"></div>

    <!-- CRT 扫描线效果 -->
    <div class="crt-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.1)0px,rgba(0,0,0,0.1)1px,transparent 1px,transparent 2px);"></div>

    <div class="game-container">
        <h1 class="title">✨ 连连看 ✨</h1>

        <!-- 难度选择 -->
        <div class="difficulty">
            <button class="difficulty-btn" data-rows="6" data-cols="8">简单</button>
            <button class="difficulty-btn active" data-rows="8" data-cols="10">普通</button>
            <button class="difficulty-btn" data-rows="10" data-cols="12">困难</button>
        </div>

        <!-- 信息面板 -->
        <div class="info-panel">
            <div class="info-box">
                <div class="info-label">剩余方块</div>
                <div class="info-value" id="remaining">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">得分</div>
                <div class="info-value" id="score">0</div>
            </div>
            <div class="info-box">
                <div class="info-label">时间</div>
                <div class="info-value" id="timer">00:00</div>
            </div>
            <div class="info-box">
                <div class="info-label">连击</div>
                <div class="info-value" id="combo">x1</div>
            </div>
        </div>

        <!-- 游戏面板 -->
        <div class="game-board-wrapper">
            <div class="game-board" id="gameBoard"></div>
            <svg id="lineSvg" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;"></svg>
        </div>

        <!-- 控制按钮 -->
        <div class="controls">
            <button class="btn btn-primary" id="startBtn">开始游戏</button>
            <button class="btn btn-secondary" id="shuffleBtn">洗牌</button>
            <button class="btn btn-secondary" id="hintBtn">提示</button>
        </div>
    </div>

    <!-- 游戏结束弹窗 -->
    <div class="modal-overlay" id="gameOverModal">
        <div class="modal">
            <h2 id="modalTitle">🎉 游戏结束！</h2>
            <p id="modalMessage">恭喜你成功通关！</p>
            <div class="modal-stats">
                <div class="stat">
                    <div class="stat-value" id="finalScore">0</div>
                    <div class="stat-label">得分</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="finalTime">00:00</div>
                    <div class="stat-label">用时</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="finalCombo">0</div>
                    <div class="stat-label">最大连击</div>
                </div>
            </div>
            <button class="btn btn-primary" id="restartBtn">再来一局</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        $(function() {
            // 游戏配置
            const CONFIG = {
                defaultRows: 8,
                defaultCols: 10,
                tileTypes: ['🍎', '🍊', '🍇', '🍓', '🍒', '🍑', '🥝', '🍋', '🍌', '🥭', '🍍', '🥥'],
                timeLimit: 300 // 5 分钟
            };

            // 游戏状态
            let gameState = {
                board: [],
                rows: CONFIG.defaultRows,
                cols: CONFIG.defaultCols,
                selected: null,
                score: 0,
                remaining: 0,
                combo: 1,
                maxCombo: 1,
                startTime: null,
                timerInterval: null,
                isPlaying: false,
                shuffleCount: 3
            };

            // 初始化粒子背景
            function initParticles() {
                const $particles = $('#particles');
                for (let i = 0; i < 30; i++) {
                    const $particle = $('<div class="particle"></div>');
                    $particle.css({
                        left: Math.random() * 100 + '%',
                        animationDelay: Math.random() * 15 + 's',
                        animationDuration: (10 + Math.random() * 10) + 's'
                    });
                    $particles.append($particle);
                }
            }

            // 格式化时间
            function formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }

            // 更新显示
            function updateDisplay() {
                $('#remaining').text(gameState.remaining);
                $('#score').text(gameState.score);
                $('#combo').text('x' + gameState.combo);

                if (gameState.timerInterval) {
                    const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);
                    const remaining = Math.max(0, CONFIG.timeLimit - elapsed);
                    $('#timer').text(formatTime(remaining));

                    if (remaining <= 30) {
                        $('#timer').addClass('danger');
                    } else {
                        $('#timer').removeClass('danger');
                    }

                    if (remaining <= 0) {
                        gameOver(false);
                    }
                }
            }

            // 生成游戏板
            function generateBoard() {
                const totalTiles = gameState.rows * gameState.cols;
                const pairCount = totalTiles / 2;

                // 确保能成对
                if (pairCount * 2 !== totalTiles) {
                    alert('行列数必须为偶数！');
                    return false;
                }

                // 生成成对的图案
                let tiles = [];
                for (let i = 0; i < pairCount; i++) {
                    const tileType = CONFIG.tileTypes[i % CONFIG.tileTypes.length];
                    tiles.push(tileType, tileType);
                }

                // 洗牌
                tiles = shuffleArray(tiles);

                // 创建游戏板（添加外围一圈空白）
                gameState.board = [];
                for (let r = -1; r <= gameState.rows; r++) {
                    const row = [];
                    for (let c = -1; c <= gameState.cols; c++) {
                        if (r === -1 || r === gameState.rows || c === -1 || c === gameState.cols) {
                            row.push(null); // 外围空白区域
                        } else {
                            const index = (r * gameState.cols + c);
                            row.push(index < tiles.length ? { type: tiles[index], eliminated: false } : null);
                        }
                    }
                    gameState.board.push(row);
                }

                return true;
            }

            // Fisher-Yates 洗牌
            function shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            // 渲染游戏板
            function renderBoard() {
                const $board = $('#gameBoard');
                $board.empty();

                $board.css('gridTemplateColumns', `repeat(${gameState.cols}, 1fr)`);

                for (let r = 0; r < gameState.rows; r++) {
                    for (let c = 0; c < gameState.cols; c++) {
                        const tile = gameState.board[r + 1][c + 1];
                        const $tile = $('<div class="tile"></div>');
                        $tile.attr('data-row', r);
                        $tile.attr('data-col', c);

                        if (tile && !tile.eliminated) {
                            $tile.text(tile.type);
                        } else {
                            $tile.css('visibility', 'hidden');
                        }

                        $board.append($tile);
                    }
                }

                updateRemaining();
            }

            // 更新剩余数量
            function updateRemaining() {
                let count = 0;
                for (let r = 0; r < gameState.rows; r++) {
                    for (let c = 0; c < gameState.cols; c++) {
                        const tile = gameState.board[r + 1][c + 1];
                        if (tile && !tile.eliminated) {
                            count++;
                        }
                    }
                }
                gameState.remaining = count;
            }

            // 检查是否可以连接
            function canConnect(r1, c1, r2, c2) {
                // 同一点
                if (r1 === r2 && c1 === c2) return null;

                // 图案不同
                if (getTile(r1, c1)?.type !== getTile(r2, c2)?.type) return null;

                // 转换为内部坐标（+1 是因为外围有空白）
                const sr = r1 + 1, sc = c1 + 1;
                const er = r2 + 1, ec = c2 + 1;

                // 0 拐（直线）
                if (checkStraightLine(sr, sc, er, ec)) {
                    return [{r: sr, c: sc}, {r: er, c: ec}];
                }

                // 1 拐
                const oneCorner = checkOneCorner(sr, sc, er, ec);
                if (oneCorner) return oneCorner;

                // 2 拐
                const twoCorner = checkTwoCorners(sr, sc, er, ec);
                if (twoCorner) return twoCorner;

                return null;
            }

            // 获取方块，处理边界
            function getTile(r, c) {
                if (r < 0 || r >= gameState.rows || c < 0 || c >= gameState.cols) {
                    return null;
                }
                return gameState.board[r + 1][c + 1];
            }

            // 检查是否为空（包括边界外）
            function isEmpty(r, c) {
                if (r < -1 || r > gameState.rows || c < -1 || c > gameState.cols) {
                    return false;
                }
                if (r === -1 || r === gameState.rows || c === -1 || c === gameState.cols) {
                    return true; // 边界外视为空
                }
                const tile = gameState.board[r + 1][c + 1];
                return !tile || tile.eliminated;
            }

            // 检查直线连接
            function checkStraightLine(r1, c1, r2, c2) {
                // 同行
                if (r1 === r2) {
                    const min = Math.min(c1, c2);
                    const max = Math.max(c1, c2);
                    for (let c = min + 1; c < max; c++) {
                        if (!isEmpty(r1 - 1, c - 1)) return false;
                    }
                    return true;
                }
                // 同列
                if (c1 === c2) {
                    const min = Math.min(r1, r2);
                    const max = Math.max(r1, r2);
                    for (let r = min + 1; r < max; r++) {
                        if (!isEmpty(r - 1, c1 - 1)) return false;
                    }
                    return true;
                }
                return false;
            }

            // 检查 1 拐连接
            function checkOneCorner(r1, c1, r2, c2) {
                // 拐点 1: (r1, c2)
                if (isEmpty(r1 - 1, c2 - 1)) {
                    if (checkStraightLine(r1, c1, r1, c2) && checkStraightLine(r1, c2, r2, c2)) {
                        return [{r: r1, c: c1}, {r: r1, c: c2}, {r: r2, c: c2}];
                    }
                }
                // 拐点 2: (r2, c1)
                if (isEmpty(r2 - 1, c1 - 1)) {
                    if (checkStraightLine(r1, c1, r2, c1) && checkStraightLine(r2, c1, r2, c2)) {
                        return [{r: r1, c: c1}, {r: r2, c: c1}, {r: r2, c: c2}];
                    }
                }
                return null;
            }

            // 检查 2 拐连接
            function checkTwoCorners(r1, c1, r2, c2) {
                // 尝试水平延伸
                for (let dc = -1; dc <= gameState.cols + 1; dc++) {
                    const testC = dc;
                    if (testC === c1) continue;

                    // 检查从 (r1, c1) 到 (r1, testC) 是否是直线
                    if (!checkStraightLine(r1, c1, r1, testC)) continue;
                    if (!isEmpty(r1 - 1, testC - 1)) continue;

                    // 检查从 (r1, testC) 到 (r2, testC) 是否是直线
                    if (!checkStraightLine(r1, testC, r2, testC)) continue;
                    if (!isEmpty(r2 - 1, testC - 1)) continue;

                    // 检查从 (r2, testC) 到 (r2, c2) 是否是直线
                    if (!checkStraightLine(r2, testC, r2, c2)) continue;

                    return [
                        {r: r1, c: c1},
                        {r: r1, c: testC},
                        {r: r2, c: testC},
                        {r: r2, c: c2}
                    ];
                }

                // 尝试垂直延伸
                for (let dr = -1; dr <= gameState.rows + 1; dr++) {
                    const testR = dr;
                    if (testR === r1) continue;

                    // 检查从 (r1, c1) 到 (testR, c1) 是否是直线
                    if (!checkStraightLine(r1, c1, testR, c1)) continue;
                    if (!isEmpty(testR - 1, c1 - 1)) continue;

                    // 检查从 (testR, c1) 到 (testR, c2) 是否是直线
                    if (!checkStraightLine(testR, c1, testR, c2)) continue;
                    if (!isEmpty(testR - 1, c2 - 1)) continue;

                    // 检查从 (testR, c2) 到 (r2, c2) 是否是直线
                    if (!checkStraightLine(testR, c2, r2, c2)) continue;

                    return [
                        {r: r1, c: c1},
                        {r: testR, c: c1},
                        {r: testR, c: c2},
                        {r: r2, c: c2}
                    ];
                }

                return null;
            }

            // 绘制连接线
            function drawLine(path) {
                if (!path || path.length < 2) return;

                const $board = $('#gameBoard');
                const boardRect = $board[0].getBoundingClientRect();
                const $tile = $('.tile').first();
                const tileRect = $tile[0].getBoundingClientRect();
                const tileWidth = tileRect.width;
                const tileHeight = tileRect.height;
                const gap = 6;

                let svgPath = '';
                path.forEach((point, index) => {
                    // 转换为显示坐标（减去外围的 1）
                    const displayR = point.r - 1;
                    const displayC = point.c - 1;

                    // 处理边界外的点
                    let x, y;
                    if (displayC < 0) {
                        x = -tileWidth / 2;
                    } else if (displayC >= gameState.cols) {
                        x = gameState.cols * (tileWidth + gap) + tileWidth / 2;
                    } else {
                        x = displayC * (tileWidth + gap) + tileWidth / 2;
                    }

                    if (displayR < 0) {
                        y = -tileHeight / 2;
                    } else if (displayR >= gameState.rows) {
                        y = gameState.rows * (tileHeight + gap) + tileHeight / 2;
                    } else {
                        y = displayR * (tileHeight + gap) + tileHeight / 2;
                    }

                    if (index === 0) {
                        svgPath += `M ${x} ${y} `;
                    } else {
                        svgPath += `L ${x} ${y} `;
                    }
                });

                const $svg = $('#lineSvg');
                $svg.empty();
                const $path = $(`<path class="connection-line" d="${svgPath}"></path>`);
                $svg.append($path);

                // 动画后移除
                setTimeout(() => {
                    $path.fadeOut(300, function() {
                        $(this).remove();
                    });
                }, 500);
            }

            // 消除方块
            function eliminateTiles(r1, c1, r2, c2) {
                const $tiles = $(`.tile[data-row="${r1}"][data-col="${c1}"], .tile[data-row="${r2}"][data-col="${c2}"]`);

                $tiles.addClass('matched');

                // 更新数据
                gameState.board[r1 + 1][c1 + 1].eliminated = true;
                gameState.board[r2 + 1][c2 + 1].eliminated = true;

                // 更新分数
                const baseScore = 10;
                gameState.score += baseScore * gameState.combo;

                // 更新连击
                gameState.combo++;
                if (gameState.combo > gameState.maxCombo) {
                    gameState.maxCombo = gameState.combo;
                }

                // 显示连击效果
                if (gameState.combo > 2) {
                    showComboEffect(gameState.combo);
                }

                setTimeout(() => {
                    $tiles.css('visibility', 'hidden').removeClass('matched selected');
                    updateRemaining();
                    updateDisplay();

                    // 检查是否获胜
                    if (gameState.remaining === 0) {
                        gameOver(true);
                    }
                }, 500);
            }

            // 显示连击效果
            function showComboEffect(combo) {
                const $effect = $('<div class="combo-text"></div>');
                $effect.text(`${combo}连击!`);
                $effect.css({
                    top: '50%',
                    left: '50%',
                    transform: 'translate(-50%, -50%)'
                });
                $('.game-board-wrapper').append($effect);

                setTimeout(() => $effect.remove(), 1000);
            }

            // 查找可匹配的方块对
            function findMatchablePair() {
                const tiles = [];

                // 收集所有未消除的方块
                for (let r = 0; r < gameState.rows; r++) {
                    for (let c = 0; c < gameState.cols; c++) {
                        const tile = gameState.board[r + 1][c + 1];
                        if (tile && !tile.eliminated) {
                            tiles.push({r, c});
                        }
                    }
                }

                // 尝试所有配对
                for (let i = 0; i < tiles.length; i++) {
                    for (let j = i + 1; j < tiles.length; j++) {
                        const path = canConnect(tiles[i].r, tiles[i].c, tiles[j].r, tiles[j].c);
                        if (path) {
                            return {r1: tiles[i].r, c1: tiles[i].c, r2: tiles[j].r, c2: tiles[j].c};
                        }
                    }
                }

                return null;
            }

            // 提示功能
            function showHint() {
                if (!gameState.isPlaying) return;

                // 清除之前的提示
                $('.tile').removeClass('hint');

                const pair = findMatchablePair();
                if (pair) {
                    $(`.tile[data-row="${pair.r1}"][data-col="${pair.c1}"],
                       .tile[data-row="${pair.r2}"][data-col="${pair.c2}"]`).addClass('hint');

                    setTimeout(() => {
                        $('.tile').removeClass('hint');
                    }, 2000);
                } else {
                    // 没有可匹配的，自动洗牌
                    shuffleBoard();
                }
            }

            // 洗牌功能
            function shuffleBoard() {
                if (!gameState.isPlaying) return;

                // 收集所有未消除的方块
                const tiles = [];
                for (let r = 0; r < gameState.rows; r++) {
                    for (let c = 0; c < gameState.cols; c++) {
                        const tile = gameState.board[r + 1][c + 1];
                        if (tile && !tile.eliminated) {
                            tiles.push(tile.type);
                        }
                    }
                }

                if (tiles.length === 0) return;

                // 洗牌
                shuffleArray(tiles);

                // 重新分配到未消除的位置
                let tileIndex = 0;
                for (let r = 0; r < gameState.rows; r++) {
                    for (let c = 0; c < gameState.cols; c++) {
                        const tile = gameState.board[r + 1][c + 1];
                        if (tile && !tile.eliminated) {
                            tile.type = tiles[tileIndex++];
                        }
                    }
                }

                // 重新渲染
                renderBoard();

                // 清除选择
                gameState.selected = null;

                // 动画效果
                $('.game-board').css('transform', 'scale(0.95)');
                setTimeout(() => {
                    $('.game-board').css('transform', 'scale(1)');
                }, 150);
            }

            // 检查是否无解
            function hasSolution() {
                return findMatchablePair() !== null;
            }

            // 游戏结束
            function gameOver(win) {
                gameState.isPlaying = false;
                clearInterval(gameState.timerInterval);

                const elapsed = Math.floor((Date.now() - gameState.startTime) / 1000);

                $('#modalTitle').text(win ? '🎉 恭喜通关！' : '😢 游戏结束');
                $('#modalMessage').text(win ? '你成功消除了所有方块！' : '时间到了，再接再厉！');
                $('#finalScore').text(gameState.score);
                $('#finalTime').text(formatTime(elapsed));
                $('#finalCombo').text(gameState.maxCombo);

                $('#gameOverModal').addClass('active');
            }

            // 开始游戏
            function startGame() {
                // 重置状态
                gameState.selected = null;
                gameState.score = 0;
                gameState.combo = 1;
                gameState.maxCombo = 1;
                gameState.isPlaying = true;
                gameState.startTime = Date.now();
                gameState.shuffleCount = 3;

                // 清除之前的定时器
                if (gameState.timerInterval) {
                    clearInterval(gameState.timerInterval);
                }

                // 生成并渲染游戏板
                if (!generateBoard()) return;
                renderBoard();

                // 检查是否有解，无解则重新生成
                let attempts = 0;
                while (!hasSolution() && attempts < 10) {
                    generateBoard();
                    renderBoard();
                    attempts++;
                }

                // 开始计时
                gameState.timerInterval = setInterval(() => {
                    updateDisplay();
                }, 1000);

                updateDisplay();
                $('#gameOverModal').removeClass('active');
            }

            // 事件处理
            $('#startBtn').on('click', startGame);
            $('#restartBtn').on('click', startGame);

            $('#shuffleBtn').on('click', function() {
                if (gameState.shuffleCount > 0 && gameState.isPlaying) {
                    gameState.shuffleCount--;
                    shuffleBoard();
                    $(this).text(`洗牌 (${gameState.shuffleCount})`);
                }
            });

            $('#hintBtn').on('click', showHint);

            // 难度选择
            $('.difficulty-btn').on('click', function() {
                $('.difficulty-btn').removeClass('active');
                $(this).addClass('active');

                gameState.rows = parseInt($(this).data('rows'));
                gameState.cols = parseInt($(this).data('cols'));
            });

            // 方块点击事件（事件委托）
            $('#gameBoard').on('click', '.tile', function() {
                if (!gameState.isPlaying) return;

                const $tile = $(this);
                if ($tile.css('visibility') === 'hidden') return;

                const r = parseInt($tile.data('row'));
                const c = parseInt($tile.data('col'));

                // 如果已经选中
                if (gameState.selected) {
                    const prevR = gameState.selected.r;
                    const prevC = gameState.selected.c;

                    // 点击同一个，取消选择
                    if (prevR === r && prevC === c) {
                        $tile.removeClass('selected');
                        gameState.selected = null;
                        return;
                    }

                    // 检查是否可以连接
                    const path = canConnect(prevR, prevC, r, c);

                    if (path) {
                        // 可以连接，消除
                        drawLine(path);
                        eliminateTiles(prevR, prevC, r, c);
                        gameState.selected = null;
                    } else {
                        // 不能连接，切换到新选择
                        $(`.tile[data-row="${prevR}"][data-col="${prevC}"]`).removeClass('selected');
                        $tile.addClass('selected');
                        gameState.selected = {r, c};
                    }
                } else {
                    // 第一次选择
                    $tile.addClass('selected');
                    gameState.selected = {r, c};
                }
            });

            // 初始化
            initParticles();
            updateDisplay();

            // 初始生成一个游戏板（未开始状态）
            gameState.rows = CONFIG.defaultRows;
            gameState.cols = CONFIG.defaultCols;
            generateBoard();
            renderBoard();
        });
    </script>
</body>
