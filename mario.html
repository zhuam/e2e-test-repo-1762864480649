<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>超级马里奥兄弟 - Super Mario Bros</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            max-width: 100vw;
            max-height: 100vh;
        }
        #mobileControls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0 15px;
        }
        .mobile-btn-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .dpad {
            display: flex;
            gap: 8px;
        }
        .dpad button, .action-btn {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        .dpad button:active, .action-btn:active {
            background: rgba(255,255,255,0.4);
        }
        .action-btns {
            display: flex;
            gap: 12px;
        }
        .action-btn {
            width: 72px;
            height: 72px;
        }
        #btnJump {
            background: rgba(255,50,50,0.3);
            border-color: rgba(255,100,100,0.5);
        }
        #btnRun {
            width: 56px;
            height: 56px;
            font-size: 14px;
            background: rgba(50,150,255,0.3);
            border-color: rgba(100,180,255,0.5);
            align-self: flex-end;
            margin-bottom: 8px;
        }
        @media (max-width: 768px) {
            #mobileControls { display: block; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="mobileControls">
        <div class="mobile-btn-row">
            <div class="dpad">
                <button id="btnLeft">◀</button>
                <button id="btnRight">▶</button>
            </div>
            <div class="action-btns">
                <button class="action-btn" id="btnRun">B</button>
                <button class="action-btn" id="btnJump">A</button>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const W = 800;
const H = 480;
canvas.width = W;
canvas.height = H;

const TILE = 32;
const GRAVITY = 0.5;
const FRICTION = 0.85;

// Audio
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
function initAudio() { if (!audioCtx) audioCtx = new AudioCtx(); }

function playSound(freq, duration, type = 'square', vol = 0.1) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function sfxJump() { playSound(500, 0.1); setTimeout(() => playSound(700, 0.1), 40); }
function sfxCoin() { playSound(988, 0.06); setTimeout(() => playSound(1319, 0.12), 60); }
function sfxStomp() { playSound(250, 0.1, 'sawtooth'); }
function sfxBump() { playSound(180, 0.08, 'triangle'); }
function sfxDie() {
    playSound(300, 0.1); setTimeout(() => playSound(250, 0.1), 100);
    setTimeout(() => playSound(200, 0.1), 200); setTimeout(() => playSound(150, 0.2), 300);
}
function sfxPowerup() {
    for (let i = 0; i < 6; i++) setTimeout(() => playSound(400 + i * 80, 0.06), i * 50);
}
function sfxBreak() { playSound(300, 0.06, 'sawtooth'); playSound(180, 0.08, 'square'); }
function sfxFlagpole() {
    [523, 587, 659, 698, 784, 880, 988, 1047].forEach((f, i) => setTimeout(() => playSound(f, 0.08), i * 60));
}
function sfxFireball() { playSound(800, 0.05, 'sawtooth', 0.08); playSound(600, 0.06, 'square', 0.06); }
function sfx1up() { for (let i = 0; i < 4; i++) setTimeout(() => playSound(300 + i * 200, 0.08), i * 40); }
function sfxKick() { playSound(150, 0.15, 'sawtooth', 0.15); }

// Game state
let gameState = 'menu';
let score = 0;
let coins = 0;
let lives = 3;
let timeLeft = 400;
let timeCounter = 0;
let cameraX = 0;
let levelWidth = 0;
let animFrame = 0;
let frameCount = 0;

// Input
const keys = { left: false, right: false, up: false, down: false, jump: false, run: false };
let jumpJustPressed = false;
let runJustPressed = false;

document.addEventListener('keydown', e => {
    if (e.repeat) return;
    switch (e.code) {
        case 'ArrowLeft': case 'KeyA': keys.left = true; break;
        case 'ArrowRight': case 'KeyD': keys.right = true; break;
        case 'ArrowUp': case 'KeyW': keys.up = true; break;
        case 'ArrowDown': case 'KeyS': keys.down = true; break;
        case 'Space': keys.jump = true; jumpJustPressed = true; e.preventDefault(); break;
        case 'ShiftLeft': case 'ShiftRight': case 'KeyZ': keys.run = true; runJustPressed = true; break;
    }
    if (gameState === 'menu' || gameState === 'gameover') { initAudio(); startGame(); }
    if (gameState === 'win') { gameState = 'menu'; }
});
document.addEventListener('keyup', e => {
    switch (e.code) {
        case 'ArrowLeft': case 'KeyA': keys.left = false; break;
        case 'ArrowRight': case 'KeyD': keys.right = false; break;
        case 'ArrowUp': case 'KeyW': keys.up = false; break;
        case 'ArrowDown': case 'KeyS': keys.down = false; break;
        case 'Space': keys.jump = false; break;
        case 'ShiftLeft': case 'ShiftRight': case 'KeyZ': keys.run = false; break;
    }
});

function setupMobileBtn(id, key) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.addEventListener('touchstart', e => {
        e.preventDefault();
        keys[key] = true;
        if (key === 'jump') jumpJustPressed = true;
        if (key === 'run') runJustPressed = true;
        initAudio();
        if (gameState === 'menu' || gameState === 'gameover') startGame();
    });
    btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('touchcancel', e => { keys[key] = false; });
}
setupMobileBtn('btnLeft', 'left');
setupMobileBtn('btnRight', 'right');
setupMobileBtn('btnJump', 'jump');
setupMobileBtn('btnRun', 'run');

canvas.addEventListener('click', () => {
    initAudio();
    if (gameState === 'menu' || gameState === 'gameover') startGame();
    if (gameState === 'win') gameState = 'menu';
});

// Tile types
const T = {
    AIR: 0, GROUND: 1, BRICK: 2, QUESTION_COIN: 3, QUESTION_MUSHROOM: 4,
    PIPE_TL: 5, PIPE_TR: 6, PIPE_BL: 7, PIPE_BR: 8, HARD: 9,
    FLAG_POLE: 10, FLAG_TOP: 11, CASTLE_WINDOW: 12, CASTLE_DOOR: 13,
    USED_BLOCK: 14, INVISIBLE_COIN: 15, INVISIBLE_1UP: 16,
    VINE: 17
};

function isSolid(t) {
    return [T.GROUND, T.BRICK, T.QUESTION_COIN, T.QUESTION_MUSHROOM,
            T.PIPE_TL, T.PIPE_TR, T.PIPE_BL, T.PIPE_BR, T.HARD, T.USED_BLOCK].includes(t);
}

const ROWS = Math.ceil(H / TILE);
const COLS = 220;
let levelMap = [];
let entities = [];
let particles = [];
let floatingTexts = [];
let mushrooms = [];
let fireballs = [];
let fireFlowers = [];

let mario = {
    x: 3 * TILE, y: 0, w: 24, h: 30,
    vx: 0, vy: 0,
    onGround: false,
    big: false,
    fire: false,
    invincible: 0,
    facing: 1,
    walkFrame: 0,
    walkTimer: 0,
    dead: false,
    deathTimer: 0,
    winAnim: false,
    winTimer: 0
};

function buildLevel() {
    levelMap = [];
    for (let r = 0; r < ROWS; r++) {
        levelMap[r] = new Array(COLS).fill(T.AIR);
    }

    // Ground (bottom 2 rows)
    for (let c = 0; c < COLS; c++) {
        levelMap[ROWS - 1][c] = T.GROUND;
        levelMap[ROWS - 2][c] = T.GROUND;
    }

    // Gaps
    const gaps = [[16, 18], [36, 38], [55, 57], [63, 64], [120, 122], [170, 172]];
    for (const [s, e] of gaps) {
        for (let c = s; c <= e; c++) {
            levelMap[ROWS - 1][c] = T.AIR;
            levelMap[ROWS - 2][c] = T.AIR;
        }
    }

    // Question blocks with coins
    const coinQuestions = [
        [9, 9], [11, 9], [13, 9], [20, 9],
        [33, 9], [47, 9], [53, 9], [74, 5],
        [92, 9], [101, 9], [113, 9], [131, 9],
        [146, 9], [161, 9]
    ];
    for (const [c, r] of coinQuestions) {
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) levelMap[r][c] = T.QUESTION_COIN;
    }

    // Question block with mushroom
    if (16 < COLS) levelMap[9][16] = T.QUESTION_MUSHROOM;

    // Brick blocks
    const brickPositions = [
        [8, 9], [14, 9], [15, 9],
        [17, 5], [18, 5], [19, 5], [20, 5], [21, 5], [22, 5], [23, 5], [24, 5],
        [32, 9], [33, 9], [34, 9],
        [35, 5], [36, 5], [37, 5], [38, 5], [39, 5], [40, 5], [41, 5],
        [44, 9], [45, 9], [46, 9],
        [52, 9], [53, 9], [54, 9],
        [72, 5], [73, 5], [74, 5], [75, 5], [76, 5], [77, 5],
        [90, 9], [91, 9], [92, 9],
        [93, 5], [94, 5], [95, 5], [96, 5],
        [100, 9], [101, 9], [102, 9],
        [112, 9], [113, 9], [114, 9],
        [130, 9], [131, 9], [132, 9],
        [145, 9], [146, 9], [147, 9],
        [148, 5], [149, 5], [150, 5],
        [160, 9], [161, 9], [162, 9],
        [175, 9], [176, 9], [177, 9]
    ];
    for (const [c, r] of brickPositions) {
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) levelMap[r][c] = T.BRICK;
    }

    // Staircase structures
    function buildStair(startCol, dir, height) {
        for (let h = 0; h < height; h++) {
            const col = dir > 0 ? startCol + h : startCol - h;
            for (let hh = 0; hh <= h; hh++) {
                const row = ROWS - 3 - hh;
                if (row >= 0 && col >= 0 && col < COLS) {
                    levelMap[row][col] = T.HARD;
                }
            }
        }
    }

    buildStair(10, 1, 4);
    buildStair(22, -1, 4);
    buildStair(30, 1, 5);
    buildStair(42, -1, 5);
    buildStair(50, 1, 4);
    buildStair(60, -1, 4);
    buildStair(195, 1, 9);

    // Pipes
    const pipes = [
        [12, 2], [28, 3], [40, 2], [67, 4], [85, 2],
        [105, 4], [135, 3], [155, 2], [178, 4]
    ];
    for (const [col, h] of pipes) {
        const baseRow = ROWS - 2 - h;
        if (col + 1 < COLS) {
            levelMap[baseRow][col] = T.PIPE_TL;
            levelMap[baseRow][col + 1] = T.PIPE_TR;
            for (let hh = 1; hh < h; hh++) {
                const r = baseRow + hh;
                if (r < ROWS) {
                    levelMap[r][col] = T.PIPE_BL;
                    levelMap[r][col + 1] = T.PIPE_BR;
                }
            }
        }
    }

    // Flag pole at end
    const flagCol = 205;
    for (let r = 3; r < ROWS - 2; r++) {
        if (r >= 0 && flagCol < COLS) levelMap[r][flagCol] = T.FLAG_POLE;
    }
    if (flagCol < COLS) levelMap[2][flagCol] = T.FLAG_TOP;

    // Castle at end
    const castleCol = 210;
    for (let r = ROWS - 8; r < ROWS - 2; r++) {
        for (let c = castleCol; c < castleCol + 5; c++) {
            if (r >= 0 && c < COLS) {
                if (r === ROWS - 3 && c >= castleCol + 1 && c <= castleCol + 3) {
                    levelMap[r][c] = T.CASTLE_DOOR;
                } else if (r === ROWS - 6 && c >= castleCol + 1 && c <= castleCol + 3) {
                    levelMap[r][c] = T.CASTLE_WINDOW;
                } else {
                    levelMap[r][c] = T.HARD;
                }
            }
        }
    }

    levelWidth = COLS * TILE;

    // Entities (enemies)
    entities = [];
    const goombaPositions = [7, 15, 24, 31, 43, 51, 58, 70, 78, 88, 98, 108, 118, 128, 140, 150, 165, 180, 188];
    for (const col of goombaPositions) {
        entities.push(createGoomba(col * TILE, (ROWS - 3) * TILE));
    }

    const koopaPositions = [22, 45, 68, 95, 125, 158];
    for (const col of koopaPositions) {
        entities.push(createKoopa(col * TILE, (ROWS - 3) * TILE - 6));
    }

    // Piranha plants in pipes
    const piranhaPipes = [12, 28, 40, 85, 105, 135, 178];
    for (const col of piranhaPipes) {
        let pipeRow = ROWS;
        for (let r = 0; r < ROWS; r++) {
            if (levelMap[r][col] === T.PIPE_TL) { pipeRow = r; break; }
        }
        if (pipeRow < ROWS) {
            entities.push(createPiranha(col * TILE + 2, (pipeRow + 1) * TILE, col));
        }
    }

    particles = [];
    floatingTexts = [];
    mushrooms = [];
    fireballs = [];
    fireFlowers = [];

    // Reset Mario
    mario.x = 3 * TILE;
    mario.y = (ROWS - 4) * TILE;
    mario.vx = 0;
    mario.vy = 0;
    mario.onGround = false;
    mario.big = false;
    mario.fire = false;
    mario.invincible = 0;
    mario.facing = 1;
    mario.walkFrame = 0;
    mario.walkTimer = 0;
    mario.dead = false;
    mario.deathTimer = 0;
    mario.winAnim = false;
    mario.winTimer = 0;
    mario.h = 30;

    cameraX = 0;
    timeLeft = 400;
    timeCounter = 0;
}

function createGoomba(x, y) {
    return {
        type: 'goomba', x, y, w: 28, h: 28, vx: -1.2, vy: 0,
        alive: true, squishTimer: 0, walkFrame: 0, walkTimer: 0, active: false
    };
}

function createKoopa(x, y) {
    return {
        type: 'koopa', x, y, w: 28, h: 38, vx: -1, vy: 0,
        alive: true, shell: false, shellMoving: false, walkFrame: 0, walkTimer: 0, active: false
    };
}

function createPiranha(x, y, pipeCol) {
    return {
        type: 'piranha', x, y, w: 28, h: 32, vx: 0, vy: 0,
        alive: true, pipeCol, state: 'hidden', timer: 0, startY: y, maxY: y - 24, active: false
    };
}

function startGame() {
    score = 0;
    coins = 0;
    lives = 3;
    buildLevel();
    gameState = 'playing';
}

function respawnMario() {
    mario.x = 3 * TILE;
    mario.y = (ROWS - 4) * TILE;
    mario.vx = 0;
    mario.vy = 0;
    mario.big = false;
    mario.fire = false;
    mario.h = 30;
    mario.invincible = 120;
    mario.dead = false;
    mario.deathTimer = 0;
    mario.winAnim = false;
    mario.winTimer = 0;
    cameraX = 0;
    timeLeft = 400;
    timeCounter = 0;
    mushrooms = mushrooms.filter(m => m.collected);
    fireballs = [];
    gameState = 'playing';
}

function getTile(col, row) {
    if (row < 0 || row >= ROWS || col < 0 || col >= COLS) return T.AIR;
    return levelMap[row][col];
}

function rectOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function addFloatingText(x, y, text) {
    floatingTexts.push({ x, y, text, life: 40 });
}

// UPDATE
function update() {
    frameCount++;
    if (frameCount % 4 === 0) animFrame++;

    if (gameState !== 'playing') return;

    if (mario.dead) {
        mario.deathTimer++;
        if (mario.deathTimer < 15) mario.vy = -5;
        mario.vy += GRAVITY;
        mario.y += mario.vy;
        if (mario.deathTimer > 90) {
            lives--;
            if (lives <= 0) {
                gameState = 'gameover';
            } else {
                respawnMario();
            }
        }
        jumpJustPressed = false;
        runJustPressed = false;
        return;
    }

    if (mario.winAnim) {
        mario.winTimer++;
        if (mario.winTimer < 80) {
            mario.y += 2;
        } else {
            mario.vx = 3;
            mario.vy += GRAVITY;
            mario.y += mario.vy;
            mario.onGround = false;
            const feetRow = Math.floor((mario.y + mario.h) / TILE);
            const feetCol = Math.floor((mario.x + mario.w / 2) / TILE);
            if (feetRow >= 0 && feetRow < ROWS && feetCol >= 0 && feetCol < COLS && isSolid(getTile(feetCol, feetRow))) {
                mario.y = feetRow * TILE - mario.h;
                mario.vy = 0;
                mario.onGround = true;
            }
        }
        if (mario.winTimer > 180) {
            gameState = 'win';
            score += timeLeft * 50;
        }
        jumpJustPressed = false;
        runJustPressed = false;
        return;
    }

    // Timer
    timeCounter++;
    if (timeCounter >= 24) {
        timeCounter = 0;
        timeLeft--;
        if (timeLeft <= 0) {
            marioDie();
        }
    }

    // Movement
    const isRunning = keys.run;
    const accel = mario.onGround ? (isRunning ? 0.5 : 0.4) : (isRunning ? 0.35 : 0.25);
    const maxSpeed = isRunning ? 5.5 : 3.5;

    if (keys.left) {
        mario.vx -= accel;
        mario.facing = -1;
    }
    if (keys.right) {
        mario.vx += accel;
        mario.facing = 1;
    }
    if (!keys.left && !keys.right) {
        mario.vx *= FRICTION;
        if (Math.abs(mario.vx) < 0.1) mario.vx = 0;
    }
    mario.vx = Math.max(-maxSpeed, Math.min(maxSpeed, mario.vx));

    // Jump
    if (jumpJustPressed && mario.onGround) {
        mario.vy = mario.big ? -11 : -10;
        mario.onGround = false;
        sfxJump();
    }
    if (!keys.jump && mario.vy < -4) mario.vy = -4;

    // Gravity
    mario.vy += GRAVITY;
    if (mario.vy > 14) mario.vy = 14;

    // Fireball spawn
    if (runJustPressed && mario.fire && fireballs.length < 2) {
        fireballs.push({
            x: mario.x + (mario.facing > 0 ? mario.w : -10),
            y: mario.y + mario.h / 2,
            w: 8, h: 8,
            vx: mario.facing * 6, vy: 0,
            life: 120
        });
        sfxFireball();
    }

    // Horizontal collision
    mario.x += mario.vx;
    resolveCollisionX(mario);

    // Vertical collision
    mario.y += mario.vy;
    mario.onGround = false;
    resolveCollisionY(mario);

    // Walking animation
    if (Math.abs(mario.vx) > 0.5 && mario.onGround) {
        mario.walkTimer++;
        if (mario.walkTimer > (isRunning ? 3 : 5)) {
            mario.walkTimer = 0;
            mario.walkFrame = (mario.walkFrame + 1) % 3;
        }
    } else if (mario.onGround) {
        mario.walkFrame = 0;
        mario.walkTimer = 0;
    }

    if (mario.invincible > 0) mario.invincible--;

    // Fall death
    if (mario.y > ROWS * TILE) {
        marioDie();
    }

    // Camera
    const targetCam = mario.x - W / 3;
    if (targetCam > cameraX) cameraX = targetCam;
    cameraX = Math.max(0, Math.min(cameraX, levelWidth - W));

    // Prevent going back
    if (mario.x < cameraX) mario.x = cameraX;

    // Update entities
    for (const ent of entities) {
        if (ent.type === 'piranha') {
            updatePiranha(ent);
            continue;
        }

        // Activation
        if (!ent.active && ent.x < cameraX + W + 64) {
            ent.active = true;
        }
        if (!ent.active) continue;

        if (!ent.alive) {
            if (ent.squishTimer > 0) ent.squishTimer--;
            continue;
        }

        ent.vy += GRAVITY;
        ent.x += ent.vx;

        // Entity horizontal collision with tiles
        const eL = Math.floor(ent.x / TILE);
        const eR = Math.floor((ent.x + ent.w - 1) / TILE);
        const eT = Math.floor(ent.y / TILE);
        const eB = Math.floor((ent.y + ent.h - 1) / TILE);

        for (let r = eT; r <= eB; r++) {
            for (let c = eL; c <= eR; c++) {
                if (isSolid(getTile(c, r))) {
                    if (ent.vx > 0) {
                        ent.x = c * TILE - ent.w;
                        ent.vx = -ent.vx;
                    } else if (ent.vx < 0) {
                        ent.x = (c + 1) * TILE;
                        ent.vx = -ent.vx;
                    }
                }
            }
        }

        ent.y += ent.vy;

        // Entity vertical collision
        const eL2 = Math.floor(ent.x / TILE);
        const eR2 = Math.floor((ent.x + ent.w - 1) / TILE);
        const eT2 = Math.floor(ent.y / TILE);
        const eB2 = Math.floor((ent.y + ent.h - 1) / TILE);

        for (let r = eT2; r <= eB2; r++) {
            for (let c = eL2; c <= eR2; c++) {
                if (isSolid(getTile(c, r))) {
                    if (ent.vy > 0) {
                        ent.y = r * TILE - ent.h;
                        ent.vy = 0;
                    } else if (ent.vy < 0) {
                        ent.y = (r + 1) * TILE;
                        ent.vy = 0;
                    }
                }
            }
        }

        // Fall death for entities
        if (ent.y > ROWS * TILE + 100) ent.alive = false;

        // Walk anim
        ent.walkTimer++;
        if (ent.walkTimer > 10) {
            ent.walkTimer = 0;
            ent.walkFrame = (ent.walkFrame + 1) % 2;
        }

        // Mario collision with entities
        if (!mario.dead && !mario.winAnim && mario.invincible <= 0) {
            const marioRect = { x: mario.x, y: mario.y, w: mario.w, h: mario.h };
            const entRect = { x: ent.x, y: ent.y, w: ent.w, h: ent.h };

            if (rectOverlap(marioRect, entRect)) {
                if (ent.type === 'goomba') {
                    if (mario.vy > 0 && mario.y + mario.h - 8 < ent.y + ent.h / 2) {
                        ent.alive = false;
                        ent.squishTimer = 30;
                        mario.vy = -7;
                        score += 100;
                        sfxStomp();
                        addFloatingText(ent.x, ent.y, '100');
                    } else {
                        marioHit();
                    }
                } else if (ent.type === 'koopa') {
                    if (!ent.shell) {
                        if (mario.vy > 0 && mario.y + mario.h - 8 < ent.y + ent.h / 2) {
                            ent.shell = true;
                            ent.h = 28;
                            ent.vx = 0;
                            mario.vy = -7;
                            score += 100;
                            sfxStomp();
                            addFloatingText(ent.x, ent.y, '100');
                        } else {
                            marioHit();
                        }
                    } else if (!ent.shellMoving) {
                        if (mario.x + mario.w / 2 < ent.x + ent.w / 2) {
                            ent.vx = 5;
                        } else {
                            ent.vx = -5;
                        }
                        ent.shellMoving = true;
                        sfxStomp();
                    } else {
                        if (mario.vy > 0 && mario.y + mario.h - 8 < ent.y + ent.h / 2) {
                            ent.vx = 0;
                            ent.shellMoving = false;
                            mario.vy = -7;
                        } else {
                            marioHit();
                        }
                    }
                }
            }
        }

        // Shell kills other entities
        if (ent.type === 'koopa' && ent.shell && ent.shellMoving && ent.alive) {
            for (const other of entities) {
                if (other === ent || !other.alive) continue;
                if (other.type === 'piranha' && other.state === 'hidden') continue;
                if (rectOverlap(
                    { x: ent.x, y: ent.y, w: ent.w, h: ent.h },
                    { x: other.x, y: other.y, w: other.w, h: other.h }
                )) {
                    other.alive = false;
                    other.squishTimer = 30;
                    score += 200;
                    addFloatingText(other.x, other.y, '200');
                    sfxStomp();
                }
            }
        }
    }

    // Update fireballs
    for (let i = fireballs.length - 1; i >= 0; i--) {
        const fb = fireballs[i];
        fb.vy += GRAVITY * 0.5;
        fb.x += fb.vx;
        fb.y += fb.vy;

        // Bounce off ground
        const fbRow = Math.floor((fb.y + fb.h) / TILE);
        const fbCol = Math.floor((fb.x + fb.w / 2) / TILE);
        if (fbRow >= 0 && fbRow < ROWS && fbCol >= 0 && fbCol < COLS && isSolid(getTile(fbCol, fbRow))) {
            fb.y = fbRow * TILE - fb.h;
            fb.vy = -5;
        }

        // Hit enemies
        let hit = false;
        for (const ent of entities) {
            if (!ent.alive) continue;
            if (ent.type === 'piranha' && ent.state === 'hidden') continue;
            if (rectOverlap(
                { x: fb.x, y: fb.y, w: fb.w, h: fb.h },
                { x: ent.x, y: ent.y, w: ent.w, h: ent.h }
            )) {
                ent.alive = false;
                ent.squishTimer = 30;
                score += 100;
                addFloatingText(ent.x, ent.y, '100');
                sfxStomp();
                hit = true;
                break;
            }
        }

        // Out of bounds
        if (fb.y > ROWS * TILE || fb.x < cameraX - 50 || fb.x > cameraX + W + 50) hit = true;
        fb.life--;
        if (fb.life <= 0) hit = true;

        if (hit) fireballs.splice(i, 1);
    }

    // Update mushrooms
    for (const m of mushrooms) {
        if (m.collected) continue;
        m.vy += GRAVITY;
        m.x += m.vx;

        const mL = Math.floor(m.x / TILE);
        const mR = Math.floor((m.x + m.w) / TILE);
        const mT = Math.floor(m.y / TILE);
        const mB = Math.floor((m.y + m.h) / TILE);

        for (let r = mT; r <= mB; r++) {
            for (let c = mL; c <= mR; c++) {
                if (isSolid(getTile(c, r))) {
                    if (m.vx > 0) { m.x = c * TILE - m.w; m.vx = -m.vx; }
                    else if (m.vx < 0) { m.x = (c + 1) * TILE; m.vx = -m.vx; }
                    if (m.vy > 0) { m.y = r * TILE - m.h; m.vy = 0; }
                }
            }
        }
        m.y += m.vy;

        if (!mario.dead && rectOverlap(
            { x: mario.x, y: mario.y, w: mario.w, h: mario.h },
            m
        )) {
            m.collected = true;
            if (!mario.big) {
                mario.big = true;
                mario.h = 50;
                mario.y -= 20;
            } else if (!mario.fire) {
                mario.fire = true;
            }
            score += 1000;
            sfxPowerup();
            addFloatingText(m.x, m.y, '1000');
        }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.3;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Update floating texts
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const ft = floatingTexts[i];
        ft.y -= 1;
        ft.life--;
        if (ft.life <= 0) floatingTexts.splice(i, 1);
    }

    // Flag pole check
    const flagCol = 205;
    if (!mario.winAnim && mario.x + mario.w > flagCol * TILE && mario.x < (flagCol + 1) * TILE) {
        mario.winAnim = true;
        mario.winTimer = 0;
        mario.vx = 0;
        mario.vy = 0;
        score += 2000;
        sfxFlagpole();
        addFloatingText(flagCol * TILE, mario.y, '2000');
    }

    jumpJustPressed = false;
    runJustPressed = false;
}

function updatePiranha(ent) {
    if (!ent.active && ent.x < cameraX + W + 64) ent.active = true;
    if (!ent.active) return;

    ent.timer++;
    const cycle = 120;

    if (ent.timer < 30) {
        ent.y = ent.startY - (ent.timer / 30) * (ent.startY - ent.maxY);
        ent.state = 'rising';
    } else if (ent.timer < 90) {
        ent.y = ent.maxY;
        ent.state = 'exposed';
    } else if (ent.timer < 120) {
        ent.y = ent.maxY + ((ent.timer - 90) / 30) * (ent.startY - ent.maxY);
        ent.state = 'retreating';
    } else {
        ent.y = ent.startY;
        ent.state = 'hidden';
        ent.timer = 0;
    }

    // Mario collision with piranha
    if (ent.state !== 'hidden' && !mario.dead && !mario.winAnim && mario.invincible <= 0) {
        if (rectOverlap(
            { x: mario.x, y: mario.y, w: mario.w, h: mario.h },
            { x: ent.x, y: ent.y, w: ent.w, h: ent.h }
        )) {
            marioHit();
        }
    }

    // Fireball kills piranha
    for (let i = fireballs.length - 1; i >= 0; i--) {
        const fb = fireballs[i];
        if (rectOverlap(
            { x: fb.x, y: fb.y, w: fb.w, h: fb.h },
            { x: ent.x, y: ent.y, w: ent.w, h: ent.h }
        )) {
            ent.alive = false;
            ent.squishTimer = 30;
            score += 100;
            addFloatingText(ent.x, ent.y, '100');
            fireballs.splice(i, 1);
            break;
        }
    }
}

function marioHit() {
    if (mario.invincible > 0) return;
    if (mario.fire) {
        mario.fire = false;
        mario.invincible = 60;
        sfxBump();
    } else if (mario.big) {
        mario.big = false;
        mario.fire = false;
        mario.h = 30;
        mario.invincible = 60;
        sfxBump();
    } else {
        marioDie();
    }
}

function marioDie() {
    if (mario.dead) return;
    mario.dead = true;
    mario.deathTimer = 0;
    mario.vy = 0;
    mario.vx = 0;
    sfxDie();
}

function hitBlock(col, row) {
    const tile = getTile(col, row);

    if (tile === T.QUESTION_COIN) {
        levelMap[row][col] = T.USED_BLOCK;
        coins++;
        score += 200;
        sfxCoin();
        addFloatingText(col * TILE, row * TILE - 20, '200');
        particles.push({
            x: col * TILE + TILE / 2, y: row * TILE,
            vx: 0, vy: -6, life: 20, type: 'coin'
        });
        if (coins >= 100) {
            coins -= 100;
            lives++;
            sfx1up();
            addFloatingText(col * TILE, row * TILE - 40, '1UP');
        }
    } else if (tile === T.QUESTION_MUSHROOM) {
        levelMap[row][col] = T.USED_BLOCK;
        sfxPowerup();
        mushrooms.push({
            x: col * TILE, y: row * TILE - TILE,
            w: TILE - 4, h: TILE - 4,
            vx: 2, vy: 0,
            collected: false
        });
    } else if (tile === T.INVISIBLE_COIN) {
        levelMap[row][col] = T.USED_BLOCK;
        coins++;
        score += 200;
        sfxCoin();
        addFloatingText(col * TILE, row * TILE - 20, '200');
        particles.push({
            x: col * TILE + TILE / 2, y: row * TILE,
            vx: 0, vy: -6, life: 20, type: 'coin'
        });
    } else if (tile === T.INVISIBLE_1UP) {
        levelMap[row][col] = T.USED_BLOCK;
        lives++;
        score += 1000;
        sfx1up();
        addFloatingText(col * TILE, row * TILE - 20, '1UP');
    } else if (tile === T.BRICK) {
        levelMap[row][col] = T.AIR;
        sfxBreak();
        score += 50;
        for (let i = 0; i < 4; i++) {
            particles.push({
                x: col * TILE + (i % 2) * 16,
                y: row * TILE + Math.floor(i / 2) * 16,
                vx: (i % 2 === 0 ? -1 : 1) * (2 + Math.random() * 2),
                vy: -4 - Math.random() * 3,
                life: 40, type: 'brick'
            });
        }
    } else if (tile === T.USED_BLOCK || tile === T.HARD) {
        sfxBump();
    } else if (tile >= T.PIPE_TL && tile <= T.PIPE_BR) {
        sfxBump();
    }
}

function resolveCollisionX(obj) {
    const left = Math.floor(obj.x / TILE);
    const right = Math.floor((obj.x + obj.w - 1) / TILE);
    const top = Math.floor(obj.y / TILE);
    const bot = Math.floor((obj.y + obj.h - 1) / TILE);

    for (let r = top; r <= bot; r++) {
        for (let c = left; c <= right; c++) {
            if (c < 0 || c >= COLS || r < 0 || r >= ROWS) continue;
            if (isSolid(levelMap[r][c])) {
                if (obj.vx > 0) {
                    obj.x = c * TILE - obj.w;
                    if (obj === mario) obj.vx = 0;
                } else if (obj.vx < 0) {
                    obj.x = (c + 1) * TILE;
                    if (obj === mario) obj.vx = 0;
                }
            }
        }
    }
}

function resolveCollisionY(obj) {
    const left = Math.floor(obj.x / TILE);
    const right = Math.floor((obj.x + obj.w - 1) / TILE);
    const top = Math.floor(obj.y / TILE);
    const bot = Math.floor((obj.y + obj.h - 1) / TILE);

    for (let r = top; r <= bot; r++) {
        for (let c = left; c <= right; c++) {
            if (c < 0 || c >= COLS || r < 0 || r >= ROWS) continue;
            if (isSolid(levelMap[r][c])) {
                if (obj.vy > 0) {
                    obj.y = r * TILE - obj.h;
                    obj.vy = 0;
                    if (obj === mario) obj.onGround = true;
                } else if (obj.vy < 0) {
                    obj.y = (r + 1) * TILE;
                    obj.vy = 0;
                    if (obj === mario) {
                        hitBlock(c, r);
                    }
                }
            }
        }
    }
}

// RENDER
function render() {
    ctx.clearRect(0, 0, W, H);

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#6b8cff');
    skyGrad.addColorStop(1, '#a8c8ff');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    if (gameState === 'menu') {
        drawMenu();
        return;
    }
    if (gameState === 'gameover') {
        drawGameOver();
        return;
    }
    if (gameState === 'win') {
        drawWin();
        return;
    }

    // Parallax clouds
    drawClouds();

    // Parallax hills
    drawHills();

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Draw tiles
    drawTiles();

    // Draw mushrooms
    for (const m of mushrooms) {
        if (m.collected) continue;
        if (m.x + m.w < cameraX - 50 || m.x > cameraX + W + 50) continue;
        drawMushroom(m);
    }

    // Draw entities
    for (const ent of entities) {
        if (ent.x + ent.w < cameraX - 50 || ent.x > cameraX + W + 50) continue;
        if (!ent.alive && ent.squishTimer <= 0) continue;
        drawEntity(ent);
    }

    // Draw fireballs
    for (const fb of fireballs) {
        drawFireball(fb);
    }

    // Draw particles
    for (const p of particles) {
        if (p.type === 'coin') {
            ctx.fillStyle = '#FFD700';
            const s = 8 * (p.life / 20);
            ctx.fillRect(p.x - s / 2, p.y - s / 2, s, s);
            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 1;
            ctx.strokeRect(p.x - s / 2, p.y - s / 2, s, s);
        } else if (p.type === 'brick') {
            ctx.fillStyle = '#C84C09';
            ctx.fillRect(p.x, p.y, 8, 8);
            ctx.strokeStyle = '#8B3000';
            ctx.lineWidth = 1;
            ctx.strokeRect(p.x, p.y, 8, 8);
        }
    }

    // Draw floating texts
    ctx.textAlign = 'center';
    for (const ft of floatingTexts) {
        ctx.fillStyle = '#FFF';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.font = 'bold 14px Arial';
        ctx.strokeText(ft.text, ft.x, ft.y);
        ctx.fillText(ft.text, ft.x, ft.y);
    }

    // Draw Mario
    if (!mario.dead || mario.deathTimer < 90) {
        if (mario.invincible <= 0 || Math.floor(mario.invincible / 3) % 2 === 0) {
            drawMario();
        }
    }

    ctx.restore();

    // HUD
    drawHUD();
}

function drawTiles() {
    const startCol = Math.max(0, Math.floor(cameraX / TILE) - 1);
    const endCol = Math.min(COLS, Math.ceil((cameraX + W) / TILE) + 1);

    for (let r = 0; r < ROWS; r++) {
        for (let c = startCol; c < endCol; c++) {
            const tile = getTile(c, r);
            const x = c * TILE;
            const y = r * TILE;

            switch (tile) {
                case T.GROUND:
                    ctx.fillStyle = '#C84C09';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#E88B3E';
                    ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
                    ctx.fillStyle = '#C84C09';
                    ctx.fillRect(x + TILE / 2 - 1, y, 2, TILE);
                    ctx.fillRect(x, y + TILE / 2 - 1, TILE, 2);
                    break;

                case T.BRICK:
                    ctx.fillStyle = '#C84C09';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#E88B3E';
                    ctx.fillRect(x + 1, y + 1, 14, 14);
                    ctx.fillRect(x + 17, y + 1, 14, 14);
                    ctx.fillRect(x + 1, y + 17, 14, 14);
                    ctx.fillRect(x + 17, y + 17, 14, 14);
                    ctx.fillStyle = '#8B3000';
                    ctx.fillRect(x, y, TILE, 1);
                    ctx.fillRect(x, y, 1, TILE);
                    break;

                case T.QUESTION_COIN:
                case T.QUESTION_MUSHROOM:
                    const pulse = Math.sin(frameCount * 0.08) * 0.15 + 0.85;
                    ctx.fillStyle = `rgb(${Math.floor(230 * pulse)}, ${Math.floor(168 * pulse)}, 0)`;
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.strokeStyle = '#B8860B';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
                    ctx.fillStyle = '#FFF';
                    ctx.font = 'bold 20px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('?', x + TILE / 2, y + TILE / 2 + 1);
                    break;

                case T.USED_BLOCK:
                    ctx.fillStyle = '#8B7355';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#9B8365';
                    ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
                    ctx.strokeStyle = '#6B5335';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
                    break;

                case T.PIPE_TL:
                    ctx.fillStyle = '#00A800';
                    ctx.fillRect(x - 3, y, TILE + 3, TILE);
                    ctx.fillStyle = '#00D800';
                    ctx.fillRect(x - 1, y + 2, TILE - 2, TILE - 4);
                    ctx.fillStyle = '#007800';
                    ctx.fillRect(x - 3, y, 3, TILE);
                    break;
                case T.PIPE_TR:
                    ctx.fillStyle = '#00A800';
                    ctx.fillRect(x, y, TILE + 3, TILE);
                    ctx.fillStyle = '#00D800';
                    ctx.fillRect(x + 2, y + 2, TILE - 2, TILE - 4);
                    ctx.fillStyle = '#007800';
                    ctx.fillRect(x + TILE, y, 3, TILE);
                    break;
                case T.PIPE_BL:
                    ctx.fillStyle = '#00A800';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#00D800';
                    ctx.fillRect(x + 2, y, TILE - 4, TILE);
                    ctx.fillStyle = '#007800';
                    ctx.fillRect(x, y, 3, TILE);
                    break;
                case T.PIPE_BR:
                    ctx.fillStyle = '#00A800';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#00D800';
                    ctx.fillRect(x + 2, y, TILE - 4, TILE);
                    ctx.fillStyle = '#007800';
                    ctx.fillRect(x + TILE - 3, y, 3, TILE);
                    break;

                case T.HARD:
                    ctx.fillStyle = '#8B8B8B';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#A8A8A8';
                    ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
                    ctx.fillStyle = '#6B6B6B';
                    ctx.fillRect(x, y, TILE, 2);
                    ctx.fillRect(x, y, 2, TILE);
                    break;

                case T.FLAG_POLE:
                    ctx.fillStyle = '#888';
                    ctx.fillRect(x + TILE / 2 - 2, y, 4, TILE);
                    break;

                case T.FLAG_TOP:
                    ctx.fillStyle = '#888';
                    ctx.fillRect(x + TILE / 2 - 2, y, 4, TILE);
                    ctx.fillStyle = '#00A800';
                    ctx.beginPath();
                    ctx.moveTo(x + TILE / 2 + 2, y + 4);
                    ctx.lineTo(x + TILE / 2 + 24, y + 14);
                    ctx.lineTo(x + TILE / 2 + 2, y + 24);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#00D800';
                    ctx.beginPath();
                    ctx.arc(x + TILE / 2, y + 2, 5, 0, Math.PI * 2);
                    ctx.fill();
                    break;

                case T.CASTLE_WINDOW:
                    ctx.fillStyle = '#8B8B8B';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#1a1a2e';
                    ctx.fillRect(x + 6, y + 4, TILE - 12, TILE - 8);
                    ctx.strokeStyle = '#6B6B6B';
                    ctx.lineWidth = 1;
                    ctx.strokeRect(x + 6, y + 4, TILE - 12, TILE - 8);
                    break;

                case T.CASTLE_DOOR:
                    ctx.fillStyle = '#8B8B8B';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#1a1a2e';
                    ctx.fillRect(x + 4, y, TILE - 8, TILE);
                    break;
            }
        }
    }
}

function drawClouds() {
    const clouds = [
        [200, 50, 1.0], [600, 70, 0.7], [1000, 45, 1.2],
        [1500, 65, 0.9], [2000, 55, 1.1], [2600, 75, 0.8],
        [3200, 50, 1.0], [3800, 60, 0.7], [4400, 45, 1.2],
        [5000, 70, 0.9], [5600, 55, 1.1]
    ];
    for (const [cx, cy, s] of clouds) {
        const px = cx - cameraX * 0.3;
        if (px < -100 || px > W + 100) continue;
        drawCloud(px, cy, s);
    }
}

function drawCloud(x, y, scale) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
    const r = 16 * scale;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.arc(x + r * 1.3, y - r * 0.2, r * 0.85, 0, Math.PI * 2);
    ctx.arc(x + r * 2.2, y + r * 0.1, r * 0.75, 0, Math.PI * 2);
    ctx.arc(x + r * 0.8, y + r * 0.2, r * 0.65, 0, Math.PI * 2);
    ctx.fill();
}

function drawHills() {
    const groundY = ROWS * TILE - TILE * 2;
    ctx.fillStyle = '#4aa52e';
    const hills = [
        [150, 1.0], [600, 0.6], [1100, 1.3],
        [1800, 0.8], [2500, 1.1], [3200, 0.7],
        [3900, 1.0], [4600, 0.9], [5300, 1.2]
    ];
    for (const [hx, s] of hills) {
        const px = hx - cameraX * 0.5;
        if (px < -200 || px > W + 200) continue;
        const w = 60 * s;
        ctx.beginPath();
        ctx.arc(px, groundY, w, Math.PI, 0);
        ctx.fill();
    }

    // Bushes
    ctx.fillStyle = '#3d8b25';
    const bushes = [
        [100, 1.0], [500, 0.7], [900, 1.2],
        [1400, 0.8], [1900, 1.0], [2400, 0.9],
        [3000, 1.1], [3600, 0.7], [4200, 1.0],
        [4800, 0.8], [5400, 1.2]
    ];
    for (const [bx, s] of bushes) {
        const px = bx - cameraX * 0.7;
        if (px < -80 || px > W + 80) continue;
        drawBush(px, groundY - 5, s);
    }
}

function drawBush(x, y, scale) {
    const r = 14 * scale;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.arc(x + r * 1.5, y, r * 1.2, 0, Math.PI * 2);
    ctx.arc(x + r * 2.8, y, r, 0, Math.PI * 2);
    ctx.fill();
}

function drawMario() {
    const x = mario.x;
    const y = mario.y;
    const f = mario.facing;

    ctx.save();
    if (f === -1) {
        ctx.translate(x + mario.w / 2, 0);
        ctx.scale(-1, 1);
        ctx.translate(-(x + mario.w / 2), 0);
    }

    if (mario.fire) {
        // Fire Mario - White hat and red overalls
        ctx.fillStyle = '#FFF';
        ctx.fillRect(x + 2, y, 20, 8);
        ctx.fillRect(x, y + 4, 24, 4);
        ctx.fillStyle = '#FFB366';
        ctx.fillRect(x + 4, y + 8, 18, 10);
        ctx.fillStyle = '#000';
        ctx.fillRect(x + 14, y + 10, 4, 4);
        ctx.fillStyle = '#6B3A00';
        ctx.fillRect(x + 10, y + 15, 10, 3);
        ctx.fillStyle = '#FFF';
        ctx.fillRect(x + 2, y + 18, 20, 12);
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x + 4, y + 24, 16, 16);
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(x + 8, y + 26, 3, 3);
        ctx.fillRect(x + 13, y + 26, 3, 3);
        ctx.fillStyle = '#6B3A00';
        if (!mario.onGround) {
            ctx.fillRect(x, y + 40, 10, 10);
            ctx.fillRect(x + 14, y + 40, 10, 10);
        } else if (Math.abs(mario.vx) > 0.5) {
            const fr = mario.walkFrame;
            if (fr === 1) { ctx.fillRect(x - 2, y + 38, 10, 12); ctx.fillRect(x + 16, y + 40, 10, 10); }
            else if (fr === 2) { ctx.fillRect(x, y + 40, 10, 10); ctx.fillRect(x + 16, y + 38, 10, 12); }
            else { ctx.fillRect(x, y + 40, 10, 10); ctx.fillRect(x + 14, y + 40, 10, 10); }
        } else {
            ctx.fillRect(x, y + 40, 10, 10);
            ctx.fillRect(x + 14, y + 40, 10, 10);
        }
    } else if (mario.big) {
        // Big Mario
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x + 2, y, 20, 8);
        ctx.fillRect(x, y + 4, 24, 4);
        ctx.fillStyle = '#FFB366';
        ctx.fillRect(x + 4, y + 8, 18, 10);
        ctx.fillStyle = '#000';
        ctx.fillRect(x + 14, y + 10, 4, 4);
        ctx.fillStyle = '#6B3A00';
        ctx.fillRect(x + 10, y + 15, 10, 3);
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x + 2, y + 18, 20, 12);
        ctx.fillStyle = '#0000FC';
        ctx.fillRect(x + 4, y + 24, 16, 16);
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(x + 8, y + 26, 3, 3);
        ctx.fillRect(x + 13, y + 26, 3, 3);
        ctx.fillStyle = '#6B3A00';
        if (!mario.onGround) {
            ctx.fillRect(x, y + 40, 10, 10);
            ctx.fillRect(x + 14, y + 40, 10, 10);
        } else if (Math.abs(mario.vx) > 0.5) {
            const fr = mario.walkFrame;
            if (fr === 1) { ctx.fillRect(x - 2, y + 38, 10, 12); ctx.fillRect(x + 16, y + 40, 10, 10); }
            else if (fr === 2) { ctx.fillRect(x, y + 40, 10, 10); ctx.fillRect(x + 16, y + 38, 10, 12); }
            else { ctx.fillRect(x, y + 40, 10, 10); ctx.fillRect(x + 14, y + 40, 10, 10); }
        } else {
            ctx.fillRect(x, y + 40, 10, 10);
            ctx.fillRect(x + 14, y + 40, 10, 10);
        }
    } else {
        // Small Mario
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x + 3, y, 16, 6);
        ctx.fillRect(x + 1, y + 3, 20, 3);
        ctx.fillStyle = '#FFB366';
        ctx.fillRect(x + 4, y + 6, 14, 8);
        ctx.fillStyle = '#000';
        ctx.fillRect(x + 12, y + 8, 3, 3);
        ctx.fillStyle = '#6B3A00';
        ctx.fillRect(x + 10, y + 12, 7, 2);
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x + 2, y + 14, 18, 6);
        ctx.fillStyle = '#0000FC';
        ctx.fillRect(x + 4, y + 18, 14, 6);
        ctx.fillStyle = '#6B3A00';
        if (!mario.onGround) {
            ctx.fillRect(x, y + 24, 8, 6);
            ctx.fillRect(x + 14, y + 24, 8, 6);
        } else if (Math.abs(mario.vx) > 0.5) {
            const fr = mario.walkFrame;
            if (fr === 1) { ctx.fillRect(x - 2, y + 22, 8, 8); ctx.fillRect(x + 16, y + 24, 8, 6); }
            else if (fr === 2) { ctx.fillRect(x, y + 24, 8, 6); ctx.fillRect(x + 16, y + 22, 8, 8); }
            else { ctx.fillRect(x, y + 24, 8, 6); ctx.fillRect(x + 14, y + 24, 8, 6); }
        } else {
            ctx.fillRect(x, y + 24, 8, 6);
            ctx.fillRect(x + 14, y + 24, 8, 6);
        }
    }

    ctx.restore();
}

function drawEntity(ent) {
    const x = ent.x, y = ent.y;

    if (ent.type === 'goomba') {
        if (!ent.alive && ent.squishTimer > 0) {
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(x, y + ent.h - 8, ent.w, 8);
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x + 4, y + ent.h - 6, 4, 3);
            ctx.fillRect(x + ent.w - 8, y + ent.h - 6, 4, 3);
        } else {
            ctx.fillStyle = '#A0522D';
            ctx.beginPath();
            ctx.arc(x + ent.w / 2, y + 10, 14, Math.PI, 0);
            ctx.fill();
            ctx.fillRect(x + 2, y + 10, ent.w - 4, 14);
            ctx.fillStyle = '#FFF';
            ctx.fillRect(x + 6, y + 8, 6, 6);
            ctx.fillRect(x + ent.w - 12, y + 8, 6, 6);
            ctx.fillStyle = '#000';
            const eo = ent.walkFrame;
            ctx.fillRect(x + 8 + eo, y + 10, 3, 4);
            ctx.fillRect(x + ent.w - 10 + eo, y + 10, 3, 4);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 5, y + 6, 7, 2);
            ctx.fillRect(x + ent.w - 12, y + 6, 7, 2);
            ctx.fillStyle = '#000';
            if (ent.walkFrame === 0) {
                ctx.fillRect(x, y + ent.h - 6, 10, 6);
                ctx.fillRect(x + ent.w - 10, y + ent.h - 6, 10, 6);
            } else {
                ctx.fillRect(x + 2, y + ent.h - 6, 10, 6);
                ctx.fillRect(x + ent.w - 12, y + ent.h - 6, 10, 6);
            }
        }
    } else if (ent.type === 'koopa') {
        if (ent.shell) {
            ctx.fillStyle = '#00A800';
            ctx.beginPath();
            ctx.ellipse(x + ent.w / 2, y + ent.h / 2, ent.w / 2, ent.h / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.ellipse(x + ent.w / 2, y + ent.h / 2 + 2, ent.w / 3, ent.h / 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#005800';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(x + ent.w / 2, y + ent.h / 2, ent.w / 2, ent.h / 2, 0, 0, Math.PI * 2);
            ctx.stroke();
        } else {
            ctx.fillStyle = '#00A800';
            ctx.beginPath();
            ctx.arc(x + ent.w / 2, y + 10, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.fillRect(x + ent.w / 2 - 6, y + 6, 5, 5);
            ctx.fillRect(x + ent.w / 2 + 1, y + 6, 5, 5);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + ent.w / 2 - 4, y + 8, 3, 3);
            ctx.fillRect(x + ent.w / 2 + 3, y + 8, 3, 3);
            ctx.fillStyle = '#00A800';
            ctx.beginPath();
            ctx.ellipse(x + ent.w / 2, y + 24, 14, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.ellipse(x + ent.w / 2, y + 26, 8, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFB366';
            if (ent.walkFrame === 0) {
                ctx.fillRect(x + 2, y + ent.h - 8, 10, 8);
                ctx.fillRect(x + ent.w - 12, y + ent.h - 8, 10, 8);
            } else {
                ctx.fillRect(x, y + ent.h - 8, 10, 8);
                ctx.fillRect(x + ent.w - 10, y + ent.h - 8, 10, 8);
            }
        }
    } else if (ent.type === 'piranha') {
        if (!ent.alive) return;
        if (ent.state === 'hidden') return;

        ctx.fillStyle = '#00A800';
        ctx.fillRect(x + 8, y + 16, 12, 16);

        ctx.fillStyle = '#FF0000';
        ctx.beginPath();
        ctx.arc(x + 14, y + 12, 14, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.arc(x + 8, y + 8, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 20, y + 8, 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.arc(x + 14, y + 16, 8, 0, Math.PI);
        ctx.fill();

        ctx.fillStyle = '#FFF';
        ctx.beginPath();
        ctx.moveTo(x + 8, y + 14); ctx.lineTo(x + 11, y + 20); ctx.lineTo(x + 14, y + 14);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(x + 14, y + 14); ctx.lineTo(x + 17, y + 20); ctx.lineTo(x + 20, y + 14);
        ctx.fill();
    }
}

function drawMushroom(m) {
    const x = m.x, y = m.y, s = m.w;
    ctx.fillStyle = '#FF0000';
    ctx.beginPath();
    ctx.ellipse(x + s / 2, y + s * 0.35, s / 2, s * 0.35, 0, Math.PI, 0);
    ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(x + s * 0.3, y + s * 0.15, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + s * 0.7, y + s * 0.15, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + s * 0.5, y + s * 0.08, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#F5DEB3';
    ctx.fillRect(x + s * 0.25, y + s * 0.35, s * 0.5, s * 0.5);
    ctx.fillStyle = '#000';
    ctx.fillRect(x + s * 0.3, y + s * 0.45, 3, 4);
    ctx.fillRect(x + s * 0.6, y + s * 0.45, 3, 4);
}

function drawFireball(fb) {
    const pulse = Math.sin(frameCount * 0.3) * 2;
    ctx.fillStyle = '#FF6600';
    ctx.beginPath();
    ctx.arc(fb.x + fb.w / 2, fb.y + fb.h / 2, 4 + pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(fb.x + fb.w / 2, fb.y + fb.h / 2, 2, 0, Math.PI * 2);
    ctx.fill();
}

function drawHUD() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, 40);

    ctx.font = 'bold 14px "Courier New", monospace';
    ctx.textBaseline = 'top';

    ctx.textAlign = 'left';
    ctx.fillStyle = '#FFF';
    ctx.fillText('MARIO', 20, 4);
    ctx.fillText(String(score).padStart(6, '0'), 20, 22);

    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFD700';
    ctx.fillText(`\u{1FA99}×${String(coins).padStart(2, '0')}`, 180, 14);

    ctx.fillStyle = '#FFF';
    ctx.fillText('WORLD', W / 2 - 80, 4);
    ctx.fillText('1-1', W / 2 - 80, 22);

    ctx.textAlign = 'right';
    ctx.fillText('TIME', W - 100, 4);
    ctx.fillText(String(Math.max(0, timeLeft)), W - 100, 22);

    ctx.textAlign = 'left';
    ctx.fillStyle = '#FF6666';
    ctx.fillText(`\u2764 ×${lives}`, W / 2 + 40, 14);

    ctx.fillStyle = '#FFF';
    ctx.textAlign = 'right';
    let stateText = 'SMALL';
    if (mario.fire) stateText = 'FIRE';
    else if (mario.big) stateText = 'SUPER';
    ctx.fillText(stateText, W - 20, 22);
}

function drawMenu() {
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#6b8cff');
    skyGrad.addColorStop(1, '#a8c8ff');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    drawClouds();
    drawHills();

    const groundY = ROWS * TILE - TILE * 2;
    ctx.fillStyle = '#C84C09';
    ctx.fillRect(0, groundY, W, TILE * 2);
    for (let x = 0; x < W; x += TILE) {
        ctx.fillStyle = '#E88B3E';
        ctx.fillRect(x + 2, groundY + 2, TILE - 4, TILE - 4);
        ctx.fillRect(x + 2, groundY + TILE + 2, TILE - 4, TILE - 4);
    }

    const cardW = 520, cardH = 320;
    const cardX = (W - cardW) / 2, cardY = (H - cardH) / 2 - 20;

    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 16); ctx.fill();
    ctx.strokeStyle = '#FFD700'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.roundRect(cardX, cardY, cardW, cardH, 16); ctx.stroke();

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.font = 'bold 36px Arial';
    ctx.fillStyle = '#FF0000';
    ctx.strokeStyle = '#8B0000'; ctx.lineWidth = 4;
    ctx.strokeText('超级马里奥兄弟', W / 2, cardY + 55);
    ctx.fillText('超级马里奥兄弟', W / 2, cardY + 55);

    ctx.font = 'bold 22px Arial';
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 3;
    ctx.strokeText('SUPER MARIO BROS', W / 2, cardY + 90);
    ctx.fillText('SUPER MARIO BROS', W / 2, cardY + 90);

    ctx.font = '15px Arial';
    ctx.fillStyle = '#DDD'; ctx.lineWidth = 0;
    ctx.fillText('← → 或 A D : 移动', W / 2, cardY + 135);
    ctx.fillText('↑ 或 W 或 空格 : 跳跃', W / 2, cardY + 160);
    ctx.fillText('Shift 或 Z : 加速/火球', W / 2, cardY + 185);
    ctx.fillText('↓ 或 S : 加速跑', W / 2, cardY + 210);

    const blink = Math.sin(frameCount * 0.06) > 0;
    if (blink) {
        ctx.font = 'bold 20px Arial';
        ctx.fillStyle = '#FFF';
        ctx.fillText('按任意键开始', W / 2, cardY + 265);
    }

    ctx.font = '13px Arial';
    ctx.fillStyle = '#888';
    ctx.fillText('Pure HTML5 Canvas | 经典重制', W / 2, cardY + 300);
}

function drawGameOver() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.font = 'bold 48px Arial';
    ctx.fillStyle = '#FF0000';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 70);

    ctx.font = '24px Arial';
    ctx.fillStyle = '#FFF';
    ctx.fillText(`最终得分: ${score}`, W / 2, H / 2);
    ctx.fillText(`收集金币: ${coins}`, W / 2, H / 2 + 40);

    const blink = Math.sin(frameCount * 0.06) > 0;
    if (blink) {
        ctx.font = '18px Arial';
        ctx.fillStyle = '#AAA';
        ctx.fillText('按任意键重新开始', W / 2, H / 2 + 100);
    }
}

function drawWin() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < 6; i++) {
        const fx = 80 + i * 120;
        const fy = 70 + Math.sin(frameCount * 0.03 + i) * 40;
        const colors = ['#FF0000', '#FFD700', '#00FF00', '#00BFFF', '#FF69B4', '#FF8C00'];
        ctx.fillStyle = colors[i];
        for (let j = 0; j < 10; j++) {
            const angle = (j / 10) * Math.PI * 2 + frameCount * 0.02;
            const r = 15 + Math.sin(frameCount * 0.05 + j) * 10;
            ctx.beginPath();
            ctx.arc(fx + Math.cos(angle) * r, fy + Math.sin(angle) * r, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    ctx.font = 'bold 48px Arial';
    ctx.fillStyle = '#FFD700';
    ctx.fillText('恭喜通关!', W / 2, H / 2 - 80);

    ctx.font = '28px Arial';
    ctx.fillStyle = '#FFF';
    ctx.fillText(`最终得分: ${score}`, W / 2, H / 2 - 20);
    ctx.fillText(`收集金币: ${coins}`, W / 2, H / 2 + 20);
    ctx.fillText(`剩余时间奖励: +${timeLeft * 50}`, W / 2, H / 2 + 60);

    ctx.font = '18px Arial';
    ctx.fillStyle = '#AAA';
    ctx.fillText('按任意键返回菜单', W / 2, H / 2 + 110);
}

// Polyfill roundRect
if (!ctx.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        if (typeof r === 'number') r = [r, r, r, r];
        this.moveTo(x + r[0], y);
        this.lineTo(x + w - r[1], y);
        this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
        this.lineTo(x + w, y + h - r[2]);
        this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
        this.lineTo(x + r[3], y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
        this.lineTo(x, y + r[0]);
        this.quadraticCurveTo(x, y, x + r[0], y);
        this.closePath();
    };
}

function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
