<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>超级玛丽 - Super Mario</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
            image-rendering: pixelated;
            max-width: 100vw;
            max-height: 100vh;
        }
        #mobileControls {
            display: none;
            position: fixed;
            bottom: 10px;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 0 15px;
        }
        .mobile-btn-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .dpad {
            display: flex;
            gap: 5px;
        }
        .dpad button, .action-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
        .dpad button:active, .action-btn:active {
            background: rgba(255,255,255,0.5);
        }
        .action-btn {
            width: 70px;
            height: 70px;
            background: rgba(255,50,50,0.3);
            border-color: rgba(255,100,100,0.6);
        }
        @media (max-width: 768px) {
            #mobileControls { display: block; }
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="mobileControls">
        <div class="mobile-btn-row">
            <div class="dpad">
                <button id="btnLeft">◀</button>
                <button id="btnRight">▶</button>
            </div>
            <button class="action-btn" id="btnJump">▲</button>
        </div>
    </div>

<script>
// ============================================================
//  Super Mario - Web Version
//  Pure HTML5 Canvas + JavaScript
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Canvas size
const W = 800;
const H = 500;
canvas.width = W;
canvas.height = H;

// ============================================================
//  AUDIO - Web Audio API sound effects
// ============================================================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;

function initAudio() {
    if (!audioCtx) audioCtx = new AudioCtx();
}

function playSound(freq, duration, type = 'square', vol = 0.1) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + duration);
}

function sfxJump() { playSound(400, 0.15); setTimeout(() => playSound(600, 0.1), 50); }
function sfxCoin() { playSound(988, 0.08); setTimeout(() => playSound(1319, 0.15), 80); }
function sfxStomp() { playSound(200, 0.15, 'sawtooth'); }
function sfxBump() { playSound(150, 0.1, 'triangle'); }
function sfxDie() { playSound(200, 0.15); setTimeout(() => playSound(150, 0.15), 150); setTimeout(() => playSound(100, 0.3), 300); }
function sfxPowerup() { for (let i = 0; i < 5; i++) setTimeout(() => playSound(400 + i * 100, 0.08), i * 60); }
function sfxBreak() { playSound(300, 0.08, 'sawtooth'); playSound(200, 0.1, 'square'); }

// ============================================================
//  GAME STATE
// ============================================================
const TILE = 32;
const GRAVITY = 0.55;
const FRICTION = 0.82;

let gameState = 'menu'; // menu, playing, gameover, win
let score = 0;
let coins = 0;
let lives = 3;
let timeLeft = 400;
let timeCounter = 0;
let cameraX = 0;
let levelWidth = 0;
let animFrame = 0;
let frameCount = 0;

// ============================================================
//  INPUT
// ============================================================
const keys = { left: false, right: false, up: false, down: false, jump: false };

document.addEventListener('keydown', e => {
    if (e.repeat) return;
    switch (e.code) {
        case 'ArrowLeft': case 'KeyA': keys.left = true; break;
        case 'ArrowRight': case 'KeyD': keys.right = true; break;
        case 'ArrowUp': case 'KeyW': case 'Space': keys.jump = true; e.preventDefault(); break;
        case 'ArrowDown': case 'KeyS': keys.down = true; break;
    }
    if (gameState === 'menu' || gameState === 'gameover') { initAudio(); startGame(); }
    if (gameState === 'win') { gameState = 'menu'; }
});
document.addEventListener('keyup', e => {
    switch (e.code) {
        case 'ArrowLeft': case 'KeyA': keys.left = false; break;
        case 'ArrowRight': case 'KeyD': keys.right = false; break;
        case 'ArrowUp': case 'KeyW': case 'Space': keys.jump = false; break;
        case 'ArrowDown': case 'KeyS': keys.down = false; break;
    }
});

// Mobile controls
function setupMobileBtn(id, key) {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; initAudio(); if (gameState === 'menu' || gameState === 'gameover') startGame(); });
    btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; });
    btn.addEventListener('touchcancel', e => { keys[key] = false; });
}
setupMobileBtn('btnLeft', 'left');
setupMobileBtn('btnRight', 'right');
setupMobileBtn('btnJump', 'jump');

canvas.addEventListener('click', () => {
    initAudio();
    if (gameState === 'menu' || gameState === 'gameover') startGame();
    if (gameState === 'win') gameState = 'menu';
});

// ============================================================
//  LEVEL DATA
// ============================================================
// Tile types: 0=air, 1=ground, 2=brick, 3=question(coin), 4=question(mushroom), 5=pipe_tl, 6=pipe_tr, 7=pipe_bl, 8=pipe_br, 9=hard_block, 10=flag_pole, 11=flag_top
const LEVEL_ROWS = 16; // H / TILE = ~15.6
const LEVEL_COLS = 220;

let levelMap = [];
let entities = [];
let particles = [];
let floatingTexts = [];
let mushrooms = [];
let bricks = [];

// Mario
let mario = {
    x: 3 * TILE, y: 0, w: 24, h: 30,
    vx: 0, vy: 0,
    onGround: false,
    big: false,
    invincible: 0,
    facing: 1,
    walkFrame: 0,
    walkTimer: 0,
    dead: false,
    deathTimer: 0,
    winAnim: false,
    winTimer: 0
};

function buildLevel() {
    const rows = Math.ceil(H / TILE);
    levelMap = [];
    for (let r = 0; r < rows; r++) {
        levelMap[r] = [];
        for (let c = 0; c < LEVEL_COLS; c++) {
            levelMap[r][c] = 0;
        }
    }

    // Ground (bottom 2 rows)
    for (let c = 0; c < LEVEL_COLS; c++) {
        levelMap[rows - 1][c] = 1;
        levelMap[rows - 2][c] = 1;
    }

    // Gaps
    const gaps = [[28, 30], [68, 69], [120, 122], [170, 171]];
    for (const [s, e] of gaps) {
        for (let c = s; c <= e; c++) {
            levelMap[rows - 1][c] = 0;
            levelMap[rows - 2][c] = 0;
        }
    }

    // Question blocks with coins
    const coinQuestions = [
        [10, 10], [14, 10], [12, 6],
        [45, 10], [48, 10],
        [78, 10], [82, 10],
        [100, 10], [105, 6],
        [130, 10], [135, 10],
        [155, 10],
        [180, 10], [185, 10]
    ];
    for (const [c, r] of coinQuestions) {
        if (r < rows && c < LEVEL_COLS) levelMap[r][c] = 3;
    }

    // Mushroom question block
    if (16 < LEVEL_COLS) levelMap[10][16] = 4;

    // Brick blocks
    const brickPositions = [
        [11, 10], [13, 10], [15, 10],
        [42, 10], [43, 10], [46, 10], [47, 10],
        [75, 10], [76, 10], [77, 10], [80, 10], [81, 10],
        [95, 10], [96, 10], [97, 10],
        [125, 10], [126, 10], [127, 10],
        [150, 10], [151, 10], [152, 10],
        [175, 10], [176, 10], [177, 10], [178, 10]
    ];
    for (const [c, r] of brickPositions) {
        if (r < rows && c < LEVEL_COLS) levelMap[r][c] = 2;
    }

    // Staircase structures
    function buildStair(startCol, dir, height) {
        for (let h = 0; h < height; h++) {
            const col = dir > 0 ? startCol + h : startCol - h;
            for (let hh = 0; hh <= h; hh++) {
                const row = rows - 3 - hh;
                if (row >= 0 && col >= 0 && col < LEVEL_COLS) {
                    levelMap[row][col] = 9;
                }
            }
        }
    }

    // Staircase 1 (before gap 1)
    buildStair(22, 1, 4);
    // Staircase 2 (after gap 1)
    buildStair(34, -1, 4);

    // Staircase 3
    buildStair(55, 1, 5);
    buildStair(63, -1, 5);

    // Staircase near flag
    buildStair(190, 1, 8);

    // Pipes
    const pipes = [
        [20, 2, 10], [38, 3, 9], [52, 2, 10],
        [90, 4, 8], [110, 2, 10],
        [140, 3, 9], [160, 2, 10],
    ];
    for (const [col, h, baseRow] of pipes) {
        if (col + 1 < LEVEL_COLS) {
            levelMap[baseRow][col] = 5;     // pipe top-left
            levelMap[baseRow][col + 1] = 6; // pipe top-right
            for (let hh = 1; hh < h; hh++) {
                const r = baseRow + hh;
                if (r < rows) {
                    levelMap[r][col] = 7;     // pipe body-left
                    levelMap[r][col + 1] = 8; // pipe body-right
                }
            }
        }
    }

    // Elevated platforms
    function buildPlatform(startCol, length, row) {
        for (let i = 0; i < length; i++) {
            const c = startCol + i;
            if (c < LEVEL_COLS && row < rows) levelMap[row][c] = 9;
        }
    }

    buildPlatform(60, 5, 8);
    buildPlatform(85, 4, 6);
    buildPlatform(108, 6, 7);
    buildPlatform(145, 4, 8);
    buildPlatform(165, 5, 6);

    // Flag pole at end
    const flagCol = 198;
    const flagBaseRow = 3;
    for (let r = flagBaseRow; r < rows - 2; r++) {
        if (r >= 0 && flagCol < LEVEL_COLS) levelMap[r][flagCol] = 10;
    }
    if (flagBaseRow - 1 >= 0 && flagCol < LEVEL_COLS) levelMap[flagBaseRow - 1][flagCol] = 11;

    // Castle at end
    const castleCol = 203;
    const castleRow = rows - 7;
    for (let r = castleRow; r < rows - 2; r++) {
        for (let c = castleCol; c < castleCol + 5; c++) {
            if (r >= 0 && c < LEVEL_COLS) levelMap[r][c] = 9;
        }
    }

    levelWidth = LEVEL_COLS * TILE;

    // Entities (enemies)
    entities = [];
    const enemyPositions = [
        18, 25, 33, 40, 44, 50, 58, 62,
        73, 79, 86, 93, 98, 103, 112, 118,
        128, 133, 138, 148, 153, 158, 163, 168,
        173, 182, 187
    ];
    for (const col of enemyPositions) {
        entities.push({
            type: 'goomba',
            x: col * TILE, y: (rows - 3) * TILE,
            w: 28, h: 28,
            vx: -1.2, vy: 0,
            alive: true,
            squishTimer: 0,
            walkFrame: 0,
            walkTimer: 0
        });
    }

    // Some Koopas
    const koopaPositions = [47, 88, 115, 142, 172];
    for (const col of koopaPositions) {
        entities.push({
            type: 'koopa',
            x: col * TILE, y: (rows - 3) * TILE - 6,
            w: 28, h: 38,
            vx: -1, vy: 0,
            alive: true,
            shell: false,
            shellMoving: false,
            walkFrame: 0,
            walkTimer: 0
        });
    }

    particles = [];
    floatingTexts = [];
    mushrooms = [];
    bricks = [];

    // Reset Mario
    mario.x = 3 * TILE;
    mario.y = (rows - 4) * TILE;
    mario.vx = 0;
    mario.vy = 0;
    mario.onGround = false;
    mario.big = false;
    mario.invincible = 0;
    mario.facing = 1;
    mario.walkFrame = 0;
    mario.dead = false;
    mario.deathTimer = 0;
    mario.winAnim = false;
    mario.winTimer = 0;

    cameraX = 0;
    timeLeft = 400;
    timeCounter = 0;
}

function startGame() {
    score = 0;
    coins = 0;
    lives = 3;
    buildLevel();
    gameState = 'playing';
}

function respawnMario() {
    mario.x = 3 * TILE;
    mario.y = 10 * TILE;
    mario.vx = 0;
    mario.vy = 0;
    mario.big = false;
    mario.invincible = 120;
    mario.dead = false;
    mario.deathTimer = 0;
    cameraX = 0;
    timeLeft = 400;
    timeCounter = 0;
    // Reset mushrooms and unhit blocks
    mushrooms = mushrooms.filter(m => m.collected);
    gameState = 'playing';
}

// ============================================================
//  COLLISION HELPERS
// ============================================================
function getTile(col, row) {
    const rows = Math.ceil(H / TILE);
    if (row < 0 || row >= rows || col < 0 || col >= LEVEL_COLS) return 0;
    return levelMap[row][col];
}

function isSolid(tile) {
    return [1, 2, 3, 4, 5, 6, 7, 8, 9].includes(tile);
}

function rectOverlap(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

// ============================================================
//  UPDATE
// ============================================================
function update() {
    frameCount++;
    if (frameCount % 3 === 0) animFrame++;

    if (gameState !== 'playing') return;

    if (mario.dead) {
        mario.deathTimer++;
        if (mario.deathTimer < 20) {
            mario.vy = -4;
        }
        mario.vy += GRAVITY;
        mario.y += mario.vy;
        if (mario.deathTimer > 90) {
            lives--;
            if (lives <= 0) {
                gameState = 'gameover';
            } else {
                respawnMario();
            }
        }
        return;
    }

    if (mario.winAnim) {
        mario.winTimer++;
        if (mario.winTimer < 60) {
            mario.y += 2;
        } else if (mario.winTimer === 60) {
            mario.vx = 3;
        } else {
            mario.vx = 3;
            mario.vy += GRAVITY;
            mario.y += mario.vy;
            mario.onGround = false;
            // Check ground
            const rows = Math.ceil(H / TILE);
            const feetRow = Math.floor((mario.y + mario.h) / TILE);
            const feetCol = Math.floor((mario.x + mario.w / 2) / TILE);
            if (feetRow >= 0 && feetRow < rows && feetCol >= 0 && feetCol < LEVEL_COLS && isSolid(levelMap[feetRow][feetCol])) {
                mario.y = feetRow * TILE - mario.h;
                mario.vy = 0;
                mario.onGround = true;
            }
        }
        if (mario.winTimer > 180) {
            gameState = 'win';
            score += timeLeft * 50;
        }
        return;
    }

    // Timer
    timeCounter++;
    if (timeCounter >= 24) {
        timeCounter = 0;
        timeLeft--;
        if (timeLeft <= 0) {
            marioDie();
        }
    }

    // Mario movement
    const accel = mario.onGround ? 0.45 : 0.35;
    const maxSpeed = keys.down ? 4.5 : 3.8;

    if (keys.left) {
        mario.vx -= accel;
        mario.facing = -1;
    }
    if (keys.right) {
        mario.vx += accel;
        mario.facing = 1;
    }

    if (!keys.left && !keys.right) {
        mario.vx *= FRICTION;
        if (Math.abs(mario.vx) < 0.1) mario.vx = 0;
    }

    mario.vx = Math.max(-maxSpeed, Math.min(maxSpeed, mario.vx));

    // Jump
    if (keys.jump && mario.onGround) {
        mario.vy = mario.big ? -10.5 : -9.8;
        mario.onGround = false;
        sfxJump();
    }

    // Variable jump height
    if (!keys.jump && mario.vy < -3) {
        mario.vy = -3;
    }

    // Gravity
    mario.vy += GRAVITY;
    if (mario.vy > 12) mario.vy = 12;

    // Horizontal collision
    mario.x += mario.vx;
    resolveCollisionX(mario);

    // Vertical collision
    mario.y += mario.vy;
    mario.onGround = false;
    resolveCollisionY(mario);

    // Walking animation
    if (Math.abs(mario.vx) > 0.5 && mario.onGround) {
        mario.walkTimer++;
        if (mario.walkTimer > 5) {
            mario.walkTimer = 0;
            mario.walkFrame = (mario.walkFrame + 1) % 3;
        }
    } else if (mario.onGround) {
        mario.walkFrame = 0;
        mario.walkTimer = 0;
    }

    // Invincibility timer
    if (mario.invincible > 0) mario.invincible--;

    // Fall death
    const rows = Math.ceil(H / TILE);
    if (mario.y > rows * TILE) {
        marioDie();
    }

    // Prevent going left of camera
    if (mario.x < cameraX) mario.x = cameraX;

    // Camera
    const targetCam = mario.x - W / 3;
    if (targetCam > cameraX) cameraX = targetCam;
    if (cameraX < 0) cameraX = 0;
    if (cameraX > levelWidth - W) cameraX = levelWidth - W;

    // Update entities
    for (const ent of entities) {
        if (!ent.alive) {
            if (ent.squishTimer > 0) ent.squishTimer--;
            continue;
        }

        // Only update if near camera
        if (ent.x < cameraX - 100 || ent.x > cameraX + W + 200) continue;

        ent.vy += GRAVITY;
        ent.x += ent.vx;

        // Entity horizontal collision with tiles
        const entLeft = Math.floor(ent.x / TILE);
        const entRight = Math.floor((ent.x + ent.w - 1) / TILE);
        const entTop = Math.floor(ent.y / TILE);
        const entBot = Math.floor((ent.y + ent.h - 1) / TILE);

        for (let r = entTop; r <= entBot; r++) {
            for (let c = entLeft; c <= entRight; c++) {
                if (isSolid(getTile(c, r))) {
                    if (ent.vx > 0) {
                        ent.x = c * TILE - ent.w;
                        ent.vx = -ent.vx;
                    } else if (ent.vx < 0) {
                        ent.x = (c + 1) * TILE;
                        ent.vx = -ent.vx;
                    }
                }
            }
        }

        ent.y += ent.vy;

        // Entity vertical collision
        const entLeft2 = Math.floor(ent.x / TILE);
        const entRight2 = Math.floor((ent.x + ent.w - 1) / TILE);
        const entTop2 = Math.floor(ent.y / TILE);
        const entBot2 = Math.floor((ent.y + ent.h - 1) / TILE);

        for (let r = entTop2; r <= entBot2; r++) {
            for (let c = entLeft2; c <= entRight2; c++) {
                if (isSolid(getTile(c, r))) {
                    if (ent.vy > 0) {
                        ent.y = r * TILE - ent.h;
                        ent.vy = 0;
                    } else if (ent.vy < 0) {
                        ent.y = (r + 1) * TILE;
                        ent.vy = 0;
                    }
                }
            }
        }

        // Fall death for entities
        if (ent.y > rows * TILE + 100) ent.alive = false;

        // Animation
        ent.walkTimer++;
        if (ent.walkTimer > 10) {
            ent.walkTimer = 0;
            ent.walkFrame = (ent.walkFrame + 1) % 2;
        }

        // Mario collision
        if (!mario.dead && !mario.winAnim && mario.invincible <= 0) {
            const marioRect = { x: mario.x, y: mario.y, w: mario.w, h: mario.h };
            const entRect = { x: ent.x, y: ent.y, w: ent.w, h: ent.h };

            if (rectOverlap(marioRect, entRect)) {
                if (ent.type === 'goomba') {
                    // Stomp check: mario falling and above entity
                    if (mario.vy > 0 && mario.y + mario.h - 8 < ent.y + ent.h / 2) {
                        ent.alive = false;
                        ent.squishTimer = 30;
                        mario.vy = -7;
                        score += 100;
                        sfxStomp();
                        addFloatingText(ent.x, ent.y, '100');
                    } else {
                        marioHit();
                    }
                } else if (ent.type === 'koopa') {
                    if (!ent.shell) {
                        if (mario.vy > 0 && mario.y + mario.h - 8 < ent.y + ent.h / 2) {
                            ent.shell = true;
                            ent.h = 28;
                            ent.vx = 0;
                            mario.vy = -7;
                            score += 100;
                            sfxStomp();
                            addFloatingText(ent.x, ent.y, '100');
                        } else {
                            marioHit();
                        }
                    } else if (!ent.shellMoving) {
                        if (mario.x + mario.w / 2 < ent.x + ent.w / 2) {
                            ent.vx = 5;
                        } else {
                            ent.vx = -5;
                        }
                        ent.shellMoving = true;
                        sfxStomp();
                    } else {
                        // Shell moving - check if mario touches from side
                        if (mario.vy > 0 && mario.y + mario.h - 8 < ent.y + ent.h / 2) {
                            ent.vx = 0;
                            ent.shellMoving = false;
                            mario.vy = -7;
                        } else {
                            marioHit();
                        }
                    }
                }
            }
        }

        // Shell kills other entities
        if (ent.type === 'koopa' && ent.shell && ent.shellMoving && ent.alive) {
            for (const other of entities) {
                if (other === ent || !other.alive) continue;
                if (rectOverlap({ x: ent.x, y: ent.y, w: ent.w, h: ent.h }, { x: other.x, y: other.y, w: other.w, h: other.h })) {
                    other.alive = false;
                    other.squishTimer = 30;
                    score += 200;
                    addFloatingText(other.x, other.y, '200');
                    sfxStomp();
                }
            }
        }
    }

    // Update mushrooms
    for (const m of mushrooms) {
        if (m.collected) continue;
        m.vy += GRAVITY;
        m.x += m.vx;

        // Collision with tiles
        const mLeft = Math.floor(m.x / TILE);
        const mRight = Math.floor((m.x + m.w) / TILE);
        const mTop = Math.floor(m.y / TILE);
        const mBot = Math.floor((m.y + m.h) / TILE);

        for (let r = mTop; r <= mBot; r++) {
            for (let c = mLeft; c <= mRight; c++) {
                if (isSolid(getTile(c, r))) {
                    if (m.vx > 0) { m.x = c * TILE - m.w; m.vx = -m.vx; }
                    else if (m.vx < 0) { m.x = (c + 1) * TILE; m.vx = -m.vx; }
                    if (m.vy > 0) { m.y = r * TILE - m.h; m.vy = 0; }
                    else if (m.vy < 0) { m.y = (r + 1) * TILE; m.vy = 0; }
                }
            }
        }
        m.y += m.vy;

        // Mario collects mushroom
        if (!mario.dead && rectOverlap({ x: mario.x, y: mario.y, w: mario.w, h: mario.h }, m)) {
            m.collected = true;
            if (!mario.big) {
                mario.big = true;
                mario.h = 50;
                mario.y -= 20;
            }
            score += 1000;
            sfxPowerup();
            addFloatingText(m.x, m.y, '1000');
        }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.3;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }

    // Update floating texts
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
        const ft = floatingTexts[i];
        ft.y -= 1;
        ft.life--;
        if (ft.life <= 0) floatingTexts.splice(i, 1);
    }

    // Check flag pole
    const flagCol = 198;
    if (!mario.winAnim && mario.x + mario.w > flagCol * TILE && mario.x < (flagCol + 1) * TILE) {
        mario.winAnim = true;
        mario.winTimer = 0;
        mario.vx = 0;
        mario.vy = 0;
        // Score based on flag height
        score += 2000;
        sfxPowerup();
    }
}

function marioHit() {
    if (mario.invincible > 0) return;
    if (mario.big) {
        mario.big = false;
        mario.h = 30;
        mario.invincible = 60;
        sfxBump();
    } else {
        marioDie();
    }
}

function marioDie() {
    if (mario.dead) return;
    mario.dead = true;
    mario.deathTimer = 0;
    mario.vy = 0;
    mario.vx = 0;
    sfxDie();
}

function hitBlock(col, row) {
    const tile = getTile(col, row);

    if (tile === 3) {
        // Question block with coin
        levelMap[row][col] = 9;
        coins++;
        score += 200;
        sfxCoin();
        addFloatingText(col * TILE, row * TILE - 20, '200');
        // Coin animation particle
        particles.push({
            x: col * TILE + TILE / 2, y: row * TILE,
            vx: 0, vy: -6, life: 20, type: 'coin'
        });
    } else if (tile === 4) {
        // Question block with mushroom
        levelMap[row][col] = 9;
        sfxPowerup();
        mushrooms.push({
            x: col * TILE, y: row * TILE - TILE,
            w: TILE - 4, h: TILE - 4,
            vx: 2, vy: 0,
            collected: false
        });
    } else if (tile === 2) {
        // Brick
        levelMap[row][col] = 0;
        sfxBreak();
        score += 50;
        // Brick particles
        for (let i = 0; i < 4; i++) {
            particles.push({
                x: col * TILE + (i % 2) * 16, y: row * TILE + Math.floor(i / 2) * 16,
                vx: (i % 2 === 0 ? -1 : 1) * (2 + Math.random() * 2),
                vy: -4 - Math.random() * 3,
                life: 40, type: 'brick'
            });
        }
    } else if (tile === 9 || tile === 5 || tile === 6 || tile === 7 || tile === 8) {
        sfxBump();
    }
}

function resolveCollisionX(obj) {
    const left = Math.floor(obj.x / TILE);
    const right = Math.floor((obj.x + obj.w - 1) / TILE);
    const top = Math.floor(obj.y / TILE);
    const bot = Math.floor((obj.y + obj.h - 1) / TILE);
    const rows = Math.ceil(H / TILE);

    for (let r = top; r <= bot; r++) {
        for (let c = left; c <= right; c++) {
            if (c < 0 || c >= LEVEL_COLS || r < 0 || r >= rows) continue;
            if (isSolid(levelMap[r][c])) {
                if (obj.vx > 0) {
                    obj.x = c * TILE - obj.w;
                    if (obj === mario) obj.vx = 0;
                } else if (obj.vx < 0) {
                    obj.x = (c + 1) * TILE;
                    if (obj === mario) obj.vx = 0;
                }
            }
        }
    }
}

function resolveCollisionY(obj) {
    const left = Math.floor(obj.x / TILE);
    const right = Math.floor((obj.x + obj.w - 1) / TILE);
    const top = Math.floor(obj.y / TILE);
    const bot = Math.floor((obj.y + obj.h - 1) / TILE);
    const rows = Math.ceil(H / TILE);

    for (let r = top; r <= bot; r++) {
        for (let c = left; c <= right; c++) {
            if (c < 0 || c >= LEVEL_COLS || r < 0 || r >= rows) continue;
            if (isSolid(levelMap[r][c])) {
                if (obj.vy > 0) {
                    obj.y = r * TILE - obj.h;
                    obj.vy = 0;
                    if (obj === mario) obj.onGround = true;
                } else if (obj.vy < 0) {
                    obj.y = (r + 1) * TILE;
                    obj.vy = 0;
                    if (obj === mario) {
                        hitBlock(c, r);
                    }
                }
            }
        }
    }
}

function addFloatingText(x, y, text) {
    floatingTexts.push({ x, y, text, life: 40 });
}

// ============================================================
//  RENDER
// ============================================================
function render() {
    ctx.clearRect(0, 0, W, H);

    // Sky gradient
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#5c94fc');
    skyGrad.addColorStop(0.7, '#88b4fc');
    skyGrad.addColorStop(1, '#b8d4fc');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    // Background clouds
    drawClouds();

    // Background hills
    drawHills();

    if (gameState === 'menu') {
        drawMenu();
        return;
    }

    if (gameState === 'gameover') {
        drawGameOver();
        return;
    }

    if (gameState === 'win') {
        drawWin();
        return;
    }

    ctx.save();
    ctx.translate(-cameraX, 0);

    // Draw tiles
    drawTiles();

    // Draw mushrooms
    for (const m of mushrooms) {
        if (m.collected) continue;
        if (m.x + m.w < cameraX - 50 || m.x > cameraX + W + 50) continue;
        drawMushroom(m);
    }

    // Draw entities
    for (const ent of entities) {
        if (ent.x + ent.w < cameraX - 50 || ent.x > cameraX + W + 50) continue;
        if (!ent.alive && ent.squishTimer <= 0) continue;
        drawEntity(ent);
    }

    // Draw particles
    for (const p of particles) {
        if (p.type === 'coin') {
            ctx.fillStyle = '#FFD700';
            const size = 8 * (p.life / 20);
            ctx.fillRect(p.x - size / 2, p.y - size / 2, size, size);
            ctx.strokeStyle = '#DAA520';
            ctx.lineWidth = 1;
            ctx.strokeRect(p.x - size / 2, p.y - size / 2, size, size);
        } else if (p.type === 'brick') {
            ctx.fillStyle = '#C84C09';
            ctx.fillRect(p.x, p.y, 8, 8);
            ctx.strokeStyle = '#8B3000';
            ctx.lineWidth = 1;
            ctx.strokeRect(p.x, p.y, 8, 8);
        }
    }

    // Draw floating texts
    for (const ft of floatingTexts) {
        ctx.fillStyle = '#FFF';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.font = 'bold 14px Arial';
        ctx.textAlign = 'center';
        ctx.strokeText(ft.text, ft.x, ft.y);
        ctx.fillText(ft.text, ft.x, ft.y);
    }

    // Draw Mario
    if (!mario.dead || mario.deathTimer < 90) {
        if (mario.invincible <= 0 || Math.floor(mario.invincible / 3) % 2 === 0) {
            drawMario();
        }
    }

    ctx.restore();

    // HUD
    drawHUD();
}

function drawTiles() {
    const startCol = Math.max(0, Math.floor(cameraX / TILE) - 1);
    const endCol = Math.min(LEVEL_COLS, Math.ceil((cameraX + W) / TILE) + 1);
    const rows = Math.ceil(H / TILE);

    for (let r = 0; r < rows; r++) {
        for (let c = startCol; c < endCol; c++) {
            const tile = getTile(c, r);
            const x = c * TILE;
            const y = r * TILE;

            switch (tile) {
                case 1: // Ground
                    ctx.fillStyle = '#C84C09';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#E88B3E';
                    ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
                    ctx.fillStyle = '#C84C09';
                    // Brick pattern
                    ctx.fillRect(x + TILE / 2 - 1, y, 2, TILE);
                    ctx.fillRect(x, y + TILE / 2 - 1, TILE, 2);
                    break;

                case 2: // Brick
                    ctx.fillStyle = '#C84C09';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#E88B3E';
                    ctx.fillRect(x + 1, y + 1, 14, 14);
                    ctx.fillRect(x + 17, y + 1, 14, 14);
                    ctx.fillRect(x + 1, y + 17, 14, 14);
                    ctx.fillRect(x + 17, y + 17, 14, 14);
                    ctx.fillStyle = '#8B3000';
                    ctx.fillRect(x, y, TILE, 1);
                    ctx.fillRect(x, y, 1, TILE);
                    break;

                case 3: case 4: // Question block
                    const pulse = Math.sin(frameCount * 0.08) * 0.15 + 0.85;
                    ctx.fillStyle = `rgba(255, 200, 0, ${pulse})`;
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.strokeStyle = '#B8860B';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x + 1, y + 1, TILE - 2, TILE - 2);
                    ctx.fillStyle = '#FFF';
                    ctx.font = 'bold 18px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('?', x + TILE / 2, y + TILE / 2 + 1);
                    break;

                case 5: // Pipe top-left
                    ctx.fillStyle = '#00A800';
                    ctx.fillRect(x - 3, y, TILE + 3, TILE);
                    ctx.fillStyle = '#00D800';
                    ctx.fillRect(x - 1, y + 2, TILE - 2, TILE - 4);
                    ctx.fillStyle = '#007800';
                    ctx.fillRect(x - 3, y, 3, TILE);
                    break;

                case 6: // Pipe top-right
                    ctx.fillStyle = '#00A800';
                    ctx.fillRect(x, y, TILE + 3, TILE);
                    ctx.fillStyle = '#00D800';
                    ctx.fillRect(x + 2, y + 2, TILE - 2, TILE - 4);
                    ctx.fillStyle = '#007800';
                    ctx.fillRect(x + TILE, y, 3, TILE);
                    break;

                case 7: // Pipe body-left
                    ctx.fillStyle = '#00A800';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#00D800';
                    ctx.fillRect(x + 2, y, TILE - 4, TILE);
                    ctx.fillStyle = '#007800';
                    ctx.fillRect(x, y, 3, TILE);
                    break;

                case 8: // Pipe body-right
                    ctx.fillStyle = '#00A800';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#00D800';
                    ctx.fillRect(x + 2, y, TILE - 4, TILE);
                    ctx.fillStyle = '#007800';
                    ctx.fillRect(x + TILE - 3, y, 3, TILE);
                    break;

                case 9: // Hard block / stone
                    ctx.fillStyle = '#8B8B8B';
                    ctx.fillRect(x, y, TILE, TILE);
                    ctx.fillStyle = '#A8A8A8';
                    ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
                    ctx.fillStyle = '#6B6B6B';
                    ctx.fillRect(x, y, TILE, 2);
                    ctx.fillRect(x, y, 2, TILE);
                    break;

                case 10: // Flag pole
                    ctx.fillStyle = '#888';
                    ctx.fillRect(x + TILE / 2 - 2, y, 4, TILE);
                    break;

                case 11: // Flag top
                    ctx.fillStyle = '#888';
                    ctx.fillRect(x + TILE / 2 - 2, y, 4, TILE);
                    // Flag
                    ctx.fillStyle = '#00A800';
                    ctx.beginPath();
                    ctx.moveTo(x + TILE / 2 + 2, y + 4);
                    ctx.lineTo(x + TILE / 2 + 22, y + 12);
                    ctx.lineTo(x + TILE / 2 + 2, y + 20);
                    ctx.closePath();
                    ctx.fill();
                    break;
            }
        }
    }
}

function drawClouds() {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
    const cloudPositions = [
        [200, 50, 1.0], [600, 80, 0.7], [1100, 40, 1.2],
        [1700, 70, 0.8], [2300, 55, 1.1], [2900, 85, 0.6],
        [3500, 45, 0.9], [4200, 65, 1.0], [5000, 50, 0.8],
        [5700, 75, 1.1], [6400, 40, 0.7]
    ];
    for (const [cx, cy, scale] of cloudPositions) {
        const px = cx - cameraX * 0.3; // parallax
        if (px < -100 || px > W + 100) continue;
        drawCloud(px, cy, scale);
    }
}

function drawCloud(x, y, scale) {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    const r = 18 * scale;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.arc(x + r * 1.2, y - r * 0.3, r * 0.8, 0, Math.PI * 2);
    ctx.arc(x + r * 2, y, r * 0.9, 0, Math.PI * 2);
    ctx.arc(x - r * 0.8, y + r * 0.1, r * 0.7, 0, Math.PI * 2);
    ctx.arc(x + r * 1, y + r * 0.2, r * 0.7, 0, Math.PI * 2);
    ctx.fill();
}

function drawHills() {
    const hillBaseY = Math.ceil(H / TILE) * TILE - TILE * 2;
    ctx.fillStyle = '#5BA832';
    const hillPositions = [
        [150, 80, 1.0], [700, 50, 0.7], [1300, 90, 1.2],
        [2000, 60, 0.8], [2800, 75, 1.0], [3600, 55, 0.9],
        [4400, 85, 1.1], [5200, 65, 0.7], [6000, 95, 1.3]
    ];
    for (const [hx, hsize, scale] of hillPositions) {
        const px = hx - cameraX * 0.5;
        if (px < -200 || px > W + 200) continue;
        const w = hsize * scale * 3;
        const h = hsize * scale;
        ctx.beginPath();
        ctx.arc(px, hillBaseY, w, Math.PI, 0);
        ctx.fill();
    }

    // Darker hill outline
    ctx.fillStyle = '#4A8A28';
    for (const [hx, hsize, scale] of hillPositions) {
        const px = hx - cameraX * 0.5;
        if (px < -200 || px > W + 200) continue;
        const w = hsize * scale * 3;
        const h = hsize * scale;
        ctx.beginPath();
        ctx.arc(px, hillBaseY + 5, w, Math.PI, 0);
        ctx.fill();
    }
}

function drawMario() {
    const x = mario.x;
    const y = mario.y;
    const f = mario.facing;
    const h = mario.big ? 50 : 30;

    ctx.save();
    if (f === -1) {
        ctx.translate(x + mario.w / 2, 0);
        ctx.scale(-1, 1);
        ctx.translate(-(x + mario.w / 2), 0);
    }

    if (mario.big) {
        // Big Mario
        // Hat
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x + 2, y, 20, 8);
        ctx.fillRect(x, y + 4, 24, 4);

        // Face
        ctx.fillStyle = '#FFB366';
        ctx.fillRect(x + 4, y + 8, 18, 10);

        // Eyes
        ctx.fillStyle = '#000';
        ctx.fillRect(x + 14, y + 10, 4, 4);

        // Mustache
        ctx.fillStyle = '#6B3A00';
        ctx.fillRect(x + 10, y + 15, 10, 3);

        // Body / overalls
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x + 2, y + 18, 20, 12);

        // Overall blue
        ctx.fillStyle = '#0000FC';
        ctx.fillRect(x + 4, y + 24, 16, 16);

        // Overall buttons
        ctx.fillStyle = '#FFD700';
        ctx.fillRect(x + 8, y + 26, 3, 3);
        ctx.fillRect(x + 13, y + 26, 3, 3);

        // Shoes
        ctx.fillStyle = '#6B3A00';
        if (!mario.onGround) {
            ctx.fillRect(x, y + 40, 10, 10);
            ctx.fillRect(x + 14, y + 40, 10, 10);
        } else if (Math.abs(mario.vx) > 0.5) {
            const frame = mario.walkFrame;
            if (frame === 0) {
                ctx.fillRect(x, y + 40, 10, 10);
                ctx.fillRect(x + 14, y + 40, 10, 10);
            } else if (frame === 1) {
                ctx.fillRect(x - 2, y + 38, 10, 12);
                ctx.fillRect(x + 16, y + 40, 10, 10);
            } else {
                ctx.fillRect(x, y + 40, 10, 10);
                ctx.fillRect(x + 16, y + 38, 10, 12);
            }
        } else {
            ctx.fillRect(x, y + 40, 10, 10);
            ctx.fillRect(x + 14, y + 40, 10, 10);
        }
    } else {
        // Small Mario
        // Hat
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x + 3, y, 16, 6);
        ctx.fillRect(x + 1, y + 3, 20, 3);

        // Face
        ctx.fillStyle = '#FFB366';
        ctx.fillRect(x + 4, y + 6, 14, 8);

        // Eyes
        ctx.fillStyle = '#000';
        ctx.fillRect(x + 12, y + 8, 3, 3);

        // Mustache
        ctx.fillStyle = '#6B3A00';
        ctx.fillRect(x + 10, y + 12, 7, 2);

        // Body
        ctx.fillStyle = '#FF0000';
        ctx.fillRect(x + 2, y + 14, 18, 6);

        // Overalls
        ctx.fillStyle = '#0000FC';
        ctx.fillRect(x + 4, y + 18, 14, 6);

        // Shoes
        ctx.fillStyle = '#6B3A00';
        if (!mario.onGround) {
            ctx.fillRect(x, y + 24, 8, 6);
            ctx.fillRect(x + 14, y + 24, 8, 6);
        } else if (Math.abs(mario.vx) > 0.5) {
            const frame = mario.walkFrame;
            if (frame === 0) {
                ctx.fillRect(x, y + 24, 8, 6);
                ctx.fillRect(x + 14, y + 24, 8, 6);
            } else if (frame === 1) {
                ctx.fillRect(x - 2, y + 22, 8, 8);
                ctx.fillRect(x + 16, y + 24, 8, 6);
            } else {
                ctx.fillRect(x, y + 24, 8, 6);
                ctx.fillRect(x + 16, y + 22, 8, 8);
            }
        } else {
            ctx.fillRect(x, y + 24, 8, 6);
            ctx.fillRect(x + 14, y + 24, 8, 6);
        }
    }

    ctx.restore();
}

function drawEntity(ent) {
    const x = ent.x;
    const y = ent.y;

    if (ent.type === 'goomba') {
        if (!ent.alive && ent.squishTimer > 0) {
            // Squished Goomba
            ctx.fillStyle = '#A0522D';
            ctx.fillRect(x, y + ent.h - 8, ent.w, 8);
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(x + 4, y + ent.h - 6, 4, 3);
            ctx.fillRect(x + ent.w - 8, y + ent.h - 6, 4, 3);
        } else {
            // Body
            ctx.fillStyle = '#A0522D';
            ctx.beginPath();
            ctx.arc(x + ent.w / 2, y + 10, 14, Math.PI, 0);
            ctx.fill();
            ctx.fillRect(x + 2, y + 10, ent.w - 4, 14);

            // Eyes
            ctx.fillStyle = '#FFF';
            ctx.fillRect(x + 6, y + 8, 6, 6);
            ctx.fillRect(x + ent.w - 12, y + 8, 6, 6);
            ctx.fillStyle = '#000';
            const eyeOff = ent.walkFrame;
            ctx.fillRect(x + 8 + eyeOff, y + 10, 3, 4);
            ctx.fillRect(x + ent.w - 10 + eyeOff, y + 10, 3, 4);

            // Angry eyebrows
            ctx.fillStyle = '#000';
            ctx.fillRect(x + 5, y + 6, 7, 2);
            ctx.fillRect(x + ent.w - 12, y + 6, 7, 2);

            // Feet
            ctx.fillStyle = '#000';
            if (ent.walkFrame === 0) {
                ctx.fillRect(x, y + ent.h - 6, 10, 6);
                ctx.fillRect(x + ent.w - 10, y + ent.h - 6, 10, 6);
            } else {
                ctx.fillRect(x + 2, y + ent.h - 6, 10, 6);
                ctx.fillRect(x + ent.w - 12, y + ent.h - 6, 10, 6);
            }
        }
    } else if (ent.type === 'koopa') {
        if (ent.shell) {
            // Shell
            ctx.fillStyle = '#00A800';
            ctx.beginPath();
            ctx.ellipse(x + ent.w / 2, y + ent.h / 2, ent.w / 2, ent.h / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.ellipse(x + ent.w / 2, y + ent.h / 2 + 2, ent.w / 3, ent.h / 3, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#007800';
            ctx.strokeStyle = '#005800';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.ellipse(x + ent.w / 2, y + ent.h / 2, ent.w / 2, ent.h / 2, 0, 0, Math.PI * 2);
            ctx.stroke();
        } else {
            // Full Koopa
            // Head
            ctx.fillStyle = '#00A800';
            ctx.beginPath();
            ctx.arc(x + ent.w / 2, y + 10, 10, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#FFF';
            ctx.fillRect(x + ent.w / 2 - 6, y + 6, 5, 5);
            ctx.fillRect(x + ent.w / 2 + 1, y + 6, 5, 5);
            ctx.fillStyle = '#000';
            ctx.fillRect(x + ent.w / 2 - 4, y + 8, 3, 3);
            ctx.fillRect(x + ent.w / 2 + 3, y + 8, 3, 3);

            // Shell body
            ctx.fillStyle = '#00A800';
            ctx.beginPath();
            ctx.ellipse(x + ent.w / 2, y + 24, 14, 12, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFD700';
            ctx.beginPath();
            ctx.ellipse(x + ent.w / 2, y + 26, 8, 7, 0, 0, Math.PI * 2);
            ctx.fill();

            // Feet
            ctx.fillStyle = '#FFB366';
            if (ent.walkFrame === 0) {
                ctx.fillRect(x + 2, y + ent.h - 8, 10, 8);
                ctx.fillRect(x + ent.w - 12, y + ent.h - 8, 10, 8);
            } else {
                ctx.fillRect(x, y + ent.h - 8, 10, 8);
                ctx.fillRect(x + ent.w - 10, y + ent.h - 8, 10, 8);
            }
        }
    }
}

function drawMushroom(m) {
    const x = m.x;
    const y = m.y;
    const s = m.w;

    // Mushroom cap
    ctx.fillStyle = '#FF0000';
    ctx.beginPath();
    ctx.ellipse(x + s / 2, y + s * 0.35, s / 2, s * 0.35, 0, Math.PI, 0);
    ctx.fill();

    // White spots
    ctx.fillStyle = '#FFF';
    ctx.beginPath();
    ctx.arc(x + s * 0.3, y + s * 0.15, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.7, y + s * 0.15, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x + s * 0.5, y + s * 0.08, 3, 0, Math.PI * 2);
    ctx.fill();

    // Stem
    ctx.fillStyle = '#F5DEB3';
    ctx.fillRect(x + s * 0.25, y + s * 0.35, s * 0.5, s * 0.5);

    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(x + s * 0.3, y + s * 0.45, 3, 4);
    ctx.fillRect(x + s * 0.6, y + s * 0.45, 3, 4);
}

function drawHUD() {
    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, 36);

    ctx.fillStyle = '#FFF';
    ctx.font = 'bold 14px "Courier New", monospace';

    // Score
    ctx.textAlign = 'left';
    ctx.fillText('MARIO', 20, 6);
    ctx.fillText(String(score).padStart(6, '0'), 20, 22);

    // Coins
    ctx.fillStyle = '#FFD700';
    ctx.fillText('\u{1FA99}', 180, 14);
    ctx.fillStyle = '#FFF';
    ctx.fillText(`×${String(coins).padStart(2, '0')}`, 200, 14);

    // World
    ctx.textAlign = 'center';
    ctx.fillText('WORLD', W / 2, 6);
    ctx.fillText('1-1', W / 2, 22);

    // Time
    ctx.textAlign = 'right';
    ctx.fillText('TIME', W - 20, 6);
    ctx.fillText(String(timeLeft), W - 20, 22);

    // Lives
    ctx.textAlign = 'left';
    ctx.fillStyle = '#FF6666';
    ctx.fillText(`❤ ×${lives}`, 280, 14);
    ctx.fillStyle = '#FFF';
}

function drawMenu() {
    // Background
    const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#5c94fc');
    skyGrad.addColorStop(1, '#88b4fc');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, W, H);

    drawClouds();
    drawHills();

    // Ground
    const groundY = Math.ceil(H / TILE) * TILE - TILE * 2;
    ctx.fillStyle = '#C84C09';
    ctx.fillRect(0, groundY, W, TILE * 2);
    ctx.fillStyle = '#E88B3E';
    for (let x = 0; x < W; x += TILE) {
        ctx.fillRect(x + 2, groundY + 2, TILE - 4, TILE - 4);
        ctx.fillRect(x + 2, groundY + TILE + 2, TILE - 4, TILE - 4);
    }

    // Title card
    const cardW = 500;
    const cardH = 300;
    const cardX = (W - cardW) / 2;
    const cardY = (H - cardH) / 2 - 30;

    ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
    ctx.beginPath();
    ctx.roundRect(cardX, cardY, cardW, cardH, 20);
    ctx.fill();

    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.roundRect(cardX, cardY, cardW, cardH, 20);
    ctx.stroke();

    // Title
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Mario icon
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(W / 2 - 40, cardY + 30, 20, 10);
    ctx.fillStyle = '#FFB366';
    ctx.fillRect(W / 2 - 38, cardY + 40, 16, 10);
    ctx.fillStyle = '#FF0000';
    ctx.fillRect(W / 2 - 40, cardY + 50, 20, 8);
    ctx.fillStyle = '#0000FC';
    ctx.fillRect(W / 2 - 38, cardY + 56, 16, 8);

    ctx.font = 'bold 42px Arial';
    ctx.fillStyle = '#FF0000';
    ctx.strokeStyle = '#8B0000';
    ctx.lineWidth = 4;
    ctx.strokeText('超级玛丽', W / 2 + 30, cardY + 50);
    ctx.fillText('超级玛丽', W / 2 + 30, cardY + 50);

    ctx.font = 'bold 24px Arial';
    ctx.fillStyle = '#FFD700';
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 3;
    ctx.strokeText('SUPER MARIO', W / 2, cardY + 90);
    ctx.fillText('SUPER MARIO', W / 2, cardY + 90);

    // Controls
    ctx.font = '16px Arial';
    ctx.fillStyle = '#CCC';
    ctx.lineWidth = 0;
    ctx.fillText('← → 或 A D : 移动', W / 2, cardY + 135);
    ctx.fillText('↑ 或 W 或 空格 : 跳跃', W / 2, cardY + 160);
    ctx.fillText('↓ 或 S : 加速跑', W / 2, cardY + 185);

    // Start prompt
    const blink = Math.sin(frameCount * 0.06) > 0;
    if (blink) {
        ctx.font = 'bold 20px Arial';
        ctx.fillStyle = '#FFF';
        ctx.fillText('按任意键开始游戏', W / 2, cardY + 240);
    }

    ctx.font = '14px Arial';
    ctx.fillStyle = '#888';
    ctx.fillText('纯 HTML5 Canvas 实现', W / 2, cardY + 275);
}

function drawGameOver() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.font = 'bold 48px Arial';
    ctx.fillStyle = '#FF0000';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 60);

    ctx.font = '24px Arial';
    ctx.fillStyle = '#FFF';
    ctx.fillText(`最终得分: ${score}`, W / 2, H / 2);
    ctx.fillText(`收集金币: ${coins}`, W / 2, H / 2 + 35);

    const blink = Math.sin(frameCount * 0.06) > 0;
    if (blink) {
        ctx.font = '18px Arial';
        ctx.fillStyle = '#AAA';
        ctx.fillText('按任意键重新开始', W / 2, H / 2 + 90);
    }
}

function drawWin() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // Fireworks
    for (let i = 0; i < 5; i++) {
        const fx = 100 + i * 150;
        const fy = 80 + Math.sin(frameCount * 0.03 + i) * 40;
        const colors = ['#FF0000', '#FFD700', '#00FF00', '#00BFFF', '#FF69B4'];
        ctx.fillStyle = colors[i];
        for (let j = 0; j < 8; j++) {
            const angle = (j / 8) * Math.PI * 2 + frameCount * 0.02;
            const r = 15 + Math.sin(frameCount * 0.05 + j) * 8;
            ctx.beginPath();
            ctx.arc(fx + Math.cos(angle) * r, fy + Math.sin(angle) * r, 3, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.font = 'bold 48px Arial';
    ctx.fillStyle = '#FFD700';
    ctx.fillText('恭喜通关!', W / 2, H / 2 - 60);

    ctx.font = '28px Arial';
    ctx.fillStyle = '#FFF';
    ctx.fillText(`最终得分: ${score}`, W / 2, H / 2);
    ctx.fillText(`收集金币: ${coins}`, W / 2, H / 2 + 40);

    ctx.font = '18px Arial';
    ctx.fillStyle = '#AAA';
    ctx.fillText('按任意键返回菜单', W / 2, H / 2 + 100);
}

// ============================================================
//  GAME LOOP
// ============================================================
function gameLoop() {
    update();
    render();
    requestAnimationFrame(gameLoop);
}

// Polyfill roundRect if needed
if (!ctx.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        if (typeof r === 'number') r = [r, r, r, r];
        this.moveTo(x + r[0], y);
        this.lineTo(x + w - r[1], y);
        this.quadraticCurveTo(x + w, y, x + w, y + r[1]);
        this.lineTo(x + w, y + h - r[2]);
        this.quadraticCurveTo(x + w, y + h, x + w - r[2], y + h);
        this.lineTo(x + r[3], y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r[3]);
        this.lineTo(x, y + r[0]);
        this.quadraticCurveTo(x, y, x + r[0], y);
        this.closePath();
    };
}

gameLoop();
</script>
