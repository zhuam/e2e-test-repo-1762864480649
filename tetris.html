<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>俄罗斯方块</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .game-container {
      display: flex;
      gap: 30px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    
    .game-area {
      position: relative;
    }
    
    #gameCanvas {
      border: 4px solid #fff;
      border-radius: 10px;
      background: #1a1a2e;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }
    
    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      color: #fff;
      min-width: 150px;
    }
    
    .panel-box {
      background: rgba(255, 255, 255, 0.15);
      padding: 15px;
      border-radius: 15px;
      backdrop-filter: blur(5px);
    }
    
    .panel-box h3 {
      font-size: 14px;
      margin-bottom: 10px;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .panel-box .value {
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
    }
    
    #nextCanvas {
      background: #1a1a2e;
      border: 2px solid #fff;
      border-radius: 8px;
    }
    
    .controls {
      font-size: 12px;
      line-height: 1.8;
      opacity: 0.9;
    }
    
    .controls h3 {
      margin-bottom: 10px;
    }
    
    .btn {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border: none;
      padding: 12px 24px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      width: 100%;
      margin-top: 10px;
    }
    
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(245, 87, 108, 0.4);
    }
    
    .btn:active {
      transform: translateY(0);
    }
    
    .game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.9);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      color: #fff;
      display: none;
      z-index: 100;
    }
    
    .game-over h2 {
      font-size: 32px;
      margin-bottom: 20px;
      color: #f5576c;
    }
    
    .game-over p {
      font-size: 18px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="game-area">
      <canvas id="gameCanvas" width="300" height="600"></canvas>
      <div class="game-over" id="gameOver">
        <h2>游戏结束</h2>
        <p>得分：<span id="finalScore">0</span></p>
        <button class="btn" onclick="restartGame()">重新开始</button>
      </div>
    </div>
    <div class="side-panel">
      <div class="panel-box">
        <h3>得分</h3>
        <div class="value" id="score">0</div>
      </div>
      <div class="panel-box">
        <h3>等级</h3>
        <div class="value" id="level">1</div>
      </div>
      <div class="panel-box">
        <h3>消除行</h3>
        <div class="value" id="lines">0</div>
      </div>
      <div class="panel-box">
        <h3>下一个</h3>
        <canvas id="nextCanvas" width="100" height="100"></canvas>
      </div>
      <div class="panel-box controls">
        <h3>操作说明</h3>
        <div>← → : 移动</div>
        <div>↑ : 旋转</div>
        <div>↓ : 加速下落</div>
        <div>空格 : 直接落下</div>
        <div>P : 暂停</div>
      </div>
      <button class="btn" id="startBtn" onclick="togglePause()">开始游戏</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const nextCanvas = document.getElementById('nextCanvas');
    const nextCtx = nextCanvas.getContext('2d');
    
    const COLS = 10;
    const ROWS = 20;
    const BLOCK_SIZE = 30;
    const NEXT_BLOCK_SIZE = 20;
    
    // 方块形状定义
    const SHAPES = {
      I: { shape: [[1,1,1,1]], color: '#00f5ff' },
      O: { shape: [[1,1],[1,1]], color: '#ffeb3b' },
      T: { shape: [[0,1,0],[1,1,1]], color: '#e040fb' },
      S: { shape: [[0,1,1],[1,1,0]], color: '#69f0ae' },
      Z: { shape: [[1,1,0],[0,1,1]], color: '#ff5252' },
      J: { shape: [[1,0,0],[1,1,1]], color: '#448aff' },
      L: { shape: [[0,0,1],[1,1,1]], color: '#ffab40' }
    };
    
    const SHAPE_KEYS = Object.keys(SHAPES);
    
    let board = [];
    let currentPiece = null;
    let nextPiece = null;
    let score = 0;
    let level = 1;
    let lines = 0;
    let gameLoop = null;
    let isPaused = false;
    let isGameOver = false;
    let isStarted = false;
    let dropInterval = 1000;
    
    function init() {
      board = [];
      for (let row = 0; row < ROWS; row++) {
        board[row] = new Array(COLS).fill(0);
      }
      score = 0;
      level = 1;
      lines = 0;
      isPaused = false;
      isGameOver = false;
      dropInterval = 1000;
      updateUI();
    }
    
    function createPiece() {
      const key = SHAPE_KEYS[Math.floor(Math.random() * SHAPE_KEYS.length)];
      const shapeInfo = SHAPES[key];
      return {
        shape: shapeInfo.shape.map(row => [...row]),
        color: shapeInfo.color,
        x: Math.floor((COLS - shapeInfo.shape[0].length) / 2),
        y: 0
      };
    }
    
    function drawBlock(context, x, y, color, size) {
      context.fillStyle = color;
      context.fillRect(x * size, y * size, size - 1, size - 1);
      
      // 添加高光效果
      context.fillStyle = 'rgba(255, 255, 255, 0.3)';
      context.fillRect(x * size, y * size, size - 1, 3);
      context.fillRect(x * size, y * size, 3, size - 1);
      
      // 添加阴影效果
      context.fillStyle = 'rgba(0, 0, 0, 0.3)';
      context.fillRect(x * size + size - 4, y * size, 3, size - 1);
      context.fillRect(x * size, y * size + size - 4, size - 1, 3);
    }
    
    function drawBoard() {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 画网格
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
      for (let x = 0; x <= COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * BLOCK_SIZE, 0);
        ctx.lineTo(x * BLOCK_SIZE, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * BLOCK_SIZE);
        ctx.lineTo(canvas.width, y * BLOCK_SIZE);
        ctx.stroke();
      }
      
      // 画已固定的方块
      for (let row = 0; row < ROWS; row++) {
        for (let col = 0; col < COLS; col++) {
          if (board[row][col]) {
            drawBlock(ctx, col, row, board[row][col], BLOCK_SIZE);
          }
        }
      }
    }
    
    function drawPiece() {
      if (!currentPiece) return;
      
      for (let row = 0; row < currentPiece.shape.length; row++) {
        for (let col = 0; col < currentPiece.shape[row].length; col++) {
          if (currentPiece.shape[row][col]) {
            drawBlock(ctx, currentPiece.x + col, currentPiece.y + row, currentPiece.color, BLOCK_SIZE);
          }
        }
      }
    }
    
    function drawGhostPiece() {
      if (!currentPiece) return;
      
      let ghostY = currentPiece.y;
      while (isValidMove(currentPiece.shape, currentPiece.x, ghostY + 1)) {
        ghostY++;
      }
      
      ctx.globalAlpha = 0.3;
      for (let row = 0; row < currentPiece.shape.length; row++) {
        for (let col = 0; col < currentPiece.shape[row].length; col++) {
          if (currentPiece.shape[row][col]) {
            drawBlock(ctx, currentPiece.x + col, ghostY + row, currentPiece.color, BLOCK_SIZE);
          }
        }
      }
      ctx.globalAlpha = 1;
    }
    
    function drawNext() {
      nextCtx.fillStyle = '#1a1a2e';
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      
      if (!nextPiece) return;
      
      const offsetX = (nextCanvas.width - nextPiece.shape[0].length * NEXT_BLOCK_SIZE) / 2;
      const offsetY = (nextCanvas.height - nextPiece.shape.length * NEXT_BLOCK_SIZE) / 2;
      
      for (let row = 0; row < nextPiece.shape.length; row++) {
        for (let col = 0; col < nextPiece.shape[row].length; col++) {
          if (nextPiece.shape[row][col]) {
            nextCtx.fillStyle = nextPiece.color;
            nextCtx.fillRect(
              offsetX + col * NEXT_BLOCK_SIZE,
              offsetY + row * NEXT_BLOCK_SIZE,
              NEXT_BLOCK_SIZE - 1,
              NEXT_BLOCK_SIZE - 1
            );
          }
        }
      }
    }
    
    function isValidMove(shape, newX, newY) {
      for (let row = 0; row < shape.length; row++) {
        for (let col = 0; col < shape[row].length; col++) {
          if (shape[row][col]) {
            const x = newX + col;
            const y = newY + row;
            
            if (x < 0 || x >= COLS || y >= ROWS) return false;
            if (y >= 0 && board[y][x]) return false;
          }
        }
      }
      return true;
    }
    
    function rotatePiece() {
      const rotated = currentPiece.shape[0].map((_, i) =>
        currentPiece.shape.map(row => row[i]).reverse()
      );
      
      if (isValidMove(rotated, currentPiece.x, currentPiece.y)) {
        currentPiece.shape = rotated;
      } else if (isValidMove(rotated, currentPiece.x - 1, currentPiece.y)) {
        currentPiece.x -= 1;
        currentPiece.shape = rotated;
      } else if (isValidMove(rotated, currentPiece.x + 1, currentPiece.y)) {
        currentPiece.x += 1;
        currentPiece.shape = rotated;
      }
    }
    
    function movePiece(dir) {
      if (isValidMove(currentPiece.shape, currentPiece.x + dir, currentPiece.y)) {
        currentPiece.x += dir;
      }
    }
    
    function dropPiece() {
      if (isValidMove(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
        currentPiece.y++;
        return true;
      }
      return false;
    }
    
    function hardDrop() {
      while (dropPiece()) {
        score += 2;
      }
      lockPiece();
    }
    
    function lockPiece() {
      for (let row = 0; row < currentPiece.shape.length; row++) {
        for (let col = 0; col < currentPiece.shape[row].length; col++) {
          if (currentPiece.shape[row][col]) {
            const y = currentPiece.y + row;
            const x = currentPiece.x + col;
            if (y >= 0) {
              board[y][x] = currentPiece.color;
            } else {
              gameOver();
              return;
            }
          }
        }
      }
      
      clearLines();
      currentPiece = nextPiece;
      nextPiece = createPiece();
      
      if (!isValidMove(currentPiece.shape, currentPiece.x, currentPiece.y)) {
        gameOver();
      }
      
      drawNext();
      updateUI();
    }
    
    function clearLines() {
      let linesCleared = 0;
      
      for (let row = ROWS - 1; row >= 0; row--) {
        if (board[row].every(cell => cell !== 0)) {
          board.splice(row, 1);
          board.unshift(new Array(COLS).fill(0));
          linesCleared++;
          row++;
        }
      }
      
      if (linesCleared > 0) {
        lines += linesCleared;
        const points = [0, 100, 300, 500, 800];
        score += points[linesCleared] * level;
        
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(100, 1000 - (level - 1) * 100);
      }
    }
    
    function updateUI() {
      document.getElementById('score').textContent = score;
      document.getElementById('level').textContent = level;
      document.getElementById('lines').textContent = lines;
    }
    
    function draw() {
      drawBoard();
      drawGhostPiece();
      drawPiece();
    }
    
    function update() {
      if (!isPaused && !isGameOver && isStarted) {
        if (!dropPiece()) {
          lockPiece();
        }
        draw();
      }
    }
    
    function gameOver() {
      isGameOver = true;
      clearInterval(gameLoop);
      document.getElementById('finalScore').textContent = score;
      document.getElementById('gameOver').style.display = 'block';
    }
    
    function restartGame() {
      document.getElementById('gameOver').style.display = 'none';
      init();
      currentPiece = createPiece();
      nextPiece = createPiece();
      isStarted = true;
      isPaused = false;
      document.getElementById('startBtn').textContent = '暂停';
      drawNext();
      draw();
      
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(update, dropInterval);
    }
    
    function togglePause() {
      if (isGameOver) return;
      
      if (!isStarted) {
        isStarted = true;
        init();
        currentPiece = createPiece();
        nextPiece = createPiece();
        drawNext();
        draw();
        gameLoop = setInterval(update, dropInterval);
        document.getElementById('startBtn').textContent = '暂停';
      } else {
        isPaused = !isPaused;
        document.getElementById('startBtn').textContent = isPaused ? '继续' : '暂停';
      }
    }
    
    document.addEventListener('keydown', (e) => {
      if (isGameOver) return;
      if (!isStarted) return;
      
      switch(e.key) {
        case 'ArrowLeft':
          if (!isPaused) movePiece(-1);
          break;
        case 'ArrowRight':
          if (!isPaused) movePiece(1);
          break;
        case 'ArrowDown':
          if (!isPaused) {
            if (dropPiece()) score += 1;
            updateUI();
          }
          break;
        case 'ArrowUp':
          if (!isPaused) rotatePiece();
          break;
        case ' ':
          if (!isPaused) hardDrop();
          break;
        case 'p':
        case 'P':
          togglePause();
          break;
      }
      
      if (!isPaused) draw();
      e.preventDefault();
    });
    
    // 初始画面
    init();
    drawBoard();
    drawNext();
  </script>
</body>
</html>
